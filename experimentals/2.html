<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FORBINDEN // DUAL IDE</title>
  
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css" />
  <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js"></script>
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

  <style>
    @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@400;700;800&display=swap");
    
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body { 
      overflow: hidden; 
      width: 100vw; height: 100vh;
      user-select: none; font-size: 10px;
      margin: 0; background-color: #050505; 
      font-family: 'JetBrains Mono', monospace;
    }

    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: currentColor; border-radius: var(--scroll-rad, 0); opacity: 0.5; }

    /* DYNAMIC THEME ENGINE */
    .app-wrapper {
      width: 100%; height: 100%; 
      display: flex; flex-direction: column; overflow: hidden;
      background: var(--bg); color: var(--text);
      border: var(--border-w) solid var(--border);
      border-radius: var(--ui-radius, 0);
      transition: background 0.4s ease, color 0.4s ease, border-color 0.4s ease, box-shadow 0.4s ease;
    }

    /* THEME 1: FORSAKEN (BRUTALIST) */
    .theme-brutal {
      --border-w: 6px; --edge-w: 4px; --ui-radius: 0px; --inner-w: 4px;
      font-family: 'Inter', sans-serif; text-transform: uppercase; font-weight: 900;
      box-shadow: 20px 20px 0px var(--border);
    }
    .theme-brutal .btn { border: 4px solid var(--border); box-shadow: 4px 4px 0 var(--border); background: var(--bg); color: var(--text); }
    .theme-brutal .btn:hover { background: var(--text); color: var(--bg); transform: translate(-2px, -2px); box-shadow: 6px 6px 0 var(--border); }
    .theme-brutal .node-circle { background: var(--bg); border: 4px solid var(--border); box-shadow: 4px 4px 0px var(--border); }
    .theme-brutal .node-label { background: var(--bg); color: var(--text); border: 4px solid var(--border); box-shadow: 4px 4px 0px var(--border); font-weight: 900; }
    .theme-brutal .editor-wrap, .theme-brutal .modal-content { border: 6px solid var(--border); box-shadow: 8px 8px 0px var(--border); }
    .theme-brutal .modal-content { box-shadow: 20px 20px 0px var(--border); }
    .theme-brutal .panel { border-right: var(--border-w) solid var(--border); border-top: var(--border-w) solid var(--border); background: var(--bg); }
    .theme-brutal .list-item:hover { background: var(--text); color: var(--bg); }
    .theme-brutal .editor-tab { border-right: var(--inner-w) solid var(--border); background: transparent; }
    .theme-brutal .editor-tab.active { background: var(--text); color: var(--bg); }
    .theme-brutal .breadcrumb { border-bottom: var(--inner-w) solid var(--border); }
    .theme-brutal .nle-clip { border-width: 2px; border-radius: 0; box-shadow: 4px 4px 0 var(--border); font-weight: 900; }

    /* THEME 2: OBSIDIAN (CYBERPUNK) */
    .theme-cyber {
      --border-w: 1px; --edge-w: 2px; --ui-radius: 12px; --inner-w: 1px;
      font-family: 'JetBrains Mono', monospace; text-transform: none; font-weight: 400;
      box-shadow: 0 0 80px var(--theme-glow);
    }
    .theme-cyber .canvas-bg { background-image: radial-gradient(circle, rgba(255,255,255,0.05) 1px, transparent 1px); background-size: 24px 24px; }
    .theme-cyber .btn { border: 1px solid var(--border); border-radius: 4px; background: transparent; color: var(--text); font-weight: 700; }
    .theme-cyber .btn:hover { background: var(--theme-glow); }
    .theme-cyber .node-circle { border-radius: 50%; background: var(--bg); border: 2px solid var(--text); box-shadow: 0 0 10px var(--theme-glow); }
    .theme-cyber .node-label { background: var(--bg); color: var(--text); border: 1px solid var(--border); border-radius: 4px; }
    .theme-cyber .editor-wrap { border: 1px solid var(--border); border-radius: 8px; }
    .theme-cyber .modal-content { border: 1px solid var(--border); border-radius: 12px; box-shadow: 0 20px 80px rgba(0,0,0,0.9); }
    .theme-cyber .edge-path { stroke: rgba(255,255,255,0.15); }
    .theme-cyber .panel { border-right: var(--border-w) solid var(--border); border-top: var(--border-w) solid var(--border); background: #050505; }
    .theme-cyber .list-item:hover { background: rgba(255,255,255,0.05); color: var(--text); }
    .theme-cyber .editor-tab { border-right: 1px solid var(--border); border-bottom: 2px solid transparent; background: transparent; }
    .theme-cyber .editor-tab.active { border-bottom-color: var(--text); color: #ffffff; background: rgba(255,255,255,0.02); }
    .theme-cyber .breadcrumb { border-bottom: 1px solid var(--border); }
    .theme-cyber .nle-clip { background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 4px; }

    /* IDE LAYOUT COMPONENTS */
    .app-header { height: 56px; display: flex; align-items: center; justify-content: space-between; padding: 0 24px; border-bottom: var(--border-w) solid var(--border); z-index: 50; flex-shrink: 0; background: var(--bg); transition: all 0.4s ease; }
    .hdr-brand { font-size: 18px; letter-spacing: -0.5px; display: flex; align-items: center; gap: 12px; font-family: 'Inter', sans-serif; font-weight: 900;}
    .btn { cursor: pointer; outline: none; padding: 8px 16px; font-size: 11px; transition: all 0.2s ease; font-family: inherit; }
    .app-body { display: flex; flex: 1; min-height: 0; position: relative; overflow: hidden; }
    
    .sidebar { width: 60px; border-right: var(--border-w) solid var(--border); display: flex; flex-direction: column; align-items: center; padding: 24px 0; gap: 24px; z-index: 200; flex-shrink: 0; background: var(--bg); position: relative; transition: all 0.4s ease; }
    .strip-icon { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; cursor: pointer; border: var(--inner-w) solid transparent; transition: all 0.2s; color: var(--text); border-radius: var(--ui-radius); position: relative; }
    .strip-icon.active { border-color: var(--border); background: rgba(128,128,128,0.1); }
    .badge { position: absolute; top: -4px; right: -4px; background: var(--text); color: var(--bg); font-size: 8px; font-weight: bold; width: 14px; height: 14px; display: flex; align-items: center; justify-content: center; border-radius: 50%; }

    /* FLOATING PANELS */
    .floating-panel { position: absolute; display: flex; flex-direction: column; background: var(--bg); border: var(--border-w) solid var(--border); border-radius: var(--ui-radius); transition: box-shadow 0.2s, border-color 0.4s ease, background 0.4s ease; }
    .panel-hdr { padding: 12px 16px; font-size: 11px; border-bottom: var(--inner-w) solid var(--border); opacity: 0.9; font-weight: bold; display: flex; justify-content: space-between; align-items: center; background: rgba(128,128,128,0.05); transition: border-color 0.4s ease; }
    .panel-hdr:active { opacity: 1; }
    .panel-content-wrap { flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; }
    .panel-resizer { position: absolute; bottom: 0; right: 0; width: 22px; height: 22px; cursor: nwse-resize; background: linear-gradient(135deg, transparent 50%, var(--text) 50%); opacity: 0.2; transition: opacity 0.2s, transform 0.2s; }
    .panel-resizer:hover { opacity: 1; transform: scale(1.1); }
    .list-item { padding: 10px 16px; cursor: pointer; display: flex; align-items: center; gap: 10px; font-size: 11px; transition: background 0.2s; border-bottom: 1px solid rgba(128,128,128,0.1); }

    .main-view { flex: 1; display: flex; flex-direction: column; position: relative; min-width: 0; }
    .canvas-container { flex: 1; position: relative; overflow: hidden; cursor: grab; background: transparent; }
    .canvas-container:active { cursor: grabbing; }
    .canvas-bg { position: absolute; inset: 0; pointer-events: none; z-index: 0; }
    .graph-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; transform-origin: 0 0; z-index: 1; }
    .svg-edges { position: absolute; inset: 0; width: 100%; height: 100%; overflow: visible; pointer-events: none; }
    .edge-path { fill: none; stroke-width: var(--edge-w); transition: stroke 0.4s; }
    .theme-brutal .edge-path { stroke: var(--text); }

    .term-content { flex: 1; padding: 16px; font-family: 'JetBrains Mono', monospace; font-size: 11px; overflow-y: auto; display: flex; flex-direction: column; gap: 6px; }

    .obs-node-wrapper { position: absolute; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; z-index: 5; transform: translate(-50%, -50%); transition: opacity 0.2s ease, transform 0.2s; }
    .obs-node-wrapper:hover { z-index: 10; }
    .obs-node-wrapper:hover .node-circle { transform: scale(1.2); }
    .node-circle { display: flex; align-items: center; justify-content: center; transition: all 0.2s cubic-bezier(0.25, 1, 0.5, 1); }
    .node-circle.main-node { width: 32px; height: 32px; border-width: calc(var(--inner-w) * 1.5); }
    .node-circle.sub-node { width: 18px; height: 18px; }
    .node-label { margin-top: 10px; font-size: 11px; padding: 4px 10px; pointer-events: none; white-space: nowrap; transition: all 0.2s; }
    .modified-dot { width: 6px; height: 6px; background: var(--text); border-radius: 50%; margin-left: 6px; display: inline-block; }

    .status-bar { height: 32px; border-top: var(--border-w) solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 24px; font-size: 11px; flex-shrink: 0; background: var(--bg); z-index: 200; position: relative; transition: all 0.4s ease; }
    .status-group { display: flex; gap: 20px; align-items: center; }

    /* EDITOR MODAL (FULLY RESTORED) */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 1000; backdrop-filter: blur(10px); display: none; align-items: center; justify-content: center; }
    .modal-overlay.open { display: flex; }
    .modal-content { width: 89vw; height: 89vh; background: var(--bg); border-radius: var(--ui-radius); display: flex; flex-direction: column; overflow: hidden; }
    .tabs-hdr { display: flex; background: rgba(128,128,128,0.05); border-bottom: var(--border-w) solid var(--border); overflow-x: auto; flex-shrink: 0; }
    .editor-tab { padding: 12px 24px; display: flex; align-items: center; gap: 12px; cursor: pointer; font-size: 11px; transition: all 0.2s; min-width: 140px; justify-content: space-between; }
    .tab-close { cursor: pointer; opacity: 0.5; padding: 2px; }
    .tab-close:hover { opacity: 1; color: var(--text); }
    .modal-body { flex: 1; display: flex; min-height: 0; }
    .editor-main-area { flex: 1; display: flex; flex-direction: column; border-right: var(--border-w) solid var(--border); }
    .breadcrumb { padding: 10px 24px; font-size: 10px; display: flex; align-items: center; gap: 8px; opacity: 0.7; flex-shrink: 0; }
    .modal-code-wrap { flex: 1; padding: 24px; display: flex; flex-direction: column; overflow: hidden; }
    .editor-wrap { flex: 1; display: flex; background: var(--bg); overflow: hidden; }
    .line-numbers { padding: 24px 10px; background: rgba(128,128,128,0.05); color: var(--text); opacity: 0.5; font-family: 'JetBrains Mono', monospace; font-size: 13px; text-align: right; line-height: 1.6; border-right: var(--inner-w) solid var(--border); user-select: none; overflow: hidden; }
    .code-area { flex: 1; font-family: 'JetBrains Mono', monospace; font-size: 13px; padding: 24px; resize: none; outline: none; line-height: 1.6; background: transparent; color: var(--text); border: none; white-space: pre; }
    .side-input { width: 100%; border: var(--inner-w) solid var(--text); padding: 10px; background: transparent; color: var(--text); font-family: inherit; font-size: 12px; outline: none; }

    /* KANBAN BOARDS & CHAT */
    .kanban-board { display: flex; flex: 1; overflow-x: auto; padding: 16px; gap: 16px; }
    .kanban-col { flex: 1; min-width: 200px; display: flex; flex-direction: column; gap: 10px; border-right: 1px solid rgba(128,128,128,0.2); padding-right: 16px; }
    .kanban-col-title { font-weight: bold; opacity: 0.7; font-size: 12px; margin-bottom: 8px; }
    .kanban-card { background: rgba(128,128,128,0.05); border: 1px solid var(--border); padding: 12px; border-radius: var(--ui-radius); cursor: grab; }
    .chat-wrap { display: flex; flex-direction: column; flex: 1; }
    .chat-messages { flex: 1; padding: 16px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
    .chat-msg { background: rgba(128,128,128,0.05); padding: 10px; border-radius: 4px; border-left: 2px solid var(--text); }
    .chat-input-wrap { padding: 16px; border-top: var(--inner-w) solid var(--border); display: flex; gap: 8px; }

    /* NLE TIMELINE (VIDEO EDITOR STYLE) */
    .nle-wrap { flex: 1; display: flex; flex-direction: column; background: var(--bg); overflow: hidden; position: relative; }
    .nle-ruler { height: 24px; border-bottom: var(--inner-w) solid var(--border); display: flex; align-items: flex-end; position: sticky; top: 0; background: rgba(128,128,128,0.05); z-index: 10; overflow: hidden; }
    .nle-ruler-tick { position: absolute; height: 8px; border-left: 1px solid var(--text); opacity: 0.5; font-size: 9px; padding-left: 4px; bottom: 0; }
    .nle-ruler-tick.major { height: 12px; opacity: 1; font-weight: bold; }
    .nle-body { flex: 1; display: flex; overflow: auto; position: relative; }
    
    .nle-track-headers { width: 140px; flex-shrink: 0; border-right: var(--inner-w) solid var(--border); position: sticky; left: 0; background: var(--bg); z-index: 20; display: flex; flex-direction: column; }
    .nle-track-header { height: 48px; display: flex; align-items: center; padding: 0 12px; font-size: 10px; font-weight: bold; border-bottom: 1px solid rgba(128,128,128,0.2); justify-content: space-between; }
    
    .nle-tracks { flex: 1; display: flex; flex-direction: column; position: relative; min-width: 1200px; background: repeating-linear-gradient(90deg, transparent, transparent 49px, rgba(128,128,128,0.05) 49px, rgba(128,128,128,0.05) 50px); }
    .nle-track-lane { height: 48px; border-bottom: 1px solid rgba(128,128,128,0.2); position: relative; display: flex; align-items: center; }
    
    .nle-clip { position: absolute; height: 32px; display: flex; align-items: center; padding: 0 8px; font-size: 10px; cursor: pointer; overflow: hidden; white-space: nowrap; transition: transform 0.1s; }
    .nle-clip:hover { transform: translateY(-2px); filter: brightness(1.2); }
    
    /* DRAGGABLE PLAYHEAD STYLING */
    .nle-playhead { position: absolute; top: 0; bottom: 0; width: 2px; background: var(--text); z-index: 30; cursor: ew-resize; }
    .nle-playhead::before { content: ''; position: absolute; top: 0; left: -6px; width: 14px; height: 14px; background: var(--text); clip-path: polygon(0 0, 100% 0, 50% 100%); }
    .nle-playhead::after { content: ''; position: absolute; top: 0; bottom: 0; left: -10px; width: 20px; background: transparent; }

    /* Login Boot Sequence */
    .login-container { 
      display: flex; flex-direction: column; align-items: center; justify-content: center; 
      min-height: 100vh; background: #050505; color: var(--accent, #fff); 
      transition: background 0.4s ease, color 0.4s ease;
      position: relative;
    }
    
    .login-container::before {
      content: ''; position: absolute; inset: 0;
      background: radial-gradient(circle at center, var(--accent) 0%, transparent 70%);
      opacity: 0.08; pointer-events: none; transition: background 0.4s ease;
    }

    .login-box { 
      width: 100%; max-width: 800px; padding: 40px; display: flex; flex-direction: column; gap: 40px; 
      border: 6px solid var(--accent, #333); transition: border-color 0.4s ease, box-shadow 0.4s ease;
      background: #000; z-index: 10;
    }
    
    .login-box.hovered { box-shadow: 20px 20px 0px var(--accent); }

    .badge-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; place-items: center; }
    
    .theme-btn { flex: 1; padding: 20px; font-size: 14px; cursor: pointer; transition: all 0.2s; text-align: center; }
    .theme-btn:disabled { opacity: 0.2; cursor: not-allowed; }
    .theme-btn.cyber { background: transparent; border: 4px solid var(--accent, #10b981); color: var(--accent, #10b981); }
    .theme-btn.cyber:hover:not(:disabled) { box-shadow: 0 0 20px var(--accent-shadow); background: rgba(255,255,255,0.05); }
    .theme-btn.brutal { background: var(--accent, #fff); border: 4px solid var(--accent, #fff); color: #000; font-family: 'Inter', sans-serif; font-weight: 900; text-transform: uppercase; }
    .theme-btn.brutal:hover:not(:disabled) { box-shadow: 8px 8px 0px rgba(255,255,255,0.2); transform: translate(-2px, -2px); }

    .faction-logo-wrap { transition: all 0.2s; display: flex; align-items: center; justify-content: center; }
    .faction-logo-wrap:hover { transform: scale(1.15); }
    .bold-svg-icon { width: 100%; height: 100%; display: block; transition: fill 0.4s, stroke 0.4s; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const Icons = {
      Files: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>,
      Search: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>,
      Git: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><circle cx="18" cy="18" r="3"/><circle cx="6" cy="6" r="3"/><path d="M6 9v12"/><path d="M18 15v-2a3 3 0 0 0-3-3H9"/></svg>,
      Terminal: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>,
      Timeline: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>,
      Message: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>,
      Note: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>,
      Board: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="9" y1="3" x2="9" y2="21"/><line x1="15" y1="3" x2="15" y2="21"/></svg>,
      FileIcon: () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/><polyline points="13 2 13 9 20 9"/></svg>
    };

    // 12 FACTION PALETTES
    const FACTIONS = [
      { name: "CRIMSON", cyber: "#ff3355", brutalText: "#d00018", brutalBg: "#fff0f2" },
      { name: "VOLT",    cyber: "#ffc410", brutalText: "#997300", brutalBg: "#fffbe6" },
      { name: "MATRIX",  cyber: "#10b981", brutalText: "#047857", brutalBg: "#ecfdf5" },
      { name: "COBALT",  cyber: "#4285f4", brutalText: "#1d4ed8", brutalBg: "#eff6ff" },
      { name: "MINT",    cyber: "#28f1c3", brutalText: "#0f766e", brutalBg: "#f0fdfa" },
      { name: "AMETHYST",cyber: "#a855f7", brutalText: "#6b21a8", brutalBg: "#faf5ff" },
      { name: "BLOOD",   cyber: "#e11d48", brutalText: "#9f1239", brutalBg: "#fff1f2" },
      { name: "FOREST",  cyber: "#22c55e", brutalText: "#15803d", brutalBg: "#f0fdf4" },
      { name: "OCEAN",   cyber: "#06b6d4", brutalText: "#0e7490", brutalBg: "#ecfeff" },
      { name: "BLAZE",   cyber: "#f97316", brutalText: "#c2410c", brutalBg: "#fff7ed" },
      { name: "ACID",    cyber: "#84cc16", brutalText: "#4d7c0f", brutalBg: "#f7fee7" },
      { name: "ROSE",    cyber: "#f43f5e", brutalText: "#be123c", brutalBg: "#fff1f2" }
    ];

    // BOLD, BOXY LOGOS
    const FactionLogos = [
      ({color}) => <svg className="bold-svg-icon" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" stroke={color} strokeWidth="4" fill="none"/><rect x="9" y="9" width="6" height="6" fill={color}/></svg>,
      ({color}) => <svg className="bold-svg-icon" viewBox="0 0 24 24"><path d="M12 2 A 10 10 0 0 1 22 12" stroke={color} strokeWidth="5" fill="none" strokeLinecap="square"/><path d="M2 12 A 10 10 0 0 0 12 22" stroke={color} strokeWidth="5" fill="none" strokeLinecap="square"/><circle cx="12" cy="12" r="4" fill={color}/></svg>,
      ({color}) => <svg className="bold-svg-icon" viewBox="0 0 24 24"><path d="M4 12 H20 M12 4 V20" stroke={color} strokeWidth="6" strokeLinecap="square"/></svg>,
      ({color}) => <svg className="bold-svg-icon" viewBox="0 0 24 24"><rect x="4" y="4" width="16" height="5" fill={color}/><rect x="4" y="15" width="16" height="5" fill={color}/></svg>,
      ({color}) => <svg className="bold-svg-icon" viewBox="0 0 24 24"><rect x="4" y="4" width="16" height="16" transform="rotate(45 12 12)" fill={color}/><circle cx="12" cy="12" r="3" fill="var(--bg, #000)"/></svg>,
      ({color}) => <svg className="bold-svg-icon" viewBox="0 0 24 24"><path d="M4 16 V12 A 8 8 0 0 1 20 12 V16 Z" fill={color}/><rect x="9" y="16" width="6" height="4" fill={color}/></svg>,
      ({color}) => <svg className="bold-svg-icon" viewBox="0 0 24 24"><path d="M3 8 L12 17 L21 8" stroke={color} strokeWidth="6" strokeLinecap="square" strokeLinejoin="miter" fill="none"/></svg>,
      ({color}) => <svg className="bold-svg-icon" viewBox="0 0 24 24"><rect x="2" y="2" width="20" height="20" stroke={color} strokeWidth="4" fill="none"/><path d="M8 12 H16 M12 8 V16" stroke={color} strokeWidth="4" strokeLinecap="square"/></svg>,
      ({color}) => <svg className="bold-svg-icon" viewBox="0 0 24 24"><rect x="4" y="12" width="7" height="8" fill={color}/><rect x="13" y="4" width="7" height="16" fill={color}/></svg>,
      ({color}) => <svg className="bold-svg-icon" viewBox="0 0 24 24"><path d="M5 4 V16 A 4 4 0 0 0 19 16 V4" stroke={color} strokeWidth="4" fill="none" strokeLinecap="square"/><path d="M10 8 V15 A 2 2 0 0 0 14 15 V8" stroke={color} strokeWidth="4" fill="none" strokeLinecap="square"/></svg>,
      ({color}) => <svg className="bold-svg-icon" viewBox="0 0 24 24"><path d="M8 4 H4 V20 H8 M16 4 H20 V20 H16" stroke={color} strokeWidth="5" fill="none" strokeLinecap="square"/></svg>,
      ({color}) => <svg className="bold-svg-icon" viewBox="0 0 24 24"><polygon points="12,2 21,7 21,17 12,22 3,17 3,7" stroke={color} strokeWidth="4" fill="none" strokeLinejoin="miter"/><circle cx="12" cy="12" r="4" fill={color}/></svg>
    ];

    const OperatorBadge = ({ index, themeMode = 'cyber', size = 48, selected = false, hovered = false, onHover, onClick, style = {} }) => {
      const Logo = FactionLogos[index % FactionLogos.length];
      const faction = FACTIONS[index % FACTIONS.length];
      const color = faction.cyber; 
      const isActive = selected || hovered;
      
      return (
        <div
          className="faction-logo-wrap"
          onMouseEnter={() => onHover && onHover(index)}
          onMouseLeave={() => onHover && onHover(null)}
          onClick={onClick}
          style={{
            width: size, height: size,
            cursor: onClick ? 'pointer' : 'default',
            border: isActive ? `4px solid ${color}` : '4px solid #333',
            background: isActive ? `${color}22` : '#111',
            padding: size * 0.2,
            flexShrink: 0,
            transition: 'all 0.2s ease',
            ...style
          }}
        >
          <Logo color={isActive ? color : '#666'} />
        </div>
      );
    };

    const INITIAL_NODES = [
      { id: 'n1', type: 'entry', label: 'core_sys.py', isMain: true, x: 0, y: 0, vx: 0, vy: 0, code: 'import torch\nimport sys\n\nprint("Central Architecture Booted")\n\ndef init_sequence():\n    # Core logic entry\n    pass', modified: false },
      { id: 'n2', type: 'function', label: 'load_network.py', isMain: false, x: 100, y: -100, vx: 0, vy: 0, code: 'def load_network():\n    return DataLoader()\n\n# Network params defined here', modified: true },
      { id: 'n3', type: 'class', label: 'DataMatrix.py', isMain: false, x: -100, y: 150, vx: 0, vy: 0, code: 'class DataMatrix:\n    def __init__(self):\n        self.active = True\n        self.buffer = []', modified: false },
    ];
    const INITIAL_EDGES = [ { id: 'e1', source: 'n1', target: 'n2' }, { id: 'e2', source: 'n1', target: 'n3' } ];

    const FloatingPanel = ({ title, isOpen, onClose, defaultX, defaultY, defaultW, defaultH, children }) => {
      const [pos, setPos] = useState({ x: defaultX, y: defaultY });
      const [size, setSize] = useState({ w: defaultW, h: defaultH });
      const [zIndex, setZIndex] = useState(100);

      const dragRef = useRef({ isDragging: false, startX: 0, startY: 0, initialX: 0, initialY: 0 });
      const resizeRef = useRef({ isResizing: false, startX: 0, startY: 0, initialW: 0, initialH: 0 });

      if (!isOpen) return null;

      const bringToFront = () => setZIndex(Date.now() % 100000 + 100);

      const onDragStart = (e) => {
        if (e.target.closest('.no-drag')) return;
        dragRef.current = { isDragging: true, startX: e.clientX, startY: e.clientY, initialX: pos.x, initialY: pos.y };
        e.currentTarget.setPointerCapture(e.pointerId);
        bringToFront();
      };
      const onDragMove = (e) => {
        if (!dragRef.current.isDragging) return;
        setPos({
          x: dragRef.current.initialX + (e.clientX - dragRef.current.startX),
          y: Math.max(0, dragRef.current.initialY + (e.clientY - dragRef.current.startY))
        });
      };
      const onDragEnd = (e) => { dragRef.current.isDragging = false; e.currentTarget.releasePointerCapture(e.pointerId); };

      const onResizeStart = (e) => {
        e.stopPropagation();
        resizeRef.current = { isResizing: true, startX: e.clientX, startY: e.clientY, initialW: size.w, initialH: size.h };
        e.currentTarget.setPointerCapture(e.pointerId);
        bringToFront();
      };
      const onResizeMove = (e) => {
        if (!resizeRef.current.isResizing) return;
        setSize({
          w: Math.max(200, resizeRef.current.initialW + (e.clientX - resizeRef.current.startX)),
          h: Math.max(150, resizeRef.current.initialH + (e.clientY - resizeRef.current.startY))
        });
      };
      const onResizeEnd = (e) => { resizeRef.current.isResizing = false; e.currentTarget.releasePointerCapture(e.pointerId); };

      return (
        <div className="floating-panel" style={{ left: pos.x, top: pos.y, width: size.w, height: size.h, zIndex }} onPointerDownCapture={bringToFront}>
          <div className="panel-hdr" style={{ cursor: 'grab' }} onPointerDown={onDragStart} onPointerMove={onDragMove} onPointerUp={onDragEnd} onPointerCancel={onDragEnd}>
            <span>{title}</span>
            <span className="no-drag" style={{ cursor: 'pointer', padding: '0 4px', opacity: 0.6 }} onClick={onClose}>✕</span>
          </div>
          <div className="panel-content-wrap">
            {children}
            <div className="panel-resizer" onPointerDown={onResizeStart} onPointerMove={onResizeMove} onPointerUp={onResizeEnd} onPointerCancel={onResizeEnd} />
          </div>
        </div>
      );
    };

    function IDE({ initialTheme, initialAvatar }) {
      const [themeMode, setThemeMode] = useState(initialTheme);
      
      const nodesRef = useRef(JSON.parse(JSON.stringify(INITIAL_NODES)));
      const edgesRef = useRef(INITIAL_EDGES);
      const [, forceRender] = useState({});

      const [transform, setTransform] = useState({ x: window.innerWidth / 2, y: window.innerHeight / 2, scale: 1 });
      const [isDraggingCanvas, setIsDraggingCanvas] = useState(false);

      const [sidebarMode, setSidebarMode] = useState("files");
      const [bottomPanelTab, setBottomPanelTab] = useState('timeline');
      
      const [openTabs, setOpenTabs] = useState([]);
      const [activeTabId, setActiveTabId] = useState(null);

      // SEARCH & SETTINGS
      const [searchQuery, setSearchQuery] = useState("");
      const [avatarIndex, setAvatarIndex] = useState(initialAvatar);
      const [hoveredAvatar, setHoveredAvatar] = useState(null);

      const filteredSearch = nodesRef.current.filter((n) => {
        const q = searchQuery.trim().toLowerCase();
        if (!q) return true;
        return (n.label || "").toLowerCase().includes(q) || (n.code || "").toLowerCase().includes(q);
      });
      
      const draggingNodeRef = useRef(null);
      const [hoveredNodeId, setHoveredNodeId] = useState(null);
      const lastMousePos = useRef({ x: 0, y: 0 });

      // TIMELINE PLAYHEAD
      const [playheadPos, setPlayheadPos] = useState(400);
      const [activeVersionName, setActiveVersionName] = useState("v1.4 (HEAD)");
      const playheadDragRef = useRef({ isDragging: false, startX: 0, startPos: 0 });

      const handlePlayheadDown = (e) => {
        e.stopPropagation();
        e.currentTarget.setPointerCapture(e.pointerId);
        playheadDragRef.current = { isDragging: true, startX: e.clientX, startPos: playheadPos };
      };
      
      const handlePlayheadMove = (e) => {
        if (!playheadDragRef.current.isDragging) return;
        let newPos = playheadDragRef.current.startPos + (e.clientX - playheadDragRef.current.startX);
        newPos = Math.max(0, Math.min(newPos, 1150));
        setPlayheadPos(newPos);
        
        let ver = "HEAD";
        if (newPos < 100) ver = "v1.0 (Init repo)";
        else if (newPos < 220) ver = "v1.1 (Write core_sys.py)";
        else if (newPos < 250) ver = "v1.2 (Merge PR #1)";
        else if (newPos < 380) ver = "v1.3 (DataMatrix class setup)";
        else ver = "v1.4 (HEAD - Fix pipeline)";
        
        if (ver !== activeVersionName) setActiveVersionName(ver);
      };

      const handlePlayheadUp = (e) => {
        playheadDragRef.current.isDragging = false;
        e.currentTarget.releasePointerCapture(e.pointerId);
      };

      const activeColorIndex = hoveredAvatar !== null ? hoveredAvatar : avatarIndex;
      const activeFaction = FACTIONS[activeColorIndex];

      const wrapperClass = `app-wrapper theme-${themeMode}`;
      const themeStyles = themeMode === 'brutal' 
        ? { '--bg': activeFaction.brutalBg, '--text': activeFaction.brutalText, '--border': activeFaction.brutalText, '--theme-glow': 'transparent' }
        : { '--bg': '#050505', '--text': activeFaction.cyber, '--border': activeFaction.cyber, '--theme-glow': `${activeFaction.cyber}44` };

      const outerBg = themeMode === 'brutal' ? '#ffffff' : '#000000';
      const modifiedNodes = nodesRef.current.filter((n) => n.modified);

      const visibleNodes = nodesRef.current.filter(node => {
        if (node.id === 'n1' && playheadPos < 100) return false;
        if (node.id === 'n3' && playheadPos < 250) return false;
        return true;
      });

      const visibleEdges = edgesRef.current.filter(edge => {
        const srcVis = visibleNodes.find(n => n.id === edge.source);
        const tgtVis = visibleNodes.find(n => n.id === edge.target);
        return srcVis && tgtVis;
      });

      useEffect(() => {
        let rafId;
        const tick = () => {
          let updated = false;
          const nodes = nodesRef.current;
          const edges = edgesRef.current;
          for (let i = 0; i < nodes.length; i++) {
            for (let j = i + 1; j < nodes.length; j++) {
              const dx = nodes[j].x - nodes[i].x; const dy = nodes[j].y - nodes[i].y;
              const distSq = dx * dx + dy * dy || 1; const dist = Math.sqrt(distSq);
              const force = 4000 / distSq;
              nodes[i].vx -= (dx / dist) * force; nodes[i].vy -= (dy / dist) * force;
              nodes[j].vx += (dx / dist) * force; nodes[j].vy += (dy / dist) * force;
            }
          }
          edges.forEach((edge) => {
            const src = nodes.find((n) => n.id === edge.source); const tgt = nodes.find((n) => n.id === edge.target);
            if (!src || !tgt) return;
            const dx = tgt.x - src.x; const dy = tgt.y - src.y;
            const dist = Math.sqrt(dx * dx + dy * dy) || 1;
            const force = (dist - 140) * 0.05;
            src.vx += (dx / dist) * force; src.vy += (dy / dist) * force;
            tgt.vx -= (dx / dist) * force; tgt.vy -= (dy / dist) * force;
          });
          nodes.forEach((n) => {
            const pullStrength = n.isMain ? 0.2 : 0.005;
            n.vx += (0 - n.x) * pullStrength; n.vy += (0 - n.y) * pullStrength;
            n.vx *= 0.8; n.vy *= 0.8;
            n.x += n.vx; n.y += n.vy;
            if (Math.abs(n.vx) > 0.05 || Math.abs(n.vy) > 0.05) updated = true;
          });
          if (draggingNodeRef.current) {
            const d = nodes.find((n) => n.id === draggingNodeRef.current.id);
            if (d) { d.x = draggingNodeRef.current.x; d.y = draggingNodeRef.current.y; d.vx = 0; d.vy = 0; updated = true; }
          }
          if (updated) forceRender({});
          rafId = requestAnimationFrame(tick);
        };
        rafId = requestAnimationFrame(tick);
        return () => cancelAnimationFrame(rafId);
      }, []);

      const handleCanvasPointerDown = (e) => {
        if (e.target.closest(".obs-node-wrapper") || e.target.closest(".floating-panel") || e.target.closest(".modal-overlay")) return;
        setIsDraggingCanvas(true);
        lastMousePos.current = { x: e.clientX, y: e.clientY };
      };
      const handleCanvasPointerMove = (e) => {
        if (isDraggingCanvas) {
          const dx = e.clientX - lastMousePos.current.x; const dy = e.clientY - lastMousePos.current.y;
          setTransform((prev) => ({ ...prev, x: prev.x + dx, y: prev.y + dy }));
          lastMousePos.current = { x: e.clientX, y: e.clientY };
        } else if (draggingNodeRef.current) {
          const dx = (e.clientX - lastMousePos.current.x) / transform.scale; 
          const dy = (e.clientY - lastMousePos.current.y) / transform.scale;
          if (Math.abs(dx) > 1 || Math.abs(dy) > 1) { draggingNodeRef.current.hasDragged = true; }
          draggingNodeRef.current.x += dx; 
          draggingNodeRef.current.y += dy;
          lastMousePos.current = { x: e.clientX, y: e.clientY };
        }
      };
      const handleCanvasPointerUp = () => { setIsDraggingCanvas(false); draggingNodeRef.current = null; };
      const handleWheel = (e) => {
        if (e.target.closest(".code-area") || e.target.closest(".floating-panel") || e.target.closest(".nle-wrap")) return;
        e.preventDefault();
        setTransform((prev) => ({ ...prev, scale: Math.min(Math.max(0.3, prev.scale * (e.deltaY > 0 ? 0.9 : 1.1)), 2.5) }));
      };

      const openNodeInEditor = (id) => { setOpenTabs((tabs) => (tabs.includes(id) ? tabs : [...tabs, id])); setActiveTabId(id); };
      const activeTabNode = nodesRef.current.find(n => n.id === activeTabId);

      return (
        <div style={{ width: '100vw', height: '100vh', padding: themeMode === 'brutal' ? '40px' : '0px', backgroundColor: outerBg, transition: 'all 0.4s ease', boxSizing: 'border-box' }}>
          
          <div className={wrapperClass} style={themeStyles}>
            
            <div className="app-header">
              <div className="hdr-brand">
                <OperatorBadge index={avatarIndex} themeMode={themeMode} size={24} style={{background: 'transparent', padding: 0, border: 'none'}} /> 
                FORBINDEN // {activeFaction.name}
              </div>
              <div style={{ display: 'flex', gap: '10px', alignItems: 'center' }}>
                <button className="btn" onClick={() => setThemeMode(themeMode === 'cyber' ? 'brutal' : 'cyber')}>
                  SWITCH ENGINE
                </button>
              </div>
            </div>

            <div className="app-body">
              <div className="sidebar">
                <div className={`strip-icon ${sidebarMode === 'files' ? 'active' : ''}`} onClick={() => setSidebarMode(sidebarMode === 'files' ? null : 'files')}><Icons.Files /></div>
                <div className={`strip-icon ${sidebarMode === 'search' ? 'active' : ''}`} onClick={() => setSidebarMode(sidebarMode === 'search' ? null : 'search')}><Icons.Search /></div>
                <div className={`strip-icon ${sidebarMode === 'git' ? 'active' : ''}`} onClick={() => setSidebarMode(sidebarMode === 'git' ? null : 'git')}>
                  <Icons.Git />{modifiedNodes.length > 0 && <div className="badge">{modifiedNodes.length}</div>}
                </div>
                
                <div className={`strip-icon ${sidebarMode === 'chat' ? 'active' : ''}`} onClick={() => setSidebarMode(sidebarMode === 'chat' ? null : 'chat')}><Icons.Message /></div>
                <div className={`strip-icon ${sidebarMode === 'note' ? 'active' : ''}`} onClick={() => setSidebarMode(sidebarMode === 'note' ? null : 'note')}><Icons.Note /></div>
                <div className={`strip-icon ${sidebarMode === 'board' ? 'active' : ''}`} onClick={() => setSidebarMode(sidebarMode === 'board' ? null : 'board')}><Icons.Board /></div>

                <div style={{flex: 1}}></div>
                
                <div className={`strip-icon ${bottomPanelTab === 'timeline' ? 'active' : ''}`} onClick={() => setBottomPanelTab(bottomPanelTab === 'timeline' ? null : 'timeline')}><Icons.Timeline /></div>
                <div className={`strip-icon ${bottomPanelTab === 'terminal' ? 'active' : ''}`} onClick={() => setBottomPanelTab(bottomPanelTab === 'terminal' ? null : 'terminal')}><Icons.Terminal /></div>
                
                <div 
                  className={`strip-icon ${sidebarMode === 'settings' ? 'active' : ''}`} 
                  onClick={() => setSidebarMode(sidebarMode === 'settings' ? null : 'settings')}
                  style={{ borderRadius: '0', padding: '0', marginTop: '10px', border: sidebarMode === 'settings' ? '4px solid var(--text)' : '4px solid transparent' }}
                >
                  <OperatorBadge index={avatarIndex} themeMode={themeMode} size={32} style={{border: 'none', background: 'transparent'}} />
                </div>
              </div>

              {/* SEARCH PANEL */}
              <FloatingPanel title="SEARCH FILES" isOpen={sidebarMode === 'search'} onClose={() => setSidebarMode(null)} defaultX={80} defaultY={80} defaultW={300} defaultH={450}>
                <div style={{ padding: "12px 16px", borderBottom: "1px solid rgba(128,128,128,0.2)" }}>
                  <input className="side-input" value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} placeholder="Find in labels and code..." autoFocus={sidebarMode === 'search'} />
                </div>
                <div style={{ flex: 1, overflowY: "auto", paddingTop: "8px" }}>
                  {filteredSearch.map((n) => (
                    <div key={`search_${n.id}`} className="list-item" onClick={() => openNodeInEditor(n.id)}><Icons.FileIcon /> <span>{n.label}</span></div>
                  ))}
                  {!filteredSearch.length && <div style={{ padding: "20px", opacity: 0.6 }}>No matches found.</div>}
                </div>
              </FloatingPanel>

              {/* GIT CHANGES PANEL */}
              <FloatingPanel title="SOURCE CONTROL" isOpen={sidebarMode === 'git'} onClose={() => setSidebarMode(null)} defaultX={80} defaultY={80} defaultW={280} defaultH={450}>
                <div style={{ flex: 1, overflowY: 'auto', paddingTop: '8px' }}>
                  <div style={{ padding: '0 20px', marginBottom: '8px', fontSize: '9px', opacity: 0.6, fontWeight: 'bold' }}>UNCOMMITTED CHANGES ({modifiedNodes.length})</div>
                  {modifiedNodes.length === 0 ?
                    <div style={{padding: '20px', opacity: 0.5, fontSize: '11px'}}>Working tree clean.</div> :
                    modifiedNodes.map(n => (
                      <div key={'git_'+n.id} className="list-item" onClick={() => openNodeInEditor(n.id)}>
                        <Icons.FileIcon /> <span style={{fontWeight: 'bold'}}>{n.label}</span> <span style={{marginLeft: 'auto', opacity: 0.5}}>M</span>
                      </div>
                    ))
                  }
                  {modifiedNodes.length > 0 && <div style={{padding: '20px'}}><button className="btn" style={{width:'100%'}}>COMMIT CHANGES</button></div>}
                </div>
              </FloatingPanel>

              {/* SETTINGS PANEL */}
              <FloatingPanel title="WORKSPACE CONFIG" isOpen={sidebarMode === 'settings'} onClose={() => setSidebarMode(null)} defaultX={80} defaultY={window.innerHeight - 440} defaultW={360} defaultH={420}>
                <div style={{ padding: '24px', display: 'flex', flexDirection: 'column', gap: '24px', height: '100%', overflowY: 'auto' }}>
                  <div>
                    <div style={{ fontSize: '10px', fontWeight: 'bold', marginBottom: '12px', opacity: 0.8 }}>SELECT OPERATOR BADGE</div>
                    <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: '12px' }}>
                      {[...Array(12)].map((_, i) => (
                        <OperatorBadge 
                          key={i} index={i} themeMode={themeMode} size={56} 
                          selected={avatarIndex === i} hovered={hoveredAvatar === i}
                          onHover={setHoveredAvatar} onClick={() => setAvatarIndex(i)} 
                        />
                      ))}
                    </div>
                  </div>
                  <button className="btn" style={{marginTop: 'auto'}} onClick={() => setSidebarMode(null)}>SAVE CONFIG</button>
                </div>
              </FloatingPanel>

              {/* EXPLORER */}
              <FloatingPanel title="EXPLORER" isOpen={sidebarMode === 'files'} onClose={() => setSidebarMode(null)} defaultX={80} defaultY={80} defaultW={280} defaultH={500}>
                <div style={{ flex: 1, overflowY: 'auto', paddingTop: '8px' }}>
                  <div style={{ padding: '0 20px', marginBottom: '8px', fontSize: '9px', opacity: 0.6, fontWeight: 'bold' }}>GRAPH WORKSPACE</div>
                  {visibleNodes.map(n => (
                    <div key={'expl_'+n.id} className="list-item" onClick={() => openNodeInEditor(n.id)}>
                      <Icons.FileIcon /> <span style={{color: n.modified ? 'inherit' : 'inherit', fontWeight: n.modified ? 'bold' : 'normal'}}>{n.label}</span>
                    </div>
                  ))}
                </div>
              </FloatingPanel>

              {/* COMMUNICATIONS */}
              <FloatingPanel title="COMMUNICATIONS" isOpen={sidebarMode === 'chat'} onClose={() => setSidebarMode(null)} defaultX={380} defaultY={80} defaultW={300} defaultH={400}>
                <div className="chat-wrap">
                  <div className="chat-messages">
                    <div className="chat-msg" style={{ display: 'flex', gap: '8px', alignItems: 'center' }}>
                      <OperatorBadge index={avatarIndex} size={20} style={{boxShadow: 'none', border: 'none', background: 'transparent'}} />
                      <div><strong>You:</strong> Architecture booted. Testing WebSockets.</div>
                    </div>
                    <div className="chat-msg"><strong>System:</strong> Sync established with active node.</div>
                  </div>
                  <div className="chat-input-wrap">
                    <input className="side-input" placeholder="Broadcast message..." style={{flex:1}} />
                    <button className="btn">SEND</button>
                  </div>
                </div>
              </FloatingPanel>

              {/* NOTES */}
              <FloatingPanel title="OPERATOR NOTES" isOpen={sidebarMode === 'note'} onClose={() => setSidebarMode(null)} defaultX={100} defaultY={120} defaultW={300} defaultH={300}>
                <textarea className="code-area" style={{ width: '100%', height: '100%', resize: 'none' }} placeholder="Personal scratchpad. Notes saved locally..." />
              </FloatingPanel>

              {/* BOARD */}
              <FloatingPanel title="PLANNING BOARD" isOpen={sidebarMode === 'board'} onClose={() => setSidebarMode(null)} defaultX={200} defaultY={100} defaultW={650} defaultH={450}>
                <div className="kanban-board">
                  <div className="kanban-col">
                    <div className="kanban-col-title">TO DO</div>
                    <div className="kanban-card">Integrate Websocket Sync</div>
                    <div className="kanban-card">Setup Gemini Prompts</div>
                  </div>
                  <div className="kanban-col">
                    <div className="kanban-col-title">IN PROGRESS</div>
                    <div className="kanban-card">Draft Graph UI</div>
                  </div>
                  <div className="kanban-col" style={{borderRight: 'none'}}>
                    <div className="kanban-col-title">DONE</div>
                    <div className="kanban-card">Initialize Babel setup</div>
                  </div>
                </div>
              </FloatingPanel>

              {/* BOTTOM PANEL (TERMINAL / TIMELINE) */}
              <FloatingPanel 
                title={
                  <div style={{display:'flex', gap:'16px'}}>
                    <span style={{cursor:'pointer', opacity: bottomPanelTab === 'terminal' ? 1 : 0.5}} onClick={() => setBottomPanelTab('terminal')}>TERMINAL</span>
                    <span style={{cursor:'pointer', opacity: bottomPanelTab === 'timeline' ? 1 : 0.5}} onClick={() => setBottomPanelTab('timeline')}>GIT NLE TIMELINE</span>
                  </div>
                } 
                isOpen={!!bottomPanelTab} onClose={() => setBottomPanelTab(null)} 
                defaultX={200} defaultY={window.innerHeight - 340} defaultW={800} defaultH={280}
              >
                {bottomPanelTab === 'terminal' && (
                  <div className="term-content">
                    <div style={{color: 'var(--text)', opacity: 0.8}}>[WS] Connected to backend on port 8080.</div>
                    <div>Awaiting terminal command input...</div>
                  </div>
                )}
                
                {bottomPanelTab === 'timeline' && (
                  <div className="nle-wrap">
                    <div className="nle-body">
                      <div className="nle-track-headers">
                        <div className="nle-ruler" style={{borderBottom: 'none'}}></div>
                        <div className="nle-track-header">
                          <span>MAIN REPO</span>
                          <Icons.Git />
                        </div>
                        <div className="nle-track-header">
                          <span>YOU</span>
                          <OperatorBadge index={avatarIndex} size={20} style={{boxShadow: 'none', border: 'none', background: 'transparent'}} />
                        </div>
                        <div className="nle-track-header">
                          <span>OPERATOR 2</span>
                          <OperatorBadge index={(avatarIndex + 1) % 12} size={20} style={{boxShadow: 'none', border: 'none', background: 'transparent'}} />
                        </div>
                      </div>
                      
                      <div style={{flex: 1, overflowX: 'auto', display: 'flex', flexDirection: 'column'}}>
                        <div className="nle-ruler">
                            <div className="nle-ruler-tick major" style={{left: '50px'}}>v1.0</div>
                            <div className="nle-ruler-tick" style={{left: '100px'}}></div>
                            <div className="nle-ruler-tick major" style={{left: '150px'}}>v1.1</div>
                            <div className="nle-ruler-tick" style={{left: '200px'}}></div>
                            <div className="nle-ruler-tick major" style={{left: '250px'}}>v1.2</div>
                            <div className="nle-ruler-tick" style={{left: '300px'}}></div>
                            <div className="nle-ruler-tick major" style={{left: '350px'}}>v1.3</div>
                            <div className="nle-ruler-tick" style={{left: '400px'}}></div>
                            <div className="nle-ruler-tick major" style={{left: '450px'}}>v1.4</div>
                            <div className="nle-ruler-tick" style={{left: '500px'}}></div>
                            <div className="nle-ruler-tick major" style={{left: '550px'}}>v1.5</div>
                        </div>
                        
                        <div className="nle-tracks">
                            <div className="nle-playhead" style={{left: `${playheadPos}px`}} onPointerDown={handlePlayheadDown} onPointerMove={handlePlayheadMove} onPointerUp={handlePlayheadUp} onPointerCancel={handlePlayheadUp}></div>
                            <div className="nle-track-lane">
                              <div className="nle-clip" style={{left: '50px', width: '80px', background: 'transparent', color: 'var(--text)'}}>Init repo</div>
                              <div className="nle-clip" style={{left: '220px', width: '120px', background: 'transparent', color: 'var(--text)'}}>Merge PR #1</div>
                            </div>
                            <div className="nle-track-lane">
                              <div className="nle-clip" style={{left: '100px', width: '150px', background: 'var(--theme-glow)', color: 'var(--text)'}}>Write core_sys.py</div>
                              <div className="nle-clip" style={{left: '380px', width: '100px', background: 'var(--theme-glow)', color: 'var(--text)'}}>Fix pipeline</div>
                            </div>
                            <div className="nle-track-lane">
                              <div className="nle-clip" style={{left: '250px', width: '200px', background: 'rgba(128,128,128,0.2)', color: 'var(--text)'}}>DataMatrix class setup</div>
                            </div>
                        </div>
                      </div>
                    </div>
                  </div>
                )}
              </FloatingPanel>

              {/* MAIN CANVAS */}
              <div className="main-view">
                <div 
                  className="canvas-container"
                  onPointerDown={handleCanvasPointerDown} onPointerMove={handleCanvasPointerMove}
                  onPointerUp={handleCanvasPointerUp} onPointerLeave={handleCanvasPointerUp} onWheel={handleWheel}
                >
                  <div className="canvas-bg"></div>
                  <div className="graph-layer" style={{ transform: `translate(${transform.x}px, ${transform.y}px) scale(${transform.scale})` }}>
                    <svg className="svg-edges">
                      {visibleEdges.map(edge => {
                        const src = visibleNodes.find(n => n.id === edge.source);
                        const tgt = visibleNodes.find(n => n.id === edge.target);
                        if (!src || !tgt) return null;
                        return <path key={edge.id} className="edge-path" d={`M ${src.x} ${src.y} L ${tgt.x} ${tgt.y}`} />
                      })}
                    </svg>

                    {visibleNodes.map(node => (
                      <div 
                        key={node.id} 
                        className="obs-node-wrapper"
                        style={{ left: node.x + 'px', top: node.y + 'px', opacity: hoveredNodeId && hoveredNodeId !== node.id && !activeTabId ? 0.3 : 1 }}
                        onPointerEnter={() => !activeTabId && !isDraggingCanvas && setHoveredNodeId(node.id)}
                        onPointerLeave={() => !activeTabId && setHoveredNodeId(null)}
                        onPointerDown={(e) => { 
                          e.stopPropagation(); 
                          draggingNodeRef.current = { id: node.id, x: node.x, y: node.y, hasDragged: false }; 
                          lastMousePos.current = { x: e.clientX, y: e.clientY }; 
                        }}
                        onPointerUp={(e) => { 
                          if (!draggingNodeRef.current?.hasDragged) openNodeInEditor(node.id); 
                          draggingNodeRef.current = null; 
                        }}
                      >
                        <div className={`node-circle ${node.isMain ? 'main-node' : 'sub-node'}`}></div>
                        <div className="node-label">
                          {node.label}
                          {node.modified && <span className="modified-dot"></span>}
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            </div>

            <div className="status-bar">
              <div className="status-group">
                <span>CONNECTED</span>
                <span>{themeMode.toUpperCase()} ENGINE</span>
              </div>
              <div className="status-group">
                <span style={{fontWeight: 'bold'}}>VERSION: {activeVersionName}</span>
              </div>
            </div>

            {/* FULL-SCREEN EDITOR MODAL */}
            <div className={`modal-overlay ${activeTabId ? 'open' : ''}`} onPointerDown={() => setActiveTabId(null)}>
              {activeTabNode && (
                <div className="modal-content" onPointerDown={e => e.stopPropagation()}>
                  <div className="tabs-hdr">
                    {openTabs.map(id => {
                      const n = nodesRef.current.find(x => x.id === id);
                      if (!n) return null;
                      return (
                        <div key={id} className={`editor-tab ${activeTabId === id ? 'active' : ''}`} onClick={() => setActiveTabId(id)}>
                          <div style={{display:'flex', alignItems:'center', gap:'8px'}}><Icons.FileIcon /> <span>{n.label}</span></div>
                          <div className="tab-close" onClick={(e) => {
                            e.stopPropagation();
                            const newTabs = openTabs.filter((t) => t !== id);
                            setOpenTabs(newTabs);
                            if (activeTabId === id) setActiveTabId(newTabs.length ? newTabs[newTabs.length - 1] : null);
                          }}>✕</div>
                        </div>
                      )
                    })}
                  </div>
                  <div className="modal-body">
                    <div className="editor-main-area">
                      <div className="breadcrumb">
                        <Icons.FileIcon /> src / root / {activeTabNode.label}
                        {activeTabNode.modified && <span className="modified-dot"></span>}
                      </div>
                      <div className="modal-code-wrap">
                        <div className="editor-wrap">
                          <div className="line-numbers">
                            {activeTabNode.code.split('\n').map((_, i) => <div key={i}>{i + 1}</div>)}
                          </div>
                          <textarea 
                            className="code-area" 
                            value={activeTabNode.code}
                            onChange={e => {
                               const node = nodesRef.current.find(n => n.id === activeTabNode.id);
                               if(node) { node.code = e.target.value; node.modified = true; forceRender({}); }
                            }}
                            spellCheck="false"
                          />
                        </div>
                      </div>
                    </div>
                  </div>
                </div>
              )}
            </div>

          </div>
        </div>
      );
    }

    // BOOTLOADER / LOGIN SCREEN
    function Bootloader() {
      const [theme, setTheme] = useState(null);
      const [avatar, setAvatar] = useState(null);
      const [hoveredAvatar, setHoveredAvatar] = useState(null);

      if (theme && avatar !== null) {
        return <IDE initialTheme={theme} initialAvatar={avatar} />;
      }

      const activeColorIndex = hoveredAvatar !== null ? hoveredAvatar : avatar;
      const activeFaction = activeColorIndex !== null ? FACTIONS[activeColorIndex] : null;
      const dynamicColor = activeFaction ? activeFaction.cyber : '#333333';
      const isHoverActive = hoveredAvatar !== null;

      return (
        <div className="login-container" style={{ '--accent': dynamicColor }}>
          <div className={`login-box ${isHoverActive ? 'hovered' : ''}`}>
            <div style={{ textAlign: 'center', marginBottom: '10px' }}>
              <h1 style={{ fontSize: '36px', fontWeight: '900', letterSpacing: '4px', marginBottom: '10px', fontFamily: 'Inter, sans-serif' }}>FORBINDEN</h1>
              <div style={{ opacity: 0.6, letterSpacing: '2px', fontFamily: 'JetBrains Mono' }}>SYSTEM BOOT SEQUENCE</div>
            </div>

            <div style={{ padding: '20px' }}>
              <h2 style={{ fontSize: '12px', opacity: 0.7, marginBottom: '24px', textAlign: 'center', letterSpacing: '1px' }}>1. SELECT OPERATOR BADGE</h2>
              <div className="badge-grid">
                {[...Array(12)].map((_, i) => (
                  <OperatorBadge 
                    key={i} index={i} size={80} 
                    selected={avatar === i} hovered={hoveredAvatar === i}
                    onHover={setHoveredAvatar} onClick={() => setAvatar(i)} 
                  />
                ))}
              </div>
            </div>

            <div style={{ opacity: avatar !== null ? 1 : 0.3, transition: 'opacity 0.3s', pointerEvents: avatar !== null ? 'auto' : 'none' }}>
              <h2 style={{ fontSize: '12px', opacity: 0.7, marginBottom: '16px', textAlign: 'center', letterSpacing: '1px' }}>2. INITIALIZE ENGINE</h2>
              <div style={{ display: 'flex', gap: '20px' }}>
                <button className="theme-btn cyber" disabled={avatar === null} onClick={() => setTheme('cyber')} style={{'--accent-shadow': `${dynamicColor}66`}}>
                  <div style={{ fontSize: '24px', fontWeight: 'bold', marginBottom: '8px' }}>OBSIDIAN</div>
                  <div style={{ fontSize: '10px', opacity: 0.7 }}>DARK MODE // CYBERPUNK</div>
                </button>
                <button className="theme-btn brutal" disabled={avatar === null} onClick={() => setTheme('brutal')}>
                  <div style={{ fontSize: '24px', fontWeight: '900', marginBottom: '8px' }}>FORSAKEN</div>
                  <div style={{ fontSize: '10px', opacity: 0.7, fontWeight: 'bold' }}>LIGHT MODE // BRUTALIST</div>
                </button>
              </div>
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<Bootloader />);
  </script>
</body>
</html>
