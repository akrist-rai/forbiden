        else if(cmd==='ls') resp.push({c:'#c0c8d8',t:nodesRef.current.map(n=>n.label).join('  ')});
        else if(cmd==='clear'){setTermLines([]);setTermInput('');return;}
        else if(cmd==='git status') resp.push({c:modifiedNodes.length?'#ffc410':'#10b981',t:modifiedNodes.length?`${modifiedNodes.length} modified: ${modifiedNodes.map(n=>n.label).join(', ')}`:'Working tree clean.'});
        else if(cmd==='node list') resp.push({c:'#c0c8d8',t:nodesRef.current.map(n=>`${n.id}: ${n.label} (${n.type})`).join('\n')});
        else resp.push({c:'#ff435a',t:`command not found: ${cmd}`});
        setTermLines(l=>[...l,...resp]);
        setTermInput('');
      };

      const handleCmdAction = (label) => {
        if(label.includes('New file node'))setShowCreateNode(true);
        else if(label.includes('New class group')){setShowCreateGroup(true);setGroupSelected([]);}
        else if(label.includes('dark / brutal'))setThemeMode(m=>m==='cyber'?'brutal':'cyber');
        else if(label.includes('board'))setSidebarMode('board');
        else if(label.includes('terminal'))setBottomPanelTab('terminal');
      };

      const nodeCount = nodesRef.current.length;
      const edgeCount = edgesRef.current.length;
      const PC = {HIGH:'#ff435a',MED:'#ffc410',LOW:'#4285f4',DONE:'#10b981'};

      return (
        <div style={{width:'100vw',height:'100vh',padding:themeMode==='brutal'?'36px':'0px',backgroundColor:outerBg,transition:'all 0.4s ease',boxSizing:'border-box'}}>
          <div className={wrapperClass}>

            {/* HEADER */}
            <div className="app-header">
              <div style={{display:'flex',alignItems:'center',gap:'16px'}}>
                <div className="hdr-brand">
                  <I.Zap />
                  FORBINDEN
                  <span className="hdr-brand-sep">//</span>
                  <span style={{fontWeight:400,opacity:0.6,fontSize:'12px',letterSpacing:'1px'}}>{themeMode.toUpperCase()} ENGINE</span>
                </div>
                <div className="hdr-breadcrumb">
                  <span>workspace</span>
                  <span style={{opacity:0.3}}>/</span>
                  <span style={{opacity:0.5}}>{activeTabNode?.label||'—'}</span>
                </div>
              </div>
              <div style={{display:'flex',gap:'7px',alignItems:'center'}}>
                <button className="btn" style={{display:'flex',alignItems:'center',gap:'5px',opacity:0.7}} onClick={()=>setShowCmd(true)} title="Ctrl+P">
                  <I.Cmd />⌘P
                </button>
                <div style={{width:'1px',height:'20px',background:'rgba(128,128,128,0.2)'}}/>
                <button className="btn" onClick={()=>setShowCreateNode(true)}><I.Plus /> NODE</button>
                <button className="btn" onClick={()=>{setShowCreateGroup(true);setGroupSelected([]);}}>&#x2B21; GROUP</button>
                <button className="btn" onClick={()=>setThemeMode(t=>t==='cyber'?'brutal':'cyber')}>{themeMode==='cyber'?'BRUTALIST':'OBSIDIAN'}</button>
                <div style={{width:'1px',height:'20px',background:'rgba(128,128,128,0.2)'}}/>
                <div style={{cursor:'pointer',display:'flex',alignItems:'center',border:'1px solid rgba(128,128,128,0.15)',borderRadius:'50%',padding:'2px',transition:'border-color 0.2s'}} onClick={()=>setSidebarMode(s=>s==='settings'?null:'settings')}>
                  <CyberAvatar index={avatarIndex} size={24}/>
                </div>
              </div>
            </div>

            <div className="app-body">
              {/* SIDEBAR */}
              <div className="sidebar">
                {[
                  ['files','EXPLORER',<I.Files/>],
                  ['search','SEARCH',<I.Search/>],
                  ['git','SOURCE CONTROL',<><I.Git/>{modifiedNodes.length>0&&<div className="badge">{modifiedNodes.length}</div>}</>],
                  ['chat','COMMS',<I.Message/>],
                  ['note','NOTES',<I.Note/>],
                  ['board','BOARD',<I.Board/>],
                ].map(([mode,tip,icon])=>(
                  <div key={mode} className={`strip-icon ${sidebarMode===mode?'active':''}`} onClick={()=>setSidebarMode(s=>s===mode?null:mode)}>
                    {icon}
                    <div className="strip-icon-tooltip">{tip}</div>
                  </div>
                ))}
                <div style={{flex:1}}/>
                <div className={`strip-icon ${bottomPanelTab==='timeline'?'active':''}`} onClick={()=>setBottomPanelTab(v=>v==='timeline'?null:'timeline')} title="Timeline">
                  <I.Timeline/><div className="strip-icon-tooltip">TIMELINE</div>
                </div>
                <div className={`strip-icon ${bottomPanelTab==='terminal'?'active':''}`} onClick={()=>setBottomPanelTab(v=>v==='terminal'?null:'terminal')}>
                  <I.Terminal/><div className="strip-icon-tooltip">TERMINAL</div>
                </div>
                <div style={{height:'1px',width:'28px',background:'rgba(128,128,128,0.2)',margin:'4px 0'}}/>
                <div className={`strip-icon ${sidebarMode==='settings'?'active':''}`} onClick={()=>setSidebarMode(s=>s==='settings'?null:'settings')} style={{borderRadius:'50%',padding:'0',border:sidebarMode==='settings'?'2px solid var(--border)':'2px solid transparent'}}>
                  <CyberAvatar index={avatarIndex} size={26}/>
                  <div className="strip-icon-tooltip">WORKSPACE</div>
                </div>
              </div>

              {/* FLOATING PANELS */}
              <FloatingPanel title="EXPLORER" isOpen={sidebarMode==='files'} onClose={()=>setSidebarMode(null)} defaultX={70} defaultY={70} defaultW={270} defaultH={480}>
                <div style={{padding:'8px 12px',borderBottom:'1px solid rgba(128,128,128,0.1)',display:'flex',gap:'6px',alignItems:'center'}}>
                  <span style={{fontSize:'9px',opacity:0.35,letterSpacing:'1px'}}>GRAPH WORKSPACE</span>
                  <span style={{marginLeft:'auto',fontSize:'9px',opacity:0.3}}>{nodeCount} nodes · {edgeCount} edges</span>
                </div>
                <div style={{flex:1,overflowY:'auto'}}>
                  {visibleNodes.map(n => {
                    const grp = groupsRef.current.find(g=>g.nodeIds.includes(n.id));
                    return (
                      <div key={'e_'+n.id} className="list-item" onClick={()=>openNodeInEditor(n.id)}>
                        <I.FileIcon/>
                        <span style={{color:n.modified?'#ffc410':'inherit',flex:1}}>{n.label}</span>
                        {grp && <span style={{fontSize:'8px',color:grp.color,padding:'1px 5px',border:`1px solid ${grp.color}44`,borderRadius:'2px'}}>{grp.name}</span>}
                        {n.modified && <span className="list-item-sub">M</span>}
                      </div>
                    );
                  })}
                </div>
                <div style={{padding:'8px 12px',borderTop:'1px solid rgba(128,128,128,0.08)',display:'flex',gap:'6px'}}>
                  <button className="btn" style={{flex:1,fontSize:'9px',padding:'5px 8px'}} onClick={()=>setShowCreateNode(true)}><I.Plus/> NEW FILE</button>
                </div>
              </FloatingPanel>

              <FloatingPanel title="SEARCH" isOpen={sidebarMode==='search'} onClose={()=>setSidebarMode(null)} defaultX={70} defaultY={70} defaultW={290} defaultH={420}>
                <div style={{padding:'10px 12px',borderBottom:'1px solid rgba(128,128,128,0.1)'}}>
                  <input className="side-input" value={searchQuery} onChange={e=>setSearchQuery(e.target.value)} placeholder="Search labels and code..." autoFocus={sidebarMode==='search'}/>
                </div>
                <div style={{padding:'6px 14px',fontSize:'9px',opacity:0.35,borderBottom:'1px solid rgba(128,128,128,0.07)'}}>{filteredSearch.length} RESULTS</div>
                <div style={{flex:1,overflowY:'auto'}}>
                  {filteredSearch.map(n => (
                    <div key={'s_'+n.id} className="list-item" onClick={()=>openNodeInEditor(n.id)}>
                      <I.FileIcon/><span style={{flex:1}}>{n.label}</span>
                      <span className="list-item-sub">{n.type}</span>
                    </div>
                  ))}
                  {!filteredSearch.length && <div style={{padding:'20px',opacity:0.4,fontSize:'10px',textAlign:'center'}}>No results.</div>}
                </div>
              </FloatingPanel>

              <FloatingPanel title="SOURCE CONTROL" isOpen={sidebarMode==='git'} onClose={()=>setSidebarMode(null)} defaultX={70} defaultY={70} defaultW={270} defaultH={400}>
                <div style={{padding:'8px 12px',borderBottom:'1px solid rgba(128,128,128,0.1)',fontSize:'9px'}}>
                  <div style={{display:'flex',justifyContent:'space-between',opacity:0.5}}>
                    <span>main ← origin/main</span>
                    <span style={{color:modifiedNodes.length?'#ffc410':'#10b981'}}>{modifiedNodes.length} changes</span>
                  </div>
                </div>
                <div style={{flex:1,overflowY:'auto'}}>
                  {modifiedNodes.length===0
                    ? <div style={{padding:'20px',opacity:0.4,fontSize:'10px',textAlign:'center'}}>Working tree clean.</div>
                    : modifiedNodes.map(n => (
                      <div key={'g_'+n.id} className="list-item" onClick={()=>openNodeInEditor(n.id)}>
                        <I.FileIcon/><span style={{color:'#ffc410',flex:1}}>{n.label}</span><span className="list-item-sub" style={{color:'#ffc410'}}>M</span>
                      </div>
                    ))
                  }
                </div>
                {modifiedNodes.length>0 && (
                  <div style={{padding:'8px 12px',borderTop:'1px solid rgba(128,128,128,0.08)',display:'flex',gap:'6px'}}>
                    <input className="side-input" placeholder="Commit message..." style={{flex:1,fontSize:'10px',padding:'5px 8px'}}/>
                    <button className="btn" style={{fontSize:'9px',padding:'5px 10px',color:'#10b981',borderColor:'rgba(16,185,129,0.3)'}}>COMMIT</button>
                  </div>
                )}
              </FloatingPanel>

              <FloatingPanel title="WORKSPACE" isOpen={sidebarMode==='settings'} onClose={()=>setSidebarMode(null)} defaultX={70} defaultY={window.innerHeight-420} defaultW={460} defaultH={220}>
                <div style={{padding:'20px',display:'flex',flexDirection:'column',gap:'18px',height:'100%',overflowY:'auto'}}>
                  <div>
                    <div style={{fontSize:'9px',opacity:0.4,marginBottom:'12px',letterSpacing:'1.2px'}}>OPERATOR IDENTITY</div>
                    <div style={{display:'flex',gap:'12px',justifyContent:'center',flexWrap:'wrap'}}>
                      {[0,1,2,3,4,5].map(i=>(
                        <CyberAvatar key={i} index={i} size={52} selected={avatarIndex===i} onClick={()=>setAvatarIndex(i)}/>
                      ))}
                    </div>
                  </div>
                  <div style={{display:'flex',gap:'8px',alignItems:'flex-end'}}>
                    <div style={{flex:1}}>
                      <div style={{fontSize:'9px',opacity:0.4,marginBottom:'6px',letterSpacing:'1px'}}>UPSTREAM REPO</div>
                      <input className="side-input" value={repoUrl} onChange={e=>setRepoUrl(e.target.value)} placeholder="https://github.com/..." style={{fontSize:'11px'}}/>
                    </div>
                    <button className="btn" style={{fontSize:'9px',flexShrink:0}}>SAVE</button>
                  </div>
                </div>
              </FloatingPanel>

              <FloatingPanel title="COMMUNICATIONS" isOpen={sidebarMode==='chat'} onClose={()=>setSidebarMode(null)} defaultX={360} defaultY={70} defaultW={290} defaultH={380}>
                <div className="chat-wrap">
                  <div style={{padding:'6px 12px',borderBottom:'1px solid rgba(128,128,128,0.1)',fontSize:'9px',opacity:0.4,display:'flex',gap:'10px'}}>
                    <span style={{color:'#10b981',display:'flex',alignItems:'center',gap:'4px'}}><div style={{width:'5px',height:'5px',borderRadius:'50%',background:'#10b981'}}/> 2 online</span>
                    <span>FORBINDEN WORKSPACE</span>
                  </div>
                  <div className="chat-messages">
                    <div className="chat-msg self"><span style={{opacity:0.5,fontSize:'9px'}}>You · now</span><br/>Architecture booted. Running tests.</div>
                    <div className="chat-msg other"><span style={{opacity:0.5,fontSize:'9px'}}>System · now</span><br/>Sync established. 4 nodes active.</div>
                    <div className="chat-msg other"><span style={{opacity:0.5,fontSize:'9px'}}>Op-2 · 2m</span><br/>Pushing DataMatrix refactor.</div>
                  </div>
                  <div className="chat-input-wrap">
                    <input className="side-input" placeholder="Broadcast..." style={{flex:1,fontSize:'10px'}}/>
                    <button className="btn" style={{fontSize:'9px',flexShrink:0}}>SEND</button>
                  </div>
                </div>
              </FloatingPanel>

              <FloatingPanel title="NOTES" isOpen={sidebarMode==='note'} onClose={()=>setSidebarMode(null)} defaultX={100} defaultY={120} defaultW={290} defaultH={280}>
                <div style={{padding:'8px 12px',borderBottom:'1px solid rgba(128,128,128,0.08)',fontSize:'9px',opacity:0.35,letterSpacing:'1px'}}>OPERATOR SCRATCHPAD</div>
                <textarea className="code-area" style={{width:'100%',height:'100%',resize:'none',color:'var(--text)',fontSize:'12px',fontFamily:"'JetBrains Mono',monospace",padding:'12px'}} placeholder="Personal notes..."/>
              </FloatingPanel>

              <FloatingPanel title="PLANNING BOARD" isOpen={sidebarMode==='board'} onClose={()=>setSidebarMode(null)} defaultX={100} defaultY={50} defaultW={920} defaultH={520}>
                {(()=>{
                  const done=board.cards.filter(c=>c.colId==='c5').length, total=board.cards.length;
                  return (
                    <div className="board-wrap" style={{position:'relative'}}>
                      <div className="board-topbar">
                        <span style={{fontSize:'11px',fontWeight:'bold',opacity:0.8,letterSpacing:'0.8px'}}>FORBINDEN / SPRINT-01</span>
                        <div style={{display:'flex',gap:'5px',marginLeft:'10px'}}>{[0,1,2].map(i=><CyberAvatar key={i} index={i} size={16}/>)}</div>
                        <div className="board-meta">
                          <span>{done}/{total} DONE</span>
                          <span style={{color:'#ffc410'}}>{board.cards.filter(c=>c.priority==='HIGH'&&c.colId!=='c5').length} HIGH-PRI</span>
                          <span style={{color:'#4285f4'}}>{board.cards.filter(c=>c.progress>0&&c.progress<100).length} ACTIVE</span>
                        </div>
                      </div>
                      <div style={{height:'2px',background:'rgba(128,128,128,0.08)',flexShrink:0}}>
                        <div style={{height:'100%',width:`${done/Math.max(total,1)*100}%`,background:'#10b981',transition:'width 0.4s'}}/>
                      </div>
                      <div className="board-cols">
                        {board.cols.map(col => {
                          const cards=board.cards.filter(c=>c.colId===col.id);
                          return (
                            <div key={col.id} className="board-col">
                              <div className="board-col-hdr" style={{background:col.color+'14',borderLeft:'2px solid '+col.color}}>
                                <span style={{color:col.color}}>{col.title}</span>
                                <span className="board-col-count" style={{color:col.color}}>{cards.length}</span>
                              </div>
                              {cards.map(card => (
                                <div key={card.id} className="board-card" onClick={()=>setFocusCard(card.id)}>
                                  <div className="board-card-accent" style={{background:PC[card.priority]||'#555'}}/>
                                  <div className="board-card-title">{card.title}</div>
                                  {card.tags.length>0 && <div className="board-card-tags">{card.tags.map(t=><span key={t} className="board-tag" style={{color:col.color,borderColor:col.color+'33',background:col.color+'0e'}}>{t}</span>)}</div>}
                                  {card.progress>0 && <div className="board-progress"><div className="board-progress-bar" style={{width:`${card.progress}%`,background:card.progress===100?'#10b981':PC[card.priority]}}/></div>}
                                  <div className="board-card-footer">
                                    <span className="board-priority" style={{color:PC[card.priority],background:PC[card.priority]+'14'}}>{card.priority}</span>
                                    {card.due && <span>📅 {card.due}</span>}
                                    {card.assignee!=null && <div style={{marginLeft:'auto'}}><CyberAvatar index={card.assignee} size={13}/></div>}
                                  </div>
                                </div>
                              ))}
                              {newCardCol===col.id
                                ? <div style={{display:'flex',flexDirection:'column',gap:'5px',padding:'7px',border:'1px solid rgba(255,255,255,0.08)',borderRadius:'4px',background:'rgba(255,255,255,0.02)'}}>
                                    <input className="create-modal-input" value={newCardTitle} onChange={e=>setNewCardTitle(e.target.value)}
                                      onKeyDown={e=>{if(e.key==='Enter')addCard(col.id);if(e.key==='Escape')setNewCardCol(null);}}
                                      placeholder="Card title..." autoFocus style={{fontSize:'10px',padding:'5px 9px'}}/>
                                    <div style={{display:'flex',gap:'5px'}}>
                                      <button className="editor-toolbar-btn" onClick={()=>addCard(col.id)} style={{flex:1,justifyContent:'center',fontSize:'9px'}}>ADD</button>
                                      <button className="editor-toolbar-btn" onClick={()=>setNewCardCol(null)} style={{color:'#ff435a'}}>✕</button>
                                    </div>
                                  </div>
                                : <div className="board-add-card" onClick={()=>{setNewCardCol(col.id);setNewCardTitle('');}}>+ ADD CARD</div>
                              }
                            </div>
                          );
                        })}
                      </div>
                      {focusCard && (()=>{
                        const card=board.cards.find(c=>c.id===focusCard); if(!card)return null;
                        const col=board.cols.find(c=>c.id===card.colId);
                        return (
                          <div className="card-detail-overlay" onClick={()=>setFocusCard(null)}>
                            <div className="card-detail-box" onClick={e=>e.stopPropagation()}>
                              <div style={{display:'flex',justifyContent:'space-between',gap:'8px'}}>
                                <div style={{fontSize:'12px',fontWeight:'bold',lineHeight:1.4,flex:1}}>{card.title}</div>
                                <div style={{cursor:'pointer',opacity:0.5}} onClick={()=>setFocusCard(null)}>✕</div>
                              </div>
                              <div>
                                <div style={{fontSize:'9px',opacity:0.4,marginBottom:'6px',letterSpacing:'1px'}}>PRIORITY</div>
                                <div style={{display:'flex',gap:'5px',flexWrap:'wrap'}}>
                                  {['HIGH','MED','LOW','DONE'].map(p=>(
                                    <button key={p} className="editor-toolbar-btn" onClick={()=>updateCard(card.id,{priority:p})} style={{color:PC[p],borderColor:card.priority===p?PC[p]:'rgba(128,128,128,0.2)',background:card.priority===p?PC[p]+'14':'transparent',fontSize:'9px'}}>{p}</button>
                                  ))}
                                </div>
                              </div>
                              <div>
                                <div style={{fontSize:'9px',opacity:0.4,marginBottom:'6px',letterSpacing:'1px'}}>MOVE TO</div>
                                <div style={{display:'flex',gap:'5px',flexWrap:'wrap'}}>
                                  {board.cols.map(c=>(
                                    <button key={c.id} className="editor-toolbar-btn" onClick={()=>moveCard(card.id,c.id)} style={{color:c.id===card.colId?c.color:'inherit',borderColor:c.id===card.colId?c.color:'rgba(128,128,128,0.2)',fontSize:'9px'}}>{c.title}</button>
                                  ))}
                                </div>
                              </div>
                              <div>
                                <div style={{fontSize:'9px',opacity:0.4,marginBottom:'5px',letterSpacing:'1px'}}>PROGRESS — {card.progress}%</div>
                                <input type="range" min="0" max="100" value={card.progress} onChange={e=>updateCard(card.id,{progress:+e.target.value})} style={{width:'100%',accentColor:col?col.color:'#10b981'}}/>
                              </div>
                              <div style={{display:'flex',gap:'10px',alignItems:'flex-end'}}>
                                <div style={{flex:1}}>
                                  <div style={{fontSize:'9px',opacity:0.4,marginBottom:'5px',letterSpacing:'1px'}}>DUE DATE</div>
                                  <input className="create-modal-input" value={card.due} onChange={e=>updateCard(card.id,{due:e.target.value})} placeholder="Mar 15" style={{fontSize:'10px',padding:'5px 9px',width:'100%'}}/>
                                </div>
                                <div>
                                  <div style={{fontSize:'9px',opacity:0.4,marginBottom:'5px',letterSpacing:'1px'}}>ASSIGNEE</div>
                                  <div style={{display:'flex',gap:'5px'}}>
                                    {[0,1,2].map(i=>(
                                      <div key={i} onClick={()=>updateCard(card.id,{assignee:i})} style={{cursor:'pointer',outline:card.assignee===i?'2px solid #10b981':'none',outlineOffset:'2px',borderRadius:'50%'}}>
                                        <CyberAvatar index={i} size={20}/>
                                      </div>
                                    ))}
                                  </div>
                                </div>
                              </div>
                              <button className="editor-toolbar-btn" onClick={()=>deleteCard(card.id)} style={{color:'#ff435a',borderColor:'#ff435a33',justifyContent:'center',fontSize:'9px'}}>DELETE CARD</button>
                            </div>
                          </div>
                        );
                      })()}
                    </div>
                  );
                })()}
              </FloatingPanel>

              {/* TERMINAL + TIMELINE */}
              <FloatingPanel
                title={
                  <div style={{display:'flex',gap:'14px'}}>
                    {['terminal','timeline'].map(t=>(
                      <span key={t} style={{cursor:'pointer',opacity:bottomPanelTab===t?1:0.4,transition:'opacity 0.2s',letterSpacing:'0.5px'}} onClick={()=>setBottomPanelTab(t)}>{t.toUpperCase()}</span>
                    ))}
                  </div>
                }
                isOpen={!!bottomPanelTab} onClose={()=>setBottomPanelTab(null)} defaultX={180} defaultY={window.innerHeight-320} defaultW={780} defaultH={270}
              >
                {bottomPanelTab==='terminal' && (
                  <div style={{display:'flex',flexDirection:'column',flex:1,overflow:'hidden'}}>
                    <div className="term-content" style={{flex:1}}>
                      {termLines.map((l,i)=><div key={i} style={{color:l.c,fontFamily:"'JetBrains Mono',monospace",whiteSpace:'pre-wrap'}}>{l.t}</div>)}
                      <div ref={termEndRef}/>
                    </div>
                    <div style={{display:'flex',alignItems:'center',borderTop:'1px solid rgba(128,128,128,0.1)',padding:'6px 14px',gap:'8px',background:'rgba(0,0,0,0.1)'}}>
                      <span style={{color:'#10b981',fontSize:'11px',fontFamily:"'JetBrains Mono',monospace"}}>$</span>
                      <input value={termInput} onChange={e=>setTermInput(e.target.value)} onKeyDown={handleTermInput}
                        style={{flex:1,background:'transparent',border:'none',outline:'none',color:'#e0e0f0',fontFamily:"'JetBrains Mono',monospace",fontSize:'11px',caretColor:'#10b981'}}
                        placeholder="try: help, ls, git status, clear"/>
                    </div>
                  </div>
                )}
                {bottomPanelTab==='timeline' && (
                  <div className="nle-wrap">
                    <div className="nle-body">
                      <div className="nle-track-headers">
                        <div className="nle-ruler" style={{borderBottom:'none'}}/>
                        <div className="nle-track-header"><span>MAIN</span><I.Git/></div>
                        <div className="nle-track-header"><span>YOU</span><CyberAvatar index={avatarIndex} size={14}/></div>
                        <div className="nle-track-header"><span>OP-2</span><div style={{width:'7px',height:'7px',background:'#4285f4',borderRadius:'50%'}}/></div>
                      </div>
                      <div style={{flex:1,overflowX:'auto',display:'flex',flexDirection:'column'}}>
                        <div className="nle-ruler">
                          {['v1.0','v1.1','v1.2','v1.3','v1.4','v1.5'].map((v,i)=>(
                            <div key={v} className="nle-ruler-tick major" style={{left:`${50+i*100}px`}}>{v}</div>
                          ))}
                        </div>
                        <div className="nle-tracks">
                          <div className="nle-playhead" style={{left:`${playheadPos}px`}} onPointerDown={handlePlayheadDown} onPointerMove={handlePlayheadMove} onPointerUp={handlePlayheadUp} onPointerCancel={handlePlayheadUp}/>
                          <div className="nle-track-lane">
                            <div className="nle-clip" style={{left:'50px',width:'70px',color:'var(--text)'}}>Init repo</div>
                            <div className="nle-clip" style={{left:'220px',width:'110px',color:'var(--text)'}}>Merge PR #1</div>
                          </div>
                          <div className="nle-track-lane">
                            <div className="nle-clip" style={{left:'100px',width:'140px',background:'rgba(255,67,90,0.12)',borderColor:'#ff435a55',color:'var(--text)'}}>Write core_sys.py</div>
                            <div className="nle-clip" style={{left:'380px',width:'90px',background:'rgba(255,67,90,0.12)',borderColor:'#ff435a55',color:'var(--text)'}}>Fix pipeline</div>
                          </div>
                          <div className="nle-track-lane">
                            <div className="nle-clip" style={{left:'250px',width:'190px',background:'rgba(66,133,244,0.12)',borderColor:'#4285f455',color:'var(--text)'}}>DataMatrix class</div>
                          </div>
                        </div>
                      </div>
                    </div>
                  </div>
                )}
              </FloatingPanel>

              {/* MAIN CANVAS */}
              <div className="main-view">
                <div className="canvas-container" onPointerDown={handleCanvasPointerDown} onPointerMove={handleCanvasPointerMove} onPointerUp={handleCanvasPointerUp} onPointerLeave={handleCanvasPointerUp} onWheel={handleWheel}>
                  <div className="canvas-bg"/>
                  <div className="graph-layer" style={{transform:`translate(${transform.x}px,${transform.y}px) scale(${transform.scale})`}}>
                    <svg className="svg-edges">
                      {visibleEdges.map(edge => {
                        const src=visibleNodes.find(n=>n.id===edge.source), tgt=visibleNodes.find(n=>n.id===edge.target);
                        if(!src||!tgt)return null;
                        const mx=(src.x+tgt.x)/2, my=(src.y+tgt.y)/2-20;
                        return <path key={edge.id} className="edge-path" d={`M${src.x} ${src.y} Q${mx} ${my} ${tgt.x} ${tgt.y}`}/>;
                      })}
                    </svg>
                    {groupsRef.current.map(grp => {
                      const gn=visibleNodes.filter(n=>grp.nodeIds.includes(n.id));
                      if(gn.length<2)return null;
                      const cx=gn.reduce((s,n)=>s+n.x,0)/gn.length, cy=gn.reduce((s,n)=>s+n.y,0)/gn.length;
                      const sorted=[...gn].sort((a,b)=>Math.atan2(a.y-cy,a.x-cx)-Math.atan2(b.y-cy,b.x-cx));
                      const PAD=46;
                      const pts=sorted.map(n=>{const dx=n.x-cx,dy=n.y-cy,d=Math.sqrt(dx*dx+dy*dy)||1;return[cx+dx/d*(d+PAD),cy+dy/d*(d+PAD)];});
                      const pathD=pts.map((p,i)=>(i===0?'M':'L')+p[0].toFixed(1)+' '+p[1].toFixed(1)).join(' ')+' Z';
                      const lx=cx, ly=Math.min(...gn.map(n=>n.y))-PAD-10;
                      return (
                        <g key={grp.id}>
                          <path d={pathD} fill={grp.color+'0c'} stroke={grp.color} strokeWidth="1" strokeDasharray="6 3" opacity="0.7"/>
                          <foreignObject x={lx-58} y={ly-11} width="120" height="20" style={{overflow:'visible'}}>
                            <div xmlns="http://www.w3.org/1999/xhtml" style={{background:grp.color+'1a',color:grp.color,border:'1px solid '+grp.color+'44',fontSize:'8px',padding:'2px 7px',fontFamily:"'JetBrains Mono',monospace",letterSpacing:'1px',borderRadius:'2px',whiteSpace:'nowrap',cursor:'pointer',display:'inline-block',userSelect:'none'}}
                              onClick={e=>{e.stopPropagation();if(window.confirm('Dissolve '+grp.name+'?'))dissolveGroup(grp.id);}}>
                              ⬡ {grp.name}
                            </div>
                          </foreignObject>
                        </g>
                      );
                    })}
                    {visibleNodes.map(node => {
                      const grp=groupsRef.current.find(g=>g.nodeIds.includes(node.id));
                      return (
                        <div key={node.id} className={`obs-node-wrapper clr-${ZONES[node.themeIdx%ZONES.length]}`}
                          style={{left:node.x+'px',top:node.y+'px',opacity:hoveredNodeId&&hoveredNodeId!==node.id&&!activeTabId?0.25:1,transition:'opacity 0.2s'}}
                          onPointerEnter={()=>!activeTabId&&!isDraggingCanvas&&setHoveredNodeId(node.id)}
                          onPointerLeave={()=>!activeTabId&&setHoveredNodeId(null)}
                          onPointerDown={e=>{e.stopPropagation();draggingNodeRef.current={id:node.id,x:node.x,y:node.y,hasDragged:false};lastMousePos.current={x:e.clientX,y:e.clientY};}}
                          onPointerUp={()=>{if(!draggingNodeRef.current?.hasDragged)openNodeInEditor(node.id);draggingNodeRef.current=null;}}
                        >
                          <div className={`node-circle ${node.isMain?'main-node':'sub-node'}`} style={grp?{boxShadow:`0 0 12px ${grp.color}88`}:{}}/>
                          <div className="node-label" style={grp?{borderColor:grp.color+'44'}:{}}>
                            {node.label}{node.modified&&<span className="modified-dot"/>}
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </div>
                <GraphMinimap nodes={visibleNodes}/>
              </div>
            </div>

            {/* STATUS BAR */}
            <div className="status-bar">
              <div className="status-group">
                <span style={{display:'flex',alignItems:'center',gap:'4px'}}><span className="status-dot" style={{background:'#10b981',boxShadow:'0 0 5px #10b981'}}/>CONNECTED</span>
                <span style={{opacity:0.3}}>|</span>
                <span>{nodeCount} NODES · {edgeCount} EDGES</span>
                <span style={{opacity:0.3}}>|</span>
                <span style={{opacity:0.6}}>{themeMode.toUpperCase()}</span>
              </div>
              <div className="status-group">
                <span style={{color:'#ffc410',fontWeight:'bold',fontSize:'10px'}}>VER {activeVersionName}</span>
                <span style={{opacity:0.3}}>|</span>
                <span style={{opacity:0.5}}>{modifiedNodes.length>0?`${modifiedNodes.length} unsaved`:'all saved'}</span>
              </div>
              <div className="status-group">
                <span style={{opacity:0.4,cursor:'pointer'}} onClick={()=>setShowCmd(true)}>⌘P</span>
                <span style={{opacity:0.3}}>|</span>
                <span style={{opacity:0.4}}>{new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'})}</span>
              </div>
            </div>

            {/* CREATE NODE MODAL */}
            {showCreateNode && (
              <div className="create-modal" onPointerDown={()=>setShowCreateNode(false)}>
                <div className="create-modal-box" onPointerDown={e=>e.stopPropagation()}>
                  <div className="create-modal-title">CREATE FILE NODE</div>
                  <div className="create-modal-field">
                    <div className="create-modal-label">NAME</div>
                    <input className="create-modal-input" value={newNodeName} onChange={e=>setNewNodeName(e.target.value)} onKeyDown={e=>e.key==='Enter'&&handleCreateNode()} placeholder="my_function" autoFocus/>
                  </div>
                  <div className="create-modal-field">
                    <div className="create-modal-label">TYPE</div>
                    <div className="type-grid">
                      {['function','entry','helper','hook','util','class'].map(t=>(
                        <button key={t} className={`type-btn ${newNodeType===t?'selected':''}`} onClick={()=>setNewNodeType(t)}>{t}</button>
                      ))}
                    </div>
                  </div>
                  <div className="create-modal-field">
                    <div className="create-modal-label">COLOR</div>
                    <div className="color-grid">
                      {['#6a6a8a','#ff435a','#ffc410','#1e836d','#4285f4','#28f1c3','#ff1650'].map((c,i)=>(
                        <div key={i} className={`color-dot-btn ${newNodeColor===i?'selected':''}`} style={{background:c}} onClick={()=>setNewNodeColor(i)}/>
                      ))}
                    </div>
                  </div>
                  <div className="create-modal-actions">
                    <button className="btn" style={{flex:1,borderColor:'rgba(16,185,129,0.5)',color:'#10b981',background:'rgba(16,185,129,0.05)'}} onClick={handleCreateNode}>CREATE</button>
                    <button className="btn" onClick={()=>setShowCreateNode(false)}>CANCEL</button>
                  </div>
                </div>
              </div>
            )}

            {/* CREATE GROUP MODAL */}
            {showCreateGroup && (
              <div className="create-modal" onPointerDown={()=>setShowCreateGroup(false)}>
                <div className="create-modal-box" onPointerDown={e=>e.stopPropagation()}>
                  <div className="create-modal-title">GROUP AS CLASS</div>
                  <div className="create-modal-field">
                    <div className="create-modal-label">CLASS NAME</div>
                    <input className="create-modal-input" value={groupName} onChange={e=>setGroupName(e.target.value)} onKeyDown={e=>e.key==='Enter'&&handleCreateGroup()} placeholder="MyClass" autoFocus/>
                  </div>
                  <div className="create-modal-field">
                    <div className="create-modal-label">THREAD COLOR</div>
                    <div className="color-grid">
                      {['#10b981','#ff435a','#ffc410','#4285f4','#28f1c3','#ff1650','#bb9af7'].map(c=>(
                        <div key={c} className={`color-dot-btn ${groupColor===c?'selected':''}`} style={{background:c}} onClick={()=>setGroupColor(c)}/>
                      ))}
                    </div>
                  </div>
                  <div className="create-modal-field">
                    <div className="create-modal-label">MEMBER NODES (min 2)</div>
                    <div style={{display:'flex',flexDirection:'column',gap:'4px',maxHeight:'170px',overflowY:'auto',marginTop:'4px'}}>
                      {nodesRef.current.map(n=>(
                        <div key={n.id} onClick={()=>setGroupSelected(s=>s.includes(n.id)?s.filter(x=>x!==n.id):[...s,n.id])}
                          style={{padding:'7px 10px',border:'1px solid '+(groupSelected.includes(n.id)?groupColor:'rgba(128,128,128,0.15)'),background:groupSelected.includes(n.id)?groupColor+'10':'transparent',borderRadius:'3px',cursor:'pointer',display:'flex',alignItems:'center',gap:'8px',transition:'all 0.12s'}}>
                          <div style={{width:'6px',height:'6px',borderRadius:'50%',background:groupSelected.includes(n.id)?groupColor:'rgba(128,128,128,0.25)',flexShrink:0}}/>
                          <span style={{fontSize:'10px',flex:1,color:groupSelected.includes(n.id)?groupColor:'inherit'}}>{n.label}</span>
                          <span style={{fontSize:'9px',opacity:0.3}}>{n.type}</span>
                        </div>
                      ))}
                    </div>
                  </div>
                  <div style={{fontSize:'9px',opacity:0.35}}>{groupSelected.length} selected (need ≥2)</div>
                  <div className="create-modal-actions">
                    <button className="btn" onClick={handleCreateGroup}
                      style={{flex:1,borderColor:groupSelected.length>=2&&groupName.trim()?groupColor+'88':'rgba(128,128,128,0.2)',color:groupSelected.length>=2&&groupName.trim()?groupColor:'rgba(128,128,128,0.3)'}}>CREATE CLASS</button>
                    <button className="btn" onClick={()=>setShowCreateGroup(false)}>CANCEL</button>
                  </div>
                </div>
              </div>
            )}

            {/* EDITOR MODAL */}
            <div className={`modal-overlay ${activeTabId?'open':''}`} onPointerDown={()=>setActiveTabId(null)}>
              {activeTabNode && (
                <div className="modal-content" onPointerDown={e=>e.stopPropagation()}>
                  <div className="tabs-hdr">
                    {openTabs.map(id => {
                      const n=nodesRef.current.find(x=>x.id===id);
                      if(!n)return null;
                      return (
                        <div key={id} className={`editor-tab ${activeTabId===id?'active':''}`} onClick={()=>setActiveTabId(id)}>
                          <div style={{display:'flex',alignItems:'center',gap:'7px'}}><I.FileIcon/><span>{n.label}</span>{n.modified&&<span className="modified-dot"/>}</div>
                          <div className="tab-close" onClick={e=>{e.stopPropagation();const t=openTabs.filter(x=>x!==id);setOpenTabs(t);if(activeTabId===id)setActiveTabId(t.length?t[t.length-1]:null);}}>✕</div>
                        </div>
                      );
                    })}
                    <div style={{marginLeft:'auto',padding:'0 14px',display:'flex',alignItems:'center',gap:'10px',opacity:0.35,fontSize:'9px'}}>
                      <span>{openTabs.length} open</span>
                    </div>
                  </div>
                  <div className="modal-body">
                    <div className="editor-main-area">
                      <CodeEditor
                        node={activeTabNode}
                        onChange={code => {
                          const node=nodesRef.current.find(n=>n.id===activeTabNode.id);
                          if(node){node.code=code;node.modified=true;forceRender({});}
                        }}
                      />
                    </div>
                  </div>
                </div>
              )}
            </div>
          </div>
        </div>
      );
    }

    // ────────────────────────────────────────────────────────────────
    //  COMMAND PALETTE WRAPPER + IDE
    // ────────────────────────────────────────────────────────────────
    function IDEWithCmd({ initialTheme, initialAvatar }) {
      const [showCmd, setShowCmd] = useState(false);
      const [pendingAction, setPendingAction] = useState(null);
      useEffect(() => {
        const h = (e) => { if((e.metaKey||e.ctrlKey)&&e.key==='p'){e.preventDefault();setShowCmd(v=>!v);} if(e.key==='Escape')setShowCmd(false); };
        window.addEventListener('keydown',h); return()=>window.removeEventListener('keydown',h);
      },[]);
      return (
        <>
          <IDE initialTheme={initialTheme} initialAvatar={initialAvatar}/>
          <CommandPalette isOpen={showCmd} onClose={()=>setShowCmd(false)} onAction={a=>{setPendingAction(a);}}/>
        </>
      );
    }

    // ────────────────────────────────────────────────────────────────
    //  BOOTLOADER
    // ────────────────────────────────────────────────────────────────
    function Bootloader() {
      const [theme, setTheme] = useState(null);
      const [avatar, setAvatar] = useState(null);
      if (theme && avatar!==null) return <IDEWithCmd initialTheme={theme} initialAvatar={avatar}/>;
      return (
        <div className="login-container">
          <div className="login-box">
            <div style={{textAlign:'center'}}>
              <div style={{fontSize:'10px',opacity:0.25,letterSpacing:'4px',marginBottom:'14px',fontFamily:"'JetBrains Mono',monospace"}}>SYSTEM BOOT SEQUENCE</div>
              <h1 style={{fontSize:'34px',fontWeight:900,letterSpacing:'6px',fontFamily:"'JetBrains Mono',monospace",marginBottom:'6px'}}>FORBINDEN</h1>
              <div style={{fontSize:'10px',opacity:0.2,letterSpacing:'3px'}}>DUAL THEME GRAPH IDE</div>
            </div>

            <div style={{background:'rgba(255,255,255,0.02)',padding:'28px',borderRadius:'6px',border:'1px solid rgba(255,255,255,0.06)'}}>
              <div style={{fontSize:'9px',opacity:0.35,marginBottom:'20px',textAlign:'center',letterSpacing:'3px'}}>01 // SELECT OPERATOR IDENTITY</div>
              <div style={{display:'flex',gap:'14px',justifyContent:'center',flexWrap:'wrap'}}>
                {[0,1,2,3,4,5].map(i=>(
                  <div key={i} onClick={()=>setAvatar(i)} style={{display:'flex',flexDirection:'column',alignItems:'center',gap:'7px',cursor:'pointer',transition:'transform 0.2s',transform:avatar===i?'translateY(-4px)':'none'}}>
                    <CyberAvatar index={i} size={68} selected={avatar===i}/>
                    <div style={{fontSize:'8px',letterSpacing:'1px',opacity:avatar===i?1:0.25,color:AVATAR_ACCENTS[i],fontFamily:"'JetBrains Mono',monospace",transition:'opacity 0.2s'}}>{AVATAR_NAMES[i]}</div>
                  </div>
                ))}
              </div>
            </div>

            <div style={{opacity:avatar!==null?1:0.15,transition:'opacity 0.4s',pointerEvents:avatar!==null?'auto':'none'}}>
              <div style={{fontSize:'9px',opacity:0.35,marginBottom:'14px',textAlign:'center',letterSpacing:'3px'}}>02 // INITIALIZE ENGINE</div>
              <div style={{display:'flex',gap:'16px'}}>
                <button className="theme-btn cyber" disabled={avatar===null} onClick={()=>setTheme('cyber')}>
                  <div style={{fontSize:'20px',fontWeight:'bold',marginBottom:'6px',letterSpacing:'2px'}}>OBSIDIAN</div>
                  <div style={{fontSize:'9px',opacity:0.5,letterSpacing:'1px'}}>DARK / CYBERPUNK</div>
                </button>
                <button className="theme-btn brutal" disabled={avatar===null} onClick={()=>setTheme('brutal')}>
                  <div style={{fontSize:'20px',fontWeight:900,marginBottom:'6px',letterSpacing:'2px'}}>FORSAKEN</div>
                  <div style={{fontSize:'9px',opacity:0.6,fontWeight:'bold',letterSpacing:'1px'}}>LIGHT / BRUTALIST</div>
                </button>
              </div>
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<Bootloader/>);
  </script>
</body>
</html>
