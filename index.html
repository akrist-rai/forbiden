<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FORBINDEN // DUAL IDE</title>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@400;700;800&display=swap");
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; width: 100vw; height: 100vh; user-select: none; font-size: 10px; margin: 0; background-color: #050505; font-family: 'JetBrains Mono', monospace; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: currentColor; border-radius: var(--scroll-rad, 0); opacity: 0.5; }
    .app-wrapper { width: 100%; height: 100%; display: flex; flex-direction: column; overflow: hidden; background: var(--bg); color: var(--text); border: var(--border-w) solid var(--border); border-radius: var(--ui-radius, 0); transition: background 0.4s ease, color 0.4s ease, border-color 0.4s ease; }
    .theme-brutal { --border-w: 6px; --edge-w: 4px; --ui-radius: 0px; --inner-w: 4px; font-family: 'Inter', sans-serif; text-transform: uppercase; font-weight: 900; box-shadow: 20px 20px 0px var(--border); }
    .theme-brutal.zone-default { --bg: #ffffff; --text: #111111; --border: #111111; --node-bg: #ffffff; }
    .theme-brutal.zone-1 { --bg: #111111; --text: #ff435a; --border: #ff435a; --node-bg: #111111; }
    .theme-brutal.zone-2 { --bg: #7ca148; --text: #111111; --border: #111111; --node-bg: #ffc410; }
    .theme-brutal.zone-3 { --bg: #1e836d; --text: #111111; --border: #111111; --node-bg: #1e836d; }
    .theme-brutal.zone-4 { --bg: #f3f5f7; --text: #4285f4; --border: #4285f4; --node-bg: #f3f5f7; }
    .theme-brutal.zone-5 { --bg: #1e836d; --text: #28f1c3; --border: #28f1c3; --node-bg: #1e836d; }
    .theme-brutal.zone-6 { --bg: #1a0020; --text: #ff1650; --border: #ff1650; --node-bg: #1a0020; }
    .theme-brutal .btn { border: 4px solid var(--text); box-shadow: 4px 4px 0 var(--border); background: var(--bg); color: var(--text); }
    .theme-brutal .btn:hover { background: var(--text); color: var(--bg); transform: translate(-2px, -2px); box-shadow: 6px 6px 0 var(--border); }
    .theme-brutal .node-circle { background: var(--node-bg); border: 4px solid var(--border); box-shadow: 4px 4px 0px var(--border); }
    .theme-brutal .node-label { background: var(--bg); color: var(--text); border: 4px solid var(--border); box-shadow: 4px 4px 0px var(--border); font-weight: 900; }
    .theme-brutal .editor-wrap, .theme-brutal .modal-content { border: 6px solid var(--border); box-shadow: 8px 8px 0px var(--border); }
    .theme-brutal .modal-content { box-shadow: 20px 20px 0px var(--border); }
    .theme-brutal .panel { border-right: var(--border-w) solid var(--border); border-top: var(--border-w) solid var(--border); background: var(--bg); }
    .theme-brutal .list-item:hover { background: var(--text); color: var(--bg); }
    .theme-brutal .editor-tab { border-right: var(--inner-w) solid var(--border); background: transparent; }
    .theme-brutal .editor-tab.active { background: var(--text); color: var(--bg); }
    .theme-brutal .breadcrumb { border-bottom: var(--inner-w) solid var(--border); }
    .theme-cyber { --bg: #0a0a0c; --text: #a1a1b8; --border: #1f1f2e; --border-w: 1px; --edge-w: 2px; --ui-radius: 12px; --inner-w: 1px; font-family: 'JetBrains Mono', monospace; text-transform: none; font-weight: 400; box-shadow: 0 0 60px rgba(0,0,0,0.8); }
    .theme-cyber .canvas-bg { background-image: radial-gradient(circle, rgba(255,255,255,0.05) 1px, transparent 1px); background-size: 24px 24px; }
    .theme-cyber .btn { border: 1px solid var(--border); border-radius: 4px; background: transparent; color: var(--text); font-weight: 700; }
    .theme-cyber .btn:hover { border-color: #10b981; color: #10b981; box-shadow: 0 0 10px rgba(16,185,129,0.2); }
    .theme-cyber .node-circle { border-radius: 50%; background: #0a0a0c; border: 2px solid var(--node-color, #ffffff); box-shadow: 0 0 10px var(--node-color, #ffffff); }
    .theme-cyber .node-label { background: #0a0a0c; color: #ffffff; border: 1px solid var(--border); border-radius: 4px; }
    .theme-cyber .editor-wrap { border: 1px solid var(--border); border-radius: 8px; }
    .theme-cyber .modal-content { border: 1px solid var(--border); border-radius: 12px; box-shadow: 0 20px 80px rgba(0,0,0,0.9); }
    .theme-cyber .edge-path { stroke: rgba(255,255,255,0.15); }
    .theme-cyber .panel { border-right: var(--border-w) solid var(--border); border-top: var(--border-w) solid var(--border); background: #050505; }
    .theme-cyber .list-item:hover { background: rgba(255,255,255,0.05); color: #fff; }
    .theme-cyber .editor-tab { border-right: 1px solid var(--border); border-bottom: 2px solid transparent; background: transparent; }
    .theme-cyber .editor-tab.active { border-bottom-color: #10b981; color: #ffffff; background: rgba(255,255,255,0.02); }
    .theme-cyber .breadcrumb { border-bottom: 1px solid var(--border); }
    .theme-cyber .obs-node-wrapper.clr-default { --node-color: #ffffff; }
    .theme-cyber .obs-node-wrapper.clr-1 { --node-color: #ff435a; }
    .theme-cyber .obs-node-wrapper.clr-2 { --node-color: #ffc410; }
    .theme-cyber .obs-node-wrapper.clr-3 { --node-color: #1e836d; }
    .theme-cyber .obs-node-wrapper.clr-4 { --node-color: #4285f4; }
    .theme-cyber .obs-node-wrapper.clr-5 { --node-color: #28f1c3; }
    .theme-cyber .obs-node-wrapper.clr-6 { --node-color: #ff1650; }
    .app-header { height: 56px; display: flex; align-items: center; justify-content: space-between; padding: 0 24px; border-bottom: var(--border-w) solid var(--border); z-index: 50; flex-shrink: 0; background: var(--bg); }
    .hdr-brand { font-size: 18px; letter-spacing: -0.5px; display: flex; align-items: center; gap: 12px; font-family: 'Inter', sans-serif; font-weight: 900; }
    .btn { cursor: pointer; outline: none; padding: 8px 16px; font-size: 11px; transition: all 0.2s ease; font-family: inherit; }
    .app-body { display: flex; flex: 1; min-height: 0; position: relative; overflow: hidden; }
    .sidebar { width: 60px; border-right: var(--border-w) solid var(--border); display: flex; flex-direction: column; align-items: center; padding: 24px 0; gap: 24px; z-index: 200; flex-shrink: 0; background: var(--bg); position: relative; }
    .strip-icon { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; cursor: pointer; border: var(--inner-w) solid transparent; transition: all 0.2s; color: var(--text); border-radius: var(--ui-radius); position: relative; }
    .strip-icon.active { border-color: var(--border); background: rgba(128,128,128,0.1); }
    .badge { position: absolute; top: -4px; right: -4px; background: #ff435a; color: #fff; font-size: 8px; font-weight: bold; width: 14px; height: 14px; display: flex; align-items: center; justify-content: center; border-radius: 50%; }
    .floating-panel { position: absolute; display: flex; flex-direction: column; background: var(--bg); border: var(--border-w) solid var(--border); border-radius: var(--ui-radius); transition: box-shadow 0.2s; }
    .theme-brutal .floating-panel { box-shadow: 8px 8px 0px var(--border); }
    .theme-cyber .floating-panel { box-shadow: 0 10px 40px rgba(0,0,0,0.6); }
    .panel-hdr { padding: 12px 16px; font-size: 11px; border-bottom: var(--inner-w) solid var(--border); opacity: 0.9; font-weight: bold; display: flex; justify-content: space-between; align-items: center; background: rgba(128,128,128,0.05); }
    .panel-content-wrap { flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; }
    .panel-resizer { position: absolute; bottom: 0; right: 0; width: 22px; height: 22px; cursor: nwse-resize; background: linear-gradient(135deg, transparent 50%, var(--text) 50%); opacity: 0.2; transition: opacity 0.2s, transform 0.2s; }
    .panel-resizer:hover { opacity: 1; transform: scale(1.1); }
    .list-item { padding: 10px 16px; cursor: pointer; display: flex; align-items: center; gap: 10px; font-size: 11px; transition: background 0.2s; border-bottom: 1px solid rgba(128,128,128,0.1); }
    .main-view { flex: 1; display: flex; flex-direction: column; position: relative; min-width: 0; }
    .canvas-container { flex: 1; position: relative; overflow: hidden; cursor: grab; background: transparent; }
    .canvas-container:active { cursor: grabbing; }
    .canvas-bg { position: absolute; inset: 0; pointer-events: none; z-index: 0; }
    .graph-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; transform-origin: 0 0; z-index: 1; }
    .svg-edges { position: absolute; inset: 0; width: 100%; height: 100%; overflow: visible; pointer-events: none; }
    .edge-path { fill: none; stroke-width: var(--edge-w); transition: stroke 0.4s; }
    .theme-brutal .edge-path { stroke: var(--text); }
    .term-content { flex: 1; padding: 16px; font-family: 'JetBrains Mono', monospace; font-size: 11px; overflow-y: auto; display: flex; flex-direction: column; gap: 6px; }
    .obs-node-wrapper { position: absolute; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; z-index: 5; transform: translate(-50%, -50%); transition: opacity 0.2s ease, transform 0.2s; }
    .obs-node-wrapper:hover { z-index: 10; }
    .obs-node-wrapper:hover .node-circle { transform: scale(1.2); }
    .node-circle { display: flex; align-items: center; justify-content: center; transition: all 0.2s cubic-bezier(0.25, 1, 0.5, 1); }
    .node-circle.main-node { width: 32px; height: 32px; border-width: calc(var(--inner-w) * 1.5); }
    .node-circle.sub-node { width: 18px; height: 18px; }
    .node-label { margin-top: 10px; font-size: 11px; padding: 4px 10px; pointer-events: none; white-space: nowrap; transition: all 0.2s; }
    .modified-dot { width: 6px; height: 6px; background: #ffc410; border-radius: 50%; margin-left: 6px; display: inline-block; }
    .status-bar { height: 32px; border-top: var(--border-w) solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 24px; font-size: 11px; flex-shrink: 0; background: var(--bg); z-index: 200; position: relative; }
    .status-group { display: flex; gap: 20px; align-items: center; }
    /* EDITOR MODAL */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 1000; backdrop-filter: blur(10px); display: none; align-items: center; justify-content: center; }
    .modal-overlay.open { display: flex; }
    .modal-content { width: 89vw; height: 89vh; background: var(--bg); border-radius: var(--ui-radius); display: flex; flex-direction: column; overflow: hidden; }
    .tabs-hdr { display: flex; background: rgba(128,128,128,0.05); border-bottom: var(--border-w) solid var(--border); overflow-x: auto; flex-shrink: 0; }
    .editor-tab { padding: 12px 24px; display: flex; align-items: center; gap: 12px; cursor: pointer; font-size: 11px; transition: all 0.2s; min-width: 140px; justify-content: space-between; }
    .tab-close { cursor: pointer; opacity: 0.5; padding: 2px; }
    .tab-close:hover { opacity: 1; color: #ff435a; }
    .modal-body { flex: 1; display: flex; min-height: 0; }
    .editor-main-area { flex: 1; display: flex; flex-direction: column; border-right: var(--border-w) solid var(--border); min-width: 0; }
    .breadcrumb { padding: 10px 24px; font-size: 10px; display: flex; align-items: center; gap: 8px; opacity: 0.7; flex-shrink: 0; }
    .modal-code-wrap { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .editor-wrap { flex: 1; display: flex; background: var(--bg); overflow: hidden; position: relative; }
    .side-input { width: 100%; border: var(--inner-w) solid var(--text); padding: 10px; background: transparent; color: var(--text); font-family: inherit; font-size: 12px; outline: none; }
    .kanban-board { display: flex; flex: 1; overflow-x: auto; padding: 16px; gap: 16px; }
    .kanban-col { flex: 1; min-width: 200px; display: flex; flex-direction: column; gap: 10px; border-right: 1px solid rgba(128,128,128,0.2); padding-right: 16px; }
    .kanban-col-title { font-weight: bold; opacity: 0.7; font-size: 12px; margin-bottom: 8px; }
    .kanban-card { background: rgba(128,128,128,0.05); border: 1px solid var(--border); padding: 12px; border-radius: var(--ui-radius); cursor: grab; }
    .chat-wrap { display: flex; flex-direction: column; flex: 1; }
    .chat-messages { flex: 1; padding: 16px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
    .chat-msg { background: rgba(128,128,128,0.05); padding: 10px; border-radius: 4px; border-left: 2px solid var(--text); }
    .chat-input-wrap { padding: 16px; border-top: var(--inner-w) solid var(--border); display: flex; gap: 8px; }
    .nle-wrap { flex: 1; display: flex; flex-direction: column; background: var(--bg); overflow: hidden; position: relative; }
    .nle-ruler { height: 24px; border-bottom: var(--inner-w) solid var(--border); display: flex; align-items: flex-end; position: sticky; top: 0; background: rgba(128,128,128,0.05); z-index: 10; overflow: hidden; }
    .nle-ruler-tick { position: absolute; height: 8px; border-left: 1px solid var(--text); opacity: 0.5; font-size: 9px; padding-left: 4px; bottom: 0; }
    .nle-ruler-tick.major { height: 12px; opacity: 1; font-weight: bold; }
    .nle-body { flex: 1; display: flex; overflow: auto; position: relative; }
    .nle-track-headers { width: 140px; flex-shrink: 0; border-right: var(--inner-w) solid var(--border); position: sticky; left: 0; background: var(--bg); z-index: 20; display: flex; flex-direction: column; }
    .nle-track-header { height: 48px; display: flex; align-items: center; padding: 0 12px; font-size: 10px; font-weight: bold; border-bottom: 1px solid rgba(128,128,128,0.2); justify-content: space-between; }
    .nle-tracks { flex: 1; display: flex; flex-direction: column; position: relative; min-width: 1200px; background: repeating-linear-gradient(90deg, transparent, transparent 49px, rgba(128,128,128,0.05) 49px, rgba(128,128,128,0.05) 50px); }
    .nle-track-lane { height: 48px; border-bottom: 1px solid rgba(128,128,128,0.2); position: relative; display: flex; align-items: center; }
    .nle-clip { position: absolute; height: 32px; border-radius: 4px; border: 1px solid var(--border); display: flex; align-items: center; padding: 0 8px; font-size: 10px; cursor: pointer; overflow: hidden; white-space: nowrap; transition: transform 0.1s; }
    .theme-brutal .nle-clip { border-width: 2px; border-radius: 0; box-shadow: 4px 4px 0 var(--border); font-weight: 900; }
    .theme-cyber .nle-clip { background: rgba(255,255,255,0.05); }
    .nle-clip:hover { transform: translateY(-2px); filter: brightness(1.2); }
    .nle-playhead { position: absolute; top: 0; bottom: 0; width: 2px; background: #ff435a; z-index: 30; cursor: ew-resize; }
    .nle-playhead::before { content: ''; position: absolute; top: 0; left: -6px; width: 14px; height: 14px; background: #ff435a; clip-path: polygon(0 0, 100% 0, 50% 100%); }
    .nle-playhead::after { content: ''; position: absolute; top: 0; bottom: 0; left: -10px; width: 20px; background: transparent; }
    /* LOGIN */
    .login-container { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; background: #050505; color: #fff; }
    .login-box { width: 100%; max-width: 700px; padding: 40px; display: flex; flex-direction: column; gap: 40px; }
    .theme-btn { flex: 1; padding: 20px; font-size: 14px; cursor: pointer; transition: all 0.2s; text-align: center; }
    .theme-btn:disabled { opacity: 0.2; cursor: not-allowed; }
    .theme-btn.cyber { background: transparent; border: 1px solid #10b981; color: #10b981; }
    .theme-btn.cyber:hover:not(:disabled) { box-shadow: 0 0 20px rgba(16,185,129,0.3); background: rgba(16,185,129,0.05); }
    .theme-btn.brutal { background: #fff; border: 4px solid #fff; color: #000; font-family: 'Inter', sans-serif; font-weight: 900; text-transform: uppercase; }
    .theme-btn.brutal:hover:not(:disabled) { box-shadow: 8px 8px 0px rgba(255,255,255,0.5); transform: translate(-2px, -2px); }

    /* ─── ENHANCED EDITOR STYLES ─── */
    .editor-toolbar { display: flex; align-items: center; gap: 4px; padding: 6px 12px; border-bottom: var(--inner-w) solid var(--border); background: rgba(128,128,128,0.04); flex-shrink: 0; flex-wrap: wrap; }
    .editor-toolbar-btn { cursor: pointer; padding: 4px 10px; font-size: 10px; border: var(--inner-w) solid var(--border); background: transparent; color: var(--text); font-family: inherit; border-radius: var(--ui-radius); transition: all 0.15s; display: flex; align-items: center; gap: 5px; opacity: 0.8; }
    .editor-toolbar-btn:hover { opacity: 1; background: rgba(128,128,128,0.1); }
    .editor-toolbar-sep { width: 1px; height: 16px; background: var(--border); margin: 0 4px; opacity: 0.5; }
    .editor-find-bar { padding: 6px 12px; border-bottom: var(--inner-w) solid var(--border); display: flex; gap: 8px; align-items: center; background: rgba(128,128,128,0.03); flex-shrink: 0; }
    .editor-find-bar input { flex: 1; background: transparent; border: var(--inner-w) solid var(--border); color: var(--text); font-family: inherit; font-size: 11px; padding: 4px 8px; outline: none; }
    .editor-find-bar input:focus { border-color: #10b981; }
    .editor-status-strip { display: flex; align-items: center; gap: 16px; padding: 4px 16px; border-top: var(--inner-w) solid var(--border); font-size: 10px; opacity: 0.7; flex-shrink: 0; background: rgba(128,128,128,0.03); }
    .editor-status-strip span { display: flex; align-items: center; gap: 4px; }
    /* code area */
    .code-area { flex: 1; font-family: 'JetBrains Mono', monospace; font-size: 13px; padding: 24px 16px; resize: none; outline: none; line-height: 1.6; background: transparent; color: transparent; border: none; white-space: pre; tab-size: 2; caret-color: #10b981; }
    .code-highlight-overlay { position: absolute; inset: 0; padding: 24px 16px; font-family: 'JetBrains Mono', monospace; font-size: 13px; line-height: 1.6; white-space: pre; pointer-events: none; overflow: hidden; color: #c9d1d9; }
    .line-numbers { padding: 24px 10px; background: rgba(128,128,128,0.03); color: var(--text); opacity: 0.4; font-family: 'JetBrains Mono', monospace; font-size: 13px; text-align: right; line-height: 1.6; border-right: var(--inner-w) solid var(--border); user-select: none; overflow: hidden; min-width: 48px; flex-shrink: 0; }
    .active-line-highlight { background: rgba(255,255,255,0.04); position: absolute; left: 0; right: 0; pointer-events: none; border-left: 2px solid rgba(16,185,129,0.5); }
    .code-panel-info { width: 220px; flex-shrink: 0; border-left: var(--border-w) solid var(--border); display: flex; flex-direction: column; overflow: hidden; background: rgba(128,128,128,0.02); }
    .code-panel-info-hdr { padding: 10px 14px; font-size: 10px; font-weight: bold; opacity: 0.6; border-bottom: var(--inner-w) solid var(--border); letter-spacing: 1px; }
    .code-panel-info-body { flex: 1; overflow-y: auto; padding: 12px 14px; font-size: 10px; line-height: 1.8; display: flex; flex-direction: column; gap: 12px; }
    .token-count-badge { display: inline-flex; align-items: center; gap: 6px; padding: 2px 8px; border: var(--inner-w) solid var(--border); border-radius: 2px; font-size: 10px; }
    /* Syntax colors — driven by CSS vars, set per palette */
    .editor-palette-scope .syn-keyword  { color: var(--syn-kw);  }
    .editor-palette-scope .syn-string   { color: var(--syn-str); }
    .editor-palette-scope .syn-comment  { color: var(--syn-cmt); font-style: italic; opacity: 0.75; }
    .editor-palette-scope .syn-number   { color: var(--syn-num); }
    .editor-palette-scope .syn-function { color: var(--syn-fn);  }
    .editor-palette-scope .syn-builtin  { color: var(--syn-bi);  }
    .editor-palette-scope .syn-operator { color: var(--syn-op);  }
    /* Palette picker */
    .palette-picker-wrap { position: relative; display: flex; align-items: center; }
    .palette-dropdown { position: absolute; top: calc(100% + 6px); left: 0; z-index: 9000;
      background: #0d0d0f; border: 1px solid rgba(255,255,255,0.12); border-radius: 6px;
      padding: 10px; display: grid; grid-template-columns: 1fr 1fr; gap: 6px; min-width: 260px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.8); }
    .palette-option { display: flex; align-items: center; gap: 8px; padding: 7px 10px;
      cursor: pointer; border-radius: 4px; border: 1px solid transparent; transition: all 0.15s; }
    .palette-option:hover { background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.1); }
    .palette-option.active { border-color: rgba(255,255,255,0.25); background: rgba(255,255,255,0.07); }
    .palette-swatches { display: flex; gap: 3px; }
    .palette-swatch { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
    .palette-name { font-size: 10px; font-family: 'JetBrains Mono', monospace; letter-spacing: 0.5px; }
    .palette-preview-dot { width: 8px; height: 8px; border-radius: 50%; margin-left: auto; flex-shrink: 0; }
    /* copied toast */
    .copy-toast { position: fixed; bottom: 60px; left: 50%; transform: translateX(-50%); background: #10b981; color: #000; padding: 8px 20px; font-family: 'JetBrains Mono', monospace; font-size: 12px; font-weight: bold; z-index: 9999; pointer-events: none; animation: toastIn 0.2s ease, toastOut 0.3s ease 1.5s forwards; }
    @keyframes toastIn { from { opacity: 0; transform: translateX(-50%) translateY(10px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
    .create-modal { position:fixed; inset:0; background:rgba(0,0,0,0.85); z-index:2000; display:flex; align-items:center; justify-content:center; backdrop-filter:blur(12px); }
    .create-modal-box { background:#0d0d0f; border:1px solid rgba(255,255,255,0.12); border-radius:10px; padding:32px; width:420px; display:flex; flex-direction:column; gap:20px; box-shadow:0 24px 80px rgba(0,0,0,0.9); max-height:90vh; overflow-y:auto; }
    .create-modal-title { font-size:13px; font-weight:bold; letter-spacing:2px; opacity:0.9; }
    .create-modal-field { display:flex; flex-direction:column; gap:6px; }
    .create-modal-label { font-size:10px; opacity:0.5; letter-spacing:1px; }
    .create-modal-input { background:transparent; border:1px solid rgba(255,255,255,0.15); color:#fff; font-family:'JetBrains Mono',monospace; font-size:12px; padding:10px 14px; outline:none; border-radius:4px; transition:border-color 0.2s; }
    .create-modal-input:focus { border-color:#10b981; }
    .type-grid { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; }
    .type-btn { padding:10px 8px; border:1px solid rgba(255,255,255,0.12); background:transparent; color:rgba(255,255,255,0.6); font-family:'JetBrains Mono',monospace; font-size:10px; cursor:pointer; border-radius:4px; transition:all 0.15s; text-align:center; }
    .type-btn.selected { border-color:#10b981; color:#10b981; background:rgba(16,185,129,0.08); }
    .color-grid { display:flex; gap:8px; }
    .color-dot-btn { width:24px; height:24px; border-radius:50%; border:2px solid transparent; cursor:pointer; transition:all 0.15s; flex-shrink:0; }
    .color-dot-btn.selected { border-color:#fff; transform:scale(1.2); }
    .create-modal-actions { display:flex; gap:10px; padding-top:4px; }
    .board-wrap { display:flex; flex-direction:column; flex:1; overflow:hidden; min-height:0; }
    .board-topbar { display:flex; align-items:center; gap:10px; padding:10px 16px; border-bottom:1px solid rgba(128,128,128,0.15); flex-shrink:0; }
    .board-meta { font-size:10px; opacity:0.45; margin-left:auto; display:flex; gap:16px; }
    .board-cols { display:flex; flex:1; overflow-x:auto; padding:14px; gap:14px; align-items:flex-start; min-height:0; }
    .board-col { width:220px; flex-shrink:0; display:flex; flex-direction:column; gap:8px; }
    .board-col-hdr { display:flex; align-items:center; justify-content:space-between; padding:6px 10px; border-radius:4px; font-size:10px; font-weight:bold; letter-spacing:1px; }
    .board-col-count { background:rgba(128,128,128,0.15); padding:1px 7px; border-radius:10px; font-size:9px; }
    .board-card { background:rgba(255,255,255,0.03); border:1px solid rgba(128,128,128,0.15); border-radius:6px; padding:12px; display:flex; flex-direction:column; gap:8px; cursor:pointer; transition:all 0.15s; position:relative; overflow:hidden; }
    .board-card:hover { border-color:rgba(255,255,255,0.2); background:rgba(255,255,255,0.05); transform:translateY(-1px); }
    .board-card-accent { position:absolute; left:0; top:0; bottom:0; width:3px; }
    .board-card-title { font-size:11px; line-height:1.4; padding-left:8px; }
    .board-card-tags { display:flex; flex-wrap:wrap; gap:4px; padding-left:8px; }
    .board-tag { font-size:9px; padding:2px 7px; border-radius:10px; letter-spacing:0.5px; border:1px solid transparent; }
    .board-card-footer { display:flex; align-items:center; gap:8px; padding-left:8px; font-size:9px; opacity:0.5; }
    .board-priority { font-size:9px; font-weight:bold; padding:2px 6px; border-radius:3px; letter-spacing:0.5px; }
    .board-progress { height:3px; background:rgba(128,128,128,0.2); border-radius:2px; overflow:hidden; margin:0 8px; }
    .board-progress-bar { height:100%; border-radius:2px; transition:width 0.3s; }
    .board-add-card { border:1px dashed rgba(128,128,128,0.25); border-radius:6px; padding:10px; text-align:center; font-size:10px; opacity:0.45; cursor:pointer; transition:all 0.15s; }
    .board-add-card:hover { opacity:0.8; border-color:rgba(255,255,255,0.3); }
    .card-detail-overlay { position:absolute; inset:0; background:rgba(0,0,0,0.75); z-index:50; display:flex; align-items:center; justify-content:center; backdrop-filter:blur(6px); }
    .card-detail-box { background:#0d0d14; border:1px solid rgba(255,255,255,0.12); border-radius:8px; width:340px; padding:24px; display:flex; flex-direction:column; gap:16px; max-height:88%; overflow-y:auto; }
    @keyframes toastOut { from { opacity: 1; } to { opacity: 0; } }
  </style>
</head>
<body>
  <div id="root"></div>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    // ────────────────────────────────────────────────────────────────
    //  OCCULT / SACRED GEOMETRY AVATARS  (6 designs)
    // ────────────────────────────────────────────────────────────────
    const CYBER_AVATARS = [

      // 0 — OUROBOROS  (Serpent devouring its own tail — alchemical eternity)
      ({ size = 48, accent = '#10b981' }) => (
        <svg width={size} height={size} viewBox="0 0 48 48" fill="none">
          <rect width="48" height="48" fill="#010d07"/>
          <circle cx="24" cy="24" r="21" stroke={accent} strokeWidth="0.35" opacity="0.2"/>
          {[15,35,55,75,95,115,135,155,175,195,215,235,255,275,295,315,335].map(a=>(
            <line key={a} x1="24" y1="6" x2="24" y2="9" stroke={accent} strokeWidth="0.8" opacity="0.35" transform={`rotate(${a} 24 24)`}/>
          ))}
          {/* Serpent body arc — gap at top for head/tail join */}
          <path d="M 21.5 7.5 A 16.5 16.5 0 1 1 26.5 7.5" stroke={accent} strokeWidth="4.8" strokeLinecap="butt"/>
          {/* Scale texture overlay */}
          <path d="M 21.5 7.5 A 16.5 16.5 0 1 1 26.5 7.5" stroke="#010d07" strokeWidth="1.5" strokeLinecap="butt" strokeDasharray="3.5 3.5" opacity="0.55"/>
          {/* Tail tip */}
          <path d="M 21.5 7.5 L 17 4 L 20 6.5" stroke={accent} strokeWidth="1.2" strokeLinecap="round" strokeLinejoin="round"/>
          {/* Head block */}
          <path d="M 26.5 7.5 L 31 3.5 L 35.5 6 L 33 11 L 26.5 7.5" fill={accent} stroke={accent} strokeWidth="0.5"/>
          {/* Eye */}
          <circle cx="31.5" cy="5.5" r="1" fill="#010d07"/>
          <circle cx="31.5" cy="5.5" r="0.45" fill={accent} opacity="0.5"/>
          {/* Tongue */}
          <path d="M 35.5 6.5 L 39 4.5 M 35.5 6.5 L 39 8.5" stroke={accent} strokeWidth="0.75" strokeLinecap="round"/>
          {/* Inner ⊙ sun symbol */}
          <circle cx="24" cy="24" r="6.5" stroke={accent} strokeWidth="0.7" opacity="0.3"/>
          <circle cx="24" cy="24" r="2.2" fill={accent} opacity="0.6"/>
          <line x1="24" y1="17" x2="24" y2="31" stroke={accent} strokeWidth="0.45" opacity="0.2"/>
          <line x1="17" y1="24" x2="31" y2="24" stroke={accent} strokeWidth="0.45" opacity="0.2"/>
        </svg>
      ),

      // 1 — TRISKELION  (Triple spiral — Celtic / Mycenaean — motion, progress, competition)
      ({ size = 48, accent = '#ff435a' }) => (
        <svg width={size} height={size} viewBox="0 0 48 48" fill="none">
          <rect width="48" height="48" fill="#0d0002"/>
          <circle cx="24" cy="24" r="21" stroke={accent} strokeWidth="0.5" opacity="0.2"/>
          <circle cx="24" cy="24" r="2.5" fill={accent} opacity="0.8"/>
          {/* Three arms — each rotated 120° — spiral sweeping outward */}
          {[0, 120, 240].map(rot => (
            <g key={rot} transform={`rotate(${rot} 24 24)`}>
              {/* Arm spiral: starts center, sweeps CW outward then curves back */}
              <path
                d="M 24 24 C 28 22 32 18 30 13 C 28 8 22 7 18 10 C 14 13 13 18 15 22"
                stroke={accent} strokeWidth="2.2" fill="none" strokeLinecap="round"
              />
              {/* Secondary inner curl */}
              <path
                d="M 24 24 C 26 23 27.5 21.5 27 19.5"
                stroke={accent} strokeWidth="1" fill="none" strokeLinecap="round" opacity="0.5"
              />
            </g>
          ))}
          {/* Outer tick marks at 0/120/240 to mark the arms */}
          {[90, 210, 330].map(a => (
            <line key={a}
              x1={24+18.5*Math.cos(a*Math.PI/180)} y1={24+18.5*Math.sin(a*Math.PI/180)}
              x2={24+21*Math.cos(a*Math.PI/180)}   y2={24+21*Math.sin(a*Math.PI/180)}
              stroke={accent} strokeWidth="1.2" opacity="0.45"/>
          ))}
          {/* Decorative outer ring dots */}
          {[0,60,120,180,240,300].map(a => (
            <circle key={a}
              cx={24+21*Math.cos(a*Math.PI/180)} cy={24+21*Math.sin(a*Math.PI/180)}
              r="0.8" fill={accent} opacity="0.3"/>
          ))}
        </svg>
      ),

      // 2 — HELM OF AWE / ÆGISHJÁLMUR  (Norse protective symbol — 8 trident staves radiating from center)
      ({ size = 48, accent = '#ffc410' }) => (
        <svg width={size} height={size} viewBox="0 0 48 48" fill="none">
          <rect width="48" height="48" fill="#0b0700"/>
          <circle cx="24" cy="24" r="21" stroke={accent} strokeWidth="0.4" opacity="0.2"/>
          {/* Outer ring */}
          <circle cx="24" cy="24" r="19.5" stroke={accent} strokeWidth="0.7" opacity="0.35"/>
          {/* Inner binding circle */}
          <circle cx="24" cy="24" r="3.5" stroke={accent} strokeWidth="1.3" opacity="0.9"/>
          <circle cx="24" cy="24" r="1.4" fill={accent} opacity="0.85"/>
          {/* 8 Ægishjálmur staves — each has a spine + two curved side branches + terminal dots */}
          {[0,45,90,135,180,225,270,315].map(angle => (
            <g key={angle} transform={`rotate(${angle} 24 24)`}>
              {/* Main spine */}
              <line x1="24" y1="20.5" x2="24" y2="5.5" stroke={accent} strokeWidth="1.8" strokeLinecap="round"/>
              {/* Upper branch left */}
              <path d="M 24 10 C 21 9 19 7 20 5" stroke={accent} strokeWidth="1.1" fill="none" strokeLinecap="round"/>
              {/* Upper branch right */}
              <path d="M 24 10 C 27 9 29 7 28 5" stroke={accent} strokeWidth="1.1" fill="none" strokeLinecap="round"/>
              {/* Lower branch left */}
              <path d="M 24 14 C 21.5 13.5 20 12 21 10.5" stroke={accent} strokeWidth="0.9" fill="none" strokeLinecap="round" opacity="0.7"/>
              {/* Lower branch right */}
              <path d="M 24 14 C 26.5 13.5 28 12 27 10.5" stroke={accent} strokeWidth="0.9" fill="none" strokeLinecap="round" opacity="0.7"/>
              {/* Terminal dots at branch tips */}
              <circle cx="20" cy="5" r="1" fill={accent} opacity="0.8"/>
              <circle cx="28" cy="5" r="1" fill={accent} opacity="0.8"/>
              <circle cx="24" cy="5.5" r="1" fill={accent} opacity="0.6"/>
            </g>
          ))}
        </svg>
      ),

      // 3 — CELTIC KNOT  (Endless interlace — eternity, no beginning or end)
      ({ size = 48, accent = '#4285f4' }) => (
        <svg width={size} height={size} viewBox="0 0 48 48" fill="none">
          <rect width="48" height="48" fill="#00040f"/>
          <circle cx="24" cy="24" r="21.5" stroke={accent} strokeWidth="0.5" opacity="0.2"/>
          {/* Outer decorative ring */}
          <circle cx="24" cy="24" r="20" stroke={accent} strokeWidth="0.8" opacity="0.3"/>
          {/* Corner dot marks */}
          {[45,135,225,315].map(a=>(
            <circle key={a} cx={24+20*Math.cos(a*Math.PI/180)} cy={24+20*Math.sin(a*Math.PI/180)} r="1" fill={accent} opacity="0.4"/>
          ))}
          {/* Classic endless Celtic square knot — 4-fold interlace constructed from overlapping loops */}
          {/* Outer square frame that the knot weaves around */}
          <rect x="10" y="10" width="28" height="28" stroke={accent} strokeWidth="0.4" opacity="0.12" fill="none"/>
          {/* Knot strand 1 — horizontal weave pass (over) */}
          <path d="M 10 18 Q 14 18 16 16 Q 18 14 18 10" stroke={accent} strokeWidth="2.8" fill="none" strokeLinecap="round"/>
          <path d="M 30 10 Q 30 14 32 16 Q 34 18 38 18" stroke={accent} strokeWidth="2.8" fill="none" strokeLinecap="round"/>
          <path d="M 38 30 Q 34 30 32 32 Q 30 34 30 38" stroke={accent} strokeWidth="2.8" fill="none" strokeLinecap="round"/>
          <path d="M 18 38 Q 18 34 16 32 Q 14 30 10 30" stroke={accent} strokeWidth="2.8" fill="none" strokeLinecap="round"/>
          {/* Inner loops — crossing strands */}
          <path d="M 10 18 Q 10 24 10 30" stroke={accent} strokeWidth="2.8" fill="none" strokeLinecap="round"/>
          <path d="M 38 18 Q 38 24 38 30" stroke={accent} strokeWidth="2.8" fill="none" strokeLinecap="round"/>
          <path d="M 18 10 Q 24 10 30 10" stroke={accent} strokeWidth="2.8" fill="none" strokeLinecap="round"/>
          <path d="M 18 38 Q 24 38 30 38" stroke={accent} strokeWidth="2.8" fill="none" strokeLinecap="round"/>
          {/* Center crossing loops — the interlace heart */}
          <path d="M 16 16 Q 24 20 32 16" stroke={accent} strokeWidth="2.8" fill="none" strokeLinecap="round"/>
          <path d="M 32 16 Q 28 24 32 32" stroke={accent} strokeWidth="2.8" fill="none" strokeLinecap="round"/>
          <path d="M 32 32 Q 24 28 16 32" stroke={accent} strokeWidth="2.8" fill="none" strokeLinecap="round"/>
          <path d="M 16 32 Q 20 24 16 16" stroke={accent} strokeWidth="2.8" fill="none" strokeLinecap="round"/>
          {/* Under-passes (gap simulation via background-color rect) */}
          <rect x="21.5" y="9" width="5" height="4" fill="#00040f"/>
          <rect x="21.5" y="35" width="5" height="4" fill="#00040f"/>
          <rect x="9" y="21.5" width="4" height="5" fill="#00040f"/>
          <rect x="35" y="21.5" width="4" height="5" fill="#00040f"/>
          {/* Re-draw crossing strand (over) */}
          <path d="M 18 10 Q 24 10 30 10" stroke={accent} strokeWidth="2.8" fill="none" strokeLinecap="round"/>
          <path d="M 18 38 Q 24 38 30 38" stroke={accent} strokeWidth="2.8" fill="none" strokeLinecap="round"/>
          <path d="M 10 18 Q 10 24 10 30" stroke={accent} strokeWidth="2.8" fill="none" strokeLinecap="round"/>
          <path d="M 38 18 Q 38 24 38 30" stroke={accent} strokeWidth="2.8" fill="none" strokeLinecap="round"/>
          {/* Center void */}
          <circle cx="24" cy="24" r="4.5" fill="#00040f"/>
          <circle cx="24" cy="24" r="3" stroke={accent} strokeWidth="1" opacity="0.6" fill="none"/>
          <circle cx="24" cy="24" r="1.2" fill={accent} opacity="0.8"/>
        </svg>
      ),

      // 4 — TRIQUETRA  (Trinity knot — three interlocked arcs, Christian / Celtic / Norse)
      ({ size = 48, accent = '#28f1c3' }) => {
        // Three lobe centres — equilateral triangle arrangement
        const R = 7.5;
        const r = 10;
        const lobes = [270, 30, 150].map(a => [
          24 + r * Math.cos(a * Math.PI / 180),
          24 + r * Math.sin(a * Math.PI / 180)
        ]);
        return (
          <svg width={size} height={size} viewBox="0 0 48 48" fill="none">
            <rect width="48" height="48" fill="#000f0c"/>
            <circle cx="24" cy="24" r="21" stroke={accent} strokeWidth="0.4" opacity="0.18"/>
            {/* Outer ring */}
            <circle cx="24" cy="24" r="19.5" stroke={accent} strokeWidth="0.7" opacity="0.3"/>
            {/* Outer horizon line (classic triquetra sits on this) */}
            <line x1="10" y1="34.5" x2="38" y2="34.5" stroke={accent} strokeWidth="1.2" opacity="0.5" strokeLinecap="round"/>
            {/* The triquetra — three overlapping vesica piscis arcs */}
            {/* Top lobe */}
            <path d="M 17 34 A 9 9 0 0 1 31 34 A 9 9 0 0 1 24 21 A 9 9 0 0 1 17 34 Z"
              stroke={accent} strokeWidth="2.5" fill="none" strokeLinejoin="round"/>
            {/* Under-pass gaps to simulate interlace */}
            {/* Left under gap */}
            <path d="M 17 34 A 9 9 0 0 1 20 28" stroke="#000f0c" strokeWidth="3.5" fill="none"/>
            {/* Right under gap */}
            <path d="M 31 34 A 9 9 0 0 0 28 28" stroke="#000f0c" strokeWidth="3.5" fill="none"/>
            {/* Re-draw top lobe over */}
            <path d="M 20.5 29 A 9 9 0 0 1 24 21 A 9 9 0 0 1 27.5 29"
              stroke={accent} strokeWidth="2.5" fill="none"/>
            {/* Inner circle */}
            <circle cx="24" cy="24" r="4" stroke={accent} strokeWidth="1" opacity="0.5" fill="none"/>
            {/* Tick markers around outer ring at 60° intervals */}
            {[0,60,120,180,240,300].map(a=>(
              <line key={a}
                x1={24+18.5*Math.cos(a*Math.PI/180)} y1={24+18.5*Math.sin(a*Math.PI/180)}
                x2={24+20.5*Math.cos(a*Math.PI/180)} y2={24+20.5*Math.sin(a*Math.PI/180)}
                stroke={accent} strokeWidth="0.9" opacity="0.4"/>
            ))}
            {/* Center dot */}
            <circle cx="24" cy="24" r="1.5" fill={accent} opacity="0.85"/>
          </svg>
        );
      },

      // 5 — HEXAGON / FLOWER OF LIFE SEED  (Sacred geometry — the primordial pattern)
      ({ size = 48, accent = '#ff1650' }) => {
        // 6 outer hex corners + center
        const hexPts = Array.from({length:6},(_,i)=>{
          const a = (i*60 - 30) * Math.PI / 180;
          return [+(24 + 15 * Math.cos(a)).toFixed(2), +(24 + 15 * Math.sin(a)).toFixed(2)];
        });
        const hexSmall = Array.from({length:6},(_,i)=>{
          const a = (i*60 - 30) * Math.PI / 180;
          return [+(24 + 7.5 * Math.cos(a)).toFixed(2), +(24 + 7.5 * Math.sin(a)).toFixed(2)];
        });
        const outerHex = Array.from({length:6},(_,i)=>{
          const a = (i*60 - 30) * Math.PI / 180;
          return [+(24 + 20 * Math.cos(a)).toFixed(2), +(24 + 20 * Math.sin(a)).toFixed(2)];
        });
        return (
          <svg width={size} height={size} viewBox="0 0 48 48" fill="none">
            <rect width="48" height="48" fill="#0f0003"/>
            {/* Outer decorative ring */}
            <circle cx="24" cy="24" r="21.5" stroke={accent} strokeWidth="0.4" opacity="0.18"/>
            {/* Outer hex frame */}
            <polygon points={outerHex.map(p=>p.join(',')).join(' ')} stroke={accent} strokeWidth="0.7" fill="none" opacity="0.25"/>
            {/* 6 outer circle petals (Flower of Life) */}
            {hexPts.map(([x,y],i)=>(
              <circle key={i} cx={x} cy={y} r="7.5" stroke={accent} strokeWidth="1" fill="none" opacity="0.55"/>
            ))}
            {/* Center circle */}
            <circle cx="24" cy="24" r="7.5" stroke={accent} strokeWidth="1.3" fill="none" opacity="0.7"/>
            {/* Main hex outline */}
            <polygon points={hexPts.map(p=>p.join(',')).join(' ')} stroke={accent} strokeWidth="1.5" fill={accent} fillOpacity="0.06"/>
            {/* Inner hex */}
            <polygon points={hexSmall.map(p=>p.join(',')).join(' ')} stroke={accent} strokeWidth="1" fill="none" opacity="0.5"/>
            {/* Spokes from center to outer corners */}
            {hexPts.map(([x,y],i)=>(
              <line key={i} x1="24" y1="24" x2={x} y2={y} stroke={accent} strokeWidth="0.6" opacity="0.3"/>
            ))}
            {/* Outer corner dots */}
            {outerHex.map(([x,y],i)=>(
              <circle key={i} cx={x} cy={y} r="1.2" fill={accent} opacity="0.45"/>
            ))}
            {/* Star of David inner lines */}
            <line x1={hexPts[0][0]} y1={hexPts[0][1]} x2={hexPts[3][0]} y2={hexPts[3][1]} stroke={accent} strokeWidth="0.6" opacity="0.3"/>
            <line x1={hexPts[1][0]} y1={hexPts[1][1]} x2={hexPts[4][0]} y2={hexPts[4][1]} stroke={accent} strokeWidth="0.6" opacity="0.3"/>
            <line x1={hexPts[2][0]} y1={hexPts[2][1]} x2={hexPts[5][0]} y2={hexPts[5][1]} stroke={accent} strokeWidth="0.6" opacity="0.3"/>
            {/* Center dot */}
            <circle cx="24" cy="24" r="1.8" fill={accent} opacity="0.9"/>
          </svg>
        );
      },

    ];
        const AVATAR_ACCENTS = ['#10b981','#ff435a','#ffc410','#4285f4','#28f1c3','#ff1650'];
    const AVATAR_NAMES = ['OUROBOROS', 'TRISKELION', 'HELM OF AWE', 'CELTIC KNOT', 'TRIQUETRA', 'HEXAGON'];

    const CyberAvatar = ({ index, size = 48, selected = false, onClick }) => {
      const AvatarSVG = CYBER_AVATARS[index % CYBER_AVATARS.length];
      const accent = AVATAR_ACCENTS[index % AVATAR_ACCENTS.length];
      return (
        <div onClick={onClick} style={{ cursor: onClick ? 'pointer' : 'default', position: 'relative', display: 'flex', flexDirection: 'column', alignItems: 'center', gap: '6px' }}>
          <div style={{
            width: size, height: size,
            border: selected ? `2px solid ${accent}` : '2px solid rgba(255,255,255,0.1)',
            boxShadow: selected ? `0 0 18px ${accent}55, 0 0 6px ${accent}88` : 'none',
            transition: 'all 0.2s ease',
            flexShrink: 0,
            borderRadius: '4px',
            overflow: 'hidden',
          }}>
            <AvatarSVG size={size} accent={accent} />
          </div>
          {selected && <div style={{ fontSize: '8px', color: accent, letterSpacing: '1px', fontFamily: "'JetBrains Mono',monospace" }}>{AVATAR_NAMES[index]}</div>}
        </div>
      );
    };

    // ────────────────────────────────────────────────────────────────
    //  ICONS
    // ────────────────────────────────────────────────────────────────
    const Icons = {
      Files: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>,
      Search: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>,

    // ────────────────────────────────────────────────────────────────
    //  SYNTAX HIGHLIGHTER (simple token-based for Python/JS)
    // ────────────────────────────────────────────────────────────────
    function highlightCode(code) {
      const PY_KEYWORDS = /\b(def|class|import|from|return|if|elif|else|for|while|in|not|and|or|True|False|None|pass|break|continue|try|except|finally|with|as|yield|lambda|self|print|raise|del|global|nonlocal|assert|async|await)\b/g;
      const JS_KEYWORDS = /\b(function|const|let|var|return|if|else|for|while|in|of|class|import|export|from|default|new|this|true|false|null|undefined|try|catch|finally|async|await|typeof|instanceof|break|continue|switch|case|throw)\b/g;
      const BUILTINS = /\b(len|range|print|type|str|int|float|list|dict|set|tuple|map|filter|zip|enumerate|open|super|object|bool|abs|max|min|sum|sorted|reversed|console|Math|JSON|Array|Object|Promise|setTimeout|parseInt|parseFloat)\b/g;
      const STRINGS = /("""[\s\S]*?"""|'''[\s\S]*?'''|"[^"\\]*(?:\\.[^"\\]*)*"|'[^'\\]*(?:\\.[^'\\]*)*'|`[^`\\]*(?:\\.[^`\\]*)*`)/g;
      const COMMENTS = /(#.*$|\/\/.*$|\/\*[\s\S]*?\*\/)/gm;
      const NUMBERS = /\b(\d+\.?\d*(?:[eE][+-]?\d+)?)\b/g;
      const FUNCS = /\b([a-zA-Z_]\w*)\s*(?=\()/g;

      // We'll escape HTML then replace tokens
      let html = code
        .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

      // Apply in order (comments first to avoid re-tokenizing)
      const PLACEHOLDER = '\x00';
      const stored = [];
      html = html.replace(COMMENTS, (m) => { stored.push(`<span class="syn-comment">${m}</span>`); return PLACEHOLDER + (stored.length-1) + '\x01'; });
      html = html.replace(STRINGS, (m) => { stored.push(`<span class="syn-string">${m}</span>`); return PLACEHOLDER + (stored.length-1) + '\x01'; });
      html = html.replace(FUNCS, (m, fn) => { stored.push(`<span class="syn-function">${fn}</span>`); return PLACEHOLDER + (stored.length-1) + '\x01('; });
      html = html.replace(PY_KEYWORDS, '<span class="syn-keyword">$&</span>');
      html = html.replace(JS_KEYWORDS, '<span class="syn-keyword">$&</span>');
      html = html.replace(BUILTINS, '<span class="syn-builtin">$&</span>');
      html = html.replace(NUMBERS, '<span class="syn-number">$&</span>');
      // restore stored
      html = html.replace(/\x00(\d+)\x01/g, (_, i) => stored[parseInt(i)]);
      return html;
    }

    // ────────────────────────────────────────────────────────────────
    //  ENHANCED CODE EDITOR COMPONENT
    // ────────────────────────────────────────────────────────────────
    function CodeEditor({ node, onChange }) {
      const [palette, setPalette] = useState(PALETTES[0]);
      const [showPaletteMenu, setShowPaletteMenu] = useState(false);
      const [showFind, setShowFind] = useState(false);
      const [findQuery, setFindQuery] = useState('');
      const [replaceQuery, setReplaceQuery] = useState('');
      const [wordWrap, setWordWrap] = useState(false);
      const [cursor, setCursor] = useState({ line: 1, col: 1 });
      const [toastMsg, setToastMsg] = useState('');
      const [fontSize, setFontSize] = useState(13);
      const textareaRef = useRef(null);
      const scrollRef = useRef(null);
      const lineNumRef = useRef(null);
      const overlayRef = useRef(null);

      const code = node.code || '';
      const lines = code.split('\n');
      const lineCount = lines.length;

      const showToast = (msg) => {
        setToastMsg('');
        setTimeout(() => setToastMsg(msg), 10);
        setTimeout(() => setToastMsg(''), 1800);
      };

      const handleScroll = () => {
        if (lineNumRef.current && textareaRef.current) {
          lineNumRef.current.scrollTop = textareaRef.current.scrollTop;
        }
        if (overlayRef.current && textareaRef.current) {
          overlayRef.current.style.transform = `translateY(-${textareaRef.current.scrollTop}px)`;
        }
      };

      const handleKeyDown = (e) => {
        if (e.key === 'Tab') {
          e.preventDefault();
          const start = e.target.selectionStart;
          const end = e.target.selectionEnd;
          const newCode = code.substring(0, start) + '  ' + code.substring(end);
          onChange(newCode);
          setTimeout(() => { e.target.selectionStart = e.target.selectionEnd = start + 2; }, 0);
        }
        if (e.ctrlKey || e.metaKey) {
          if (e.key === 'f') { e.preventDefault(); setShowFind(v => !v); }
          if (e.key === 'c' && !e.shiftKey) { handleCopy(); }
          if (e.key === '/') { e.preventDefault(); toggleLineComment(); }
        }
      };

      const handleCursorUpdate = (e) => {
        const ta = e.target;
        const before = code.substring(0, ta.selectionStart);
        const nl = (before.match(/\n/g) || []).length + 1;
        const lastNl = before.lastIndexOf('\n');
        const col = ta.selectionStart - lastNl;
        setCursor({ line: nl, col });
      };

      // Close palette menu on outside click
      useEffect(() => {
        if (!showPaletteMenu) return;
        const handler = () => setShowPaletteMenu(false);
        document.addEventListener('pointerdown', handler);
        return () => document.removeEventListener('pointerdown', handler);
      }, [showPaletteMenu]);

      const handleCopy = () => {
        navigator.clipboard.writeText(code).catch(() => {});
        showToast('COPIED TO CLIPBOARD');
      };

      const handleFormat = () => {
        // Simple indentation fixer
        let formatted = code
          .split('\n').map(l => l.replace(/\s+$/, '')).join('\n')
          .replace(/\n{3,}/g, '\n\n');
        onChange(formatted);
        showToast('FORMATTED');
      };

      const handleFindReplace = () => {
        if (!findQuery) return;
        const replaced = code.split(findQuery).join(replaceQuery);
        onChange(replaced);
        showToast(`REPLACED ${(code.split(findQuery).length - 1)} INSTANCES`);
      };

      const toggleLineComment = () => {
        const ta = textareaRef.current;
        const start = ta.selectionStart;
        const before = code.substring(0, start);
        const lineStart = before.lastIndexOf('\n') + 1;
        const lineText = code.substring(lineStart, code.indexOf('\n', lineStart) === -1 ? code.length : code.indexOf('\n', lineStart));
        let newCode;
        if (lineText.trimStart().startsWith('#')) {
          newCode = code.substring(0, lineStart) + lineText.replace(/^\s*#\s?/, '') + code.substring(lineStart + lineText.length);
        } else {
          newCode = code.substring(0, lineStart) + '# ' + lineText + code.substring(lineStart + lineText.length);
        }
        onChange(newCode);
        showToast('TOGGLED COMMENT');
      };

      const wordCount = code.trim() ? code.trim().split(/\s+/).length : 0;
      const charCount = code.length;
      const selCount = textareaRef.current ? Math.abs(textareaRef.current.selectionEnd - textareaRef.current.selectionStart) : 0;

      const highlighted = highlightCode(code);
      const cssVars = { '--syn-kw': palette.kw, '--syn-str': palette.str, '--syn-cmt': palette.cmt, '--syn-num': palette.num, '--syn-fn': palette.fn, '--syn-bi': palette.bi, '--syn-op': palette.op };
      const cssVarsStr = Object.entries(cssVars).map(([k,v]) => `${k}:${v}`).join(';');

      // Active line highlight offset
      const lineHeight = fontSize * 1.6;
      const activeLineY = (cursor.line - 1) * lineHeight;

      return (
        <div className="editor-palette-scope" style={{ display: 'flex', flexDirection: 'column', flex: 1, minHeight: 0, overflow: 'hidden', background: palette.bg, style: cssVarsStr }} ref={el => el && Object.entries(cssVars).forEach(([k,v]) => el.style.setProperty(k,v))}>
          {/* Toolbar */}
          <div className="editor-toolbar">
            <button className="editor-toolbar-btn" onClick={handleCopy} title="Copy all (Ctrl+C)"><Icons.Copy /> COPY</button>
            <div className="editor-toolbar-sep"/>
            <button className="editor-toolbar-btn" onClick={handleFormat} title="Format code"><Icons.Format /> FORMAT</button>
            <button className="editor-toolbar-btn" onClick={toggleLineComment} title="Toggle comment (Ctrl+/)"><span style={{fontSize:'10px'}}>#</span> COMMENT</button>
            <div className="editor-toolbar-sep"/>
            <button className="editor-toolbar-btn" onClick={() => setShowFind(v => !v)} title="Find & Replace (Ctrl+F)" style={showFind ? {opacity:1, color:'#10b981'} : {}}><Icons.Find /> FIND</button>
            <button className="editor-toolbar-btn" onClick={() => setWordWrap(v => !v)} title="Toggle word wrap" style={wordWrap ? {opacity:1, color:'#10b981'} : {}}><Icons.Wrap /> WRAP</button>
            <div className="editor-toolbar-sep"/>
            <button className="editor-toolbar-btn" onClick={() => setFontSize(s => Math.max(10, s - 1))}>A-</button>
            <button className="editor-toolbar-btn" onClick={() => setFontSize(s => Math.min(20, s + 1))}>A+</button>
            <div style={{marginLeft:'auto', display:'flex', alignItems:'center', gap:'8px'}}>
              {/* Palette picker */}
              <div className="palette-picker-wrap">
                <button
                  className="editor-toolbar-btn"
                  onClick={() => setShowPaletteMenu(v => !v)}
                  style={showPaletteMenu ? {opacity:1, borderColor: palette.fn, color: palette.fn} : {}}
                  title="Change color palette"
                >
                  <div style={{display:'flex', gap:'3px', alignItems:'center'}}>
                    {palette.swatches.map((c,i) => <div key={i} style={{width:'7px', height:'7px', borderRadius:'50%', background:c}} />)}
                  </div>
                  <span style={{marginLeft:'4px'}}>{palette.name}</span>
                </button>
                {showPaletteMenu && (
                  <div className="palette-dropdown" onClick={e => e.stopPropagation()}>
                    {PALETTES.map(p => (
                      <div
                        key={p.id}
                        className={`palette-option ${palette.id === p.id ? 'active' : ''}`}
                        onClick={() => { setPalette(p); setShowPaletteMenu(false); }}
                        style={{background: p.bg}}
                      >
                        <div className="palette-swatches">
                          {p.swatches.map((c,i) => <div key={i} className="palette-swatch" style={{background:c}} />)}
                        </div>
                        <span className="palette-name" style={{color: p.base}}>{p.name}</span>
                        {palette.id === p.id && <div className="palette-preview-dot" style={{background: p.fn}} />}
                      </div>
                    ))}
                  </div>
                )}
              </div>
              <div style={{fontSize:'10px', opacity:0.35, display:'flex', alignItems:'center', gap:'10px'}}>
                <span>^/ comment</span>
                <span>TAB indent</span>
              </div>
            </div>
          </div>

          {/* Find/Replace bar */}
          {showFind && (
            <div className="editor-find-bar">
              <span style={{fontSize:'10px', opacity:0.6, flexShrink:0}}>FIND</span>
              <input value={findQuery} onChange={e=>setFindQuery(e.target.value)} placeholder="Search..." spellCheck="false" />
              <span style={{fontSize:'10px', opacity:0.6, flexShrink:0}}>→</span>
              <input value={replaceQuery} onChange={e=>setReplaceQuery(e.target.value)} placeholder="Replace with..." spellCheck="false" />
              <button className="editor-toolbar-btn" onClick={handleFindReplace} style={{flexShrink:0}}>REPLACE ALL</button>
              <button className="editor-toolbar-btn" onClick={() => setShowFind(false)} style={{flexShrink:0, color:'#ff435a'}}>✕</button>
            </div>
          )}

          {/* Editor + info panel */}
          <div style={{display:'flex', flex:1, minHeight:0, overflow:'hidden'}}>
            {/* Main code area */}
            <div style={{display:'flex', flex:1, overflow:'hidden', position:'relative', minWidth:0}}>
              {/* Line numbers */}
              <div
                ref={lineNumRef}
                className="line-numbers"
                style={{fontSize:fontSize, lineHeight:'1.6', background: palette.bg, color: palette.lineNum, borderRightColor: palette.lineNum + '55'}}
              >
                {Array.from({length: lineCount}, (_, i) => (
                  <div key={i} style={{
                    color: cursor.line === i+1 ? palette.base : palette.lineNum,
                    opacity: cursor.line === i+1 ? 1 : 0.6,
                    fontWeight: cursor.line === i+1 ? 'bold' : undefined,
                  }}>{i+1}</div>
                ))}
              </div>
              {/* Editable area */}
              <div style={{flex:1, position:'relative', overflow:'hidden', background: palette.bg}}>
                {/* Active line highlight */}
                <div className="active-line-highlight" style={{
                  top: `calc(24px + ${activeLineY}px)`,
                  height: `${lineHeight}px`,
                  background: palette.activeLine,
                  borderLeftColor: palette.fn + '88',
                }} />
                {/* Syntax overlay */}
                <div
                  ref={overlayRef}
                  className="code-highlight-overlay"
                  style={{fontSize, lineHeight:'1.6', pointerEvents:'none', zIndex:1, whiteSpace: wordWrap ? 'pre-wrap' : 'pre', color: palette.base}}
                  dangerouslySetInnerHTML={{__html: highlighted}}
                />
                {/* Textarea (actual editable) */}
                <textarea
                  ref={textareaRef}
                  className="code-area"
                  value={code}
                  onChange={e => onChange(e.target.value)}
                  onKeyDown={handleKeyDown}
                  onScroll={handleScroll}
                  onClick={handleCursorUpdate}
                  onKeyUp={handleCursorUpdate}
                  spellCheck="false"
                  style={{
                    fontSize,
                    lineHeight:'1.6',
                    whiteSpace: wordWrap ? 'pre-wrap' : 'pre',
                    position:'absolute', inset:0,
                    padding:'24px 16px',
                    fontFamily:"'JetBrains Mono', monospace",
                    color: 'transparent',
                    caretColor: palette.fn,
                    background: 'transparent',
                    border: 'none',
                    outline: 'none',
                    resize: 'none',
                    zIndex: 2,
                  }}
                />
              </div>
            </div>

            {/* Info panel */}
            <div className="code-panel-info">
              <div className="code-panel-info-hdr">INSPECTOR</div>
              <div className="code-panel-info-body">
                <div>
                  <div style={{opacity:0.5, marginBottom:'4px', fontSize:'9px', letterSpacing:'1px'}}>FILE</div>
                  <div style={{fontWeight:'bold', color:'var(--text)', fontSize:'11px'}}>{node.label}</div>
                  <div style={{opacity:0.5, marginTop:'2px', fontSize:'9px'}}>{node.type}</div>
                </div>
                <div>
                  <div style={{opacity:0.5, marginBottom:'6px', fontSize:'9px', letterSpacing:'1px'}}>STATS</div>
                  <div style={{display:'flex', flexDirection:'column', gap:'4px'}}>
                    <div className="token-count-badge"><span style={{opacity:0.5}}>LINES</span><span style={{color:'#10b981'}}>{lineCount}</span></div>
                    <div className="token-count-badge"><span style={{opacity:0.5}}>WORDS</span><span style={{color:'#ffc410'}}>{wordCount}</span></div>
                    <div className="token-count-badge"><span style={{opacity:0.5}}>CHARS</span><span style={{color:'#4285f4'}}>{charCount}</span></div>
                    {selCount > 0 && <div className="token-count-badge"><span style={{opacity:0.5}}>SEL</span><span style={{color:'#ff435a'}}>{selCount}</span></div>}
                  </div>
                </div>
                <div>

    // ────────────────────────────────────────────────────────────────

      { id: 'n2', type: 'function', label: 'load_network.py', isMain: false, x: 140, y: -130, vx: 0, vy: 0, themeIdx: 5, classId:'g1', code: 'def load_network(config=None):\n    """Load the neural network from disk.\n    \n    Args:\n        config: Optional configuration dict\n    Returns:\n        DataLoader instance\n    """\n    loader = DataLoader(config)\n    loader.init()\n    return loader\n\n# Network params defined here\nDEFAULT_LR = 0.001\nDEFAULT_BATCH = 32', modified: true },
      { id: 'n3', type: 'class', label: 'DataMatrix.py', isMain: false, x: -100, y: 150, vx: 0, vy: 0, themeIdx: 6, code: 'class DataMatrix:\n    """Core data matrix handler."""\n\n    def __init__(self, size=128):\n        self.active = True\n        self.buffer = []\n        self.size = size\n\n    def push(self, data):\n        if len(self.buffer) < self.size:\n            self.buffer.append(data)\n            return True\n        return False\n\n    def flush(self):\n        self.buffer = []\n        return self', modified: false, classId:'g1' },
      { id: 'n4', type: 'function', label: 'preprocess.py', isMain: false, x: 60, y: 180, vx: 0, vy: 0, themeIdx: 4, classId: null,

    ];
    const INITIAL_EDGES = [{ id: 'e1', source: 'n1', target: 'n2' }, { id: 'e2', source: 'n1', target: 'n3' }, { id: 'e3', source: 'n2', target: 'n4' }];
    const INITIAL_GROUPS = [{ id: 'g1', name: 'NetworkLayer', color: '#10b981', nodeIds: ['n2','n3'] }];

    // ────────────────────────────────────────────────────────────────
    //  FLOATING PANEL
    // ────────────────────────────────────────────────────────────────
    const FloatingPanel = ({ title, isOpen, onClose, defaultX, defaultY, defaultW, defaultH, children }) => {
      const [pos, setPos] = useState({ x: defaultX, y: defaultY });
      const [size, setSize] = useState({ w: defaultW, h: defaultH });
      const [zIndex, setZIndex] = useState(100);
      const dragRef = useRef({ isDragging: false, startX: 0, startY: 0, initialX: 0, initialY: 0 });
      const resizeRef = useRef({ isResizing: false, startX: 0, startY: 0, initialW: 0, initialH: 0 });
      if (!isOpen) return null;
      const bringToFront = () => setZIndex(Date.now() % 100000 + 100);
      const onDragStart = (e) => {
        if (e.target.closest('.no-drag')) return;
        dragRef.current = { isDragging: true, startX: e.clientX, startY: e.clientY, initialX: pos.x, initialY: pos.y };
        e.currentTarget.setPointerCapture(e.pointerId); bringToFront();
      };
      const onDragMove = (e) => {
        if (!dragRef.current.isDragging) return;
        setPos({ x: dragRef.current.initialX + (e.clientX - dragRef.current.startX), y: Math.max(0, dragRef.current.initialY + (e.clientY - dragRef.current.startY)) });
      };
      const onDragEnd = (e) => { dragRef.current.isDragging = false; e.currentTarget.releasePointerCapture(e.pointerId); };
      const onResizeStart = (e) => {
        e.stopPropagation();
        resizeRef.current = { isResizing: true, startX: e.clientX, startY: e.clientY, initialW: size.w, initialH: size.h };
        e.currentTarget.setPointerCapture(e.pointerId); bringToFront();
      };
      const onResizeMove = (e) => {
        if (!resizeRef.current.isResizing) return;
        setSize({ w: Math.max(200, resizeRef.current.initialW + (e.clientX - resizeRef.current.startX)), h: Math.max(150, resizeRef.current.initialH + (e.clientY - resizeRef.current.startY)) });
      };
      const onResizeEnd = (e) => { resizeRef.current.isResizing = false; e.currentTarget.releasePointerCapture(e.pointerId); };
      return (
        <div className="floating-panel" style={{ left: pos.x, top: pos.y, width: size.w, height: size.h, zIndex }} onPointerDownCapture={bringToFront}>
          <div className="panel-hdr" style={{ cursor: 'grab' }} onPointerDown={onDragStart} onPointerMove={onDragMove} onPointerUp={onDragEnd} onPointerCancel={onDragEnd}>
            <span>{title}</span>
            <span className="no-drag" style={{ cursor: 'pointer', padding: '0 4px', opacity: 0.6 }} onClick={onClose}>✕</span>
          </div>
          <div className="panel-content-wrap">
            {children}
            <div className="panel-resizer" onPointerDown={onResizeStart} onPointerMove={onResizeMove} onPointerUp={onResizeEnd} onPointerCancel={onResizeEnd} />
          </div>
        </div>
      );
    };

    // ────────────────────────────────────────────────────────────────
    //  IDE
    // ────────────────────────────────────────────────────────────────
    function IDE({ initialTheme, initialAvatar }) {
      const [themeMode, setThemeMode] = useState(initialTheme);
      const nodesRef = useRef(JSON.parse(JSON.stringify(INITIAL_NODES)));
      const edgesRef = useRef(INITIAL_EDGES);
      const [, forceRender] = useState({});
      const [transform, setTransform] = useState({ x: window.innerWidth / 2, y: window.innerHeight / 2, scale: 1 });
      const [isDraggingCanvas, setIsDraggingCanvas] = useState(false);
      const [sidebarMode, setSidebarMode] = useState("files");
      const [bottomPanelTab, setBottomPanelTab] = useState('timeline');
      const [openTabs, setOpenTabs] = useState([]);
      const [activeTabId, setActiveTabId] = useState(null);
      const [searchQuery, setSearchQuery] = useState("");
      const [avatarIndex, setAvatarIndex] = useState(initialAvatar);
      const [repoUrl, setRepoUrl] = useState("");
      const [playheadPos, setPlayheadPos] = useState(400);
      const [activeVersionName, setActiveVersionName] = useState("v1.4 (HEAD)");
      const playheadDragRef = useRef({ isDragging: false, startX: 0, startPos: 0 });
      const draggingNodeRef = useRef(null);
      const [hoveredNodeId, setHoveredNodeId] = useState(null);
      const lastMousePos = useRef({ x: 0, y: 0 });
      const [showCreateNode, setShowCreateNode] = useState(false);
      const [newNodeName, setNewNodeName] = useState('');
      const [newNodeType, setNewNodeType] = useState('function');
      const [newNodeColor, setNewNodeColor] = useState(0);
      const groupsRef = useRef(JSON.parse(JSON.stringify(INITIAL_GROUPS)));
      const [showCreateGroup, setShowCreateGroup] = useState(false);
      const [groupName, setGroupName] = useState('');
      const [groupColor, setGroupColor] = useState('#10b981');
      const [groupSelected, setGroupSelected] = useState([]);
      const [board, setBoard] = useState(INITIAL_BOARD);
      const [focusCard, setFocusCard] = useState(null);
      const [newCardCol, setNewCardCol] = useState(null);
      const [newCardTitle, setNewCardTitle] = useState('');

      const filteredSearch = nodesRef.current.filter((n) => {
        const q = searchQuery.trim().toLowerCase();
        if (!q) return true;
        return (n.label||'').toLowerCase().includes(q) || (n.code||'').toLowerCase().includes(q);
      });
      const modifiedNodes = nodesRef.current.filter(n => n.modified);
      const visibleNodes = nodesRef.current.filter(node => {
        if (node.id === 'n1' && playheadPos < 100) return false;
        if (node.id === 'n3' && playheadPos < 250) return false;
        return true;
      });
      const visibleEdges = edgesRef.current.filter(edge => {
        const s = visibleNodes.find(n => n.id === edge.source);
        const t = visibleNodes.find(n => n.id === edge.target);
        return s && t;
      });

      const currentActiveId = activeTabId || hoveredNodeId;
      const activeNode = nodesRef.current.find(n => n.id === currentActiveId);
      const activeZoneKey = activeNode ? ZONES[activeNode.themeIdx % ZONES.length] : "default";
      const activeTabNode = nodesRef.current.find(n => n.id === activeTabId);
      const wrapperClass = `app-wrapper theme-${themeMode} zone-${activeZoneKey}`;
      const outerBg = themeMode === "brutal" ? OUTSIDE_COLORS[activeZoneKey] : "#050505";

      const handlePlayheadDown = (e) => {
        e.stopPropagation();
        e.currentTarget.setPointerCapture(e.pointerId);
        playheadDragRef.current = { isDragging: true, startX: e.clientX, startPos: playheadPos };
      };
      const handlePlayheadMove = (e) => {
        if (!playheadDragRef.current.isDragging) return;
        let newPos = Math.max(0, Math.min(playheadDragRef.current.startPos + (e.clientX - playheadDragRef.current.startX), 1150));
        setPlayheadPos(newPos);
        let ver = "HEAD";
        if (newPos < 100) ver = "v1.0"; else if (newPos < 220) ver = "v1.1"; else if (newPos < 250) ver = "v1.2"; else if (newPos < 380) ver = "v1.3"; else ver = "v1.4 (HEAD)";
        if (ver !== activeVersionName) setActiveVersionName(ver);
      };
      const handlePlayheadUp = (e) => { playheadDragRef.current.isDragging = false; e.currentTarget.releasePointerCapture(e.pointerId); };

      useEffect(() => {
        let rafId;
        const tick = () => {
          let updated = false;
          const nodes = nodesRef.current; const edges = edgesRef.current;
          for (let i = 0; i < nodes.length; i++) for (let j = i+1; j < nodes.length; j++) {
            const dx = nodes[j].x - nodes[i].x; const dy = nodes[j].y - nodes[i].y;
            const distSq = dx*dx + dy*dy || 1; const dist = Math.sqrt(distSq);
            const force = 4000/distSq;
            nodes[i].vx -= (dx/dist)*force; nodes[i].vy -= (dy/dist)*force;
            nodes[j].vx += (dx/dist)*force; nodes[j].vy += (dy/dist)*force;
          }
          edges.forEach(edge => {
            const src = nodes.find(n => n.id === edge.source); const tgt = nodes.find(n => n.id === edge.target);
            if (!src || !tgt) return;
            const dx = tgt.x - src.x; const dy = tgt.y - src.y; const dist = Math.sqrt(dx*dx + dy*dy) || 1;
            const force = (dist-140)*0.05;
            src.vx += (dx/dist)*force; src.vy += (dy/dist)*force;
            tgt.vx -= (dx/dist)*force; tgt.vy -= (dy/dist)*force;
          });
          nodes.forEach(n => {
            const p = n.isMain ? 0.2 : 0.005;
            n.vx += (0-n.x)*p; n.vy += (0-n.y)*p;
            n.vx *= 0.8; n.vy *= 0.8;
            n.x += n.vx; n.y += n.vy;
            if (Math.abs(n.vx) > 0.05 || Math.abs(n.vy) > 0.05) updated = true;
          });
          if (draggingNodeRef.current) {
            const d = nodes.find(n => n.id === draggingNodeRef.current.id);
            if (d) { d.x = draggingNodeRef.current.x; d.y = draggingNodeRef.current.y; d.vx = 0; d.vy = 0; updated = true; }
          }
          if (updated) forceRender({});
          rafId = requestAnimationFrame(tick);
        };
        rafId = requestAnimationFrame(tick);
        return () => cancelAnimationFrame(rafId);
      }, []);

      const handleCanvasPointerDown = (e) => {
        if (e.target.closest(".obs-node-wrapper") || e.target.closest(".floating-panel") || e.target.closest(".modal-overlay")) return;
        setIsDraggingCanvas(true); lastMousePos.current = { x: e.clientX, y: e.clientY };
      };
      const handleCanvasPointerMove = (e) => {
        if (isDraggingCanvas) {
          const dx = e.clientX - lastMousePos.current.x; const dy = e.clientY - lastMousePos.current.y;
          setTransform(prev => ({ ...prev, x: prev.x+dx, y: prev.y+dy }));
          lastMousePos.current = { x: e.clientX, y: e.clientY };
        } else if (draggingNodeRef.current) {
          const dx = (e.clientX - lastMousePos.current.x)/transform.scale;
          const dy = (e.clientY - lastMousePos.current.y)/transform.scale;
          if (Math.abs(dx) > 1 || Math.abs(dy) > 1) draggingNodeRef.current.hasDragged = true;
          draggingNodeRef.current.x += dx; draggingNodeRef.current.y += dy;
          lastMousePos.current = { x: e.clientX, y: e.clientY };
        }
      };
      const handleCanvasPointerUp = () => { setIsDraggingCanvas(false); draggingNodeRef.current = null; };
      const handleWheel = (e) => {
        if (e.target.closest(".code-area") || e.target.closest(".floating-panel") || e.target.closest(".nle-wrap")) return;
        e.preventDefault();
        setTransform(prev => ({ ...prev, scale: Math.min(Math.max(0.3, prev.scale*(e.deltaY > 0 ? 0.9 : 1.1)), 2.5) }));
      };
      const openNodeInEditor = (id) => { setOpenTabs(tabs => tabs.includes(id) ? tabs : [...tabs, id]); setActiveTabId(id); };

      const handleCreateNode = () => {
        if (!newNodeName.trim()) return;
        const nid = 'n' + Date.now();
        const slug = newNodeName.trim().replace(/\s+/g,'_');

          code:'def '+slug+'():\n    pass', modified:false,

        setShowCreateNode(false); setNewNodeName(''); forceRender({});
      };

      const handleCreateGroup = () => {
        if (!groupName.trim() || groupSelected.length < 2) return;
        const gid = 'g' + Date.now();
        groupsRef.current = [...groupsRef.current, { id:gid, name:groupName.trim(), color:groupColor, nodeIds:[...groupSelected] }];
        nodesRef.current = nodesRef.current.map(n => groupSelected.includes(n.id) ? {...n, classId:gid} : n);
        setShowCreateGroup(false); setGroupName(''); setGroupSelected([]); forceRender({});
      };

      const dissolveGroup = (gid) => {
        groupsRef.current = groupsRef.current.filter(g => g.id!==gid);
        nodesRef.current = nodesRef.current.map(n => n.classId===gid ? {...n,classId:null} : n);
        forceRender({});
      };

      const toggleGroupSel = (id) => setGroupSelected(prev => prev.includes(id)?prev.filter(x=>x!==id):[...prev,id]);

      const addCard = (colId) => {
        if (!newCardTitle.trim()) return;
        setBoard(b => ({...b, cards:[...b.cards, {id:'k'+Date.now(),colId,title:newCardTitle.trim(),priority:'MED',tags:[],progress:0,due:'',assignee:avatarIndex}]}));
        setNewCardCol(null); setNewCardTitle('');
      };
      const moveCard = (cardId,colId) => setBoard(b=>({...b,cards:b.cards.map(c=>c.id===cardId?{...c,colId}:c)}));
      const updateCard = (cardId,patch) => setBoard(b=>({...b,cards:b.cards.map(c=>c.id===cardId?{...c,...patch}:c)}));
      const deleteCard = (cardId) => { setBoard(b=>({...b,cards:b.cards.filter(c=>c.id!==cardId)})); setFocusCard(null); };

      return (
        <div style={{ width:'100vw', height:'100vh', padding: themeMode==='brutal' ? '40px' : '0px', backgroundColor: outerBg, transition:'all 0.4s ease', boxSizing:'border-box' }}>

                <button className="btn" onClick={() => { setShowCreateGroup(true); setGroupSelected([]); }}>&#x2B21; GROUP</button>

              </div>

                  ['chat', <Icons.Message />],

                  style={{ borderRadius:'50%', padding:'0', marginTop:'10px', border: sidebarMode==='settings' ? '2px solid var(--border)' : '2px solid transparent' }}
                >

                        const src = visibleNodes.find(n => n.id===edge.source); const tgt = visibleNodes.find(n => n.id===edge.target);
                        if (!src || !tgt) return null;
                        return <path key={edge.id} className="edge-path" d={`M ${src.x} ${src.y} L ${tgt.x} ${tgt.y}`} />
                      })}
                    </svg>
                    {/* group convex-hull threads */}
                    {groupsRef.current.map(grp => {
                      const gn = visibleNodes.filter(n => grp.nodeIds.includes(n.id));
                      if (gn.length < 2) return null;
                      const cx=gn.reduce((s,n)=>s+n.x,0)/gn.length, cy=gn.reduce((s,n)=>s+n.y,0)/gn.length;
                      const sorted=[...gn].sort((a,b)=>Math.atan2(a.y-cy,a.x-cx)-Math.atan2(b.y-cy,b.x-cx));
                      const PAD=44;
                      const pts=sorted.map(n=>{const dx=n.x-cx,dy=n.y-cy,d=Math.sqrt(dx*dx+dy*dy)||1;return[cx+dx/d*(d+PAD),cy+dy/d*(d+PAD)];});
                      const pathD=pts.map((p,i)=>(i===0?'M':'L')+p[0].toFixed(1)+' '+p[1].toFixed(1)).join(' ')+' Z';
                      const lx=cx, ly=Math.min(...gn.map(n=>n.y))-PAD-8;
                      return (
                        <g key={grp.id}>
                          <path d={pathD} fill={grp.color+'10'} stroke={grp.color} strokeWidth='1.5' strokeDasharray='7 3' opacity='0.8'/>
                          <foreignObject x={lx-64} y={ly-12} width='130' height='22' style={{overflow:'visible'}}>

                              style={{background:grp.color+'22',color:grp.color,border:'1px solid '+grp.color+'55',

                          </foreignObject>
                        </g>
                      );

      const [theme, setTheme] = useState(null);
      const [avatar, setAvatar] = useState(null);
      if (theme && avatar !== null) return <IDE initialTheme={theme} initialAvatar={avatar} />;

      return (
        <div className="login-container">
          <div className="login-box">
            <div style={{textAlign:'center', marginBottom:'20px'}}>
              <h1 style={{fontSize:'32px', fontWeight:'bold', letterSpacing:'4px', marginBottom:'10px', fontFamily:"'JetBrains Mono',monospace"}}>FORBINDEN</h1>
              <div style={{opacity:0.4, letterSpacing:'3px', fontSize:'11px'}}>SYSTEM BOOT SEQUENCE</div>
            </div>

            <div style={{background:'rgba(255,255,255,0.03)', padding:'30px', borderRadius:'8px', border:'1px solid rgba(255,255,255,0.08)'}}>
              <h2 style={{fontSize:'10px', opacity:0.5, marginBottom:'24px', textAlign:'center', letterSpacing:'3px'}}>01 // SELECT OPERATOR IDENTITY</h2>
              <div style={{display:'flex', gap:'16px', justifyContent:'center', flexWrap:'wrap'}}>
                {[0,1,2,3,4,5].map(i => (
                  <div key={i} onClick={() => setAvatar(i)} style={{display:'flex', flexDirection:'column', alignItems:'center', gap:'8px', cursor:'pointer', transition:'transform 0.2s', transform: avatar===i ? 'translateY(-4px)' : 'none'}}>
                    <CyberAvatar index={i} size={72} selected={avatar===i} />
                    <div style={{fontSize:'9px', letterSpacing:'1px', opacity: avatar===i ? 1 : 0.3, color: AVATAR_ACCENTS[i], fontFamily:"'JetBrains Mono',monospace", transition:'opacity 0.2s'}}>
                      {AVATAR_NAMES[i]}
                    </div>
                  </div>
                ))}
              </div>
            </div>

            <div style={{opacity: avatar !== null ? 1 : 0.2, transition:'opacity 0.4s', pointerEvents: avatar !== null ? 'auto' : 'none'}}>
              <h2 style={{fontSize:'10px', opacity:0.5, marginBottom:'16px', textAlign:'center', letterSpacing:'3px'}}>02 // INITIALIZE ENGINE</h2>
              <div style={{display:'flex', gap:'20px'}}>
                <button className="theme-btn cyber" disabled={avatar===null} onClick={() => setTheme('cyber')}>
                  <div style={{fontSize:'22px', fontWeight:'bold', marginBottom:'8px', letterSpacing:'2px'}}>OBSIDIAN</div>
                  <div style={{fontSize:'10px', opacity:0.6}}>DARK // CYBERPUNK</div>
                </button>
                <button className="theme-btn brutal" disabled={avatar===null} onClick={() => setTheme('brutal')}>
                  <div style={{fontSize:'22px', fontWeight:'900', marginBottom:'8px', letterSpacing:'2px'}}>FORSAKEN</div>
                  <div style={{fontSize:'10px', opacity:0.7, fontWeight:'bold'}}>LIGHT // BRUTALIST</div>
                </button>
              </div>
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<Bootloader />);
  </script>
</body>
</html>
