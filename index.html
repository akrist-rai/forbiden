<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FORBINDEN // DUAL CORE GRAPH</title>
  
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css" />
  <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js"></script>

  <style>
    @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@400;700;800&display=swap");
    
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body { 
      overflow: hidden; 
      width: 100vw; height: 100vh;
      user-select: none; font-size: 10px;
      background-color: #050505; 
      margin: 0;
    }

    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: currentColor; }

    /* =========================================
       BASE WRAPPER & VARIABLES
       ========================================= */
    .app-wrapper {
      width: 100%; height: 100%; 
      display: flex; flex-direction: column; overflow: hidden;
      background: var(--bg);
      color: var(--text);
      border: var(--border-w) solid var(--border);
      border-radius: var(--ui-radius, 0);
      transition: background-color 0.4s ease, color 0.4s ease, border-color 0.4s ease;
    }

    /* =========================================
       THEME 1: FORSAKEN (BRUTALIST)
       ========================================= */
    .theme-brutal {
      --bg: #ffffff; --text: #111111; --border: #111111; --node-bg: #ffffff;
      --border-w: 6px; --edge-w: 4px; --ui-radius: 0px;
      font-family: 'Inter', sans-serif;
      text-transform: uppercase; font-weight: 900;
      box-shadow: 20px 20px 0px rgba(17,17,17,1);
    }
    
    /* Forsaken Custom Color Zones */
    .theme-brutal.zone-default { --bg: #ffffff; --text: #111111; --border: #111111; --node-bg: #ffffff; }
    .theme-brutal.zone-1       { --bg: #111111; --text: #ff435a; --border: #ff435a; --node-bg: #111111; }
    .theme-brutal.zone-2       { --bg: #7ca148; --text: #111111; --border: #111111; --node-bg: #ffc410; }
    .theme-brutal.zone-3       { --bg: #1e836d; --text: #111111; --border: #111111; --node-bg: #1e836d; }
    .theme-brutal.zone-4       { --bg: #f3f5f7; --text: #4285f4; --border: #4285f4; --node-bg: #f3f5f7; }

    .theme-brutal .btn { border: 4px solid var(--text); box-shadow: 4px 4px 0 var(--border); }
    .theme-brutal .btn:hover { background: var(--text); color: var(--bg); transform: translate(-2px, -2px); box-shadow: 6px 6px 0 var(--border); }
    .theme-brutal .node-circle { background: var(--node-bg); border: 4px solid var(--border); box-shadow: 4px 4px 0px var(--border); }
    .theme-brutal .node-label { background: var(--bg); color: var(--text); border: 4px solid var(--border); box-shadow: 4px 4px 0px var(--border); font-weight: 900; }
    .theme-brutal .code-area { background: var(--node-bg); border: 6px solid var(--border); color: var(--text); box-shadow: 8px 8px 0px var(--border); font-weight: 700; }
    .theme-brutal .modal-content { border: 6px solid var(--border); box-shadow: 20px 20px 0px var(--border); }

    /* =========================================
       THEME 2: OBSIDIAN (CYBERPUNK)
       ========================================= */
    .theme-cyber {
      --bg: #0a0a0c; --text: #a1a1b8; --border: #1f1f2e;
      --border-w: 1px; --edge-w: 2px; --ui-radius: 12px;
      font-family: 'JetBrains Mono', monospace;
      text-transform: none; font-weight: 400;
      box-shadow: 0 0 60px rgba(0,0,0,0.8);
    }

    .theme-cyber .canvas-bg { background-image: radial-gradient(circle, rgba(255,255,255,0.05) 1px, transparent 1px); background-size: 24px 24px; }
    .theme-cyber .btn { border: 1px solid var(--border); border-radius: 4px; background: transparent; color: var(--text); font-weight: 700; }
    .theme-cyber .btn:hover { border-color: #10b981; color: #10b981; box-shadow: 0 0 10px rgba(16,185,129,0.2); }
    .theme-cyber .node-circle { border-radius: 50%; background: #0a0a0c; border: 2px solid var(--node-color, #ffffff); box-shadow: 0 0 10px var(--node-color, #ffffff); }
    .theme-cyber .node-label { background: #0a0a0c; color: #ffffff; border: 1px solid var(--border); border-radius: 4px; }
    .theme-cyber .code-area { background: #050505; border: 1px solid var(--border); color: #f0f0f5; border-radius: 8px; font-weight: 400; }
    .theme-cyber .modal-content { border: 1px solid var(--border); border-radius: 12px; box-shadow: 0 20px 80px rgba(0,0,0,0.9); }
    .theme-cyber .edge-path { stroke: rgba(255,255,255,0.15); }
    
    .theme-cyber .obs-node-wrapper.clr-default { --node-color: #ffffff; }
    .theme-cyber .obs-node-wrapper.clr-1 { --node-color: #ff435a; }
    .theme-cyber .obs-node-wrapper.clr-2 { --node-color: #ffc410; }
    .theme-cyber .obs-node-wrapper.clr-3 { --node-color: #1e836d; }
    .theme-cyber .obs-node-wrapper.clr-4 { --node-color: #4285f4; }

    /* =========================================
       LAYOUT COMPONENTS (Shared)
       ========================================= */
    .app-header { 
      height: 56px; display: flex; align-items: center; justify-content: space-between; 
      padding: 0 24px; border-bottom: var(--border-w) solid var(--border); 
      z-index: 50; flex-shrink: 0; background: transparent; 
      transition: border-color 0.4s ease;
    }
    .hdr-brand { font-size: 18px; letter-spacing: -0.5px; }

    .btn { 
      cursor: pointer; outline: none; padding: 8px 16px; font-size: 11px;
      transition: all 0.2s ease;
    }

    .app-body { display: flex; flex: 1; min-height: 0; position: relative; }
    
    .sidebar { 
      width: 60px; border-right: var(--border-w) solid var(--border); 
      display: flex; flex-direction: column; align-items: center; 
      padding: 24px 0; gap: 24px; z-index: 10; flex-shrink: 0; 
      background: transparent; transition: border-color 0.4s ease;
    }
    .strip-icon { 
      width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; 
      cursor: pointer; border: var(--border-w) solid transparent; transition: all 0.2s; color: var(--text);
      border-radius: var(--ui-radius);
    }

    .canvas-container { flex: 1; position: relative; overflow: hidden; cursor: grab; background: transparent; }
    .canvas-container:active { cursor: grabbing; }
    .canvas-bg { position: absolute; inset: 0; pointer-events: none; z-index: 0; }
    
    .graph-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; transform-origin: 0 0; z-index: 1; }
    .svg-edges { position: absolute; inset: 0; width: 100%; height: 100%; overflow: visible; pointer-events: none; }
    
    .edge-path { fill: none; stroke-width: var(--edge-w); transition: stroke 0.4s; }
    .theme-brutal .edge-path { stroke: var(--text); }
    .edge-path.active-conn { stroke-dasharray: 8 8; }

    .obs-node-wrapper { 
      position: absolute; display: flex; flex-direction: column; align-items: center; justify-content: center; 
      cursor: pointer; z-index: 5; transform: translate(-50%, -50%); 
      transition: opacity 0.2s ease;
    }
    .obs-node-wrapper:hover { z-index: 10; }
    .obs-node-wrapper:hover .node-circle { transform: scale(1.2); }
    
    .node-circle { display: flex; align-items: center; justify-content: center; transition: all 0.2s cubic-bezier(0.25, 1, 0.5, 1); }
    .node-circle.main-node { width: 32px; height: 32px; border-width: calc(var(--border-w) * 1.5); }
    .node-circle.sub-node { width: 18px; height: 18px; }

    .node-label { margin-top: 10px; font-size: 11px; padding: 4px 10px; pointer-events: none; white-space: nowrap; transition: all 0.2s; }

    .status-bar { 
      height: 32px; border-top: var(--border-w) solid var(--border); 
      display: flex; align-items: center; justify-content: space-between; 
      padding: 0 24px; font-size: 11px; flex-shrink: 0; background: transparent; 
      transition: border-color 0.4s;
    }

    /* =========================================
       89% OVERLAY MODAL
       ========================================= */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 1000;
      backdrop-filter: blur(8px); display: none; align-items: center; justify-content: center;
      opacity: 0; transition: opacity 0.3s;
    }
    .modal-overlay.open { display: flex; opacity: 1; }
    
    .modal-content {
      width: 89vw; height: 89vh; 
      background: var(--bg); border-radius: var(--ui-radius);
      display: flex; flex-direction: column; overflow: hidden;
      transform: translateY(20px); 
      transition: transform 0.4s ease, background-color 0.4s, color 0.4s;
    }
    .modal-overlay.open .modal-content { transform: translateY(0); }
    
    .modal-hdr {
      height: 60px; border-bottom: var(--border-w) solid var(--border); background: transparent;
      display: flex; align-items: center; justify-content: space-between; padding: 0 32px; flex-shrink: 0;
      transition: border-color 0.4s;
    }
    .modal-hdr-title { font-size: 20px; display: flex; align-items: center; gap: 16px; }
    
    .modal-input { 
      background: transparent; border: none; color: inherit; font-family: inherit; 
      font-size: inherit; font-weight: inherit; outline: none; 
      border-bottom: 2px dashed transparent; padding: 4px 0;
    }
    .modal-input:focus { border-bottom-color: var(--border); }
    
    .modal-body { flex: 1; display: flex; }
    .modal-code-wrap { 
      flex: 1; padding: 32px; display: flex; flex-direction: column; 
      border-right: var(--border-w) solid var(--border); transition: border-color 0.4s; 
    }
    
    .code-area { 
      flex: 1; font-family: 'JetBrains Mono', monospace; font-size: 13px; 
      padding: 24px; resize: none; outline: none; line-height: 1.6;
      transition: background 0.4s, color 0.4s, border-color 0.4s;
    }
    
    .modal-side { width: 320px; display: flex; flex-direction: column; background: transparent; }
    .modal-side-sec { padding: 24px; border-bottom: var(--border-w) solid var(--border); transition: border-color 0.4s; }
    .modal-side-label { font-size: 12px; margin-bottom: 12px; }
    
    .side-input { 
      width: 100%; border: var(--border-w) solid var(--text); padding: 10px; background: transparent; 
      color: var(--text); font-family: inherit; font-size: 12px; 
      outline: none; transition: border-color 0.4s, color 0.4s;
    }
    .side-input option { color: #000; }

    /* Bootloader */
    .boot-menu { position: fixed; inset: 0; display: flex; z-index: 9999; font-family: 'JetBrains Mono', monospace; }
    .boot-half { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; transition: all 0.3s; }
    .boot-half.cyber { background: #050505; color: #10b981; border-right: 1px solid #1f1f2e; }
    .boot-half.cyber:hover { background: #0a0a0c; box-shadow: inset 0 0 80px rgba(16,185,129,0.15); }
    .boot-half.brutal { background: #FFFFFF; color: #111111; font-family: 'Inter', sans-serif; text-transform: uppercase; font-weight: 900; }
    .boot-half.brutal:hover { background: #f3f5f7; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const Icons = {
      Files: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>,
      Search: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>,
      Terminal: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>,
    };

    const ZONES = ['default', '1', '2', '3', '4'];
    
    // Fallback colors for the modal designator boxes
    const ZONE_COLORS = {
      'default': '#ffffff',
      '1': '#ff435a',
      '2': '#ffc410',
      '3': '#1e836d',
      '4': '#4285f4'
    };

    // Initial Physics Nodes
    const INITIAL_NODES = [
      { id: 'n1', type: 'entry', label: 'core_sys.py', isMain: true, x: 0, y: 0, vx: 0, vy: 0, themeIdx: 0, code: 'import torch\nprint("Central Architecture Booted")' },
      { id: 'n2', type: 'function', label: 'load_network', isMain: false, x: 100, y: -100, vx: 0, vy: 0, themeIdx: 1, code: 'def load_network():\n    return DataLoader()' },
      { id: 'n3', type: 'class', label: 'DataMatrix', isMain: false, x: -100, y: 150, vx: 0, vy: 0, themeIdx: 2, code: 'class DataMatrix:\n    def __init__(self):\n        self.active = True' },
      { id: 'n4', type: 'function', label: 'compile_node', isMain: false, x: 150, y: 100, vx: 0, vy: 0, themeIdx: 4, code: 'def compile_node():\n    pass' },
    ];

    const INITIAL_EDGES = [
      { id: 'e1', source: 'n1', target: 'n2' },
      { id: 'e2', source: 'n1', target: 'n3' },
      { id: 'e3', source: 'n2', target: 'n4' },
      { id: 'e4', source: 'n1', target: 'n4' }
    ];

    function IDE({ initialTheme }) {
      const [themeMode, setThemeMode] = useState(initialTheme);
      
      const nodesRef = useRef(JSON.parse(JSON.stringify(INITIAL_NODES)));
      const edgesRef = useRef(INITIAL_EDGES);
      const [, forceRender] = useState({});

      const [transform, setTransform] = useState({ x: window.innerWidth / 2, y: window.innerHeight / 2, scale: 1 });
      const [isDraggingCanvas, setIsDraggingCanvas] = useState(false);
      const [connectingFrom, setConnectingFrom] = useState(null);
      const [tempMouse, setTempMouse] = useState({x: 0, y: 0});
      
      const draggingNodeRef = useRef(null);
      const [hoveredNodeId, setHoveredNodeId] = useState(null);
      const [modalNodeId, setModalNodeId] = useState(null);

      const lastMousePos = useRef({ x: 0, y: 0 });
      const dragStartPos = useRef({ x: 0, y: 0 });

      // Calculate active styling based on theme and hover
      const activeNodeId = modalNodeId || hoveredNodeId;
      const activeNode = nodesRef.current.find(n => n.id === activeNodeId);
      
      let wrapperClass = `app-wrapper theme-${themeMode}`;
      if (themeMode === 'brutal') {
        wrapperClass += activeNode ? ` zone-${ZONES[activeNode.themeIdx % ZONES.length]}` : ' zone-default';
      }

      // --- Force Directed Graph Physics ---
      useEffect(() => {
        let rafId;
        const tick = () => {
          let updated = false;
          const nodes = nodesRef.current;
          const edges = edgesRef.current;

          // Repulsion
          for (let i = 0; i < nodes.length; i++) {
            for (let j = i + 1; j < nodes.length; j++) {
              const dx = nodes[j].x - nodes[i].x;
              const dy = nodes[j].y - nodes[i].y;
              const distSq = dx*dx + dy*dy || 1;
              const dist = Math.sqrt(distSq);
              const force = 4000 / distSq; 
              const fx = (dx / dist) * force;
              const fy = (dy / dist) * force;
              nodes[i].vx -= fx; nodes[i].vy -= fy;
              nodes[j].vx += fx; nodes[j].vy += fy;
            }
          }

          // Attraction
          edges.forEach(edge => {
            const src = nodes.find(n => n.id === edge.source);
            const tgt = nodes.find(n => n.id === edge.target);
            if (src && tgt) {
              const dx = tgt.x - src.x;
              const dy = tgt.y - src.y;
              const dist = Math.sqrt(dx*dx + dy*dy) || 1;
              const force = (dist - 140) * 0.05; 
              const fx = (dx / dist) * force;
              const fy = (dy / dist) * force;
              src.vx += fx; src.vy += fy;
              tgt.vx -= fx; tgt.vy -= fy;
            }
          });

          // Center Gravity & Integration
          nodes.forEach(n => {
            const pullStrength = n.isMain ? 0.2 : 0.005;
            n.vx += (0 - n.x) * pullStrength;
            n.vy += (0 - n.y) * pullStrength;

            n.vx *= 0.8;
            n.vy *= 0.8;

            n.x += n.vx;
            n.y += n.vy;

            if (Math.abs(n.vx) > 0.05 || Math.abs(n.vy) > 0.05) updated = true;
          });

          if (draggingNodeRef.current) {
            const d = nodes.find(n => n.id === draggingNodeRef.current.id);
            if (d) {
              d.x = draggingNodeRef.current.x;
              d.y = draggingNodeRef.current.y;
              d.vx = 0; d.vy = 0;
              updated = true;
            }
          }

          if (updated) forceRender({});
          rafId = requestAnimationFrame(tick);
        };
        rafId = requestAnimationFrame(tick);
        return () => cancelAnimationFrame(rafId);
      }, []);

      // --- Handlers ---
      const handleCanvasPointerDown = (e) => {
        if (e.target.closest('.obs-node-wrapper') || e.target.closest('.modal-overlay') || e.target.closest('.app-header')) return;
        setIsDraggingCanvas(true);
        lastMousePos.current = { x: e.clientX, y: e.clientY };
        setConnectingFrom(null);
      };

      const handleCanvasPointerMove = (e) => {
        if (connectingFrom) {
          setTempMouse({ x: e.clientX, y: e.clientY });
        }
        if (isDraggingCanvas) {
          const dx = e.clientX - lastMousePos.current.x;
          const dy = e.clientY - lastMousePos.current.y;
          setTransform(prev => ({ ...prev, x: prev.x + dx, y: prev.y + dy }));
          lastMousePos.current = { x: e.clientX, y: e.clientY };
        } else if (draggingNodeRef.current) {
          const dx = (e.clientX - lastMousePos.current.x) / transform.scale;
          const dy = (e.clientY - lastMousePos.current.y) / transform.scale;
          draggingNodeRef.current.x += dx;
          draggingNodeRef.current.y += dy;
          lastMousePos.current = { x: e.clientX, y: e.clientY };
        }
      };

      const handleCanvasPointerUp = () => {
        setIsDraggingCanvas(false);
        draggingNodeRef.current = null;
      };

      const handleWheel = (e) => {
        if (e.target.closest('.code-area')) return;
        e.preventDefault();
        const delta = e.deltaY > 0 ? 0.9 : 1.1;
        setTransform(prev => ({ ...prev, scale: Math.min(Math.max(0.3, prev.scale * delta), 2.5) }));
      };

      const handleNodePointerDown = (e, id) => {
        e.stopPropagation();
        if (connectingFrom && connectingFrom !== id) {
          if (!edgesRef.current.find(edge => edge.source === connectingFrom && edge.target === id)) {
            edgesRef.current = [...edgesRef.current, { id: 'e_' + Date.now(), source: connectingFrom, target: id }];
          }
          setConnectingFrom(null);
          return;
        }
        
        const node = nodesRef.current.find(n => n.id === id);
        draggingNodeRef.current = { id, x: node.x, y: node.y };
        lastMousePos.current = { x: e.clientX, y: e.clientY };
        dragStartPos.current = { x: e.clientX, y: e.clientY };
      };

      const handleNodePointerUp = (e, id) => {
        if (draggingNodeRef.current && draggingNodeRef.current.id === id) {
          const dist = Math.hypot(e.clientX - dragStartPos.current.x, e.clientY - dragStartPos.current.y);
          if (dist < 5) setModalNodeId(id);
        }
        draggingNodeRef.current = null;
      };

      const handleNodeContextMenu = (e, id) => {
        e.preventDefault();
        setConnectingFrom(id);
        setTempMouse({ x: e.clientX, y: e.clientY });
      };

      const updateNode = (id, field, value) => {
        const node = nodesRef.current.find(n => n.id === id);
        if (node) {
          node[field] = value;
          forceRender({});
        }
      };

      const addBlock = () => {
        const id = 'node_' + Date.now();
        const x = (0 - transform.x) / transform.scale + (Math.random() * 100 - 50);
        const y = (0 - transform.y) / transform.scale + (Math.random() * 100 - 50);
        const themeIdx = Math.floor(Math.random() * 4) + 1;
        
        nodesRef.current.push({ id, type: 'function', label: 'new_block', isMain: false, x, y, vx: 0, vy: 0, themeIdx, code: '' });
        edgesRef.current.push({ id: 'e_' + Date.now(), source: 'n1', target: id });
        forceRender({});
      };

      const drawLine = (sx, sy, tx, ty) => `M ${sx} ${sy} L ${tx} ${ty}`;

      const modalNodeObj = nodesRef.current.find(n => n.id === modalNodeId);

      return (
        <div style={{
          width: '100vw', height: '100vh',
          padding: themeMode === 'brutal' ? '40px' : '0px',
          backgroundColor: themeMode === 'brutal' ? '#ffffff' : '#050505',
          transition: 'all 0.4s ease',
          boxSizing: 'border-box'
        }}>
          <div className={wrapperClass}>
            
            <div className="app-header">
              <div className="hdr-brand">FORBINDEN // {themeMode.toUpperCase()}</div>
              <div style={{ display: 'flex', gap: '16px' }}>
                <button className="btn" onClick={addBlock}>+ ADD NODE</button>
                <button className="btn" onClick={() => setThemeMode(themeMode === 'cyber' ? 'brutal' : 'cyber')}>
                  SWITCH TO {themeMode === 'cyber' ? 'FORSAKEN' : 'OBSIDIAN'}
                </button>
              </div>
            </div>

            <div className="app-body">
              <div className="sidebar">
                <div className="strip-icon"><Icons.Files /></div>
                <div className="strip-icon"><Icons.Search /></div>
                <div className="strip-icon"><Icons.Terminal /></div>
              </div>

              <div 
                className="canvas-container"
                onPointerDown={handleCanvasPointerDown}
                onPointerMove={handleCanvasPointerMove}
                onPointerUp={handleCanvasPointerUp}
                onPointerLeave={handleCanvasPointerUp}
                onWheel={handleWheel}
              >
                <div className="canvas-bg"></div>
                <div className="graph-layer" style={{ transform: `translate(${transform.x}px, ${transform.y}px) scale(${transform.scale})` }}>
                  
                  <svg className="svg-edges">
                    {edgesRef.current.map(edge => {
                      const src = nodesRef.current.find(n => n.id === edge.source);
                      const tgt = nodesRef.current.find(n => n.id === edge.target);
                      if (!src || !tgt) return null;
                      return <path key={edge.id} className="edge-path" d={drawLine(src.x, src.y, tgt.x, tgt.y)} />
                    })}
                    {connectingFrom && (
                      <path className="edge-path active-conn" 
                        d={drawLine(
                          nodesRef.current.find(n => n.id === connectingFrom)?.x || 0,
                          nodesRef.current.find(n => n.id === connectingFrom)?.y || 0,
                          (tempMouse.x - transform.x) / transform.scale,
                          (tempMouse.y - transform.y) / transform.scale
                        )} 
                      />
                    )}
                  </svg>

                  {nodesRef.current.map(node => (
                    <div 
                      key={node.id} 
                      className={`obs-node-wrapper clr-${ZONES[node.themeIdx % ZONES.length]}`}
                      style={{ left: node.x, top: node.y, opacity: hoveredNodeId && hoveredNodeId !== node.id && !modalNodeId ? 0.3 : 1 }}
                      onPointerEnter={() => !modalNodeId && !isDraggingCanvas && setHoveredNodeId(node.id)}
                      onPointerLeave={() => !modalNodeId && setHoveredNodeId(null)}
                      onPointerDown={(e) => handleNodePointerDown(e, node.id)}
                      onPointerUp={(e) => handleNodePointerUp(e, node.id)}
                      onContextMenu={(e) => handleNodeContextMenu(e, node.id)}
                    >
                      <div className={`node-circle ${node.isMain ? 'main-node' : 'sub-node'}`}></div>
                      <div className="node-label">{node.label}</div>
                    </div>
                  ))}
                </div>
              </div>
            </div>

            <div className="status-bar">
              <span>{themeMode.toUpperCase()} ENGINE | {nodesRef.current.length} NODES</span>
              <span>ZOOM: {Math.round(transform.scale * 100)}%</span>
            </div>

            <div className={`modal-overlay ${modalNodeId ? 'open' : ''}`} onPointerDown={() => setModalNodeId(null)}>
              {modalNodeObj && (
                <div className="modal-content" onPointerDown={e => e.stopPropagation()}>
                  <div className="modal-hdr">
                    <div className="modal-hdr-title">
                      <span style={{ fontSize: '18px' }}>■</span>
                      <input className="modal-input" value={modalNodeObj.label} onChange={e => updateNode(modalNodeObj.id, 'label', e.target.value)} spellCheck="false" />
                    </div>
                    <button className="btn" onClick={() => setModalNodeId(null)}>CLOSE</button>
                  </div>
                  
                  <div className="modal-body">
                    <div className="modal-code-wrap">
                      <textarea 
                        className="code-area" 
                        value={modalNodeObj.code}
                        onChange={e => updateNode(modalNodeObj.id, 'code', e.target.value)}
                        spellCheck="false"
                        placeholder="// INSERT LOGIC..."
                      />
                    </div>
                    
                    <div className="modal-side">
                      <div className="modal-side-sec">
                        <div className="modal-side-label">CLASSIFICATION</div>
                        <select className="side-input" value={modalNodeObj.type} onChange={e => updateNode(modalNodeObj.id, 'type', e.target.value)}>
                          <option value="entry">ENTRY POINT</option>
                          <option value="function">FUNCTION</option>
                          <option value="class">CLASS DEFINITION</option>
                        </select>
                      </div>
                      <div className="modal-side-sec">
                        <div className="modal-side-label">AI ASSISTANT</div>
                        <textarea className="side-input" style={{ height: '120px', resize: 'none' }} placeholder="QUERY LOGIC..." spellCheck="false" />
                        <button className="btn" style={{ width: '100%', marginTop: '16px' }}>RUN SCAN</button>
                      </div>
                      <div className="modal-side-sec" style={{ borderBottom: 'none', marginTop: 'auto' }}>
                        <div className="modal-side-label">COLOR DESIGNATOR</div>
                        <div style={{ display: 'flex', gap: '8px', flexWrap: 'wrap' }}>
                          {ZONES.map((zone, idx) => (
                            <div 
                              key={idx} 
                              onClick={() => updateNode(modalNodeObj.id, 'themeIdx', idx)}
                              style={{ 
                                width: '24px', height: '24px', cursor: 'pointer', borderRadius: themeMode === 'cyber' ? '50%' : '0',
                                background: ZONE_COLORS[zone],
                                border: `2px solid ${modalNodeObj.themeIdx === idx ? 'var(--text)' : 'transparent'}`,
                              }} 
                            />
                          ))}
                        </div>
                      </div>
                    </div>
                  </div>
                </div>
              )}
            </div>

          </div>
        </div>
      );
    }

    function Bootloader() {
      const [theme, setTheme] = useState(null);

      if (theme) return <IDE initialTheme={theme} />;

      return (
        <div className="boot-menu">
          <div className="boot-half cyber" onClick={() => setTheme('cyber')}>
            <div style={{ fontSize: '36px', fontWeight: '700', marginBottom: '8px' }}>OBSIDIAN CORE</div>
            <div style={{ fontSize: '12px', opacity: 0.6 }}>DARK MODE // EDGE-TO-EDGE // PHYSICS ENGINE</div>
          </div>
          <div className="boot-half brutal" onClick={() => setTheme('brutal')}>
            <div style={{ fontSize: '36px', fontWeight: '900', marginBottom: '8px' }}>FORSAKEN CORE</div>
            <div style={{ fontSize: '12px', opacity: 0.6, fontWeight: '700' }}>BRUTALIST // THICK MARGINS // COLOR FLOOD</div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<Bootloader />);
  </script>
</body>
</html>
