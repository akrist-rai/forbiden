<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SYSTEM // BOOT</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css" />
    <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js"></script>
    
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

    <style>
      @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@300;400;500;700;800&display=swap");
      
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { 
        margin: 0; padding: 0; overflow: hidden; 
        background: #2b2d31; 
        font-family: "Inter", sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
      }
      
      ::-webkit-scrollbar { width: 4px; height: 4px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

      .app-frame {
        width: 100vw;
        height: 100vh;
        background-color: var(--bg);
        display: flex;
        flex-direction: column;
        overflow: hidden;
        color: var(--text-main);
        font-size: 13px;
        transition: all 0.3s ease;
      }

      body.app-loaded .app-frame {
        width: calc(100vw - 48px);
        height: calc(100vh - 48px);
        border-radius: 16px;
        box-shadow: 0 32px 80px rgba(0,0,0,0.6);
        border: 1px solid rgba(255,255,255,0.05);
      }

      .theme-synq {
        --bg: #131418; --panel: #1a1b20; --border: #2c2e36; 
        --accent: #10b981; --accent-dim: rgba(16, 185, 129, 0.2);
        --text-muted: #6b7280; --text-main: #9ca3af; --text-bright: #f3f4f6;
        --canvas-dots: rgba(255, 255, 255, 0.07);
        background-color: var(--bg); color: var(--text-main);
      }
      
      .theme-forbidden {
        --bg: #090a0f; --panel: #11141c; --border: #1e2832; 
        --accent: #e5ff00; --accent-dim: rgba(229, 255, 0, 0.15);
        --text-pale: #b0c4cf; --text-bright: #ffffff; 
        --border-bright: #b0c4cf;
        --text-main: var(--text-pale);
        --text-muted: #5e7382;
        --canvas-dots: rgba(176, 196, 207, 0.15);
        font-family: "JetBrains Mono", monospace;
        text-transform: uppercase;
        background-color: var(--bg); color: var(--text-pale);
      }

      .boot-menu { width: 100vw; height: 100vh; background: #000; color: #10b981; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 14px; font-family: "JetBrains Mono", monospace; }
      .boot-input { background: #000; border: 1px solid #10b981; color: #10b981; padding: 8px 16px; font-family: inherit; margin-bottom: 16px; width: 400px; outline: none; }
      .boot-btn { background: transparent; border: 1px solid #10b981; color: #10b981; padding: 16px 32px; font-family: inherit; font-size: 14px; cursor: pointer; transition: all 0.2s; text-align: left; width: 400px; margin-bottom: 16px; display: flex; justify-content: space-between; }
      .boot-btn:hover { background: #10b981; color: #000; }
      .boot-btn.forbidden-btn { border-color: #e5ff00; color: #e5ff00; }
      .boot-btn.forbidden-btn:hover { background: #e5ff00; color: #000; }
      
      .btn-run { background: var(--accent); color: #000; border: none; padding: 6px 16px; border-radius: 4px; font-weight: bold; cursor: pointer; font-family: inherit; font-size: 11px; }
      .btn-run:hover { opacity: 0.8; }
      .btn-ghost { background: transparent; color: var(--text-main); border: 1px solid transparent; border-radius: 4px; padding: 4px 10px; cursor: pointer; font-family: inherit; font-size: 11px; transition: all 0.2s; }
      .btn-ghost:hover { color: var(--text-bright); background: rgba(255,255,255,0.05); }

      .app-header {
        height: 44px; display: flex; align-items: center; justify-content: space-between;
        padding: 0 16px; background: var(--bg); border-bottom: 1px solid var(--border);
        font-size: 12px; font-weight: 500; z-index: 50;
      }
      .app-header-nav { display: flex; gap: 16px; color: var(--text-muted); }
      .app-header-nav span { cursor: pointer; transition: color 0.2s; }
      .app-header-nav span:hover { color: var(--text-bright); }
      .app-header-title { color: var(--text-bright); font-weight: 600; letter-spacing: 0.5px; position: absolute; left: 50%; transform: translateX(-50%); }
      .app-header-actions { display: flex; gap: 12px; align-items: center; }

      .app-body { display: flex; flex: 1; overflow: hidden; background: var(--bg); }
      
      .icon-strip {
        width: 54px; background: var(--bg); border-right: 1px solid var(--border);
        display: flex; flex-direction: column; align-items: center; padding: 12px 0; gap: 20px;
        flex-shrink: 0; z-index: 10;
      }
      .strip-icon { width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; color: var(--text-muted); cursor: pointer; border-radius: 8px; transition: all 0.2s; }
      .strip-icon:hover { color: var(--text-bright); background: rgba(255,255,255,0.05); }
      .strip-icon.active { color: var(--accent); position: relative; }
      .strip-icon.active::after { content: ''; position: absolute; left: -14px; top: 2px; bottom: 2px; width: 3px; background: var(--accent); border-radius: 0 4px 4px 0; }

      /* OBSIDIAN-LIKE VISUAL GRAPH CANVAS */
      .canvas-container {
        flex: 1; position: relative; overflow: hidden;
        background-color: var(--bg);
        background-image: radial-gradient(circle at 1px 1px, var(--canvas-dots) 1px, transparent 0);
        background-size: 24px 24px;
        cursor: grab;
      }
      .canvas-container:active { cursor: grabbing; }
      
      .graph-layer {
        position: absolute; top: 0; left: 0; width: 100%; height: 100%; transform-origin: 0 0;
        pointer-events: none; /* Let clicks pass to canvas unless on a node */
      }
      
      .svg-edges { position: absolute; top: 0; left: 0; width: 100%; height: 100%; overflow: visible; }
      .edge-path { fill: none; stroke: var(--border); stroke-width: 2px; transition: stroke 0.3s; }
      .edge-path:hover { stroke: var(--accent); stroke-width: 3px; }

      /* NODE BLOCKS */
      .node-block {
        position: absolute; width: 280px; background: var(--panel);
        border: 1px solid var(--border); border-radius: 8px;
        box-shadow: 0 16px 40px rgba(0,0,0,0.5); display: flex; flex-direction: column;
        pointer-events: auto; cursor: default;
        transition: box-shadow 0.2s, border-color 0.2s;
      }
      .node-block:hover { border-color: rgba(255,255,255,0.2); }
      .node-block.selected { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent), 0 16px 40px rgba(0,0,0,0.5); }
      
      .node-header {
        background: rgba(255,255,255,0.03); border-bottom: 1px solid var(--border);
        padding: 8px 12px; display: flex; justify-content: space-between; align-items: center;
        font-family: "JetBrains Mono", monospace; font-size: 11px; color: var(--text-bright);
        border-radius: 8px 8px 0 0; cursor: grab;
      }
      .node-header:active { cursor: grabbing; }
      
      .node-author { font-size: 9px; padding: 2px 6px; border-radius: 4px; background: rgba(255,255,255,0.1); color: var(--text-muted); }
      .node-author.me { background: var(--accent-dim); color: var(--accent); }

      .node-body {
        padding: 0; display: flex; flex-direction: column; position: relative;
      }
      
      .node-textarea {
        width: 100%; height: 100px; background: transparent; border: none;
        color: var(--text-main); font-family: "JetBrains Mono", monospace; font-size: 11px;
        padding: 10px 12px; resize: none; outline: none; line-height: 1.5;
      }
      
      /* PORTS */
      .node-port {
        position: absolute; width: 12px; height: 12px; border-radius: 50%;
        background: var(--bg); border: 2px solid var(--border);
        top: 50%; transform: translateY(-50%); z-index: 10;
      }
      .node-port.input { left: -6px; }
      .node-port.output { right: -6px; }
      .node-block.selected .node-port { border-color: var(--accent); }

      /* CLASS THREAD BINDING */
      .class-hull {
        position: absolute; border: 2px dashed var(--border); border-radius: 16px;
        background: rgba(255,255,255,0.01); pointer-events: none;
        transition: all 0.2s; z-index: 0;
      }
      .class-hull-label {
        position: absolute; top: -24px; left: 16px; font-family: "JetBrains Mono", monospace;
        font-size: 11px; color: var(--text-muted); font-weight: bold; padding: 2px 8px;
        background: var(--bg); border: 1px solid var(--border); border-radius: 4px;
      }

      .floating-tabs-container {
        position: absolute; top: 16px; left: 16px; z-index: 50;
        display: flex; gap: 8px; align-items: center; pointer-events: auto;
      }

      .right-panel {
        width: 320px; background: var(--panel); border-left: 1px solid var(--border);
        display: flex; flex-direction: column; flex-shrink: 0; z-index: 10;
      }
      .right-panel-tabs {
        display: flex; padding: 16px 20px 0; gap: 24px; font-size: 12px; color: var(--text-muted);
        border-bottom: 1px solid var(--border); margin-bottom: 16px;
      }
      .right-panel-tab { padding-bottom: 12px; cursor: pointer; position: relative; }
      .right-panel-tab.active { color: var(--text-bright); }
      .right-panel-tab.active::after { content:''; position: absolute; bottom: -1px; left: 0; right: 0; height: 2px; background: var(--accent); }

      .status-bar { 
        height: 32px; border-top: 1px solid var(--border); background: var(--bg); 
        display: flex; align-items: center; justify-content: space-between; 
        padding: 0 16px; font-size: 11px; color: var(--text-muted); flex-shrink: 0; z-index: 10;
        font-family: "JetBrains Mono", monospace;
      }
      .status-pill { padding: 2px 8px; border: 1px solid var(--border); border-radius: 12px; }
      .status-pill.ok { border-color: var(--accent); color: var(--accent); }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
      const { useState, useEffect, useRef, useMemo, useCallback } = React;

      // ─── Helpers ────────────────────────────────────────────────────────────────
      function normalizeServerBase(input) {
        const raw = (input || "").trim();
        if (!raw) return "";
        const withProtocol = /^https?:\/\//i.test(raw) ? raw : `http://${raw}`;
        return withProtocol.replace(/\/+$/, "");
      }

      function detectDefaultServer() {
        const isHttp = window.location.protocol === "http:" || window.location.protocol === "https:";
        if (isHttp && window.location.host) return window.location.host;
        return "localhost:3000";
      }

      function setCookie(name, value, days = 30) {
        const expires = new Date(Date.now() + days * 24 * 60 * 60 * 1000).toUTCString();
        document.cookie = `${name}=${encodeURIComponent(value)}; expires=${expires}; path=/; SameSite=Lax`;
      }

      function getCookie(name) {
        const key = `${name}=`;
        const parts = document.cookie.split(";").map((part) => part.trim());
        for (const part of parts) {
          if (part.startsWith(key)) return decodeURIComponent(part.slice(key.length));
        }
        return "";
      }

      const Icons = {
        Logo: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>,
        Files: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>,
        Search: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>,
        Branch: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="6" y1="3" x2="6" y2="15"/><circle cx="18" cy="6" r="3"/><circle cx="6" cy="18" r="3"/><path d="M18 9a9 9 0 0 1-9 9"/></svg>,
        Play: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polygon points="5 3 19 12 5 21 5 3"/></svg>,
        Terminal: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>,
        Network: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="2" y="2" width="20" height="8" rx="2" ry="2"/><rect x="2" y="14" width="20" height="8" rx="2" ry="2"/><line x1="6" y1="10" x2="6" y2="14"/></svg>,
        Settings: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>,
        Link: () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6M15 3h6v6M10 14L21 3"/></svg>
      };

      // ─── Initial Graph Data ──────────────────────────────────────────────────
      const INITIAL_NODES = [
        { id: 'main', type: 'entry', label: 'train.py', code: 'import torch\nfrom model import ST_Mamba\nfrom data import load_traffic_data\n\ndata = load_traffic_data()\nmodel = ST_Mamba()\nprint("Training Commute traffic model...")', x: 100, y: 250, author: 'system', classGroup: null },
        { id: 'data', type: 'function', label: 'load_traffic_data', code: 'def load_traffic_data(city="Gandhinagar"):\n    # Loading local traffic datasets\n    return TrafficDataset(city)', x: 500, y: 80, author: 'akrist', classGroup: null },
        { id: 'mamba_init', type: 'method', label: '__init__', code: 'def __init__(self):\n    super().__init__()\n    # Using GAT layer before Mamba core\n    self.gat = GATConv(64, 128)\n    self.mamba = MambaBlock()', x: 550, y: 300, author: 'akrist', classGroup: 'SpatioTemporalMamba' },
        { id: 'mamba_fwd', type: 'method', label: 'forward', code: 'def forward(self, x):\n    x = self.gat(x)\n    return self.mamba(x)', x: 550, y: 480, author: 'akrist', classGroup: 'SpatioTemporalMamba' },
        { id: 'helper', type: 'function', label: 'calculate_loss', code: 'def calculate_loss(pred, target):\n    return torch.nn.MSELoss()(pred, target)', x: 900, y: 390, author: 'collaborator', classGroup: null }
      ];

      const INITIAL_EDGES = [
        { id: 'e1', source: 'main', target: 'data' },
        { id: 'e2', source: 'main', target: 'mamba_init' },
        { id: 'e3', source: 'mamba_init', target: 'mamba_fwd' }, // Internal class thread
        { id: 'e4', source: 'mamba_fwd', target: 'helper' }
      ];

      // ─── Main IDE Component ──────────────────────────────────────────────────
      function IDE({ theme, username, serverIP }) {
        const [nodes, setNodes] = useState(INITIAL_NODES);
        const [edges, setEdges] = useState(INITIAL_EDGES);
        const [selectedNodeId, setSelectedNodeId] = useState('main');
        
        // Canvas transform state
        const [transform, setTransform] = useState({ x: 0, y: 0, scale: 1 });
        const [isDraggingCanvas, setIsDraggingCanvas] = useState(false);
        const lastMousePos = useRef({ x: 0, y: 0 });

        // Node drag state
        const [draggingNodeId, setDraggingNodeId] = useState(null);

        const [activeStrip, setActiveStrip] = useState("branch"); // Default to branch/network view
        const [rightPanelTab, setRightPanelTab] = useState("Component View");
        const [aiPrompt, setAiPrompt] = useState("");
        const [aiResponse, setAiResponse] = useState("");
        const [terminalVisible, setTerminalVisible] = useState(false);
        const terminalRef = useRef(null);
        
        useEffect(() => { document.body.classList.add("app-loaded"); }, []);

        // --- Canvas Panning & Zooming ---
        const handleCanvasPointerDown = (e) => {
          if (e.target.closest('.node-block') || e.target.closest('.floating-tabs-container')) return;
          setIsDraggingCanvas(true);
          lastMousePos.current = { x: e.clientX, y: e.clientY };
          setSelectedNodeId(null);
        };

        const handleCanvasPointerMove = (e) => {
          if (isDraggingCanvas) {
            const dx = e.clientX - lastMousePos.current.x;
            const dy = e.clientY - lastMousePos.current.y;
            setTransform(prev => ({ ...prev, x: prev.x + dx, y: prev.y + dy }));
            lastMousePos.current = { x: e.clientX, y: e.clientY };
          } else if (draggingNodeId) {
            const dx = (e.clientX - lastMousePos.current.x) / transform.scale;
            const dy = (e.clientY - lastMousePos.current.y) / transform.scale;
            setNodes(nodes.map(n => n.id === draggingNodeId ? { ...n, x: n.x + dx, y: n.y + dy } : n));
            lastMousePos.current = { x: e.clientX, y: e.clientY };
          }
        };

        const handleCanvasPointerUp = () => {
          setIsDraggingCanvas(false);
          setDraggingNodeId(null);
        };

        const handleWheel = (e) => {
          if (e.target.closest('.node-textarea')) return; // Allow scrolling text
          e.preventDefault();
          const zoomSensitivity = 0.001;
          const delta = -e.deltaY * zoomSensitivity;
          setTransform(prev => {
            const newScale = Math.min(Math.max(0.3, prev.scale + delta), 2);
            return { ...prev, scale: newScale };
          });
        };

        // --- Node Operations ---
        const handleNodePointerDown = (e, id) => {
          e.stopPropagation();
          setDraggingNodeId(id);
          setSelectedNodeId(id);
          lastMousePos.current = { x: e.clientX, y: e.clientY };
        };

        const updateNodeCode = (id, newCode) => {
          setNodes(nodes.map(n => n.id === id ? { ...n, code: newCode } : n));
        };

        const addNewNode = () => {
          const id = 'node_' + Date.now();
          const viewportCenterX = (-transform.x + window.innerWidth / 2) / transform.scale;
          const viewportCenterY = (-transform.y + window.innerHeight / 2) / transform.scale;
          
          setNodes([...nodes, { 
            id, type: 'function', label: 'new_function', code: '# Write code here', 
            x: viewportCenterX - 140, y: viewportCenterY - 75, author: username, classGroup: null 
          }]);
          setSelectedNodeId(id);
        };

        // --- Calculation for Class Hulls ---
        const classGroups = useMemo(() => {
          const groups = {};
          nodes.forEach(n => {
            if (n.classGroup) {
              if (!groups[n.classGroup]) groups[n.classGroup] = [];
              groups[n.classGroup].push(n);
            }
          });
          
          const hulls = [];
          for (const [name, nodesInGroup] of Object.entries(groups)) {
            let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
            nodesInGroup.forEach(n => {
              if (n.x < minX) minX = n.x;
              if (n.y < minY) minY = n.y;
              if (n.x > maxX) maxX = n.x;
              if (n.y > maxY) maxY = n.y;
            });
            // Padding around nodes
            hulls.push({
              name,
              x: minX - 30, y: minY - 50,
              width: (maxX - minX) + 280 + 60, // 280 is node width
              height: (maxY - minY) + 150 + 80 // 150 is approx node height
            });
          }
          return hulls;
        }, [nodes]);

        // --- Calculation for Edges ---
        const drawBezier = (sourceId, targetId) => {
          const sourceNode = nodes.find(n => n.id === sourceId);
          const targetNode = nodes.find(n => n.id === targetId);
          if (!sourceNode || !targetNode) return "";

          // Output port is right side, Input port is left side
          const sx = sourceNode.x + 280;
          const sy = sourceNode.y + 75; // Approx half height
          const tx = targetNode.x;
          const ty = targetNode.y + 75;

          const dx = Math.abs(tx - sx) * 0.5;
          return `M ${sx} ${sy} C ${sx + dx} ${sy}, ${tx - dx} ${ty}, ${tx} ${ty}`;
        };

        // --- Actions ---
        const runCode = () => {
          setTerminalVisible(true);
          // Mocking execution based on the "Commute" context
          setTimeout(() => {
            if (terminalRef.current) {
              terminalRef.current.innerHTML += `<div style="color:var(--accent)">[SYSTEM] Compiling computational graph...</div>`;
              terminalRef.current.innerHTML += `<div style="color:var(--text-bright)">Starting execution on node [train.py]</div>`;
              terminalRef.current.innerHTML += `<div style="color:var(--text-bright)">Loading local traffic datasets for Gandhinagar... OK</div>`;
              terminalRef.current.innerHTML += `<div style="color:var(--text-bright)">Initializing SpatioTemporalMamba -> GATConv -> MambaBlock</div>`;
              terminalRef.current.innerHTML += `<div style="color:var(--accent)">Training Commute traffic model...</div>`;
              terminalRef.current.innerHTML += `<div style="color:var(--text-muted)">Epoch 1/10 | Loss: 0.842 | Time: 1.2s</div>`;
            }
          }, 300);
        };

        const askAI = () => {
          if (!aiPrompt.trim()) return;
          setAiResponse("Analyzing node graph uplink...");
          setTimeout(() => {
            const contextNode = nodes.find(n => n.id === selectedNodeId);
            setAiResponse(`Regarding your architecture:\nThe graph links your entry point to the Commute dataset and the SpatioTemporalMamba model. \n\nCurrently observing node [${contextNode ? contextNode.label : 'Global'}]. PyTorch GAT + Mamba is an excellent choice for spatial-temporal flow prediction. Need help writing the backprop thread?`);
          }, 1000);
        };

        return (
          <div className={`app-frame theme-${theme}`}>
            
            {/* TOP NAVIGATION BAR */}
            <div className="app-header">
              <div style={{ display: "flex", alignItems: "center", gap: 20 }}>
                <div style={{ color: "var(--accent)", padding: "4px 6px", borderRadius: 4, background: "rgba(255,255,255,0.05)" }}>
                  <Icons.Logo />
                </div>
                <div className="app-header-nav">
                  <span>Graph</span><span>Nodes</span><span>Selection</span><span>View</span>
                  <span onClick={runCode}>Run Flow</span><span onClick={() => setTerminalVisible(!terminalVisible)}>Terminal</span>
                </div>
              </div>
              
              <div className="app-header-title">{theme === 'forbidden' ? 'FORBIDDEN // ARCHITECTURE' : 'Commute_Project.graph'}</div>
              
              <div className="app-header-actions">
                <Icons.Search />
                <Icons.Network />
                <div style={{ width: 24, height: 24, borderRadius: 12, background: "var(--accent)", display: "flex", alignItems: "center", color: "#000", fontSize: 10, fontWeight: "bold", marginLeft: 8 }}>
                  <span style={{margin:"auto"}}>{username.substring(0,1).toUpperCase() || 'S'}</span>
                </div>
              </div>
            </div>

            <div className="app-body">
              {/* LEFT ICON STRIP */}
              <div className="icon-strip">
                <div className={`strip-icon ${activeStrip === "files" ? "active" : ""}`} onClick={() => setActiveStrip("files")}><Icons.Files /></div>
                <div className={`strip-icon ${activeStrip === "search" ? "active" : ""}`} onClick={() => setActiveStrip("search")}><Icons.Search /></div>
                <div className={`strip-icon ${activeStrip === "branch" ? "active" : ""}`} onClick={() => setActiveStrip("branch")}><Icons.Branch /></div>
                <div className="strip-icon" onClick={runCode}><Icons.Play /></div>
                <div className={`strip-icon ${terminalVisible ? "active" : ""}`} onClick={() => setTerminalVisible(!terminalVisible)}><Icons.Terminal /></div>
              </div>

              {/* MIDDLE GRAPH CANVAS */}
              <div 
                className="canvas-container" 
                onPointerDown={handleCanvasPointerDown}
                onPointerMove={handleCanvasPointerMove}
                onPointerUp={handleCanvasPointerUp}
                onPointerLeave={handleCanvasPointerUp}
                onWheel={handleWheel}
              >
                
                {/* Floating Add Node Button */}
                <div className="floating-tabs-container">
                  <div className="btn-ghost" style={{ background: 'var(--panel)', padding: '6px 16px', display: 'flex', gap: 8, alignItems: 'center' }} onClick={addNewNode}>
                    <span style={{ color: 'var(--accent)', fontWeight: 'bold' }}>+</span> ADD FUNCTION BLOCK
                  </div>
                </div>

                {/* GRAPH TRANSFORM LAYER */}
                <div className="graph-layer" style={{ transform: `translate(${transform.x}px, ${transform.y}px) scale(${transform.scale})` }}>
                  
                  {/* Edges SVG */}
                  <svg className="svg-edges">
                    {edges.map(edge => (
                      <path key={edge.id} className="edge-path" d={drawBezier(edge.source, edge.target)} />
                    ))}
                  </svg>

                  {/* Class Hulls (Thread binding) */}
                  {classGroups.map(hull => (
                    <div key={hull.name} className="class-hull" style={{ left: hull.x, top: hull.y, width: hull.width, height: hull.height }}>
                      <div className="class-hull-label">class {hull.name}</div>
                    </div>
                  ))}

                  {/* Nodes */}
                  {nodes.map(node => (
                    <div 
                      key={node.id} 
                      className={`node-block ${selectedNodeId === node.id ? 'selected' : ''}`}
                      style={{ left: node.x, top: node.y }}
                      onPointerDown={(e) => handleNodePointerDown(e, node.id)}
                    >
                      <div className="node-port input" />
                      <div className="node-port output" />
                      
                      <div className="node-header">
                        <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
                          <span style={{ color: node.type === 'entry' ? 'var(--accent)' : '#3b82f6' }}>{node.type === 'entry' ? '◆' : 'ƒ'}</span>
                          <span>{node.label}</span>
                        </div>
                        <span className={`node-author ${node.author === username ? 'me' : ''}`}>{node.author}</span>
                      </div>
                      
                      <div className="node-body">
                        <textarea 
                          className="node-textarea" 
                          value={node.code}
                          onChange={(e) => updateNodeCode(node.id, e.target.value)}
                          onPointerDown={(e) => e.stopPropagation()} // Allow selecting text without dragging
                        />
                      </div>
                    </div>
                  ))}
                </div>

                {/* Floating Terminal */}
                {terminalVisible && (
                  <div style={{
                    position: "absolute", bottom: "40px", left: "5%", right: "5%", height: "220px",
                    background: "var(--panel)", border: "1px solid var(--border)", borderRadius: 12,
                    boxShadow: "0 10px 40px rgba(0,0,0,0.6)", display: "flex", flexDirection: "column", zIndex: 100
                  }}>
                    <div style={{ padding: "8px 16px", borderBottom: "1px solid var(--border)", display: "flex", justifyContent: "space-between", fontSize: 11, color: "var(--text-muted)", fontWeight: "bold" }}>
                      <span>HOST TERMINAL // EXECUTION TRACE</span>
                      <span style={{ cursor: "pointer", fontSize: 14 }} onClick={() => setTerminalVisible(false)}>×</span>
                    </div>
                    <div ref={terminalRef} style={{ flex: 1, padding: "12px", overflowY: "auto", fontFamily: '"JetBrains Mono", monospace', fontSize: 11, display: "flex", flexDirection: "column", gap: 4 }}>
                      <div style={{ color: 'var(--text-muted)' }}>Console initialized. Awaiting flow execution...</div>
                    </div>
                  </div>
                )}
              </div>

              {/* RIGHT SIDEBAR - AI Component View */}
              <div className="right-panel">
                <div className="right-panel-tabs">
                  <div className={`right-panel-tab ${rightPanelTab === "Component View" ? "active" : ""}`} onClick={() => setRightPanelTab("Component View")}>Node Props</div>
                  <div className={`right-panel-tab ${rightPanelTab === "Code View" ? "active" : ""}`} onClick={() => setRightPanelTab("Code View")}>AI Uplink</div>
                </div>

                <div style={{ flex: 1, padding: "0 20px", overflowY: "auto", display: "flex", flexDirection: "column", gap: 16 }}>
                  {rightPanelTab === "Node Props" && selectedNodeId ? (
                    <div>
                      <div style={{ fontSize: 11, fontWeight: "bold", color: "var(--text-muted)", marginBottom: 8 }}>Selected Node</div>
                      <div style={{ color: 'var(--text-bright)', fontSize: 12 }}>{nodes.find(n => n.id === selectedNodeId)?.label}</div>
                    </div>
                  ) : (
                    <>
                      <div style={{ fontSize: 11, fontWeight: "bold", color: "var(--text-muted)", textTransform: "uppercase" }}>AI Assistant</div>
                      <div style={{ background: "rgba(255,255,255,0.03)", padding: "14px", borderRadius: "8px", border: "1px solid var(--border)", fontSize: 12, lineHeight: 1.6, color: "var(--text-bright)", whiteSpace: "pre-wrap" }}>
                        {aiResponse || "Select a node block or ask a question regarding the graph architecture."}
                      </div>
                    </>
                  )}
                </div>
                
                <div style={{ padding: "16px", borderTop: "1px solid var(--border)", marginTop: "auto" }}>
                  <div style={{ display: "flex", gap: 8 }}>
                    <input 
                      value={aiPrompt} onChange={(e) => setAiPrompt(e.target.value)} 
                      onKeyDown={(e) => e.key === "Enter" && askAI()}
                      placeholder="Message AI..." 
                      style={{ flex: 1, background: "rgba(255,255,255,0.05)", border: "1px solid var(--border)", borderRadius: 6, color: "var(--text-bright)", padding: "10px 12px", outline: "none", fontSize: 12 }} 
                    />
                    <button onClick={askAI} className="btn-run" style={{ padding: "0 12px" }}>ASK</button>
                  </div>
                </div>
              </div>

            </div>

            {/* BOTTOM STATUS BAR */}
            <div className="status-bar">
              <div style={{ display: "flex", gap: 16, alignItems: "center" }}>
                <span className="status-pill ok">NETWORK SYNCED</span>
                <span>NODES: {nodes.length}</span>
                <span>EDGES: {edges.length}</span>
              </div>
              <div style={{ display: "flex", gap: 16, alignItems: "center" }}>
                <span>{selectedNodeId ? `Selected: ${nodes.find(n => n.id === selectedNodeId)?.label}` : 'Canvas Mode'}</span>
                <span>Zoom: {Math.round(transform.scale * 100)}%</span>
              </div>
            </div>
          </div>
        );
      }

      // ─── Bootloader ──────────────────────────────────────────────────────────
      function App() {
        const savedUsername = getCookie("forbiden_username");
        const savedServer = getCookie("forbiden_server");
        const savedTheme = getCookie("forbiden_theme");
        const validSavedTheme = savedTheme === "synq" || savedTheme === "forbidden" ? savedTheme : null;

        const [step, setStep] = useState(savedUsername ? 1 : 0);
        const [serverIP, setServerIP] = useState(savedServer || detectDefaultServer);
        const [username, setUsername] = useState(savedUsername || "akrist");
        const [theme, setTheme] = useState(validSavedTheme);

        useEffect(() => { if (serverIP) setCookie("forbiden_server", serverIP); }, [serverIP]);
        useEffect(() => { if (username) setCookie("forbiden_username", username); }, [username]);
        useEffect(() => { if (theme) setCookie("forbiden_theme", theme); }, [theme]);

        const handleConnect = () => {
          const normalized = username.trim();
          if (!normalized) return;
          setUsername(normalized);
          setCookie("forbiden_username", normalized);
          setCookie("forbiden_server", serverIP);
          setStep(1);
        };

        if (step === 0) {
          return (
            <div className="boot-menu">
              <div style={{ width: 400, marginBottom: 16 }}>ESTABLISHING NETWORK UPLINK...</div>
              <input className="boot-input" value={serverIP} onChange={e => setServerIP(e.target.value)} placeholder="Server (e.g., localhost:3001)" />
              <input className="boot-input" value={username} onChange={e => setUsername(e.target.value)} placeholder="Enter Ident (Username)" autoFocus onKeyDown={e => e.key === 'Enter' && handleConnect()} />
              <button className="boot-btn" onClick={handleConnect} style={{textAlign: "center", justifyContent: "center"}}>CONNECT TO HOST</button>
            </div>
          );
        }

        if (theme === null) {
          return (
            <div className="boot-menu">
              <div style={{ width: 400, marginBottom: 32 }}>NETWORK SECURED. SELECT OPERATING ENVIRONMENT:</div>
              <button className="boot-btn" onClick={() => setTheme('synq')}>
                <span>[1] SYNQIDE</span> <span>STANDARD MINIMAL</span>
              </button>
              <button className="boot-btn forbidden-btn" onClick={() => setTheme('forbidden')}>
                <span>[2] FORBIDDEN</span> <span>RESTRICTED TIER</span>
              </button>
            </div>
          );
        }

        return <IDE theme={theme} username={username} serverIP={serverIP} />;
      }

      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<App />);
    </script>
  </body>
</html>
