<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FORBINDEN // DUAL IDE</title>
  
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css" />
  <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js"></script>
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

  <style>
    @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@400;700;800&display=swap");
    
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body { 
      overflow: hidden; 
      width: 100vw; height: 100vh;
      user-select: none; font-size: 10px;
      margin: 0; background-color: #050505; 
    }

    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: currentColor; border-radius: var(--scroll-rad, 0); }

    /* =========================================
       BASE WRAPPER & VARIABLES
       ========================================= */
    .app-wrapper {
      width: 100%; height: 100%; 
      display: flex; flex-direction: column; overflow: hidden;
      background: var(--bg); color: var(--text);
      border: var(--border-w) solid var(--border);
      border-radius: var(--ui-radius, 0);
      transition: background 0.4s ease, color 0.4s ease, border-color 0.4s ease;
    }

    /* =========================================
       THEME 1: FORSAKEN (BRUTALIST)
       ========================================= */
    .theme-brutal {
      --border-w: 6px; --edge-w: 4px; --ui-radius: 0px; --inner-w: 4px;
      font-family: 'Inter', sans-serif;
      text-transform: uppercase; font-weight: 900;
      box-shadow: 20px 20px 0px var(--border);
    }
    
    /* DEFAULT ZONES */
    .theme-brutal.zone-default { --bg: #ffffff; --text: #111111; --border: #111111; --node-bg: #ffffff; }
    .theme-brutal.dark-mode.zone-default { --bg: #111111; --text: #ffffff; --border: #ffffff; --node-bg: #111111; }

    /* CUSTOM COLOR ZONES */
    .theme-brutal.zone-1       { --bg: #111111; --text: #ff435a; --border: #ff435a; --node-bg: #111111; }
    .theme-brutal.zone-2       { --bg: #7ca148; --text: #111111; --border: #111111; --node-bg: #ffc410; }
    .theme-brutal.zone-3       { --bg: #1e836d; --text: #111111; --border: #111111; --node-bg: #1e836d; }
    .theme-brutal.zone-4       { --bg: #f3f5f7; --text: #4285f4; --border: #4285f4; --node-bg: #f3f5f7; }
    .theme-brutal.zone-5       { --bg: #1e836d; --text: #28f1c3; --border: #28f1c3; --node-bg: #1e836d; }
    .theme-brutal.zone-6       { --bg: linear-gradient(135deg, #7161a4, #332b89); --text: #ff1650; --border: #ff1650; --node-bg: #332b89; }

    /* Forsaken Component Stylings */
    .theme-brutal .btn { border: 4px solid var(--text); box-shadow: 4px 4px 0 var(--border); background: var(--bg); color: var(--text); }
    .theme-brutal .btn:hover { background: var(--text); color: var(--bg); transform: translate(-2px, -2px); box-shadow: 6px 6px 0 var(--border); }
    .theme-brutal .node-circle { background: var(--node-bg); border: 4px solid var(--border); box-shadow: 4px 4px 0px var(--border); }
    .theme-brutal .node-label { background: var(--bg); color: var(--text); border: 4px solid var(--border); box-shadow: 4px 4px 0px var(--border); font-weight: 900; }
    .theme-brutal .editor-wrap { border: 6px solid var(--border); box-shadow: 8px 8px 0px var(--border); }
    .theme-brutal .modal-content { border: 6px solid var(--border); box-shadow: 20px 20px 0px var(--border); }
    .theme-brutal .panel { border-right: var(--border-w) solid var(--border); border-top: var(--border-w) solid var(--border); background: var(--bg); }
    .theme-brutal .list-item:hover { background: var(--text); color: var(--bg); }
    .theme-brutal .editor-tab { border-right: var(--inner-w) solid var(--border); background: transparent; }
    .theme-brutal .editor-tab.active { background: var(--text); color: var(--bg); }
    .theme-brutal .breadcrumb { border-bottom: var(--inner-w) solid var(--border); }

    .theme-brutal.zone-6 .code-area { background: #332b89; }
    .theme-brutal.zone-6 .side-input { background: #1a103c; }

    /* =========================================
       THEME 2: OBSIDIAN (CYBERPUNK)
       ========================================= */
    .theme-cyber {
      --bg: #0a0a0c; --text: #a1a1b8; --border: #1f1f2e;
      --border-w: 1px; --edge-w: 2px; --ui-radius: 12px; --inner-w: 1px;
      font-family: 'JetBrains Mono', monospace;
      text-transform: none; font-weight: 400;
      box-shadow: 0 0 60px rgba(0,0,0,0.8);
    }

    .theme-cyber .canvas-bg { background-image: radial-gradient(circle, rgba(255,255,255,0.05) 1px, transparent 1px); background-size: 24px 24px; }
    .theme-cyber .btn { border: 1px solid var(--border); border-radius: 4px; background: transparent; color: var(--text); font-weight: 700; }
    .theme-cyber .btn:hover { border-color: #10b981; color: #10b981; box-shadow: 0 0 10px rgba(16,185,129,0.2); }
    .theme-cyber .node-circle { border-radius: 50%; background: #0a0a0c; border: 2px solid var(--node-color, #ffffff); box-shadow: 0 0 10px var(--node-color, #ffffff); }
    .theme-cyber .node-label { background: #0a0a0c; color: #ffffff; border: 1px solid var(--border); border-radius: 4px; }
    .theme-cyber .editor-wrap { border: 1px solid var(--border); border-radius: 8px; }
    .theme-cyber .modal-content { border: 1px solid var(--border); border-radius: 12px; box-shadow: 0 20px 80px rgba(0,0,0,0.9); }
    .theme-cyber .edge-path { stroke: rgba(255,255,255,0.15); }
    .theme-cyber .panel { border-right: var(--border-w) solid var(--border); border-top: var(--border-w) solid var(--border); background: #050505; }
    .theme-cyber .list-item:hover { background: rgba(255,255,255,0.05); color: #fff; }
    .theme-cyber .editor-tab { border-right: 1px solid var(--border); border-bottom: 2px solid transparent; background: transparent; }
    .theme-cyber .editor-tab.active { border-bottom-color: #10b981; color: #ffffff; background: rgba(255,255,255,0.02); }
    .theme-cyber .breadcrumb { border-bottom: 1px solid var(--border); }

    .theme-cyber .obs-node-wrapper.clr-default { --node-color: #ffffff; }
    .theme-cyber .obs-node-wrapper.clr-1 { --node-color: #ff435a; }
    .theme-cyber .obs-node-wrapper.clr-2 { --node-color: #ffc410; }
    .theme-cyber .obs-node-wrapper.clr-3 { --node-color: #1e836d; }
    .theme-cyber .obs-node-wrapper.clr-4 { --node-color: #4285f4; }
    .theme-cyber .obs-node-wrapper.clr-5 { --node-color: #28f1c3; }
    .theme-cyber .obs-node-wrapper.clr-6 { --node-color: #ff1650; }

    /* =========================================
       IDE LAYOUT COMPONENTS
       ========================================= */
    .app-header { 
      height: 56px; display: flex; align-items: center; justify-content: space-between; 
      padding: 0 24px; border-bottom: var(--border-w) solid var(--border); 
      z-index: 50; flex-shrink: 0; background: transparent; 
    }
    .hdr-brand { font-size: 18px; letter-spacing: -0.5px; display: flex; align-items: center; gap: 12px; }

    .btn { cursor: pointer; outline: none; padding: 8px 16px; font-size: 11px; transition: all 0.2s ease; }

    .app-body { display: flex; flex: 1; min-height: 0; position: relative; }
    
    .sidebar { 
      width: 60px; border-right: var(--border-w) solid var(--border); 
      display: flex; flex-direction: column; align-items: center; 
      padding: 24px 0; gap: 24px; z-index: 20; flex-shrink: 0; 
      background: transparent; 
    }
    .strip-icon { 
      width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; 
      cursor: pointer; border: var(--inner-w) solid transparent; transition: all 0.2s; color: var(--text);
      border-radius: var(--ui-radius); position: relative;
    }
    .strip-icon.active { border-color: var(--border); }
    .badge { position: absolute; top: -4px; right: -4px; background: #ff435a; color: #fff; font-size: 8px; font-weight: bold; width: 14px; height: 14px; display: flex; align-items: center; justify-content: center; border-radius: 50%; }

    .explorer-panel {
      width: 260px; display: flex; flex-direction: column; z-index: 15;
      transition: all 0.3s ease; border-right: var(--border-w) solid var(--border);
      background: var(--bg);
    }
    .panel-hdr { padding: 16px 20px; font-size: 12px; border-bottom: var(--inner-w) solid var(--border); opacity: 0.8; font-weight: bold; display: flex; justify-content: space-between;}
    .list-item { padding: 10px 20px; cursor: pointer; display: flex; align-items: center; gap: 10px; font-size: 11px; transition: background 0.2s; border-bottom: 1px solid rgba(128,128,128,0.1); }

    .main-view { flex: 1; display: flex; flex-direction: column; position: relative; min-width: 0; }
    
    .canvas-container { flex: 1; position: relative; overflow: hidden; cursor: grab; background: transparent; }
    .canvas-container:active { cursor: grabbing; }
    .canvas-bg { position: absolute; inset: 0; pointer-events: none; z-index: 0; }
    .graph-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; transform-origin: 0 0; z-index: 1; }
    .svg-edges { position: absolute; inset: 0; width: 100%; height: 100%; overflow: visible; pointer-events: none; }
    .edge-path { fill: none; stroke-width: var(--edge-w); transition: stroke 0.4s; }
    .theme-brutal .edge-path { stroke: var(--text); }

    .terminal-panel {
      height: 200px; border-top: var(--border-w) solid var(--border);
      display: flex; flex-direction: column; background: var(--bg); z-index: 15;
    }
    .term-content { flex: 1; padding: 16px 20px; font-family: 'JetBrains Mono', monospace; font-size: 11px; overflow-y: auto; display: flex; flex-direction: column; gap: 6px; }

    .obs-node-wrapper { 
      position: absolute; display: flex; flex-direction: column; align-items: center; justify-content: center; 
      cursor: pointer; z-index: 5; transform: translate(-50%, -50%); 
      transition: opacity 0.2s ease;
    }
    .obs-node-wrapper:hover { z-index: 10; }
    .obs-node-wrapper:hover .node-circle { transform: scale(1.2); }
    .node-circle { display: flex; align-items: center; justify-content: center; transition: all 0.2s cubic-bezier(0.25, 1, 0.5, 1); }
    .node-circle.main-node { width: 32px; height: 32px; border-width: calc(var(--inner-w) * 1.5); }
    .node-circle.sub-node { width: 18px; height: 18px; }
    .node-label { margin-top: 10px; font-size: 11px; padding: 4px 10px; pointer-events: none; white-space: nowrap; transition: all 0.2s; }
    .modified-dot { width: 6px; height: 6px; background: #ffc410; border-radius: 50%; margin-left: 6px; display: inline-block; }

    .status-bar { 
      height: 32px; border-top: var(--border-w) solid var(--border); 
      display: flex; align-items: center; justify-content: space-between; 
      padding: 0 24px; font-size: 11px; flex-shrink: 0; background: transparent; 
    }
    .status-group { display: flex; gap: 20px; align-items: center; }

    /* =========================================
       89% OVERLAY MODAL (CODE EDITOR)
       ========================================= */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 1000;
      backdrop-filter: blur(10px); display: none; align-items: center; justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    
    .modal-content {
      width: 89vw; height: 89vh; 
      background: var(--bg); border-radius: var(--ui-radius);
      display: flex; flex-direction: column; overflow: hidden;
    }
    
    .tabs-hdr {
      display: flex; background: rgba(128,128,128,0.05); border-bottom: var(--border-w) solid var(--border);
      overflow-x: auto; flex-shrink: 0;
    }
    .editor-tab {
      padding: 12px 24px; display: flex; align-items: center; gap: 12px; cursor: pointer;
      font-size: 11px; transition: all 0.2s; min-width: 140px; justify-content: space-between;
    }
    .tab-close { cursor: pointer; opacity: 0.5; padding: 2px; }
    .tab-close:hover { opacity: 1; color: #ff435a; }

    .modal-body { flex: 1; display: flex; min-height: 0; }
    
    .editor-main-area { flex: 1; display: flex; flex-direction: column; border-right: var(--border-w) solid var(--border); }
    .breadcrumb { padding: 10px 24px; font-size: 10px; display: flex; align-items: center; gap: 8px; opacity: 0.7; flex-shrink: 0; }
    
    .modal-code-wrap { flex: 1; padding: 24px; display: flex; flex-direction: column; overflow: hidden; }
    .editor-wrap { flex: 1; display: flex; background: var(--bg); overflow: hidden; }
    
    .line-numbers { 
      padding: 24px 10px; background: rgba(128,128,128,0.05); color: var(--text); opacity: 0.5;
      font-family: 'JetBrains Mono', monospace; font-size: 13px; text-align: right; 
      line-height: 1.6; border-right: var(--inner-w) solid var(--border); user-select: none;
      overflow: hidden; /* Scroll synced via React ref */
    }
    .code-area { 
      flex: 1; font-family: 'JetBrains Mono', monospace; font-size: 13px; 
      padding: 24px; resize: none; outline: none; line-height: 1.6;
      background: transparent; color: var(--text); border: none; white-space: pre;
    }
    
    .modal-side { width: 320px; display: flex; flex-direction: column; background: transparent; overflow-y: auto; }
    .modal-side-sec { padding: 24px; border-bottom: var(--inner-w) solid var(--border); }
    .side-input { width: 100%; border: var(--inner-w) solid var(--text); padding: 10px; background: transparent; color: var(--text); font-family: inherit; font-size: 12px; outline: none; }
    .side-input option { color: #000; }

    /* =========================================
       COMMAND PALETTE
       ========================================= */
    .cmd-overlay {
      position: fixed; top: 20%; left: 50%; transform: translateX(-50%);
      width: 500px; background: var(--bg); border: var(--border-w) solid var(--border);
      border-radius: var(--ui-radius); box-shadow: 0 20px 60px rgba(0,0,0,0.5);
      z-index: 2000; display: none; flex-direction: column;
    }
    .theme-brutal .cmd-overlay { box-shadow: 16px 16px 0px var(--border); }
    .cmd-overlay.open { display: flex; }
    .cmd-input { width: 100%; padding: 16px 20px; background: transparent; border: none; border-bottom: var(--inner-w) solid var(--border); color: var(--text); font-family: inherit; font-size: 16px; outline: none; font-weight: bold; }
    .cmd-list { max-height: 300px; overflow-y: auto; }
    .cmd-item { padding: 12px 20px; cursor: pointer; display: flex; justify-content: space-between; font-size: 11px; border-bottom: 1px solid rgba(128,128,128,0.1); }
    .cmd-item:hover { background: var(--text); color: var(--bg); }

    /* Bootloader */
    .boot-menu { position: fixed; inset: 0; display: flex; z-index: 9999; font-family: 'JetBrains Mono', monospace; }
    .boot-half { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; transition: all 0.3s; }
    .boot-half.cyber { background: #050505; color: #10b981; border-right: 1px solid #1f1f2e; }
    .boot-half.cyber:hover { background: #0a0a0c; box-shadow: inset 0 0 80px rgba(16,185,129,0.15); }
    .boot-half.brutal { background: #FFFFFF; color: #111111; font-family: 'Inter', sans-serif; text-transform: uppercase; font-weight: 900; }
    .boot-half.brutal:hover { background: #f3f5f7; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const Icons = {
      Files: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>,
      Search: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>,
      Git: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><circle cx="18" cy="18" r="3"/><circle cx="6" cy="6" r="3"/><path d="M6 9v12"/><path d="M18 15v-2a3 3 0 0 0-3-3H9"/></svg>,
      Terminal: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>,
      FileIcon: () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/><polyline points="13 2 13 9 20 9"/></svg>
    };

    const ZONES = ['default', '1', '2', '3', '4', '5', '6'];
    const ZONE_COLORS = { 'default': '#ffffff', '1': '#ff435a', '2': '#ffc410', '3': '#1e836d', '4': '#4285f4', '5': '#1e836d', '6': 'linear-gradient(135deg, #7161a4, #332b89)' };
    const OUTSIDE_COLORS = { 'default': '#ffffff', '1': '#ffffff', '2': '#ffffff', '3': '#ffffff', '4': '#ffffff', '5': '#808080', '6': '#1a0b2e' };

    const INITIAL_NODES = [
      { id: 'n1', type: 'entry', label: 'core_sys.py', isMain: true, x: 0, y: 0, vx: 0, vy: 0, themeIdx: 0, code: 'import torch\nimport sys\n\nprint("Central Architecture Booted")\n\ndef init_sequence():\n    # Core logic entry\n    pass', modified: false },
      { id: 'n2', type: 'function', label: 'load_network.py', isMain: false, x: 100, y: -100, vx: 0, vy: 0, themeIdx: 5, code: 'def load_network():\n    return DataLoader()\n\n# Network params defined here', modified: false },
      { id: 'n3', type: 'class', label: 'DataMatrix.py', isMain: false, x: -100, y: 150, vx: 0, vy: 0, themeIdx: 6, code: 'class DataMatrix:\n    def __init__(self):\n        self.active = True\n        self.buffer = []', modified: false },
    ];
    const INITIAL_EDGES = [ { id: 'e1', source: 'n1', target: 'n2' }, { id: 'e2', source: 'n1', target: 'n3' } ];

    const DEFAULT_SERVER = (() => {
      const isHttp = window.location.protocol === "http:" || window.location.protocol === "https:";
      return isHttp ? window.location.origin : "http://localhost:3000";
    })();

    function normalizeServerUrl(raw = "") {
      const v = String(raw).trim();
      if (!v) return DEFAULT_SERVER;
      if (/^https?:\/\//i.test(v)) return v.replace(/\/+$/, "");
      return `http://${v}`.replace(/\/+$/, "");
    }

    function safeJsonParse(raw, fallback) {
      try { return JSON.parse(raw); } catch (_) { return fallback; }
    }

    function inferRunLanguage(label = "") {
      if (label.endsWith(".py")) return "python";
      if (label.endsWith(".cpp") || label.endsWith(".cc") || label.endsWith(".cxx")) return "cpp";
      return null;
    }

    function hashThemeIndex(value = "") {
      let h = 0;
      for (let i = 0; i < value.length; i++) h = ((h << 5) - h + value.charCodeAt(i)) | 0;
      return Math.abs(h) % ZONES.length;
    }

    function IDE({ initialTheme, username = "operator", serverUrl = DEFAULT_SERVER, repoUrl = "" }) {
      const [themeMode, setThemeMode] = useState(initialTheme);
      const [isBrutalDark, setIsBrutalDark] = useState(false);
      const [connectionState, setConnectionState] = useState("connecting");
      const [repoWorkspaceId, setRepoWorkspaceId] = useState("");
      const [repoName, setRepoName] = useState("");
      const [terminalLines, setTerminalLines] = useState([
        { id: "boot-1", t: "info", v: "Connecting to backend..." }
      ]);
      const [scmStatus, setScmStatus] = useState({ branch: "-", ahead: 0, behind: 0, changes: [], clean: true });
      const [scmLog, setScmLog] = useState([]);
      const [scmBranches, setScmBranches] = useState([]);
      const [scmMessage, setScmMessage] = useState("[forbiden] sync");
      const [scmBusy, setScmBusy] = useState(false);
      const [searchQuery, setSearchQuery] = useState("");
      const [aiPrompts, setAiPrompts] = useState({});
      const [aiReplies, setAiReplies] = useState({});

      const nodesRef = useRef(JSON.parse(JSON.stringify(INITIAL_NODES)));
      const edgesRef = useRef(INITIAL_EDGES);
      const socketRef = useRef(null);
      const syncTimersRef = useRef(new Map());
      const repoWorkspaceRef = useRef("");
      const [, forceRender] = useState({});

      const [transform, setTransform] = useState({ x: window.innerWidth / 2, y: window.innerHeight / 2, scale: 1 });
      const [isDraggingCanvas, setIsDraggingCanvas] = useState(false);

      const [sidebarMode, setSidebarMode] = useState("files");
      const [terminalOpen, setTerminalOpen] = useState(false);
      const [cmdOpen, setCmdOpen] = useState(false);
      const [cmdSearch, setCmdSearch] = useState("");

      const [openTabs, setOpenTabs] = useState([]);
      const [activeTabId, setActiveTabId] = useState(null);
      const [cursorPos, setCursorPos] = useState({ ln: 1, col: 1 });

      const draggingNodeRef = useRef(null);
      const [hoveredNodeId, setHoveredNodeId] = useState(null);
      const lastMousePos = useRef({ x: 0, y: 0 });

      const lineNumRef = useRef(null);
      const handleEditorScroll = (e) => {
        if (lineNumRef.current) lineNumRef.current.scrollTop = e.target.scrollTop;
      };

      const appendTerminal = (v, t = "info") => {
        setTerminalLines((prev) => [...prev.slice(-300), { id: `t-${Date.now()}-${Math.random()}`, v: String(v), t }]);
      };

      const getNodeById = (id) => nodesRef.current.find((n) => n.id === id);

      const activeTabNode = getNodeById(activeTabId);
      const repoMode = Boolean(String(repoUrl || "").trim());
      const currentActiveId = activeTabId || hoveredNodeId;
      const activeNode = getNodeById(currentActiveId);
      const activeZoneKey = activeNode ? ZONES[activeNode.themeIdx % ZONES.length] : "default";

      let wrapperClass = `app-wrapper theme-${themeMode} zone-${activeZoneKey}`;
      if (themeMode === "brutal" && isBrutalDark && activeZoneKey === "default") wrapperClass += " dark-mode";

      const outerBg = themeMode === "brutal"
        ? (isBrutalDark && activeZoneKey === "default" ? "#111111" : OUTSIDE_COLORS[activeZoneKey])
        : "#050505";

      const modifiedNodes = nodesRef.current.filter((n) => n.modified);

      useEffect(() => {
        repoWorkspaceRef.current = repoWorkspaceId;
      }, [repoWorkspaceId]);

      const normalizeGraphNode = (raw, idx, type) => ({
        id: raw.id,
        type,
        label: raw.label || raw.name || raw.path || raw.id,
        isMain: type === "entry",
        x: raw.x ?? (Math.cos(idx) * (type === "entry" ? 0 : 220 + idx * 8)),
        y: raw.y ?? (Math.sin(idx) * (type === "entry" ? 0 : 180 + idx * 6)),
        vx: 0,
        vy: 0,
        themeIdx: hashThemeIndex(raw.id),
        code: raw.code || "",
        modified: false,
        nodeKind: raw.kind || "",
        filePath: raw.path || raw.filePath || "",
        owner: raw.owner || "",
        classThreadId: raw.classThreadId || "",
        backendBlock: raw.kind === "function-block"
      });

      const applySnapshot = (snapshot) => {
        if (!snapshot || typeof snapshot !== "object") return;

        const prevMap = new Map(nodesRef.current.map((n) => [n.id, n]));
        const nextNodes = [];
        const nextEdges = [];
        let idx = 0;

        const files = Array.isArray(snapshot.files) ? snapshot.files : [];
        const blocks = Array.isArray(snapshot.blocks) ? snapshot.blocks : [];
        const classes = Array.isArray(snapshot.classes) ? snapshot.classes : [];
        const links = Array.isArray(snapshot.links) ? snapshot.links : [];

        files.forEach((f) => {
          const existing = prevMap.get(f.id);
          const node = normalizeGraphNode(
            {
              ...f,
              x: existing?.x,
              y: existing?.y,
              code: existing?.code || `// ${f.path}\n// Linked from server.js graph`
            },
            idx++,
            f.central ? "entry" : "function"
          );
          nextNodes.push(node);
        });

        blocks.forEach((b) => {
          const existing = prevMap.get(b.id);
          const node = normalizeGraphNode({ ...b, x: existing?.x, y: existing?.y }, idx++, b.classThreadId ? "class" : "function");
          node.modified = existing?.modified || false;
          nextNodes.push(node);
        });

        classes.forEach((cls) => {
          const existing = prevMap.get(cls.id);
          nextNodes.push(normalizeGraphNode({
            ...cls,
            label: cls.name,
            code: `// Class Thread\n// ${cls.name}\n// Blocks: ${cls.blockIds?.join(", ") || "none"}`,
            x: existing?.x,
            y: existing?.y
          }, idx++, "class"));
        });

        links.forEach((e) => {
          nextEdges.push({
            id: e.id || `edge-${Math.random()}`,
            source: e.from || e.source,
            target: e.to || e.target,
            label: e.label || e.kind || ""
          });
        });

        classes.forEach((cls) => {
          (cls.blockIds || []).forEach((blockId, i) => {
            nextEdges.push({ id: `bind:${cls.id}:${blockId}:${i}`, source: cls.id, target: blockId, label: "class-bind" });
          });
        });

        if (nextNodes.length) {
          nodesRef.current = nextNodes;
          edgesRef.current = nextEdges;
          setOpenTabs((tabs) => tabs.filter((id) => nextNodes.some((n) => n.id === id)));
          if (activeTabId && !nextNodes.some((n) => n.id === activeTabId)) setActiveTabId(null);
          forceRender({});
        }
      };

      const queueSyncNode = (node) => {
        if (!node || node.nodeKind === "file" || node.nodeKind === "class-thread") return;

        if (node.nodeKind === "repo-file") {
          const wsId = repoWorkspaceRef.current;
          if (!wsId || !node.repoPath) return;
          const timerMap = syncTimersRef.current;
          if (timerMap.has(node.id)) clearTimeout(timerMap.get(node.id));
          timerMap.set(node.id, setTimeout(() => {
            fetch(`${serverUrl}/api/repo/file`, {
              method: "PUT",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                workspaceId: wsId,
                path: node.repoPath,
                content: node.code || "",
                username
              })
            })
              .then((r) => r.json())
              .then((data) => {
                if (data?.ok) {
                  appendTerminal(`[REPO] Synced ${node.repoPath} to GitHub`, "success");
                  if (data.scm) setScmStatus(data.scm);
                } else {
                  appendTerminal(`[REPO] Save failed for ${node.repoPath}`, "error");
                }
              })
              .catch(() => appendTerminal(`[REPO] Save failed for ${node.repoPath}`, "error"));
          }, 350));
          return;
        }

        const timerMap = syncTimersRef.current;
        if (timerMap.has(node.id)) clearTimeout(timerMap.get(node.id));
        timerMap.set(node.id, setTimeout(() => {
          const payload = {
            id: node.id.startsWith("class:") ? undefined : node.id,
            functionName: node.label,
            filePath: node.filePath || `src/${node.label}`,
            code: node.code || "",
            owner: username,
            classThreadId: node.classThreadId || ""
          };
          if (socketRef.current?.connected) socketRef.current.emit("graph:block_upsert", payload);
          else {
            fetch(`${serverUrl}/api/graph/block`, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(payload)
            }).catch(() => {});
          }
        }, 350));
      };

      const saveAllChanges = () => {
        modifiedNodes.forEach((n) => {
          n.modified = false;
          queueSyncNode(n);
        });
        appendTerminal(`[SAVE] Synced ${modifiedNodes.length} block(s).`, "success");
        forceRender({});
      };

      const refreshScm = async () => {
        if (!repoMode || !repoWorkspaceRef.current) return;
        try {
          const [statusRes, logRes, branchRes] = await Promise.all([
            fetch(`${serverUrl}/api/repo/scm/status?workspaceId=${encodeURIComponent(repoWorkspaceRef.current)}`),
            fetch(`${serverUrl}/api/repo/scm/log?workspaceId=${encodeURIComponent(repoWorkspaceRef.current)}&limit=12`),
            fetch(`${serverUrl}/api/repo/scm/branches?workspaceId=${encodeURIComponent(repoWorkspaceRef.current)}`)
          ]);
          const statusData = await statusRes.json();
          const logData = await logRes.json();
          const branchData = await branchRes.json();
          if (statusData?.ok) setScmStatus(statusData);
          if (logData?.ok) setScmLog(logData.commits || []);
          if (branchData?.ok) setScmBranches(branchData.branches || []);
        } catch (_) {
          appendTerminal("[SCM] Unable to refresh source control state.", "warn");
        }
      };

      const runScmAction = async (fn) => {
        if (scmBusy || !repoWorkspaceRef.current) return;
        setScmBusy(true);
        try {
          await fn();
          await refreshScm();
        } catch (err) {
          appendTerminal(`[SCM] ${err.message || "Action failed."}`, "error");
        } finally {
          setScmBusy(false);
        }
      };

      const scmCommit = () => runScmAction(async () => {
        const res = await fetch(`${serverUrl}/api/repo/scm/commit`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            workspaceId: repoWorkspaceRef.current,
            message: scmMessage,
            username
          })
        });
        const data = await res.json();
        if (!res.ok || !data.ok) throw new Error(data.error || "Commit failed");
        appendTerminal(data.sync?.pushed ? `[SCM] Commit+push ${data.sync.sha || ""}` : "[SCM] Commit completed", "success");
      });

      const scmPush = () => runScmAction(async () => {
        const res = await fetch(`${serverUrl}/api/repo/scm/push`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ workspaceId: repoWorkspaceRef.current })
        });
        const data = await res.json();
        if (!res.ok || !data.ok) throw new Error(data.error || "Push failed");
        appendTerminal("[SCM] Push completed", "success");
      });

      const scmPull = () => runScmAction(async () => {
        const res = await fetch(`${serverUrl}/api/repo/scm/pull`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ workspaceId: repoWorkspaceRef.current })
        });
        const data = await res.json();
        if (!res.ok || !data.ok) throw new Error(data.error || "Pull failed");
        appendTerminal("[SCM] Pull completed", "success");
      });

      const scmCheckout = (branch) => runScmAction(async () => {
        const res = await fetch(`${serverUrl}/api/repo/scm/checkout`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ workspaceId: repoWorkspaceRef.current, branch })
        });
        const data = await res.json();
        if (!res.ok || !data.ok) throw new Error(data.error || "Checkout failed");
        appendTerminal(`[SCM] Checked out ${branch}`, "success");
      });

      const runActiveCode = async () => {
        const node = activeTabNode;
        if (!node) return;
        const lang = inferRunLanguage(node.label);
        if (!lang) {
          appendTerminal(`[RUN] Unsupported runtime for ${node.label}. Use .py or .cpp/.cc/.cxx`, "warn");
          return;
        }
        appendTerminal(`[RUN] Executing ${node.label}...`, "info");
        setTerminalOpen(true);
        try {
          const res = await fetch(`${serverUrl}/api/run`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ code: node.code || "", language: lang })
          });
          const data = await res.json();
          appendTerminal(data.output || data.error || "No output.", data.success ? "success" : "error");
        } catch (_) {
          appendTerminal("[RUN] Backend unreachable.", "error");
        }
      };

      const analyzeActiveCode = async () => {
        const node = activeTabNode;
        if (!node) return;
        const prompt = (aiPrompts[node.id] || "").trim();
        if (!prompt) {
          appendTerminal("[AI] Enter a prompt first.", "warn");
          return;
        }
        appendTerminal(`[AI] Analyzing ${node.label}...`, "info");
        try {
          const res = await fetch(`${serverUrl}/api/ai/chat`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ prompt, currentContext: node.code || "" })
          });
          const data = await res.json();
          const reply = data.response || data.error || "No AI response.";
          setAiReplies((prev) => ({ ...prev, [node.id]: reply }));
          appendTerminal(`[AI] ${reply}`, data.response ? "success" : "warn");
        } catch (_) {
          appendTerminal("[AI] Backend unavailable.", "error");
        }
      };

      const loadRepoWorkspace = async (workspaceId, displayName) => {
        const res = await fetch(`${serverUrl}/api/repo/tree?workspaceId=${encodeURIComponent(workspaceId)}`);
        const data = await res.json();
        if (!res.ok || !data.ok) throw new Error(data.error || "Failed to load repository tree.");

        const files = Array.isArray(data.files) ? data.files : [];
        const rootId = "repo:root";
        const rootNode = {
          id: rootId,
          type: "entry",
          label: displayName || "repository",
          isMain: true,
          x: 0,
          y: 0,
          vx: 0,
          vy: 0,
          themeIdx: 0,
          code: `// ${displayName || "repository"}\n// ${files.length} files loaded`,
          modified: false,
          nodeKind: "repo-root"
        };

        const fileNodes = files.map((relPath, idx) => {
          const id = `repo-file:${relPath}`;
          return {
            id,
            type: "function",
            label: relPath,
            isMain: false,
            x: Math.cos(idx * 0.35) * (200 + (idx % 10) * 14),
            y: Math.sin(idx * 0.35) * (180 + (idx % 7) * 12),
            vx: 0,
            vy: 0,
            themeIdx: hashThemeIndex(relPath),
            code: "",
            loaded: false,
            modified: false,
            nodeKind: "repo-file",
            repoPath: relPath,
            filePath: relPath
          };
        });

        nodesRef.current = [rootNode, ...fileNodes];
        edgesRef.current = fileNodes.map((n, i) => ({ id: `repo-edge:${i}:${n.id}`, source: rootId, target: n.id, label: "contains" }));
        setOpenTabs([]);
        setActiveTabId(null);
        forceRender({});
      };

      const connectRepository = async () => {
        if (!repoMode) return;
        appendTerminal(`[REPO] Connecting ${repoUrl} ...`, "info");
        const res = await fetch(`${serverUrl}/api/repo/connect`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ repoUrl })
        });
        const data = await res.json();
        if (!res.ok || !data.ok) throw new Error(data.error || "Repository connection failed.");

        setRepoWorkspaceId(data.workspaceId);
        setRepoName(`${data.repo.owner}/${data.repo.name}`);
        await loadRepoWorkspace(data.workspaceId, `${data.repo.owner}/${data.repo.name}`);
        appendTerminal(`[REPO] Ready: ${data.repo.owner}/${data.repo.name}`, "success");
        await refreshScm();
      };

      useEffect(() => {
        let mounted = true;

        if (repoMode) {
          connectRepository().catch((err) => appendTerminal(`[REPO] ${err.message}`, "error"));
        } else {
          fetch(`${serverUrl}/api/graph/state`)
            .then((r) => r.json())
            .then((data) => { if (mounted) applySnapshot(data); })
            .catch(() => appendTerminal("[GRAPH] Failed to load initial graph state.", "warn"));
        }

        if (typeof io !== "function") {
          appendTerminal("[WS] socket.io client unavailable.", "error");
          setConnectionState("error");
          return () => {};
        }

        const sock = io(serverUrl, { transports: ["websocket", "polling"] });
        socketRef.current = sock;
        setConnectionState("connecting");

        sock.on("connect", () => {
          setConnectionState("connected");
          appendTerminal("[WS] Connected to backend.", "success");
          sock.emit("graph:join", { username });
          if (!repoMode) sock.emit("graph:refresh_main");
        });
        sock.on("disconnect", () => { setConnectionState("disconnected"); appendTerminal("[WS] Disconnected.", "warn"); });
        sock.on("connect_error", () => { setConnectionState("error"); appendTerminal("[WS] Connection error.", "error"); });
        sock.on("graph:state", (snapshot) => { if (!repoMode) applySnapshot(snapshot); });
        sock.on("terminal:output", (data) => appendTerminal(String(data).replace(/\r?\n/g, " ").trim(), "info"));

        return () => {
          mounted = false;
          for (const timer of syncTimersRef.current.values()) clearTimeout(timer);
          syncTimersRef.current.clear();
          socketRef.current = null;
          sock.disconnect();
        };
      }, [serverUrl, username, repoMode, repoUrl]);

      useEffect(() => {
        const handleKeyDown = (e) => {
          const meta = e.metaKey || e.ctrlKey;
          if (meta && e.key.toLowerCase() === "k") { e.preventDefault(); setCmdOpen((p) => !p); }
          if (meta && e.key.toLowerCase() === "s") { e.preventDefault(); saveAllChanges(); }
          if (meta && e.key.toLowerCase() === "n") { e.preventDefault(); addBlock(); }
          if (meta && e.key.toLowerCase() === "p") { e.preventDefault(); setCmdOpen(true); }
          if (meta && e.key.toLowerCase() === "b") { e.preventDefault(); setSidebarMode((m) => (m === "files" ? null : "files")); }
          if (meta && e.key === "`") { e.preventDefault(); setTerminalOpen((p) => !p); }
          if (meta && e.key === "Enter") { e.preventDefault(); runActiveCode(); }
          if (meta && e.key.toLowerCase() === "f") { e.preventDefault(); setSidebarMode("search"); }
          if (meta && e.key.toLowerCase() === "w" && activeTabId) {
            e.preventDefault();
            const nextTabs = openTabs.filter((id) => id !== activeTabId);
            setOpenTabs(nextTabs);
            setActiveTabId(nextTabs[nextTabs.length - 1] || null);
          }
          if (e.key === "Escape") {
            setCmdOpen(false);
            if (!activeTabId) setHoveredNodeId(null);
          }
        };
        window.addEventListener("keydown", handleKeyDown);
        return () => window.removeEventListener("keydown", handleKeyDown);
      }, [activeTabId, openTabs, modifiedNodes.length, sidebarMode]);

      useEffect(() => {
        let rafId;
        const tick = () => {
          let updated = false;
          const nodes = nodesRef.current;
          const edges = edgesRef.current;

          for (let i = 0; i < nodes.length; i++) {
            for (let j = i + 1; j < nodes.length; j++) {
              const dx = nodes[j].x - nodes[i].x;
              const dy = nodes[j].y - nodes[i].y;
              const distSq = dx * dx + dy * dy || 1;
              const dist = Math.sqrt(distSq);
              const force = 4000 / distSq;
              nodes[i].vx -= (dx / dist) * force;
              nodes[i].vy -= (dy / dist) * force;
              nodes[j].vx += (dx / dist) * force;
              nodes[j].vy += (dy / dist) * force;
            }
          }

          edges.forEach((edge) => {
            const src = nodes.find((n) => n.id === edge.source);
            const tgt = nodes.find((n) => n.id === edge.target);
            if (!src || !tgt) return;
            const dx = tgt.x - src.x;
            const dy = tgt.y - src.y;
            const dist = Math.sqrt(dx * dx + dy * dy) || 1;
            const force = (dist - 140) * 0.05;
            src.vx += (dx / dist) * force;
            src.vy += (dy / dist) * force;
            tgt.vx -= (dx / dist) * force;
            tgt.vy -= (dy / dist) * force;
          });

          nodes.forEach((n) => {
            const pullStrength = n.isMain ? 0.2 : 0.005;
            n.vx += (0 - n.x) * pullStrength;
            n.vy += (0 - n.y) * pullStrength;
            n.vx *= 0.8;
            n.vy *= 0.8;
            n.x += n.vx;
            n.y += n.vy;
            if (Math.abs(n.vx) > 0.05 || Math.abs(n.vy) > 0.05) updated = true;
          });

          if (draggingNodeRef.current) {
            const d = nodes.find((n) => n.id === draggingNodeRef.current.id);
            if (d) {
              d.x = draggingNodeRef.current.x;
              d.y = draggingNodeRef.current.y;
              d.vx = 0;
              d.vy = 0;
              updated = true;
            }
          }

          if (updated) forceRender({});
          rafId = requestAnimationFrame(tick);
        };
        rafId = requestAnimationFrame(tick);
        return () => cancelAnimationFrame(rafId);
      }, []);

      const handleCanvasPointerDown = (e) => {
        if (e.target.closest(".obs-node-wrapper") || e.target.closest(".modal-overlay")) return;
        setIsDraggingCanvas(true);
        lastMousePos.current = { x: e.clientX, y: e.clientY };
      };
      const handleCanvasPointerMove = (e) => {
        if (isDraggingCanvas) {
          const dx = e.clientX - lastMousePos.current.x;
          const dy = e.clientY - lastMousePos.current.y;
          setTransform((prev) => ({ ...prev, x: prev.x + dx, y: prev.y + dy }));
          lastMousePos.current = { x: e.clientX, y: e.clientY };
        } else if (draggingNodeRef.current) {
          const dx = (e.clientX - lastMousePos.current.x) / transform.scale;
          const dy = (e.clientY - lastMousePos.current.y) / transform.scale;
          draggingNodeRef.current.x += dx;
          draggingNodeRef.current.y += dy;
          lastMousePos.current = { x: e.clientX, y: e.clientY };
        }
      };
      const handleCanvasPointerUp = () => {
        setIsDraggingCanvas(false);
        draggingNodeRef.current = null;
      };
      const handleWheel = (e) => {
        if (e.target.closest(".code-area")) return;
        e.preventDefault();
        setTransform((prev) => ({ ...prev, scale: Math.min(Math.max(0.3, prev.scale * (e.deltaY > 0 ? 0.9 : 1.1)), 2.5) }));
      };

      const handleNodePointerDown = (e, id) => {
        e.stopPropagation();
        const node = getNodeById(id);
        if (!node) return;
        draggingNodeRef.current = { id, x: node.x, y: node.y };
        lastMousePos.current = { x: e.clientX, y: e.clientY };
      };

      const openNodeInEditor = async (id) => {
        const node = getNodeById(id);
        if (node?.nodeKind === "repo-file" && !node.loaded && repoWorkspaceRef.current) {
          try {
            const res = await fetch(`${serverUrl}/api/repo/file?workspaceId=${encodeURIComponent(repoWorkspaceRef.current)}&path=${encodeURIComponent(node.repoPath)}`);
            const data = await res.json();
            if (res.ok && data.ok) {
              node.code = data.content || "";
              node.loaded = true;
            } else {
              appendTerminal(`[REPO] Cannot open ${node.repoPath}`, "warn");
            }
          } catch (_) {
            appendTerminal(`[REPO] Failed to open ${node.repoPath}`, "error");
          }
        }
        setOpenTabs((tabs) => (tabs.includes(id) ? tabs : [...tabs, id]));
        setActiveTabId(id);
      };

      const handleNodePointerUp = (e, id) => {
        openNodeInEditor(id);
        draggingNodeRef.current = null;
      };

      const closeTab = (e, id) => {
        e.stopPropagation();
        const newTabs = openTabs.filter((t) => t !== id);
        setOpenTabs(newTabs);
        if (activeTabId === id) setActiveTabId(newTabs.length ? newTabs[newTabs.length - 1] : null);
      };

      const updateNodeCode = (id, newCode) => {
        const node = getNodeById(id);
        if (!node) return;
        node.code = newCode;
        node.modified = true;
        queueSyncNode(node);
        forceRender({});
      };

      const updateCursorPos = (e) => {
        const text = e.target.value;
        const pos = e.target.selectionStart;
        const lines = text.substring(0, pos).split("\n");
        setCursorPos({ ln: lines.length, col: lines[lines.length - 1].length + 1 });
      };

      const getLanguage = (label) => {
        if (label.endsWith(".py")) return "Python";
        if (label.endsWith(".js") || label.endsWith(".ts")) return "JavaScript";
        if (label.endsWith(".cpp") || label.endsWith(".cc") || label.endsWith(".cxx")) return "C++";
        if (label.endsWith(".json")) return "JSON";
        return "Plain Text";
      };

      const addBlock = () => {
        if (repoMode) {
          const relPath = prompt("New file path in repo:", "src/new_file.py");
          if (!relPath) return;
          const id = `repo-file:${relPath}`;
          const existing = getNodeById(id);
          if (existing) {
            openNodeInEditor(existing.id);
            return;
          }
          const node = {
            id,
            type: "function",
            label: relPath,
            isMain: false,
            x: (0 - transform.x) / transform.scale + (Math.random() * 80 - 40),
            y: (0 - transform.y) / transform.scale + (Math.random() * 80 - 40),
            vx: 0,
            vy: 0,
            themeIdx: hashThemeIndex(relPath),
            code: "",
            loaded: true,
            modified: true,
            nodeKind: "repo-file",
            repoPath: relPath,
            filePath: relPath
          };
          nodesRef.current.push(node);
          edgesRef.current.push({ id: `repo-edge:new:${Date.now()}`, source: "repo:root", target: id, label: "contains" });
          forceRender({});
          openNodeInEditor(id);
          queueSyncNode(node);
          setCmdOpen(false);
          return;
        }

        const id = `block:${Date.now().toString(36)}:${Math.random().toString(36).slice(2, 6)}`;
        const x = (0 - transform.x) / transform.scale + (Math.random() * 100 - 50);
        const y = (0 - transform.y) / transform.scale + (Math.random() * 100 - 50);
        const themeIdx = Math.floor(Math.random() * 6) + 1;

        const node = {
          id,
          type: "function",
          label: "new_file.py",
          isMain: false,
          x,
          y,
          vx: 0,
          vy: 0,
          themeIdx,
          code: "",
          modified: true,
          nodeKind: "function-block",
          filePath: "src/new_file.py",
          owner: username,
          classThreadId: "",
          backendBlock: true
        };
        nodesRef.current.push(node);
        forceRender({});
        openNodeInEditor(id);
        queueSyncNode(node);
        setCmdOpen(false);
      };

      const drawLine = (sx, sy, tx, ty) => `M ${sx} ${sy} L ${tx} ${ty}`;

      const filteredSearch = nodesRef.current.filter((n) => {
        const q = searchQuery.trim().toLowerCase();
        if (!q) return true;
        return (n.label || "").toLowerCase().includes(q) || (n.code || "").toLowerCase().includes(q);
      });

      const commands = [
        { name: "Create New Node", action: addBlock },
        { name: "Save All (Ctrl/Cmd+S)", action: () => { saveAllChanges(); setCmdOpen(false); } },
        { name: "Run Active Block (Ctrl/Cmd+Enter)", action: () => { runActiveCode(); setCmdOpen(false); } },
        { name: "Toggle Theme (Forsaken / Obsidian)", action: () => { setThemeMode(themeMode === "cyber" ? "brutal" : "cyber"); setCmdOpen(false); } },
        { name: "Toggle Terminal", action: () => { setTerminalOpen(!terminalOpen); setCmdOpen(false); } },
        { name: "Toggle Explorer", action: () => { setSidebarMode(sidebarMode === "files" ? null : "files"); setCmdOpen(false); } },
        { name: repoMode ? "Refresh Repository" : "Refresh Main Graph", action: () => {
          if (repoMode) connectRepository().catch((err) => appendTerminal(`[REPO] ${err.message}`, "error"));
          else socketRef.current?.emit("graph:refresh_main");
          setCmdOpen(false);
        } }
      ].filter((c) => c.name.toLowerCase().includes(cmdSearch.toLowerCase()));

      return (
        <div style={{
          width: '100vw', height: '100vh', padding: themeMode === 'brutal' ? '40px' : '0px',
          backgroundColor: outerBg, transition: 'all 0.4s ease', boxSizing: 'border-box'
        }}>
          <div className={wrapperClass}>
            
            <div className="app-header">
              <div className="hdr-brand">
                <Icons.Search /> FORBINDEN // {themeMode.toUpperCase()} IDE
              </div>
              <div style={{ display: 'flex', gap: '10px', alignItems: 'center', minWidth: 0 }}>
                <input
                  className="side-input"
                  style={{ width: "300px", padding: "8px 10px" }}
                  spellCheck="false"
                  placeholder={activeTabNode ? `Ask Gemini about ${activeTabNode.label}...` : "Select a file to ask Gemini"}
                  value={activeTabNode ? (aiPrompts[activeTabNode.id] || "") : ""}
                  onChange={(e) => {
                    if (!activeTabNode) return;
                    setAiPrompts((prev) => ({ ...prev, [activeTabNode.id]: e.target.value }));
                  }}
                  onKeyDown={(e) => {
                    if (e.key === "Enter") {
                      e.preventDefault();
                      analyzeActiveCode();
                    }
                  }}
                  disabled={!activeTabNode}
                />
                <button className="btn" onClick={analyzeActiveCode} disabled={!activeTabNode}>GEMINI</button>
                <button className="btn" onClick={addBlock}>+ ADD NODE</button>
                {themeMode === 'brutal' && (
                  <button className="btn" onClick={() => setIsBrutalDark(!isBrutalDark)}>
                    {isBrutalDark ? 'LIGHT MODE' : 'DARK MODE'}
                  </button>
                )}
                <button className="btn" onClick={() => setThemeMode(themeMode === 'cyber' ? 'brutal' : 'cyber')}>
                  SWAP ENGINE
                </button>
              </div>
            </div>

            <div className="app-body">
              <div className="sidebar">
                <div className={`strip-icon ${sidebarMode === 'files' ? 'active' : ''}`} onClick={() => setSidebarMode(sidebarMode === 'files' ? null : 'files')}>
                  <Icons.Files />
                </div>
                <div className={`strip-icon ${sidebarMode === 'search' ? 'active' : ''}`} onClick={() => setSidebarMode(sidebarMode === 'search' ? null : 'search')}>
                  <Icons.Search />
                </div>
                <div className={`strip-icon ${sidebarMode === 'git' ? 'active' : ''}`} onClick={() => setSidebarMode(sidebarMode === 'git' ? null : 'git')}>
                  <Icons.Git />
                  {modifiedNodes.length > 0 && <div className="badge">{modifiedNodes.length}</div>}
                </div>
                <div style={{flex: 1}}></div>
                <div className={`strip-icon ${terminalOpen ? 'active' : ''}`} onClick={() => setTerminalOpen(!terminalOpen)}>
                  <Icons.Terminal />
                </div>
              </div>

              {sidebarMode === 'files' && (
                <div className="explorer-panel">
                  <div className="panel-hdr">EXPLORER</div>
                  <div style={{ flex: 1, overflowY: 'auto', paddingTop: '8px' }}>
                    <div style={{ padding: '0 20px', marginBottom: '8px', fontSize: '9px', opacity: 0.6, fontWeight: 'bold' }}>OPEN EDITORS</div>
                    {openTabs.map(id => {
                      const n = nodesRef.current.find(x => x.id === id);
                      return n && (
                        <div key={'open_'+n.id} className="list-item" onClick={() => setActiveTabId(id)}>
                          <span style={{opacity: activeTabId === id ? 1 : 0.5}}>▸ {n.label} {n.modified ? '●' : ''}</span>
                        </div>
                      )
                    })}
                    <div style={{ padding: '16px 20px 8px', fontSize: '9px', opacity: 0.6, fontWeight: 'bold' }}>GRAPH WORKSPACE</div>
                    {nodesRef.current.map(n => (
                      <div key={'expl_'+n.id} className="list-item" onClick={() => openNodeInEditor(n.id)}>
                        <Icons.FileIcon /> <span style={{color: n.modified ? '#ffc410' : 'inherit'}}>{n.label}</span>
                      </div>
                    ))}
                  </div>
                </div>
              )}

              {sidebarMode === "search" && (
                <div className="explorer-panel">
                  <div className="panel-hdr">SEARCH</div>
                  <div style={{ padding: "12px 16px", borderBottom: "1px solid rgba(128,128,128,0.2)" }}>
                    <input
                      className="side-input"
                      value={searchQuery}
                      onChange={(e) => setSearchQuery(e.target.value)}
                      placeholder="Find in labels and code..."
                    />
                  </div>
                  <div style={{ flex: 1, overflowY: "auto", paddingTop: "8px" }}>
                    {filteredSearch.map((n) => (
                      <div key={`search_${n.id}`} className="list-item" onClick={() => openNodeInEditor(n.id)}>
                        <Icons.FileIcon />
                        <span>{n.label}</span>
                      </div>
                    ))}
                    {!filteredSearch.length && (
                      <div style={{ padding: "20px", opacity: 0.6 }}>No matches.</div>
                    )}
                  </div>
                </div>
              )}

              {sidebarMode === 'git' && (
                <div className="explorer-panel">
                  <div className="panel-hdr">SOURCE CONTROL</div>
                  <div style={{ flex: 1, overflowY: 'auto', paddingTop: '8px' }}>
                    {repoMode ? (
                      <>
                        <div style={{ padding: '0 20px', marginBottom: '8px', fontSize: '9px', opacity: 0.8, fontWeight: 'bold' }}>
                          BRANCH {scmStatus.branch} | AHEAD {scmStatus.ahead} | BEHIND {scmStatus.behind}
                        </div>
                        <div style={{ padding: '0 20px 10px' }}>
                          <input
                            className="side-input"
                            value={scmMessage}
                            onChange={(e) => setScmMessage(e.target.value)}
                            placeholder="Commit message"
                            style={{ marginBottom: 8 }}
                          />
                          <div style={{ display: 'flex', gap: 8, marginBottom: 8 }}>
                            <button className="btn" onClick={scmCommit} disabled={scmBusy}>COMMIT+PUSH</button>
                            <button className="btn" onClick={scmPush} disabled={scmBusy}>PUSH</button>
                            <button className="btn" onClick={scmPull} disabled={scmBusy}>PULL</button>
                            <button className="btn" onClick={refreshScm} disabled={scmBusy}>REFRESH</button>
                          </div>
                          <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap' }}>
                            {scmBranches.map((b) => (
                              <button
                                key={b.name}
                                className="btn"
                                style={{ opacity: b.current ? 1 : 0.7 }}
                                onClick={() => scmCheckout(b.name)}
                                disabled={scmBusy || b.current}
                              >
                                {b.current ? `* ${b.name}` : b.name}
                              </button>
                            ))}
                          </div>
                        </div>
                        <div style={{ padding: '0 20px', marginBottom: '8px', fontSize: '9px', opacity: 0.6, fontWeight: 'bold' }}>
                          CHANGES ({scmStatus.changes?.length || 0})
                        </div>
                        {(scmStatus.changes?.length || 0) === 0 ? (
                          <div style={{padding: '20px', opacity: 0.5, fontSize: '11px'}}>Working tree clean.</div>
                        ) : (
                          (scmStatus.changes || []).map((c, idx) => (
                            <div key={`scm_${idx}_${c.path}`} className="list-item">
                              <Icons.FileIcon /> <span>{c.path}</span> <span style={{marginLeft: 'auto', opacity: 0.6}}>{c.status}</span>
                            </div>
                          ))
                        )}
                        <div style={{ padding: '16px 20px 8px', fontSize: '9px', opacity: 0.6, fontWeight: 'bold' }}>RECENT COMMITS</div>
                        {(scmLog || []).map((entry) => (
                          <div key={entry.sha} className="list-item" title={entry.sha}>
                            <span style={{ maxWidth: 170, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{entry.subject}</span>
                            <span style={{marginLeft: 'auto', opacity: 0.6}}>{entry.shortSha}</span>
                          </div>
                        ))}
                      </>
                    ) : (
                      <>
                        <div style={{ padding: '0 20px', marginBottom: '8px', fontSize: '9px', opacity: 0.6, fontWeight: 'bold' }}>CHANGES ({modifiedNodes.length})</div>
                        {modifiedNodes.length === 0 ?
                          <div style={{padding: '20px', opacity: 0.5, fontSize: '11px'}}>No uncommitted changes.</div> :
                          modifiedNodes.map(n => (
                            <div key={'git_'+n.id} className="list-item" onClick={() => openNodeInEditor(n.id)}>
                              <Icons.FileIcon /> <span style={{color: '#ffc410'}}>{n.label}</span> <span style={{marginLeft: 'auto', opacity: 0.5}}>M</span>
                            </div>
                          ))
                        }
                        {modifiedNodes.length > 0 && <div style={{padding: '20px'}}><button className="btn" style={{width:'100%'}} onClick={saveAllChanges}>COMMIT CHANGES</button></div>}
                      </>
                    )}
                  </div>
                </div>
              )}

              <div className="main-view">
                <div 
                  className="canvas-container"
                  onPointerDown={handleCanvasPointerDown} onPointerMove={handleCanvasPointerMove}
                  onPointerUp={handleCanvasPointerUp} onPointerLeave={handleCanvasPointerUp} onWheel={handleWheel}
                >
                  <div className="canvas-bg"></div>
                  <div className="graph-layer" style={{ transform: `translate(${transform.x}px, ${transform.y}px) scale(${transform.scale})` }}>
                    
                    <svg className="svg-edges">
                      {edgesRef.current.map(edge => {
                        const src = nodesRef.current.find(n => n.id === edge.source);
                        const tgt = nodesRef.current.find(n => n.id === edge.target);
                        if (!src || !tgt) return null;
                        return <path key={edge.id} className="edge-path" d={drawLine(src.x, src.y, tgt.x, tgt.y)} />
                      })}
                    </svg>

                    {nodesRef.current.map(node => (
                      <div 
                        key={node.id} 
                        className={`obs-node-wrapper clr-${ZONES[node.themeIdx % ZONES.length]}`}
                        style={{ left: node.x + 'px', top: node.y + 'px', opacity: hoveredNodeId && hoveredNodeId !== node.id && !activeTabId ? 0.3 : 1 }}
                        onPointerEnter={() => !activeTabId && !isDraggingCanvas && setHoveredNodeId(node.id)}
                        onPointerLeave={() => !activeTabId && setHoveredNodeId(null)}
                        onPointerDown={(e) => handleNodePointerDown(e, node.id)}
                        onPointerUp={(e) => handleNodePointerUp(e, node.id)}
                      >
                        <div className={`node-circle ${node.isMain ? 'main-node' : 'sub-node'}`}></div>
                        <div className="node-label">
                          {node.label}
                          {node.modified && <span className="modified-dot"></span>}
                        </div>
                      </div>
                    ))}
                  </div>
                </div>

                {terminalOpen && (
                  <div className="terminal-panel">
                    <div className="panel-hdr" style={{display:'flex', justifyContent:'space-between'}}>
                      <span>TERMINAL</span>
                      <span style={{cursor:'pointer'}} onClick={() => setTerminalOpen(false)}>✕</span>
                    </div>
                    <div className="term-content">
                      {terminalLines.map((line) => (
                        <div
                          key={line.id}
                          className="term-line"
                          style={{
                            color:
                              line.t === "error"
                                ? "#ff6666"
                                : line.t === "success"
                                  ? "#28f1c3"
                                  : line.t === "warn"
                                    ? "#ffc410"
                                    : "inherit"
                          }}
                        >
                          {line.v}
                        </div>
                      ))}
                    </div>
                  </div>
                )}
              </div>
            </div>

            <div className="status-bar">
              <div className="status-group">
                <span>{connectionState.toUpperCase()}</span>
                <span>{themeMode.toUpperCase()} ENGINE</span>
                {repoMode && <span>REPO: {repoName || repoUrl}</span>}
                <span><Icons.Git /> {repoMode ? (scmStatus.branch || "detached") : "main*"}</span>
                {(repoMode ? (scmStatus.changes?.length || 0) : modifiedNodes.length) > 0 && (
                  <span style={{color: '#ffc410'}}>
                    {repoMode ? (scmStatus.changes?.length || 0) : modifiedNodes.length} modified
                  </span>
                )}
              </div>
              <div className="status-group">
                {activeTabNode && <span>Ln {cursorPos.ln}, Col {cursorPos.col}</span>}
                <span>UTF-8</span>
                {activeTabNode && <span>{getLanguage(activeTabNode.label)}</span>}
                <span>Prettier</span>
              </div>
            </div>

            <div className={`cmd-overlay ${cmdOpen ? 'open' : ''}`}>
              <input 
                autoFocus={cmdOpen} className="cmd-input" placeholder="Type a command..." 
                value={cmdSearch} onChange={e => setCmdSearch(e.target.value)} 
              />
              <div className="cmd-list">
                {commands.map((cmd, idx) => (
                  <div key={idx} className="cmd-item" onClick={cmd.action}>
                    <span>{cmd.name}</span>
                    <span style={{opacity:0.5}}>Action</span>
                  </div>
                ))}
                {commands.length === 0 && <div className="cmd-item" style={{opacity:0.5}}>No commands found.</div>}
              </div>
            </div>

            {/* 89% EDITOR MODAL */}
            <div className={`modal-overlay ${activeTabId ? 'open' : ''}`} onPointerDown={() => setActiveTabId(null)}>
              {activeTabNode && (
                <div className="modal-content" onPointerDown={e => e.stopPropagation()}>
                  
                  <div className="tabs-hdr">
                    {openTabs.map(id => {
                      const n = nodesRef.current.find(x => x.id === id);
                      if (!n) return null;
                      return (
                        <div key={id} className={`editor-tab ${activeTabId === id ? 'active' : ''}`} onClick={() => setActiveTabId(id)}>
                          <div style={{display:'flex', alignItems:'center', gap:'8px'}}>
                            <Icons.FileIcon /> 
                            <span style={{color: n.modified ? '#ffc410' : 'inherit'}}>{n.label}</span>
                          </div>
                          <div className="tab-close" onClick={(e) => closeTab(e, id)}>✕</div>
                        </div>
                      )
                    })}
                    <div style={{flex: 1, borderBottom: '1px solid var(--border)'}}></div>
                  </div>
                  
                  <div className="modal-body">
                    <div className="editor-main-area">
                      <div className="breadcrumb">
                        <span>workspace</span> <span>{themeMode==='cyber'?'>':'/'}</span> 
                        <span>{activeTabNode.type}s</span> <span>{themeMode==='cyber'?'>':'/'}</span> 
                        <span style={{fontWeight: 'bold', color: 'var(--text)'}}>{activeTabNode.label}</span>
                      </div>
                      
                      <div className="modal-code-wrap">
                        <div className="editor-wrap">
                          <div className="line-numbers" ref={lineNumRef}>
                            {(activeTabNode.code || ' ').split('\n').map((_, i) => <div key={i}>{i + 1}</div>)}
                          </div>
                          <textarea 
                            className="code-area" 
                            value={activeTabNode.code}
                            onChange={e => updateNodeCode(activeTabNode.id, e.target.value)}
                            onKeyUp={updateCursorPos}
                            onClick={updateCursorPos}
                            onScroll={handleEditorScroll}
                            spellCheck="false"
                            placeholder="// Write implementation here..."
                          />
                        </div>
                      </div>
                    </div>
                    
                    <div className="modal-side panel">
                      <div className="modal-side-sec">
                        <div style={{marginBottom:'12px', fontSize:'12px', fontWeight:'bold'}}>FILE PROPS</div>
                        <input 
                          className="side-input" 
                          value={activeTabNode.label} 
                          onChange={e => {
                            const node = nodesRef.current.find(n => n.id === activeTabNode.id);
                            if(node) { node.label = e.target.value; node.modified = true; queueSyncNode(node); forceRender({}); }
                          }}
                          style={{marginBottom: '8px'}}
                        />
                        <select 
                          className="side-input" 
                          value={activeTabNode.type} 
                          onChange={e => {
                            const node = nodesRef.current.find(n => n.id === activeTabNode.id);
                            if(node) {
                              node.type = e.target.value;
                              node.classThreadId = e.target.value === "class" ? (node.classThreadId || node.label) : "";
                              node.modified = true;
                              queueSyncNode(node);
                              if (node.classThreadId && socketRef.current?.connected) {
                                socketRef.current.emit("graph:class_bind", { classThreadId: node.classThreadId, className: node.label, blockIds: [node.id] });
                              }
                              forceRender({});
                            }
                          }}
                        >
                          <option value="entry">Entry Point</option>
                          <option value="function">Function</option>
                          <option value="class">Class</option>
                        </select>
                      </div>
                      {aiReplies[activeTabNode.id] && (
                        <div className="modal-side-sec">
                          <div style={{marginBottom:'12px', fontSize:'12px', fontWeight:'bold'}}>GEMINI RESPONSE</div>
                          <div style={{ fontSize: "10px", opacity: 0.9, whiteSpace: "pre-wrap" }}>
                            {aiReplies[activeTabNode.id]}
                          </div>
                        </div>
                      )}
                      <div className="modal-side-sec" style={{ borderBottom: 'none', marginTop: 'auto' }}>
                        <div style={{marginBottom:'12px', fontSize:'12px', fontWeight:'bold'}}>ASSIGN COLOR ZONE</div>
                        <div style={{ display: 'flex', gap: '8px', flexWrap: 'wrap' }}>
                          {ZONES.map((zone, idx) => {
                            const isZoneDark = isBrutalDark && zone === 'default';
                            const displayColor = isZoneDark ? '#111111' : ZONE_COLORS[zone];
                            return (
                              <div 
                                key={idx} onClick={() => {
                                  const node = nodesRef.current.find(n => n.id === activeTabNode.id);
                                  if(node) { node.themeIdx = idx; node.modified = true; queueSyncNode(node); forceRender({}); }
                                }}
                                style={{ 
                                  width: '24px', height: '24px', cursor: 'pointer', borderRadius: themeMode === 'cyber' ? '50%' : '0',
                                  background: displayColor,
                                  border: `2px solid ${activeTabNode.themeIdx === idx ? 'var(--text)' : 'transparent'}`,
                                  boxShadow: themeMode==='brutal' ? '2px 2px 0px rgba(0,0,0,1)' : 'none'
                                }} 
                              />
                            );
                          })}
                        </div>
                      </div>
                    </div>
                  </div>
                </div>
              )}
            </div>

          </div>
        </div>
      );
    }

    function Bootloader() {
      const [theme, setTheme] = useState(null);
      const stored = safeJsonParse(localStorage.getItem("forbiden_boot_cfg"), {});
      const [username, setUsername] = useState(typeof stored?.username === "string" && stored.username.trim() ? stored.username.trim() : "operator");
      const [serverUrl, setServerUrl] = useState(typeof stored?.serverUrl === "string" && stored.serverUrl.trim() ? stored.serverUrl.trim() : DEFAULT_SERVER);
      const [repoUrl, setRepoUrl] = useState(typeof stored?.repoUrl === "string" ? stored.repoUrl : "");

      if (theme) {
        const normalizedServer = normalizeServerUrl(serverUrl);
        localStorage.setItem("forbiden_boot_cfg", JSON.stringify({ username, serverUrl: normalizedServer, repoUrl }));
        return <IDE initialTheme={theme} username={username} serverUrl={normalizedServer} repoUrl={repoUrl} />;
      }
      return (
        <div className="boot-menu">
          <div style={{
            position: "fixed",
            top: 16,
            left: "50%",
            transform: "translateX(-50%)",
            zIndex: 10000,
            width: "min(900px, 92vw)",
            padding: "14px",
            border: "1px solid #2a2a2a",
            background: "rgba(0,0,0,0.65)",
            display: "grid",
            gridTemplateColumns: "1fr 1fr 2fr",
            gap: "10px",
            fontFamily: "'JetBrains Mono', monospace"
          }}>
            <input
              value={username}
              onChange={(e) => setUsername(e.target.value)}
              placeholder="Username"
              style={{ padding: "10px", background: "#0a0a0a", border: "1px solid #333", color: "#ddd", fontFamily: "inherit" }}
            />
            <input
              value={serverUrl}
              onChange={(e) => setServerUrl(e.target.value)}
              placeholder="Server URL (localhost:3000)"
              style={{ padding: "10px", background: "#0a0a0a", border: "1px solid #333", color: "#ddd", fontFamily: "inherit" }}
            />
            <input
              value={repoUrl}
              onChange={(e) => setRepoUrl(e.target.value)}
              placeholder="GitHub Repo URL (optional): https://github.com/owner/repo"
              style={{ padding: "10px", background: "#0a0a0a", border: "1px solid #333", color: "#ddd", fontFamily: "inherit" }}
            />
          </div>
          <div className="boot-half cyber" onClick={() => setTheme('cyber')}>
            <div style={{ fontSize: '36px', fontWeight: '700', marginBottom: '8px' }}>OBSIDIAN CORE</div>
            <div style={{ fontSize: '12px', opacity: 0.6 }}>DARK MODE // EDGE-TO-EDGE // MODERN IDE</div>
          </div>
          <div className="boot-half brutal" onClick={() => setTheme('brutal')}>
            <div style={{ fontSize: '36px', fontWeight: '900', marginBottom: '8px' }}>FORSAKEN CORE</div>
            <div style={{ fontSize: '12px', opacity: 0.6, fontWeight: '700' }}>BRUTALIST // THICK MARGINS // COLOR FLOOD</div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<Bootloader />);
  </script>
</body>
</html>
