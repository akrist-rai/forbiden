<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FORBINDEN // DUAL IDE</title>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@400;700;800&display=swap");
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; width: 100vw; height: 100vh; user-select: none; font-size: 10px; margin: 0; background-color: #050505; font-family: 'JetBrains Mono', monospace; }
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: currentColor; border-radius: var(--scroll-rad, 0); opacity: 0.3; }
    .app-wrapper { width: 100%; height: 100%; display: flex; flex-direction: column; overflow: hidden; background: var(--bg); color: var(--text); border: var(--border-w) solid var(--border); border-radius: var(--ui-radius, 0); transition: background 0.4s ease, color 0.4s ease, border-color 0.4s ease; }

    /* BRUTAL THEME */
    .theme-brutal { --border-w: 5px; --edge-w: 3px; --ui-radius: 0px; --inner-w: 3px; font-family: 'Inter', sans-serif; text-transform: uppercase; font-weight: 900; box-shadow: 16px 16px 0px var(--border); }
    .theme-brutal.zone-default { --bg: #ffffff; --text: #111111; --border: #111111; --node-bg: #ffffff; }
    .theme-brutal.zone-1 { --bg: #111111; --text: #ff435a; --border: #ff435a; --node-bg: #111111; }
    .theme-brutal.zone-2 { --bg: #7ca148; --text: #111111; --border: #111111; --node-bg: #ffc410; }
    .theme-brutal.zone-3 { --bg: #1e836d; --text: #111111; --border: #111111; --node-bg: #1e836d; }
    .theme-brutal.zone-4 { --bg: #f3f5f7; --text: #4285f4; --border: #4285f4; --node-bg: #f3f5f7; }
    .theme-brutal.zone-5 { --bg: #1e836d; --text: #28f1c3; --border: #28f1c3; --node-bg: #1e836d; }
    .theme-brutal.zone-6 { --bg: #1a0020; --text: #ff1650; --border: #ff1650; --node-bg: #1a0020; }
    .theme-brutal .btn { border: 3px solid var(--text); box-shadow: 3px 3px 0 var(--border); background: var(--bg); color: var(--text); }
    .theme-brutal .btn:hover { background: var(--text); color: var(--bg); transform: translate(-2px, -2px); box-shadow: 5px 5px 0 var(--border); }
    .theme-brutal .node-circle { background: var(--node-bg); border: 3px solid var(--border); box-shadow: 3px 3px 0px var(--border); }
    .theme-brutal .node-label { background: var(--bg); color: var(--text); border: 3px solid var(--border); box-shadow: 3px 3px 0px var(--border); font-weight: 900; }
    .theme-brutal .editor-wrap, .theme-brutal .modal-content { border: 5px solid var(--border); box-shadow: 6px 6px 0px var(--border); }
    .theme-brutal .modal-content { box-shadow: 16px 16px 0px var(--border); }
    .theme-brutal .panel { border-right: var(--border-w) solid var(--border); border-top: var(--border-w) solid var(--border); background: var(--bg); }
    .theme-brutal .list-item:hover { background: var(--text); color: var(--bg); }
    .theme-brutal .editor-tab { border-right: var(--inner-w) solid var(--border); background: transparent; }
    .theme-brutal .editor-tab.active { background: var(--text); color: var(--bg); }
    .theme-brutal .breadcrumb { border-bottom: var(--inner-w) solid var(--border); }

    /* CYBER THEME */
    .theme-cyber { --bg: #080810; --text: #9494b0; --border: #1a1a2c; --border-w: 1px; --edge-w: 1.5px; --ui-radius: 10px; --inner-w: 1px; font-family: 'JetBrains Mono', monospace; text-transform: none; font-weight: 400; box-shadow: 0 0 80px rgba(0,0,0,0.9); }
    .theme-cyber .canvas-bg { background-image: radial-gradient(circle, rgba(255,255,255,0.04) 1px, transparent 1px); background-size: 28px 28px; }
    .theme-cyber .btn { border: 1px solid rgba(255,255,255,0.1); border-radius: 4px; background: rgba(255,255,255,0.03); color: var(--text); font-weight: 600; letter-spacing: 0.5px; }
    .theme-cyber .btn:hover { border-color: #10b981; color: #10b981; background: rgba(16,185,129,0.06); box-shadow: 0 0 14px rgba(16,185,129,0.15); }
    .theme-cyber .node-circle { border-radius: 50%; background: #080810; border: 1.5px solid var(--node-color, #ffffff); box-shadow: 0 0 10px var(--node-color, #ffffff); }
    .theme-cyber .node-label { background: rgba(8,8,16,0.9); color: #c0c0d8; border: 1px solid rgba(255,255,255,0.1); border-radius: 3px; backdrop-filter: blur(8px); }
    .theme-cyber .editor-wrap { border: 1px solid var(--border); border-radius: 8px; }
    .theme-cyber .modal-content { border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; box-shadow: 0 24px 100px rgba(0,0,0,0.95); background: #080810; }
    .theme-cyber .edge-path { stroke: rgba(255,255,255,0.12); }
    .theme-cyber .panel { border-right: var(--border-w) solid var(--border); border-top: var(--border-w) solid var(--border); background: #040408; }
    .theme-cyber .list-item:hover { background: rgba(255,255,255,0.04); color: #e0e0f0; }
    .theme-cyber .editor-tab { border-right: 1px solid var(--border); border-bottom: 2px solid transparent; background: transparent; }
    .theme-cyber .editor-tab.active { border-bottom-color: #10b981; color: #e8e8f8; background: rgba(255,255,255,0.02); }
    .theme-cyber .breadcrumb { border-bottom: 1px solid var(--border); }
    .theme-cyber .obs-node-wrapper.clr-default { --node-color: #8888aa; }
    .theme-cyber .obs-node-wrapper.clr-1 { --node-color: #ff435a; }
    .theme-cyber .obs-node-wrapper.clr-2 { --node-color: #ffc410; }
    .theme-cyber .obs-node-wrapper.clr-3 { --node-color: #1e836d; }
    .theme-cyber .obs-node-wrapper.clr-4 { --node-color: #4285f4; }
    .theme-cyber .obs-node-wrapper.clr-5 { --node-color: #28f1c3; }
    .theme-cyber .obs-node-wrapper.clr-6 { --node-color: #ff1650; }

    /* LAYOUT */
    .app-header { height: 48px; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; border-bottom: var(--border-w) solid var(--border); z-index: 50; flex-shrink: 0; background: var(--bg); }
    .hdr-brand { font-size: 15px; letter-spacing: 1px; display: flex; align-items: center; gap: 10px; font-family: 'Inter', sans-serif; font-weight: 900; }
    .hdr-brand-sep { opacity: 0.25; }
    .hdr-breadcrumb { font-size: 10px; opacity: 0.4; display: flex; align-items: center; gap: 6px; }
    .btn { cursor: pointer; outline: none; padding: 7px 14px; font-size: 10px; transition: all 0.18s ease; font-family: inherit; letter-spacing: 0.5px; }
    .app-body { display: flex; flex: 1; min-height: 0; position: relative; overflow: hidden; }
    .sidebar { width: 52px; border-right: var(--border-w) solid var(--border); display: flex; flex-direction: column; align-items: center; padding: 20px 0; gap: 6px; z-index: 200; flex-shrink: 0; background: var(--bg); position: relative; }
    .strip-icon { width: 34px; height: 34px; display: flex; align-items: center; justify-content: center; cursor: pointer; border: var(--inner-w) solid transparent; transition: all 0.2s; color: var(--text); border-radius: var(--ui-radius); position: relative; opacity: 0.55; }
    .strip-icon:hover { opacity: 1; }
    .strip-icon.active { border-color: var(--border); background: rgba(128,128,128,0.1); opacity: 1; }
    .strip-icon-tooltip { position: absolute; left: 48px; top: 50%; transform: translateY(-50%); background: #111; color: #fff; font-size: 9px; padding: 3px 8px; border-radius: 3px; white-space: nowrap; pointer-events: none; opacity: 0; transition: opacity 0.15s; z-index: 1000; letter-spacing: 0.5px; }
    .strip-icon:hover .strip-icon-tooltip { opacity: 1; }
    .badge { position: absolute; top: -3px; right: -3px; background: #ff435a; color: #fff; font-size: 8px; font-weight: bold; width: 13px; height: 13px; display: flex; align-items: center; justify-content: center; border-radius: 50%; }
    .floating-panel { position: absolute; display: flex; flex-direction: column; background: var(--bg); border: var(--border-w) solid var(--border); border-radius: var(--ui-radius); transition: box-shadow 0.2s; }
    .theme-brutal .floating-panel { box-shadow: 6px 6px 0px var(--border); }
    .theme-cyber .floating-panel { box-shadow: 0 12px 50px rgba(0,0,0,0.7); border-color: rgba(255,255,255,0.07); }
    .panel-hdr { padding: 10px 14px; font-size: 10px; border-bottom: var(--inner-w) solid var(--border); opacity: 0.9; font-weight: bold; display: flex; justify-content: space-between; align-items: center; background: rgba(128,128,128,0.04); letter-spacing: 0.8px; }
    .panel-content-wrap { flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; }
    .panel-resizer { position: absolute; bottom: 0; right: 0; width: 18px; height: 18px; cursor: nwse-resize; background: linear-gradient(135deg, transparent 50%, var(--text) 50%); opacity: 0.15; transition: opacity 0.2s; }
    .panel-resizer:hover { opacity: 0.6; }
    .list-item { padding: 8px 14px; cursor: pointer; display: flex; align-items: center; gap: 8px; font-size: 10px; transition: background 0.15s; border-bottom: 1px solid rgba(128,128,128,0.07); }
    .list-item-sub { font-size: 9px; opacity: 0.4; margin-left: auto; }
    .main-view { flex: 1; display: flex; flex-direction: column; position: relative; min-width: 0; }
    .canvas-container { flex: 1; position: relative; overflow: hidden; cursor: grab; background: transparent; }
    .canvas-container:active { cursor: grabbing; }
    .canvas-bg { position: absolute; inset: 0; pointer-events: none; z-index: 0; }
    .graph-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; transform-origin: 0 0; z-index: 1; }
    .svg-edges { position: absolute; inset: 0; width: 100%; height: 100%; overflow: visible; pointer-events: none; }
    .edge-path { fill: none; stroke-width: var(--edge-w); transition: stroke 0.4s; }
    .theme-brutal .edge-path { stroke: var(--text); opacity: 0.6; }
    .term-content { flex: 1; padding: 14px; font-family: 'JetBrains Mono', monospace; font-size: 11px; overflow-y: auto; display: flex; flex-direction: column; gap: 4px; }
    .obs-node-wrapper { position: absolute; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; z-index: 5; transform: translate(-50%, -50%); transition: opacity 0.2s ease; }
    .obs-node-wrapper:hover { z-index: 10; }
    .obs-node-wrapper:hover .node-circle { transform: scale(1.25); }
    .node-circle { display: flex; align-items: center; justify-content: center; transition: all 0.25s cubic-bezier(0.25, 1, 0.5, 1); }
    .node-circle.main-node { width: 30px; height: 30px; border-width: calc(var(--inner-w) * 1.5); }
    .node-circle.sub-node { width: 16px; height: 16px; }
    .node-label { margin-top: 9px; font-size: 10px; padding: 3px 9px; pointer-events: none; white-space: nowrap; transition: all 0.2s; }
    .modified-dot { width: 5px; height: 5px; background: #ffc410; border-radius: 50%; margin-left: 5px; display: inline-block; vertical-align: middle; }

    /* STATUS BAR */
    .status-bar { height: 26px; border-top: var(--border-w) solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 18px; font-size: 10px; flex-shrink: 0; background: var(--bg); z-index: 200; position: relative; opacity: 0.85; }
    .status-group { display: flex; gap: 16px; align-items: center; }
    .status-dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; margin-right: 4px; }

    /* EDITOR MODAL */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 1000; backdrop-filter: blur(12px); display: none; align-items: center; justify-content: center; }
    .modal-overlay.open { display: flex; }
    .modal-content { width: 90vw; height: 90vh; background: var(--bg); border-radius: var(--ui-radius); display: flex; flex-direction: column; overflow: hidden; }
    .tabs-hdr { display: flex; background: rgba(0,0,0,0.15); border-bottom: var(--border-w) solid var(--border); overflow-x: auto; flex-shrink: 0; }
    .editor-tab { padding: 10px 20px; display: flex; align-items: center; gap: 10px; cursor: pointer; font-size: 10px; transition: all 0.18s; min-width: 130px; justify-content: space-between; white-space: nowrap; }
    .tab-close { cursor: pointer; opacity: 0.4; padding: 2px 4px; border-radius: 2px; }
    .tab-close:hover { opacity: 1; color: #ff435a; background: rgba(255,67,90,0.1); }
    .modal-body { flex: 1; display: flex; min-height: 0; }
    .editor-main-area { flex: 1; display: flex; flex-direction: column; min-width: 0; }

    /* CODE EDITOR */
    .editor-toolbar { display: flex; align-items: center; gap: 3px; padding: 5px 10px; border-bottom: var(--inner-w) solid var(--border); background: rgba(0,0,0,0.12); flex-shrink: 0; flex-wrap: nowrap; overflow-x: auto; }
    .editor-toolbar-btn { cursor: pointer; padding: 4px 9px; font-size: 10px; border: 1px solid rgba(128,128,128,0.15); background: transparent; color: var(--text); font-family: inherit; border-radius: 3px; transition: all 0.15s; display: flex; align-items: center; gap: 4px; opacity: 0.7; white-space: nowrap; letter-spacing: 0.3px; }
    .editor-toolbar-btn:hover { opacity: 1; background: rgba(128,128,128,0.08); border-color: rgba(128,128,128,0.35); }
    .editor-toolbar-btn.active { opacity: 1; color: #10b981; border-color: rgba(16,185,129,0.4); background: rgba(16,185,129,0.06); }
    .editor-toolbar-sep { width: 1px; height: 14px; background: rgba(128,128,128,0.2); margin: 0 3px; flex-shrink: 0; }
    .editor-find-bar { padding: 5px 10px; border-bottom: var(--inner-w) solid var(--border); display: flex; gap: 6px; align-items: center; background: rgba(0,0,0,0.1); flex-shrink: 0; }
    .editor-find-bar input { flex: 1; background: rgba(128,128,128,0.06); border: 1px solid rgba(128,128,128,0.2); color: var(--text); font-family: inherit; font-size: 11px; padding: 4px 8px; outline: none; border-radius: 3px; min-width: 80px; }
    .editor-find-bar input:focus { border-color: rgba(16,185,129,0.6); background: rgba(16,185,129,0.03); }
    .editor-status-strip { display: flex; align-items: center; gap: 14px; padding: 3px 14px; border-top: var(--inner-w) solid var(--border); font-size: 10px; opacity: 0.55; flex-shrink: 0; background: rgba(0,0,0,0.1); }
    .code-area { flex: 1; font-family: 'JetBrains Mono', monospace; font-size: 13px; padding: 20px 14px; resize: none; outline: none; line-height: 1.65; background: transparent; color: transparent; border: none; white-space: pre; tab-size: 2; caret-color: #10b981; }
    .code-highlight-overlay { position: absolute; inset: 0; padding: 20px 14px; font-family: 'JetBrains Mono', monospace; font-size: 13px; line-height: 1.65; white-space: pre; pointer-events: none; overflow: hidden; }
    .line-numbers { padding: 20px 12px 20px 8px; background: rgba(0,0,0,0.1); font-family: 'JetBrains Mono', monospace; font-size: 13px; text-align: right; line-height: 1.65; border-right: 1px solid rgba(128,128,128,0.1); user-select: none; overflow: hidden; min-width: 44px; flex-shrink: 0; display: flex; flex-direction: column; }
    .line-num { transition: color 0.1s; }
    .active-line-highlight { background: rgba(255,255,255,0.025); position: absolute; left: 0; right: 0; pointer-events: none; border-left: 2px solid rgba(16,185,129,0.4); }
    .code-panel-info { width: 200px; flex-shrink: 0; border-left: var(--border-w) solid var(--border); display: flex; flex-direction: column; overflow: hidden; background: rgba(0,0,0,0.08); }
    .code-panel-info-hdr { padding: 8px 12px; font-size: 9px; font-weight: bold; opacity: 0.4; border-bottom: 1px solid rgba(128,128,128,0.1); letter-spacing: 1.5px; }
    .code-panel-info-body { flex: 1; overflow-y: auto; padding: 10px 12px; font-size: 10px; line-height: 1.8; display: flex; flex-direction: column; gap: 14px; }
    .info-section-title { font-size: 9px; opacity: 0.35; letter-spacing: 1.2px; margin-bottom: 5px; text-transform: uppercase; }
    .stat-row { display: flex; align-items: center; justify-content: space-between; padding: 3px 0; border-bottom: 1px solid rgba(128,128,128,0.06); }
    .stat-label { opacity: 0.45; font-size: 9px; }
    .stat-val { font-size: 10px; font-weight: bold; }

    /* Syntax highlight */
    .editor-palette-scope .syn-keyword  { color: var(--syn-kw); font-weight: 500; }
    .editor-palette-scope .syn-string   { color: var(--syn-str); }
    .editor-palette-scope .syn-comment  { color: var(--syn-cmt); font-style: italic; }
    .editor-palette-scope .syn-number   { color: var(--syn-num); }
    .editor-palette-scope .syn-function { color: var(--syn-fn); }
    .editor-palette-scope .syn-builtin  { color: var(--syn-bi); }
    .editor-palette-scope .syn-operator { color: var(--syn-op); }

    /* Palette picker */
    .palette-dropdown { position: absolute; top: calc(100% + 6px); left: 0; z-index: 9000;
      background: #0a0a0e; border: 1px solid rgba(255,255,255,0.1); border-radius: 6px;
      padding: 8px; display: grid; grid-template-columns: 1fr 1fr; gap: 4px; min-width: 260px;
      box-shadow: 0 16px 50px rgba(0,0,0,0.85); }
    .palette-option { display: flex; align-items: center; gap: 7px; padding: 6px 8px;
      cursor: pointer; border-radius: 3px; border: 1px solid transparent; transition: all 0.15s; }
    .palette-option:hover { background: rgba(255,255,255,0.04); border-color: rgba(255,255,255,0.08); }
    .palette-option.active { border-color: rgba(255,255,255,0.18); background: rgba(255,255,255,0.06); }
    .palette-swatches { display: flex; gap: 3px; }
    .palette-swatch { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .palette-name { font-size: 10px; font-family: 'JetBrains Mono', monospace; }

    /* Toast */
    .copy-toast { position: fixed; bottom: 52px; left: 50%; transform: translateX(-50%); background: #10b981; color: #000; padding: 7px 18px; font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: bold; z-index: 9999; pointer-events: none; border-radius: 2px; animation: toastIn 0.2s ease, toastOut 0.3s ease 1.5s forwards; letter-spacing: 0.5px; }
    @keyframes toastIn { from { opacity: 0; transform: translateX(-50%) translateY(8px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
    @keyframes toastOut { from { opacity: 1; } to { opacity: 0; } }

    /* CREATE MODALS */
    .create-modal { position:fixed; inset:0; background:rgba(0,0,0,0.88); z-index:2000; display:flex; align-items:center; justify-content:center; backdrop-filter:blur(14px); }
    .create-modal-box { background:#090910; border:1px solid rgba(255,255,255,0.1); border-radius:8px; padding:28px; width:400px; display:flex; flex-direction:column; gap:18px; box-shadow:0 28px 90px rgba(0,0,0,0.95); max-height:90vh; overflow-y:auto; }
    .create-modal-title { font-size:12px; font-weight:bold; letter-spacing:2px; opacity:0.9; }
    .create-modal-field { display:flex; flex-direction:column; gap:5px; }
    .create-modal-label { font-size:9px; opacity:0.4; letter-spacing:1.2px; text-transform: uppercase; }
    .create-modal-input { background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.12); color:#e0e0f0; font-family:'JetBrains Mono',monospace; font-size:12px; padding:9px 12px; outline:none; border-radius:4px; transition:border-color 0.2s; }
    .create-modal-input:focus { border-color:rgba(16,185,129,0.6); background: rgba(16,185,129,0.03); }
    .type-grid { display:grid; grid-template-columns:1fr 1fr 1fr; gap:6px; }
    .type-btn { padding:9px 8px; border:1px solid rgba(255,255,255,0.1); background:transparent; color:rgba(255,255,255,0.5); font-family:'JetBrains Mono',monospace; font-size:10px; cursor:pointer; border-radius:3px; transition:all 0.15s; text-align:center; }
    .type-btn.selected { border-color:#10b981; color:#10b981; background:rgba(16,185,129,0.07); }
    .color-grid { display:flex; gap:6px; }
    .color-dot-btn { width:22px; height:22px; border-radius:50%; border:2px solid transparent; cursor:pointer; transition:all 0.15s; flex-shrink:0; }
    .color-dot-btn.selected { border-color:#fff; transform:scale(1.25); }
    .create-modal-actions { display:flex; gap:8px; padding-top:2px; }

    /* BOARD */
    .board-wrap { display:flex; flex-direction:column; flex:1; overflow:hidden; min-height:0; position:relative; }
    .board-topbar { display:flex; align-items:center; gap:8px; padding:8px 14px; border-bottom:1px solid rgba(128,128,128,0.12); flex-shrink:0; }
    .board-meta { font-size:9px; opacity:0.4; margin-left:auto; display:flex; gap:14px; }
    .board-cols { display:flex; flex:1; overflow-x:auto; padding:12px; gap:10px; align-items:flex-start; min-height:0; }
    .board-col { width:210px; flex-shrink:0; display:flex; flex-direction:column; gap:6px; }
    .board-col-hdr { display:flex; align-items:center; justify-content:space-between; padding:5px 10px; border-radius:3px; font-size:10px; font-weight:bold; letter-spacing:0.8px; }
    .board-col-count { background:rgba(128,128,128,0.12); padding:1px 6px; border-radius:8px; font-size:9px; }
    .board-card { background:rgba(255,255,255,0.02); border:1px solid rgba(128,128,128,0.12); border-radius:5px; padding:10px; display:flex; flex-direction:column; gap:6px; cursor:pointer; transition:all 0.15s; position:relative; overflow:hidden; }
    .board-card:hover { border-color:rgba(255,255,255,0.15); background:rgba(255,255,255,0.04); transform:translateY(-1px); box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
    .board-card-accent { position:absolute; left:0; top:0; bottom:0; width:2.5px; }
    .board-card-title { font-size:10px; line-height:1.5; padding-left:8px; }
    .board-card-tags { display:flex; flex-wrap:wrap; gap:3px; padding-left:8px; }
    .board-tag { font-size:9px; padding:1px 6px; border-radius:8px; letter-spacing:0.3px; border:1px solid transparent; }
    .board-card-footer { display:flex; align-items:center; gap:6px; padding-left:8px; font-size:9px; opacity:0.45; }
    .board-priority { font-size:8px; font-weight:bold; padding:1px 5px; border-radius:2px; letter-spacing:0.5px; }
    .board-progress { height:2px; background:rgba(128,128,128,0.15); border-radius:2px; overflow:hidden; margin:0 8px; }
    .board-progress-bar { height:100%; border-radius:2px; transition:width 0.4s; }
    .board-add-card { border:1px dashed rgba(128,128,128,0.18); border-radius:5px; padding:9px; text-align:center; font-size:9px; opacity:0.35; cursor:pointer; transition:all 0.15s; }
    .board-add-card:hover { opacity:0.7; border-color:rgba(255,255,255,0.25); }
    .card-detail-overlay { position:absolute; inset:0; background:rgba(0,0,0,0.8); z-index:50; display:flex; align-items:center; justify-content:center; backdrop-filter:blur(8px); }
    .card-detail-box { background:#0a0a12; border:1px solid rgba(255,255,255,0.1); border-radius:6px; width:320px; padding:22px; display:flex; flex-direction:column; gap:14px; max-height:88%; overflow-y:auto; }

    /* Chat */
    .chat-wrap { display: flex; flex-direction: column; flex: 1; overflow: hidden; }
    .chat-messages { flex: 1; padding: 12px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
    .chat-msg { padding: 9px 12px; border-radius: 4px; font-size: 11px; line-height: 1.5; }
    .chat-msg.self { background: rgba(16,185,129,0.07); border-left: 2px solid #10b981; }
    .chat-msg.other { background: rgba(128,128,128,0.05); border-left: 2px solid rgba(128,128,128,0.3); }
    .chat-input-wrap { padding: 10px 12px; border-top: var(--inner-w) solid var(--border); display: flex; gap: 6px; }

    /* NLE */
    .nle-wrap { flex: 1; display: flex; flex-direction: column; background: var(--bg); overflow: hidden; position: relative; }
    .nle-ruler { height: 22px; border-bottom: var(--inner-w) solid var(--border); display: flex; align-items: flex-end; position: sticky; top: 0; background: rgba(0,0,0,0.12); z-index: 10; overflow: hidden; }
    .nle-ruler-tick { position: absolute; height: 7px; border-left: 1px solid var(--text); opacity: 0.3; font-size: 9px; padding-left: 3px; bottom: 0; }
    .nle-ruler-tick.major { height: 11px; opacity: 0.7; font-weight: bold; }
    .nle-body { flex: 1; display: flex; overflow: auto; position: relative; }
    .nle-track-headers { width: 130px; flex-shrink: 0; border-right: var(--inner-w) solid var(--border); position: sticky; left: 0; background: var(--bg); z-index: 20; display: flex; flex-direction: column; }
    .nle-track-header { height: 44px; display: flex; align-items: center; padding: 0 10px; font-size: 9px; font-weight: bold; border-bottom: 1px solid rgba(128,128,128,0.15); justify-content: space-between; opacity: 0.7; }
    .nle-tracks { flex: 1; display: flex; flex-direction: column; position: relative; min-width: 1200px; background: repeating-linear-gradient(90deg, transparent, transparent 49px, rgba(128,128,128,0.04) 49px, rgba(128,128,128,0.04) 50px); }
    .nle-track-lane { height: 44px; border-bottom: 1px solid rgba(128,128,128,0.12); position: relative; display: flex; align-items: center; }
    .nle-clip { position: absolute; height: 28px; border-radius: 3px; border: 1px solid var(--border); display: flex; align-items: center; padding: 0 8px; font-size: 9px; cursor: pointer; overflow: hidden; white-space: nowrap; transition: filter 0.15s; }
    .theme-brutal .nle-clip { border-width: 2px; border-radius: 0; box-shadow: 3px 3px 0 var(--border); font-weight: 900; }
    .theme-cyber .nle-clip { background: rgba(255,255,255,0.04); }
    .nle-clip:hover { filter: brightness(1.25); }
    .nle-playhead { position: absolute; top: 0; bottom: 0; width: 1.5px; background: #ff435a; z-index: 30; cursor: ew-resize; }
    .nle-playhead::before { content: ''; position: absolute; top: 0; left: -5px; width: 11px; height: 11px; background: #ff435a; clip-path: polygon(0 0, 100% 0, 50% 100%); }
    .nle-playhead::after { content: ''; position: absolute; top: 0; bottom: 0; left: -8px; width: 16px; background: transparent; }

    /* MINIMAP */
    .minimap-wrap { position: absolute; bottom: 10px; right: 10px; width: 120px; height: 75px; border: 1px solid rgba(128,128,128,0.2); border-radius: 4px; overflow: hidden; background: rgba(0,0,0,0.4); pointer-events: none; z-index: 100; backdrop-filter: blur(4px); }
    .minimap-canvas { width: 100%; height: 100%; position: relative; }
    .minimap-node { position: absolute; border-radius: 50%; transform: translate(-50%,-50%); }
    .minimap-label { position: absolute; bottom: 4px; left: 6px; font-size: 8px; opacity: 0.4; letter-spacing: 0.5px; }

    /* COMMAND PALETTE */
    .cmd-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 3000; display: flex; align-items: flex-start; justify-content: center; padding-top: 15vh; backdrop-filter: blur(10px); }
    .cmd-box { width: 480px; background: #09090f; border: 1px solid rgba(255,255,255,0.12); border-radius: 8px; overflow: hidden; box-shadow: 0 30px 100px rgba(0,0,0,0.95); }
    .cmd-input-wrap { display: flex; align-items: center; gap: 10px; padding: 14px 16px; border-bottom: 1px solid rgba(128,128,128,0.1); }
    .cmd-prefix { font-size: 14px; opacity: 0.3; }
    .cmd-input { flex: 1; background: transparent; border: none; color: #e0e0f0; font-family: 'JetBrains Mono', monospace; font-size: 13px; outline: none; }
    .cmd-results { max-height: 300px; overflow-y: auto; }
    .cmd-item { display: flex; align-items: center; gap: 10px; padding: 10px 16px; cursor: pointer; font-size: 11px; transition: background 0.1s; }
    .cmd-item:hover, .cmd-item.focused { background: rgba(255,255,255,0.05); }
    .cmd-item-icon { width: 26px; height: 26px; border: 1px solid rgba(128,128,128,0.2); border-radius: 4px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 10px; opacity: 0.7; }
    .cmd-item-label { flex: 1; }
    .cmd-item-hint { font-size: 9px; opacity: 0.3; }
    .cmd-footer { padding: 7px 16px; border-top: 1px solid rgba(128,128,128,0.08); display: flex; gap: 16px; font-size: 9px; opacity: 0.35; }

    /* DIFF VIEW */
    .diff-line { display: flex; font-family: 'JetBrains Mono', monospace; font-size: 11px; line-height: 1.65; }
    .diff-line-num { width: 36px; text-align: right; padding-right: 10px; opacity: 0.3; flex-shrink: 0; font-size: 10px; }
    .diff-add { background: rgba(16,185,129,0.08); border-left: 2px solid #10b981; }
    .diff-del { background: rgba(255,67,90,0.08); border-left: 2px solid #ff435a; }
    .diff-ctx { opacity: 0.5; }

    /* SIDE-INPUT */
    .side-input { width: 100%; border: 1px solid rgba(128,128,128,0.2); padding: 8px 10px; background: rgba(128,128,128,0.04); color: var(--text); font-family: inherit; font-size: 11px; outline: none; border-radius: 3px; transition: border-color 0.2s; }
    .side-input:focus { border-color: rgba(16,185,129,0.5); }

    /* LOGIN */
    .login-container { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; background: #050505; color: #fff; }
    .login-box { width: 100%; max-width: 680px; padding: 40px 32px; display: flex; flex-direction: column; gap: 36px; }
    .theme-btn { flex: 1; padding: 18px; font-size: 13px; cursor: pointer; transition: all 0.2s; text-align: center; }
    .theme-btn:disabled { opacity: 0.15; cursor: not-allowed; }
    .theme-btn.cyber { background: transparent; border: 1px solid #10b981; color: #10b981; border-radius: 4px; }
    .theme-btn.cyber:hover:not(:disabled) { box-shadow: 0 0 24px rgba(16,185,129,0.25); background: rgba(16,185,129,0.04); }
    .theme-btn.brutal { background: #fff; border: 4px solid #fff; color: #000; font-family: 'Inter', sans-serif; font-weight: 900; text-transform: uppercase; }
    .theme-btn.brutal:hover:not(:disabled) { box-shadow: 8px 8px 0px rgba(255,255,255,0.4); transform: translate(-2px, -2px); }
  </style>
</head>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback, useMemo } = React;

    // ────────────────────────────────────────────────────────────────
    //  SACRED GEOMETRY AVATARS
    // ────────────────────────────────────────────────────────────────
    const CYBER_AVATARS = [
      ({ size = 48, accent = '#10b981' }) => (
        <svg width={size} height={size} viewBox="0 0 48 48" fill="none">

          <path d="M 21.5 7.5 L 17 4 L 20 6.5" stroke={accent} strokeWidth="1.2" strokeLinecap="round" strokeLinejoin="round"/>

          <circle cx="24" cy="24" r="6.5" stroke={accent} strokeWidth="0.7" opacity="0.3"/>

      ({ size = 48, accent = '#ff435a' }) => (

              <path d="M 24 24 C 26 23 27.5 21.5 27 19.5" stroke={accent} strokeWidth="1" fill="none" strokeLinecap="round" opacity="0.5"/>

            <line key={a} x1={24+18.5*Math.cos(a*Math.PI/180)} y1={24+18.5*Math.sin(a*Math.PI/180)} x2={24+21*Math.cos(a*Math.PI/180)} y2={24+21*Math.sin(a*Math.PI/180)} stroke={accent} strokeWidth="1.2" opacity="0.45"/>

            <g key={angle} transform={`rotate(${angle} 24 24)`}>
              <line x1="24" y1="20.5" x2="24" y2="5.5" stroke={accent} strokeWidth="1.8" strokeLinecap="round"/>

          <rect x="21.5" y="9" width="5" height="4" fill="#00040f"/>

      ),
      ({ size = 48, accent = '#28f1c3' }) => {
        const r = 10;
        const lobes = [270, 30, 150].map(a => [24 + r * Math.cos(a * Math.PI / 180), 24 + r * Math.sin(a * Math.PI / 180)]);
        return (
          <svg width={size} height={size} viewBox="0 0 48 48" fill="none">

    // ────────────────────────────────────────────────────────────────
    //  ICONS

    // ────────────────────────────────────────────────────────────────
    //  SYNTAX HIGHLIGHTER
    // ────────────────────────────────────────────────────────────────
    function highlightCode(code) {
      const PY_KW = /\b(def|class|import|from|return|if|elif|else|for|while|in|not|and|or|True|False|None|pass|break|continue|try|except|finally|with|as|yield|lambda|self|print|raise|del|global|nonlocal|assert|async|await)\b/g;
      const JS_KW = /\b(function|const|let|var|return|if|else|for|while|in|of|class|import|export|from|default|new|this|true|false|null|undefined|try|catch|finally|async|await|typeof|instanceof|break|continue|switch|case|throw)\b/g;
      const BUILTINS = /\b(len|range|print|type|str|int|float|list|dict|set|tuple|map|filter|zip|enumerate|open|super|object|bool|abs|max|min|sum|sorted|reversed|console|Math|JSON|Array|Object|Promise|setTimeout|parseInt|parseFloat)\b/g;
      const STRINGS = /("""[\s\S]*?"""|'''[\s\S]*?'''|"[^"\\]*(?:\\.[^"\\]*)*"|'[^'\\]*(?:\\.[^'\\]*)*'|`[^`\\]*(?:\\.[^`\\]*)*`)/g;
      const COMMENTS = /(#.*$|\/\/.*$|\/\*[\s\S]*?\*\/)/gm;
      const NUMBERS = /\b(\d+\.?\d*(?:[eE][+-]?\d+)?)\b/g;
      const FUNCS = /\b([a-zA-Z_]\w*)\s*(?=\()/g;
      let html = code.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      const stored = [];
      const PH = '\x00', PE = '\x01';
      html = html.replace(COMMENTS, m => { stored.push(`<span class="syn-comment">${m}</span>`); return PH+(stored.length-1)+PE; });
      html = html.replace(STRINGS, m => { stored.push(`<span class="syn-string">${m}</span>`); return PH+(stored.length-1)+PE; });
      html = html.replace(FUNCS, (m,fn) => { stored.push(`<span class="syn-function">${fn}</span>`); return PH+(stored.length-1)+PE+'('; });
      html = html.replace(PY_KW, '<span class="syn-keyword">$&</span>');
      html = html.replace(JS_KW, '<span class="syn-keyword">$&</span>');
      html = html.replace(BUILTINS, '<span class="syn-builtin">$&</span>');
      html = html.replace(NUMBERS, '<span class="syn-number">$&</span>');
      html = html.replace(/\x00(\d+)\x01/g, (_, i) => stored[parseInt(i)]);
      return html;
    }

    // ────────────────────────────────────────────────────────────────

      { id:'forbinden', name:'FORBINDEN', bg:'#0b0b0f', base:'#c0c8d8', lineNum:'#2e2e42', activeLine:'rgba(255,255,255,0.035)', kw:'#ff435a', str:'#ffc410', cmt:'#3e3e5a', num:'#4285f4', fn:'#10b981', bi:'#28f1c3', op:'#6a6a8a', swatches:['#ff435a','#ffc410','#10b981','#28f1c3'] },
      { id:'dracula', name:'DRACULA', bg:'#282a36', base:'#f8f8f2', lineNum:'#44475a', activeLine:'rgba(68,71,90,0.4)', kw:'#ff79c6', str:'#f1fa8c', cmt:'#6272a4', num:'#bd93f9', fn:'#50fa7b', bi:'#8be9fd', op:'#ff79c6', swatches:['#ff79c6','#f1fa8c','#50fa7b','#8be9fd'] },
      { id:'monokai', name:'MONOKAI', bg:'#272822', base:'#f8f8f2', lineNum:'#3e3d32', activeLine:'rgba(73,72,62,0.4)', kw:'#f92672', str:'#e6db74', cmt:'#75715e', num:'#ae81ff', fn:'#a6e22e', bi:'#66d9e8', op:'#f92672', swatches:['#f92672','#e6db74','#a6e22e','#ae81ff'] },

      { id:'tokyo', name:'TOKYO NIGHT', bg:'#1a1b2e', base:'#a9b1d6', lineNum:'#2a2b3d', activeLine:'rgba(42,43,61,0.5)', kw:'#bb9af7', str:'#9ece6a', cmt:'#3b4261', num:'#ff9e64', fn:'#7dcfff', bi:'#2ac3de', op:'#c0caf5', swatches:['#bb9af7','#9ece6a','#7dcfff','#ff9e64'] },
      { id:'gruvbox', name:'GRUVBOX', bg:'#282828', base:'#ebdbb2', lineNum:'#3c3836', activeLine:'rgba(60,56,54,0.5)', kw:'#fb4934', str:'#b8bb26', cmt:'#665c54', num:'#d3869b', fn:'#fabd2f', bi:'#8ec07c', op:'#fe8019', swatches:['#fb4934','#b8bb26','#fabd2f','#8ec07c'] },
      { id:'onedark', name:'ONE DARK', bg:'#282c34', base:'#abb2bf', lineNum:'#3b4048', activeLine:'rgba(40,44,52,0.6)', kw:'#c678dd', str:'#98c379', cmt:'#5c6370', num:'#d19a66', fn:'#61afef', bi:'#56b6c2', op:'#e06c75', swatches:['#c678dd','#98c379','#61afef','#d19a66'] },
      { id:'solarized', name:'SOLARIZED', bg:'#002b36', base:'#839496', lineNum:'#073642', activeLine:'rgba(7,54,66,0.6)', kw:'#859900', str:'#2aa198', cmt:'#586e75', num:'#d33682', fn:'#268bd2', bi:'#cb4b16', op:'#657b83', swatches:['#859900','#2aa198','#268bd2','#d33682'] },
    ];

    // ────────────────────────────────────────────────────────────────
    //  CODE EDITOR COMPONENT
    // ────────────────────────────────────────────────────────────────
    function CodeEditor({ node, onChange }) {
      const [palette, setPalette] = useState(PALETTES[0]);
      const [showPaletteMenu, setShowPaletteMenu] = useState(false);
      const [showFind, setShowFind] = useState(false);
      const [showDiff, setShowDiff] = useState(false);
      const [findQuery, setFindQuery] = useState('');
      const [replaceQuery, setReplaceQuery] = useState('');
      const [wordWrap, setWordWrap] = useState(false);
      const [cursor, setCursor] = useState({ line: 1, col: 1 });
      const [toastMsg, setToastMsg] = useState('');
      const [fontSize, setFontSize] = useState(13);
      const [minimap, setMinimap] = useState(true);
      const textareaRef = useRef(null);
      const lineNumRef = useRef(null);
      const overlayRef = useRef(null);
      const code = node.code || '';
      const lines = code.split('\n');
      const lineCount = lines.length;

      const showToast = (msg) => { setToastMsg(''); setTimeout(() => setToastMsg(msg), 10); setTimeout(() => setToastMsg(''), 1800); };

      const handleScroll = () => {
        if (lineNumRef.current && textareaRef.current) lineNumRef.current.scrollTop = textareaRef.current.scrollTop;
        if (overlayRef.current && textareaRef.current) overlayRef.current.style.transform = `translateY(-${textareaRef.current.scrollTop}px)`;
      };

      const handleKeyDown = (e) => {
        if (e.key === 'Tab') {
          e.preventDefault();
          const s = e.target.selectionStart, en = e.target.selectionEnd;
          const nCode = code.substring(0, s) + '  ' + code.substring(en);
          onChange(nCode);
          setTimeout(() => { e.target.selectionStart = e.target.selectionEnd = s + 2; }, 0);
        }
        if ((e.ctrlKey || e.metaKey) && e.key === 'f') { e.preventDefault(); setShowFind(v => !v); }
        if ((e.ctrlKey || e.metaKey) && e.key === '/') { e.preventDefault(); toggleLineComment(); }
        if ((e.ctrlKey || e.metaKey) && e.key === 'd') { e.preventDefault(); setShowDiff(v => !v); }
      };

      const handleCursorUpdate = (e) => {
        const ta = e.target, before = code.substring(0, ta.selectionStart);
        const nl = (before.match(/\n/g) || []).length + 1;
        setCursor({ line: nl, col: ta.selectionStart - before.lastIndexOf('\n') });
      };

      useEffect(() => {
        if (!showPaletteMenu) return;
        const h = () => setShowPaletteMenu(false);
        document.addEventListener('pointerdown', h);
        return () => document.removeEventListener('pointerdown', h);
      }, [showPaletteMenu]);

      const handleCopy = () => { navigator.clipboard.writeText(code).catch(() => {}); showToast('COPIED'); };

      const handleFormat = () => {
        const formatted = code.split('\n').map(l => l.replace(/\s+$/, '')).join('\n').replace(/\n{3,}/g, '\n\n');
        onChange(formatted); showToast('FORMATTED');
      };

      const handleFindReplace = () => {
        if (!findQuery) return;
        const count = (code.split(findQuery).length - 1);
        onChange(code.split(findQuery).join(replaceQuery));
        showToast(`REPLACED ${count} INSTANCES`);
      };

      const toggleLineComment = () => {
        const ta = textareaRef.current;
        const before = code.substring(0, ta.selectionStart);
        const lineStart = before.lastIndexOf('\n') + 1;
        const lineEnd = code.indexOf('\n', lineStart) === -1 ? code.length : code.indexOf('\n', lineStart);
        const lineText = code.substring(lineStart, lineEnd);
        const newCode = lineText.trimStart().startsWith('#')
          ? code.substring(0, lineStart) + lineText.replace(/^\s*#\s?/, '') + code.substring(lineEnd)
          : code.substring(0, lineStart) + '# ' + lineText + code.substring(lineEnd);
        onChange(newCode); showToast('TOGGLED COMMENT');
      };

      // Diff view: show fake diff of current vs "saved" (last 3 lines changed)
      const diffLines = useMemo(() => {
        const codeLines = code.split('\n');
        return codeLines.map((line, i) => {
          if (i === 1 && node.modified) return { type: 'add', text: line, num: i + 1 };
          if (i === 2 && node.modified) return { type: 'del', text: '# (previous version)', num: null };
          return { type: 'ctx', text: line, num: i + 1 };
        });
      }, [code, node.modified]);

      const wordCount = code.trim() ? code.trim().split(/\s+/).length : 0;
      const charCount = code.length;
      const highlighted = highlightCode(code);
      const cssVars = { '--syn-kw': palette.kw, '--syn-str': palette.str, '--syn-cmt': palette.cmt, '--syn-num': palette.num, '--syn-fn': palette.fn, '--syn-bi': palette.bi, '--syn-op': palette.op };
      const lineH = fontSize * 1.65;
      const activeLineY = (cursor.line - 1) * lineH;

      // Minimap rendering
      const minimapLines = useMemo(() => {
        const lns = code.split('\n').slice(0, 50);
        return lns.map(l => ({ len: Math.min(l.length, 80), indent: l.match(/^\s*/)[0].length }));
      }, [code]);

      return (
        <div className="editor-palette-scope" style={{ display:'flex', flexDirection:'column', flex:1, minHeight:0, overflow:'hidden', background:palette.bg }} ref={el => el && Object.entries(cssVars).forEach(([k,v]) => el.style.setProperty(k,v))}>
          {/* Toolbar */}
          <div className="editor-toolbar">
            <button className="editor-toolbar-btn" onClick={handleCopy} title="Copy"><I.Copy /> COPY</button>
            <div className="editor-toolbar-sep"/>
            <button className="editor-toolbar-btn" onClick={handleFormat}><I.Format /> FORMAT</button>
            <button className="editor-toolbar-btn" onClick={toggleLineComment} title="Ctrl+/"># COMMENT</button>
            <div className="editor-toolbar-sep"/>
            <button className={`editor-toolbar-btn ${showFind?'active':''}`} onClick={() => setShowFind(v=>!v)} title="Ctrl+F"><I.Find /> FIND</button>
            <button className={`editor-toolbar-btn ${wordWrap?'active':''}`} onClick={() => setWordWrap(v=>!v)}><I.Wrap /> WRAP</button>
            <button className={`editor-toolbar-btn ${showDiff?'active':''}`} onClick={() => setShowDiff(v=>!v)} title="Ctrl+D"><I.Diff /> DIFF</button>
            <div className="editor-toolbar-sep"/>
            <button className="editor-toolbar-btn" onClick={() => setFontSize(s=>Math.max(10,s-1))} style={{padding:'4px 6px'}}>A−</button>
            <button className="editor-toolbar-btn" onClick={() => setFontSize(s=>Math.min(20,s+1))} style={{padding:'4px 6px'}}>A+</button>
            <button className={`editor-toolbar-btn ${minimap?'active':''}`} onClick={() => setMinimap(v=>!v)} style={{padding:'4px 7px', fontSize:'9px'}}>MAP</button>
            <div style={{marginLeft:'auto', position:'relative'}}>
              <button
                className={`editor-toolbar-btn ${showPaletteMenu?'active':''}`}
                onClick={() => setShowPaletteMenu(v=>!v)}
                style={{gap:'5px'}}
              >
                <div style={{display:'flex',gap:'3px'}}>
                  {palette.swatches.map((c,i) => <div key={i} style={{width:'6px',height:'6px',borderRadius:'50%',background:c}}/>)}
                </div>
                {palette.name}
              </button>
              {showPaletteMenu && (
                <div className="palette-dropdown" onClick={e=>e.stopPropagation()}>
                  {PALETTES.map(p => (
                    <div key={p.id} className={`palette-option ${palette.id===p.id?'active':''}`} onClick={() => { setPalette(p); setShowPaletteMenu(false); }} style={{background:p.bg}}>
                      <div className="palette-swatches">{p.swatches.map((c,i) => <div key={i} className="palette-swatch" style={{background:c}}/>)}</div>
                      <span className="palette-name" style={{color:p.base}}>{p.name}</span>
                    </div>
                  ))}
                </div>
              )}
            </div>
          </div>

          {/* Find bar */}
          {showFind && (
            <div className="editor-find-bar">
              <span style={{fontSize:'9px',opacity:0.5,flexShrink:0,letterSpacing:'0.5px'}}>FIND</span>
              <input value={findQuery} onChange={e=>setFindQuery(e.target.value)} placeholder="Search..." spellCheck="false" />
              <span style={{fontSize:'9px',opacity:0.4,flexShrink:0}}>→</span>
              <input value={replaceQuery} onChange={e=>setReplaceQuery(e.target.value)} placeholder="Replace..." spellCheck="false" />
              <button className="editor-toolbar-btn" onClick={handleFindReplace} style={{flexShrink:0,fontSize:'9px'}}>REPLACE ALL</button>
              <button className="editor-toolbar-btn" onClick={() => setShowFind(false)} style={{flexShrink:0,color:'#ff435a',padding:'4px 6px'}}>✕</button>
            </div>
          )}

          <div style={{display:'flex',flex:1,overflow:'hidden',minHeight:0}}>
            {/* Diff panel */}
            {showDiff && (
              <div style={{width:'240px',flexShrink:0,borderRight:`1px solid ${palette.lineNum}44`,overflow:'auto',background:palette.bg,display:'flex',flexDirection:'column'}}>
                <div style={{padding:'7px 12px',fontSize:'9px',opacity:0.4,borderBottom:`1px solid ${palette.lineNum}44`,letterSpacing:'1px'}}>DIFF — WORKING TREE</div>
                <div style={{flex:1,overflow:'auto',padding:'8px 0'}}>
                  {diffLines.map((dl,i) => (
                    <div key={i} className={`diff-line ${dl.type==='add'?'diff-add':dl.type==='del'?'diff-del':'diff-ctx'}`} style={{fontSize:'10px'}}>
                      <span className="diff-line-num">{dl.num||''}</span>
                      <span style={{color: dl.type==='add'?'#10b981':dl.type==='del'?'#ff435a':palette.base, paddingRight:'10px'}}>{dl.type==='add'?'+':dl.type==='del'?'-':' '} {dl.text.substring(0,26)}{dl.text.length>26?'…':''}</span>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {/* Main code area */}
            <div style={{display:'flex',flex:1,overflow:'hidden',position:'relative',minWidth:0}}>
              {/* Line nums */}
              <div ref={lineNumRef} className="line-numbers" style={{fontSize,lineHeight:'1.65',background:palette.bg,color:palette.lineNum,borderRightColor:palette.lineNum+'44',overflowY:'hidden'}}>
                {Array.from({length:lineCount},(_,i) => (
                  <div key={i} className="line-num" style={{color:cursor.line===i+1?palette.base:palette.lineNum,opacity:cursor.line===i+1?1:0.5,fontWeight:cursor.line===i+1?'bold':undefined,fontSize:cursor.line===i+1?fontSize:fontSize-0.5}}>
                    {i+1}
                  </div>
                ))}
              </div>

              {/* Editor */}
              <div style={{flex:1,position:'relative',overflow:'hidden',background:palette.bg}}>
                <div className="active-line-highlight" style={{top:`calc(20px + ${activeLineY}px)`,height:`${lineH}px`,background:palette.activeLine,borderLeftColor:palette.fn+'60'}}/>
                <div ref={overlayRef} className="code-highlight-overlay" style={{fontSize,lineHeight:'1.65',whiteSpace:wordWrap?'pre-wrap':'pre',color:palette.base}} dangerouslySetInnerHTML={{__html:highlighted}}/>
                <textarea
                  ref={textareaRef}
                  className="code-area"
                  value={code}
                  onChange={e=>onChange(e.target.value)}
                  onKeyDown={handleKeyDown}
                  onScroll={handleScroll}
                  onClick={handleCursorUpdate}
                  onKeyUp={handleCursorUpdate}
                  spellCheck="false"
                  style={{fontSize,lineHeight:'1.65',whiteSpace:wordWrap?'pre-wrap':'pre',position:'absolute',inset:0,padding:'20px 14px',fontFamily:"'JetBrains Mono',monospace",color:'transparent',caretColor:palette.fn,background:'transparent',border:'none',outline:'none',resize:'none',zIndex:2}}
                />

                {/* Minimap */}
                {minimap && (
                  <div style={{position:'absolute',top:0,right:0,width:'60px',bottom:0,background:palette.bg+'cc',borderLeft:`1px solid ${palette.lineNum}33`,overflow:'hidden',pointerEvents:'none',opacity:0.6}}>
                    {minimapLines.map((l,i) => (
                      <div key={i} style={{position:'relative',height:'2.5px',margin:'0.5px 4px'}}>
                        <div style={{position:'absolute',left:`${l.indent*1.5}px`,width:`${l.len*0.65}px`,maxWidth:'50px',height:'2px',background:i===cursor.line-1?palette.fn:palette.lineNum,opacity:0.7,borderRadius:'1px'}}/>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            </div>

            {/* Info panel */}
            <div className="code-panel-info">
              <div className="code-panel-info-hdr">INSPECTOR</div>
              <div className="code-panel-info-body">
                <div>
                  <div className="info-section-title">FILE</div>
                  <div style={{fontWeight:'bold',color:palette.fn,fontSize:'11px',letterSpacing:'0.3px'}}>{node.label}</div>
                  <div style={{opacity:0.4,marginTop:'2px',fontSize:'9px'}}>{node.type}</div>
                </div>

    const FloatingPanel = ({ title, isOpen, onClose, defaultX, defaultY, defaultW, defaultH, children }) => {
      const [pos, setPos] = useState({ x: defaultX, y: defaultY });
      const [size, setSize] = useState({ w: defaultW, h: defaultH });
      const [zIndex, setZIndex] = useState(100);
      const dragRef = useRef({ isDragging:false });
      const resizeRef = useRef({ isResizing:false });
      if (!isOpen) return null;
      const bringToFront = () => setZIndex(Date.now() % 100000 + 100);
      const onDragStart = (e) => { if(e.target.closest('.no-drag'))return; dragRef.current={isDragging:true,startX:e.clientX,startY:e.clientY,ix:pos.x,iy:pos.y}; e.currentTarget.setPointerCapture(e.pointerId); bringToFront(); };
      const onDragMove = (e) => { if(!dragRef.current.isDragging)return; setPos({x:dragRef.current.ix+(e.clientX-dragRef.current.startX),y:Math.max(0,dragRef.current.iy+(e.clientY-dragRef.current.startY))}); };
      const onDragEnd = (e) => { dragRef.current.isDragging=false; e.currentTarget.releasePointerCapture(e.pointerId); };
      const onResizeStart = (e) => { e.stopPropagation(); resizeRef.current={isResizing:true,startX:e.clientX,startY:e.clientY,iw:size.w,ih:size.h}; e.currentTarget.setPointerCapture(e.pointerId); };
      const onResizeMove = (e) => { if(!resizeRef.current.isResizing)return; setSize({w:Math.max(220,resizeRef.current.iw+(e.clientX-resizeRef.current.startX)),h:Math.max(160,resizeRef.current.ih+(e.clientY-resizeRef.current.startY))}); };
      const onResizeEnd = (e) => { resizeRef.current.isResizing=false; e.currentTarget.releasePointerCapture(e.pointerId); };
      return (
        <div className="floating-panel" style={{left:pos.x,top:pos.y,width:size.w,height:size.h,zIndex}} onPointerDownCapture={bringToFront}>
          <div className="panel-hdr" style={{cursor:'grab'}} onPointerDown={onDragStart} onPointerMove={onDragMove} onPointerUp={onDragEnd} onPointerCancel={onDragEnd}>
            <span>{title}</span>

    function CommandPalette({ isOpen, onClose, onAction }) {
      const [query, setQuery] = useState('');
      const [focused, setFocused] = useState(0);
      const filtered = CMD_ITEMS.filter(i => i.label.toLowerCase().includes(query.toLowerCase()));
      useEffect(() => { if(isOpen) setQuery(''); }, [isOpen]);
      if (!isOpen) return null;
      return (
        <div className="cmd-overlay" onClick={onClose}>
          <div className="cmd-box" onClick={e=>e.stopPropagation()}>
            <div className="cmd-input-wrap">
              <span className="cmd-prefix">⌘</span>
              <input className="cmd-input" value={query} onChange={e=>setQuery(e.target.value)} placeholder="Type a command..." autoFocus
                onKeyDown={e=>{
                  if(e.key==='ArrowDown'){e.preventDefault();setFocused(f=>Math.min(f+1,filtered.length-1));}
                  if(e.key==='ArrowUp'){e.preventDefault();setFocused(f=>Math.max(f-1,0));}
                  if(e.key==='Enter'){onAction(filtered[focused]?.label);onClose();}
                  if(e.key==='Escape')onClose();
                }}
              />
            </div>
            <div className="cmd-results">
              {filtered.map((item,i) => (

    function GraphMinimap({ nodes }) {
      if (!nodes.length) return null;
      const pad = 10;
      const W = 120, H = 75;
      const xs = nodes.map(n=>n.x), ys = nodes.map(n=>n.y);
      const minX=Math.min(...xs)-50, maxX=Math.max(...xs)+50, minY=Math.min(...ys)-50, maxY=Math.max(...ys)+50;
      const rangeX = maxX-minX || 1, rangeY = maxY-minY || 1;
      const toMm = (x,y) => [pad + (x-minX)/rangeX*(W-pad*2), pad + (y-minY)/rangeY*(H-pad*2)];
      return (
        <div className="minimap-wrap">
          <svg width={W} height={H} style={{display:'block'}}>
            {nodes.map(n => {
              const [mx,my] = toMm(n.x,n.y);
              return <circle key={n.id} cx={mx} cy={my} r={n.isMain?4:2.5} fill={AVATAR_ACCENTS[n.themeIdx%6]} opacity="0.75"/>;
            })}
          </svg>
          <div className="minimap-label">GRAPH OVERVIEW</div>
        </div>
      );
    }

      }, []);

      const filteredSearch = nodesRef.current.filter(n => {

        if (!q) return true;
        return (n.label||'').toLowerCase().includes(q) || (n.code||'').toLowerCase().includes(q);
      });
      const modifiedNodes = nodesRef.current.filter(n => n.modified);
      const visibleNodes = nodesRef.current.filter(n => {
        if (n.id==='n1' && playheadPos<100) return false;
        if (n.id==='n3' && playheadPos<250) return false;
        return true;
      });
      const visibleEdges = edgesRef.current.filter(e => visibleNodes.find(n=>n.id===e.source) && visibleNodes.find(n=>n.id===e.target));

      const activeNode = nodesRef.current.find(n=>n.id===(activeTabId||hoveredNodeId));
      const activeZoneKey = activeNode ? ZONES[activeNode.themeIdx%ZONES.length] : 'default';
      const activeTabNode = nodesRef.current.find(n=>n.id===activeTabId);
      const wrapperClass = `app-wrapper theme-${themeMode} zone-${activeZoneKey}`;
      const outerBg = themeMode==='brutal' ? OUTSIDE_COLORS[activeZoneKey] : '#050505';

      // Force simulation
      useEffect(() => {
        let rafId;
        const tick = () => {
          let updated = false;
          const nodes = nodesRef.current, edges = edgesRef.current;
          for (let i=0;i<nodes.length;i++) for (let j=i+1;j<nodes.length;j++) {
            const dx=nodes[j].x-nodes[i].x, dy=nodes[j].y-nodes[i].y;
            const distSq=dx*dx+dy*dy||1, dist=Math.sqrt(distSq), force=4200/distSq;
            nodes[i].vx-=(dx/dist)*force; nodes[i].vy-=(dy/dist)*force;
            nodes[j].vx+=(dx/dist)*force; nodes[j].vy+=(dy/dist)*force;
          }
          edges.forEach(edge => {
            const src=nodes.find(n=>n.id===edge.source), tgt=nodes.find(n=>n.id===edge.target);
            if(!src||!tgt)return;
            const dx=tgt.x-src.x, dy=tgt.y-src.y, dist=Math.sqrt(dx*dx+dy*dy)||1, force=(dist-145)*0.05;
            src.vx+=(dx/dist)*force; src.vy+=(dy/dist)*force;
            tgt.vx-=(dx/dist)*force; tgt.vy-=(dy/dist)*force;
          });
          nodes.forEach(n => {
            const p=n.isMain?0.2:0.005;
            n.vx+=(0-n.x)*p; n.vy+=(0-n.y)*p;
            n.vx*=0.8; n.vy*=0.8;
            n.x+=n.vx; n.y+=n.vy;
            if(Math.abs(n.vx)>0.05||Math.abs(n.vy)>0.05)updated=true;

          if (draggingNodeRef.current) { const d=nodes.find(n=>n.id===draggingNodeRef.current.id); if(d){d.x=draggingNodeRef.current.x;d.y=draggingNodeRef.current.y;d.vx=0;d.vy=0;updated=true;} }

          rafId = requestAnimationFrame(tick);
