<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FORBINDEN // DUAL IDE</title>
  
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css" />
  <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js"></script>
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

  <style>
    @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@400;700;800&display=swap");
    
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body { 
      overflow: hidden; 
      width: 100vw; height: 100vh;
      user-select: none; font-size: 10px;
      margin: 0; background-color: #050505; 
    }

    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: currentColor; border-radius: var(--scroll-rad, 0); opacity: 0.5; }

    /* BASE WRAPPER & VARIABLES */
    .app-wrapper {
      width: 100%; height: 100%; 
      display: flex; flex-direction: column; overflow: hidden;
      background: var(--bg); color: var(--text);
      border: var(--border-w) solid var(--border);
      border-radius: var(--ui-radius, 0);
      transition: background 0.4s ease, color 0.4s ease, border-color 0.4s ease;
    }

    /* THEME 1: FORSAKEN (BRUTALIST) */
    .theme-brutal {
      --border-w: 6px; --edge-w: 4px; --ui-radius: 0px; --inner-w: 4px;
      font-family: 'Inter', sans-serif; text-transform: uppercase; font-weight: 900;
      box-shadow: 20px 20px 0px var(--border);
    }
    .theme-brutal.zone-default { --bg: #ffffff; --text: #111111; --border: #111111; --node-bg: #ffffff; }
    .theme-brutal.dark-mode.zone-default { --bg: #111111; --text: #ffffff; --border: #ffffff; --node-bg: #111111; }
    .theme-brutal.zone-1 { --bg: #111111; --text: #ff435a; --border: #ff435a; --node-bg: #111111; }
    .theme-brutal.zone-2 { --bg: #7ca148; --text: #111111; --border: #111111; --node-bg: #ffc410; }
    .theme-brutal.zone-3 { --bg: #1e836d; --text: #111111; --border: #111111; --node-bg: #1e836d; }
    .theme-brutal.zone-4 { --bg: #f3f5f7; --text: #4285f4; --border: #4285f4; --node-bg: #f3f5f7; }
    .theme-brutal.zone-5 { --bg: #1e836d; --text: #28f1c3; --border: #28f1c3; --node-bg: #1e836d; }
    .theme-brutal.zone-6 { --bg: linear-gradient(135deg, #7161a4, #332b89); --text: #ff1650; --border: #ff1650; --node-bg: #332b89; }

    .theme-brutal .btn { border: 4px solid var(--text); box-shadow: 4px 4px 0 var(--border); background: var(--bg); color: var(--text); }
    .theme-brutal .btn:hover { background: var(--text); color: var(--bg); transform: translate(-2px, -2px); box-shadow: 6px 6px 0 var(--border); }
    .theme-brutal .node-circle { background: var(--node-bg); border: 4px solid var(--border); box-shadow: 4px 4px 0px var(--border); }
    .theme-brutal .node-label { background: var(--bg); color: var(--text); border: 4px solid var(--border); box-shadow: 4px 4px 0px var(--border); font-weight: 900; }
    .theme-brutal .editor-wrap, .theme-brutal .modal-content { border: 6px solid var(--border); box-shadow: 8px 8px 0px var(--border); }
    .theme-brutal .modal-content { box-shadow: 20px 20px 0px var(--border); }
    .theme-brutal .panel { border-right: var(--border-w) solid var(--border); border-top: var(--border-w) solid var(--border); background: var(--bg); }
    .theme-brutal .list-item:hover { background: var(--text); color: var(--bg); }
    .theme-brutal .editor-tab { border-right: var(--inner-w) solid var(--border); background: transparent; }
    .theme-brutal .editor-tab.active { background: var(--text); color: var(--bg); }
    .theme-brutal .breadcrumb { border-bottom: var(--inner-w) solid var(--border); }

    /* THEME 2: OBSIDIAN (CYBERPUNK) */
    .theme-cyber {
      --bg: #0a0a0c; --text: #a1a1b8; --border: #1f1f2e;
      --border-w: 1px; --edge-w: 2px; --ui-radius: 12px; --inner-w: 1px;
      font-family: 'JetBrains Mono', monospace; text-transform: none; font-weight: 400;
      box-shadow: 0 0 60px rgba(0,0,0,0.8);
    }
    .theme-cyber .canvas-bg { background-image: radial-gradient(circle, rgba(255,255,255,0.05) 1px, transparent 1px); background-size: 24px 24px; }
    .theme-cyber .btn { border: 1px solid var(--border); border-radius: 4px; background: transparent; color: var(--text); font-weight: 700; }
    .theme-cyber .btn:hover { border-color: #10b981; color: #10b981; box-shadow: 0 0 10px rgba(16,185,129,0.2); }
    .theme-cyber .node-circle { border-radius: 50%; background: #0a0a0c; border: 2px solid var(--node-color, #ffffff); box-shadow: 0 0 10px var(--node-color, #ffffff); }
    .theme-cyber .node-label { background: #0a0a0c; color: #ffffff; border: 1px solid var(--border); border-radius: 4px; }
    .theme-cyber .editor-wrap { border: 1px solid var(--border); border-radius: 8px; }
    .theme-cyber .modal-content { border: 1px solid var(--border); border-radius: 12px; box-shadow: 0 20px 80px rgba(0,0,0,0.9); }
    .theme-cyber .edge-path { stroke: rgba(255,255,255,0.15); }
    .theme-cyber .panel { border-right: var(--border-w) solid var(--border); border-top: var(--border-w) solid var(--border); background: #050505; }
    .theme-cyber .list-item:hover { background: rgba(255,255,255,0.05); color: #fff; }
    .theme-cyber .editor-tab { border-right: 1px solid var(--border); border-bottom: 2px solid transparent; background: transparent; }
    .theme-cyber .editor-tab.active { border-bottom-color: #10b981; color: #ffffff; background: rgba(255,255,255,0.02); }
    .theme-cyber .breadcrumb { border-bottom: 1px solid var(--border); }

    .theme-cyber .obs-node-wrapper.clr-default { --node-color: #ffffff; }
    .theme-cyber .obs-node-wrapper.clr-1 { --node-color: #ff435a; }
    .theme-cyber .obs-node-wrapper.clr-2 { --node-color: #ffc410; }
    .theme-cyber .obs-node-wrapper.clr-3 { --node-color: #1e836d; }
    .theme-cyber .obs-node-wrapper.clr-4 { --node-color: #4285f4; }
    .theme-cyber .obs-node-wrapper.clr-5 { --node-color: #28f1c3; }
    .theme-cyber .obs-node-wrapper.clr-6 { --node-color: #ff1650; }

    /* IDE LAYOUT COMPONENTS */
    .app-header { height: 56px; display: flex; align-items: center; justify-content: space-between; padding: 0 24px; border-bottom: var(--border-w) solid var(--border); z-index: 50; flex-shrink: 0; background: var(--bg); }
    .hdr-brand { font-size: 18px; letter-spacing: -0.5px; display: flex; align-items: center; gap: 12px; }
    .btn { cursor: pointer; outline: none; padding: 8px 16px; font-size: 11px; transition: all 0.2s ease; }
    .app-body { display: flex; flex: 1; min-height: 0; position: relative; overflow: hidden; }
    
    .sidebar { width: 60px; border-right: var(--border-w) solid var(--border); display: flex; flex-direction: column; align-items: center; padding: 24px 0; gap: 24px; z-index: 200; flex-shrink: 0; background: var(--bg); position: relative; }
    .strip-icon { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; cursor: pointer; border: var(--inner-w) solid transparent; transition: all 0.2s; color: var(--text); border-radius: var(--ui-radius); position: relative; }
    .strip-icon.active { border-color: var(--border); background: rgba(128,128,128,0.1); }
    .badge { position: absolute; top: -4px; right: -4px; background: #ff435a; color: #fff; font-size: 8px; font-weight: bold; width: 14px; height: 14px; display: flex; align-items: center; justify-content: center; border-radius: 50%; }

    /* FLOATING PANELS */
    .floating-panel { position: absolute; display: flex; flex-direction: column; background: var(--bg); border: var(--border-w) solid var(--border); border-radius: var(--ui-radius); transition: box-shadow 0.2s; }
    .theme-brutal .floating-panel { box-shadow: 8px 8px 0px var(--border); }
    .theme-cyber .floating-panel { box-shadow: 0 10px 40px rgba(0,0,0,0.6); }
    .panel-hdr { padding: 12px 16px; font-size: 11px; border-bottom: var(--inner-w) solid var(--border); opacity: 0.9; font-weight: bold; display: flex; justify-content: space-between; align-items: center; background: rgba(128,128,128,0.05); }
    .panel-hdr:active { opacity: 1; }
    .panel-content-wrap { flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; }
    .panel-resizer { position: absolute; bottom: 0; right: 0; width: 14px; height: 14px; cursor: nwse-resize; background: linear-gradient(135deg, transparent 50%, var(--border) 50%); opacity: 0.5; transition: opacity 0.2s; }
    .panel-resizer:hover { opacity: 1; }
    .list-item { padding: 10px 16px; cursor: pointer; display: flex; align-items: center; gap: 10px; font-size: 11px; transition: background 0.2s; border-bottom: 1px solid rgba(128,128,128,0.1); }

    .main-view { flex: 1; display: flex; flex-direction: column; position: relative; min-width: 0; }
    .canvas-container { flex: 1; position: relative; overflow: hidden; cursor: grab; background: transparent; }
    .canvas-container:active { cursor: grabbing; }
    .canvas-bg { position: absolute; inset: 0; pointer-events: none; z-index: 0; }
    .graph-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; transform-origin: 0 0; z-index: 1; }
    .svg-edges { position: absolute; inset: 0; width: 100%; height: 100%; overflow: visible; pointer-events: none; }
    .edge-path { fill: none; stroke-width: var(--edge-w); transition: stroke 0.4s; }
    .theme-brutal .edge-path { stroke: var(--text); }

    .term-content { flex: 1; padding: 16px; font-family: 'JetBrains Mono', monospace; font-size: 11px; overflow-y: auto; display: flex; flex-direction: column; gap: 6px; }

    .obs-node-wrapper { position: absolute; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; z-index: 5; transform: translate(-50%, -50%); transition: opacity 0.2s ease; }
    .obs-node-wrapper:hover { z-index: 10; }
    .obs-node-wrapper:hover .node-circle { transform: scale(1.2); }
    .node-circle { display: flex; align-items: center; justify-content: center; transition: all 0.2s cubic-bezier(0.25, 1, 0.5, 1); }
    .node-circle.main-node { width: 32px; height: 32px; border-width: calc(var(--inner-w) * 1.5); }
    .node-circle.sub-node { width: 18px; height: 18px; }
    .node-label { margin-top: 10px; font-size: 11px; padding: 4px 10px; pointer-events: none; white-space: nowrap; transition: all 0.2s; }
    .modified-dot { width: 6px; height: 6px; background: #ffc410; border-radius: 50%; margin-left: 6px; display: inline-block; }

    .status-bar { height: 32px; border-top: var(--border-w) solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 24px; font-size: 11px; flex-shrink: 0; background: var(--bg); z-index: 200; position: relative; }
    .status-group { display: flex; gap: 20px; align-items: center; }

    /* EDITOR MODAL */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 1000; backdrop-filter: blur(10px); display: none; align-items: center; justify-content: center; }
    .modal-overlay.open { display: flex; }
    .modal-content { width: 89vw; height: 89vh; background: var(--bg); border-radius: var(--ui-radius); display: flex; flex-direction: column; overflow: hidden; }
    .tabs-hdr { display: flex; background: rgba(128,128,128,0.05); border-bottom: var(--border-w) solid var(--border); overflow-x: auto; flex-shrink: 0; }
    .editor-tab { padding: 12px 24px; display: flex; align-items: center; gap: 12px; cursor: pointer; font-size: 11px; transition: all 0.2s; min-width: 140px; justify-content: space-between; }
    .tab-close { cursor: pointer; opacity: 0.5; padding: 2px; }
    .tab-close:hover { opacity: 1; color: #ff435a; }
    .modal-body { flex: 1; display: flex; min-height: 0; }
    .editor-main-area { flex: 1; display: flex; flex-direction: column; border-right: var(--border-w) solid var(--border); }
    .breadcrumb { padding: 10px 24px; font-size: 10px; display: flex; align-items: center; gap: 8px; opacity: 0.7; flex-shrink: 0; }
    .modal-code-wrap { flex: 1; padding: 24px; display: flex; flex-direction: column; overflow: hidden; }
    .editor-wrap { flex: 1; display: flex; background: var(--bg); overflow: hidden; }
    .line-numbers { padding: 24px 10px; background: rgba(128,128,128,0.05); color: var(--text); opacity: 0.5; font-family: 'JetBrains Mono', monospace; font-size: 13px; text-align: right; line-height: 1.6; border-right: var(--inner-w) solid var(--border); user-select: none; overflow: hidden; }
    .code-area { flex: 1; font-family: 'JetBrains Mono', monospace; font-size: 13px; padding: 24px; resize: none; outline: none; line-height: 1.6; background: transparent; color: var(--text); border: none; white-space: pre; }
    .modal-side { width: 320px; display: flex; flex-direction: column; background: transparent; overflow-y: auto; }
    .modal-side-sec { padding: 24px; border-bottom: var(--inner-w) solid var(--border); }
    .side-input { width: 100%; border: var(--inner-w) solid var(--text); padding: 10px; background: transparent; color: var(--text); font-family: inherit; font-size: 12px; outline: none; }
    
    /* KANBAN BOARDS & CHAT */
    .kanban-board { display: flex; flex: 1; overflow-x: auto; padding: 16px; gap: 16px; }
    .kanban-col { flex: 1; min-width: 200px; display: flex; flex-direction: column; gap: 10px; border-right: 1px solid rgba(128,128,128,0.2); padding-right: 16px; }
    .kanban-col-title { font-weight: bold; opacity: 0.7; font-size: 12px; margin-bottom: 8px; }
    .kanban-card { background: rgba(128,128,128,0.05); border: 1px solid var(--border); padding: 12px; border-radius: var(--ui-radius); cursor: grab; }
    .chat-wrap { display: flex; flex-direction: column; flex: 1; }
    .chat-messages { flex: 1; padding: 16px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
    .chat-msg { background: rgba(128,128,128,0.05); padding: 10px; border-radius: 4px; border-left: 2px solid var(--text); }
    .chat-input-wrap { padding: 16px; border-top: var(--inner-w) solid var(--border); display: flex; gap: 8px; }

    /* NLE TIMELINE (VIDEO EDITOR STYLE) */
    .nle-wrap { flex: 1; display: flex; flex-direction: column; background: var(--bg); overflow: hidden; position: relative; }
    .nle-ruler { height: 24px; border-bottom: var(--inner-w) solid var(--border); display: flex; align-items: flex-end; position: sticky; top: 0; background: rgba(128,128,128,0.05); z-index: 10; overflow: hidden; }
    .nle-ruler-tick { position: absolute; height: 8px; border-left: 1px solid var(--text); opacity: 0.5; font-size: 9px; padding-left: 4px; bottom: 0; }
    .nle-ruler-tick.major { height: 12px; opacity: 1; font-weight: bold; }
    .nle-body { flex: 1; display: flex; overflow: auto; position: relative; }
    
    .nle-track-headers { width: 140px; flex-shrink: 0; border-right: var(--inner-w) solid var(--border); position: sticky; left: 0; background: var(--bg); z-index: 20; display: flex; flex-direction: column; }
    .nle-track-header { height: 48px; display: flex; align-items: center; padding: 0 12px; font-size: 10px; font-weight: bold; border-bottom: 1px solid rgba(128,128,128,0.2); justify-content: space-between; }
    
    .nle-tracks { flex: 1; display: flex; flex-direction: column; position: relative; min-width: 1200px; background: repeating-linear-gradient(90deg, transparent, transparent 49px, rgba(128,128,128,0.05) 49px, rgba(128,128,128,0.05) 50px); }
    .nle-track-lane { height: 48px; border-bottom: 1px solid rgba(128,128,128,0.2); position: relative; display: flex; align-items: center; }
    
    .nle-clip { position: absolute; height: 32px; border-radius: 4px; border: 1px solid var(--border); display: flex; align-items: center; padding: 0 8px; font-size: 10px; cursor: pointer; overflow: hidden; white-space: nowrap; transition: transform 0.1s; }
    .theme-brutal .nle-clip { border-width: 2px; border-radius: 0; box-shadow: 4px 4px 0 var(--border); font-weight: 900; }
    .theme-cyber .nle-clip { background: rgba(255,255,255,0.05); }
    .nle-clip:hover { transform: translateY(-2px); filter: brightness(1.2); }
    
    .nle-playhead { position: absolute; top: 0; bottom: 0; width: 2px; background: #ff435a; z-index: 30; pointer-events: none; }
    .nle-playhead::before { content: ''; position: absolute; top: 0; left: -6px; width: 14px; height: 14px; background: #ff435a; clip-path: polygon(0 0, 100% 0, 50% 100%); }

    /* Bootloader */
    .boot-menu { position: fixed; inset: 0; display: flex; z-index: 9999; font-family: 'JetBrains Mono', monospace; }
    .boot-half { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; transition: all 0.3s; }
    .boot-half.cyber { background: #0a0a0c; color: #10b981; border-right: 1px solid #1f1f2e; }
    .boot-half.cyber:hover { background: #050505; box-shadow: inset 0 0 80px rgba(16,185,129,0.15); }
    .boot-half.brutal { background: #FFFFFF; color: #111111; font-family: 'Inter', sans-serif; text-transform: uppercase; font-weight: 900; }
    .boot-half.brutal:hover { background: #f3f5f7; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const Icons = {
      Files: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>,
      Search: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>,
      Git: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><circle cx="18" cy="18" r="3"/><circle cx="6" cy="6" r="3"/><path d="M6 9v12"/><path d="M18 15v-2a3 3 0 0 0-3-3H9"/></svg>,
      Terminal: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>,
      Timeline: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>,
      Message: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>,
      Note: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>,
      Board: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="9" y1="3" x2="9" y2="21"/><line x1="15" y1="3" x2="15" y2="21"/></svg>,
      FileIcon: () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/><polyline points="13 2 13 9 20 9"/></svg>
    };

    const ZONES = ['default', '1', '2', '3', '4', '5', '6'];
    const ZONE_COLORS = { 'default': '#ffffff', '1': '#ff435a', '2': '#ffc410', '3': '#1e836d', '4': '#4285f4', '5': '#1e836d', '6': 'linear-gradient(135deg, #7161a4, #332b89)' };
    const OUTSIDE_COLORS = { 'default': '#ffffff', '1': '#ffffff', '2': '#ffffff', '3': '#ffffff', '4': '#ffffff', '5': '#808080', '6': '#1a0b2e' };

    const INITIAL_NODES = [
      { id: 'n1', type: 'entry', label: 'core_sys.py', isMain: true, x: 0, y: 0, vx: 0, vy: 0, themeIdx: 0, code: 'import torch\nimport sys\n\nprint("Central Architecture Booted")\n\ndef init_sequence():\n    # Core logic entry\n    pass', modified: false },
      { id: 'n2', type: 'function', label: 'load_network.py', isMain: false, x: 100, y: -100, vx: 0, vy: 0, themeIdx: 5, code: 'def load_network():\n    return DataLoader()\n\n# Network params defined here', modified: false },
      { id: 'n3', type: 'class', label: 'DataMatrix.py', isMain: false, x: -100, y: 150, vx: 0, vy: 0, themeIdx: 6, code: 'class DataMatrix:\n    def __init__(self):\n        self.active = True\n        self.buffer = []', modified: false },
    ];
    const INITIAL_EDGES = [ { id: 'e1', source: 'n1', target: 'n2' }, { id: 'e2', source: 'n1', target: 'n3' } ];

    const FloatingPanel = ({ title, isOpen, onClose, defaultX, defaultY, defaultW, defaultH, children }) => {
      const [pos, setPos] = useState({ x: defaultX, y: defaultY });
      const [size, setSize] = useState({ w: defaultW, h: defaultH });
      const [zIndex, setZIndex] = useState(100);

      const dragRef = useRef({ isDragging: false, startX: 0, startY: 0, initialX: 0, initialY: 0 });
      const resizeRef = useRef({ isResizing: false, startX: 0, startY: 0, initialW: 0, initialH: 0 });

      if (!isOpen) return null;

      const bringToFront = () => setZIndex(Date.now() % 100000 + 100);

      const onDragStart = (e) => {
        if (e.target.closest('.no-drag')) return;
        dragRef.current = { isDragging: true, startX: e.clientX, startY: e.clientY, initialX: pos.x, initialY: pos.y };
        e.currentTarget.setPointerCapture(e.pointerId);
        bringToFront();
      };
      const onDragMove = (e) => {
        if (!dragRef.current.isDragging) return;
        setPos({
          x: dragRef.current.initialX + (e.clientX - dragRef.current.startX),
          y: Math.max(0, dragRef.current.initialY + (e.clientY - dragRef.current.startY))
        });
      };
      const onDragEnd = (e) => { dragRef.current.isDragging = false; e.currentTarget.releasePointerCapture(e.pointerId); };

      const onResizeStart = (e) => {
        e.stopPropagation();
        resizeRef.current = { isResizing: true, startX: e.clientX, startY: e.clientY, initialW: size.w, initialH: size.h };
        e.currentTarget.setPointerCapture(e.pointerId);
        bringToFront();
      };
      const onResizeMove = (e) => {
        if (!resizeRef.current.isResizing) return;
        setSize({
          w: Math.max(200, resizeRef.current.initialW + (e.clientX - resizeRef.current.startX)),
          h: Math.max(150, resizeRef.current.initialH + (e.clientY - resizeRef.current.startY))
        });
      };
      const onResizeEnd = (e) => { resizeRef.current.isResizing = false; e.currentTarget.releasePointerCapture(e.pointerId); };

      return (
        <div className="floating-panel" style={{ left: pos.x, top: pos.y, width: size.w, height: size.h, zIndex }} onPointerDownCapture={bringToFront}>
          <div className="panel-hdr" style={{ cursor: 'grab' }} onPointerDown={onDragStart} onPointerMove={onDragMove} onPointerUp={onDragEnd} onPointerCancel={onDragEnd}>
            <span>{title}</span>
            <span className="no-drag" style={{ cursor: 'pointer', padding: '0 4px', opacity: 0.6 }} onClick={onClose}>✕</span>
          </div>
          <div className="panel-content-wrap">
            {children}
            <div className="panel-resizer" onPointerDown={onResizeStart} onPointerMove={onResizeMove} onPointerUp={onResizeEnd} onPointerCancel={onResizeEnd} />
          </div>
        </div>
      );
    };

    function IDE({ initialTheme }) {
      const [themeMode, setThemeMode] = useState(initialTheme);
      const [isBrutalDark, setIsBrutalDark] = useState(false);
      
      const nodesRef = useRef(JSON.parse(JSON.stringify(INITIAL_NODES)));
      const edgesRef = useRef(INITIAL_EDGES);
      const [, forceRender] = useState({});

      const [transform, setTransform] = useState({ x: window.innerWidth / 2, y: window.innerHeight / 2, scale: 1 });
      const [isDraggingCanvas, setIsDraggingCanvas] = useState(false);

      const [sidebarMode, setSidebarMode] = useState("files");
      const [bottomPanelTab, setBottomPanelTab] = useState('timeline'); // null, 'terminal', 'timeline'
      
      const [openTabs, setOpenTabs] = useState([]);
      const [activeTabId, setActiveTabId] = useState(null);

      const draggingNodeRef = useRef(null);
      const [hoveredNodeId, setHoveredNodeId] = useState(null);
      const lastMousePos = useRef({ x: 0, y: 0 });

      const activeTabNode = nodesRef.current.find(n => n.id === activeTabId);
      const currentActiveId = activeTabId || hoveredNodeId;
      const activeNode = nodesRef.current.find(n => n.id === currentActiveId);
      const activeZoneKey = activeNode ? ZONES[activeNode.themeIdx % ZONES.length] : "default";

      let wrapperClass = `app-wrapper theme-${themeMode} zone-${activeZoneKey}`;
      if (themeMode === "brutal" && isBrutalDark && activeZoneKey === "default") wrapperClass += " dark-mode";

      const outerBg = themeMode === "brutal"
        ? (isBrutalDark && activeZoneKey === "default" ? "#111111" : OUTSIDE_COLORS[activeZoneKey])
        : "#050505";

      const modifiedNodes = nodesRef.current.filter((n) => n.modified);

      useEffect(() => {
        let rafId;
        const tick = () => {
          let updated = false;
          const nodes = nodesRef.current;
          const edges = edgesRef.current;
          for (let i = 0; i < nodes.length; i++) {
            for (let j = i + 1; j < nodes.length; j++) {
              const dx = nodes[j].x - nodes[i].x; const dy = nodes[j].y - nodes[i].y;
              const distSq = dx * dx + dy * dy || 1; const dist = Math.sqrt(distSq);
              const force = 4000 / distSq;
              nodes[i].vx -= (dx / dist) * force; nodes[i].vy -= (dy / dist) * force;
              nodes[j].vx += (dx / dist) * force; nodes[j].vy += (dy / dist) * force;
            }
          }
          edges.forEach((edge) => {
            const src = nodes.find((n) => n.id === edge.source); const tgt = nodes.find((n) => n.id === edge.target);
            if (!src || !tgt) return;
            const dx = tgt.x - src.x; const dy = tgt.y - src.y;
            const dist = Math.sqrt(dx * dx + dy * dy) || 1;
            const force = (dist - 140) * 0.05;
            src.vx += (dx / dist) * force; src.vy += (dy / dist) * force;
            tgt.vx -= (dx / dist) * force; tgt.vy -= (dy / dist) * force;
          });
          nodes.forEach((n) => {
            const pullStrength = n.isMain ? 0.2 : 0.005;
            n.vx += (0 - n.x) * pullStrength; n.vy += (0 - n.y) * pullStrength;
            n.vx *= 0.8; n.vy *= 0.8;
            n.x += n.vx; n.y += n.vy;
            if (Math.abs(n.vx) > 0.05 || Math.abs(n.vy) > 0.05) updated = true;
          });
          if (draggingNodeRef.current) {
            const d = nodes.find((n) => n.id === draggingNodeRef.current.id);
            if (d) { d.x = draggingNodeRef.current.x; d.y = draggingNodeRef.current.y; d.vx = 0; d.vy = 0; updated = true; }
          }
          if (updated) forceRender({});
          rafId = requestAnimationFrame(tick);
        };
        rafId = requestAnimationFrame(tick);
        return () => cancelAnimationFrame(rafId);
      }, []);

      const handleCanvasPointerDown = (e) => {
        if (e.target.closest(".obs-node-wrapper") || e.target.closest(".floating-panel") || e.target.closest(".modal-overlay")) return;
        setIsDraggingCanvas(true);
        lastMousePos.current = { x: e.clientX, y: e.clientY };
      };
      const handleCanvasPointerMove = (e) => {
        if (isDraggingCanvas) {
          const dx = e.clientX - lastMousePos.current.x; const dy = e.clientY - lastMousePos.current.y;
          setTransform((prev) => ({ ...prev, x: prev.x + dx, y: prev.y + dy }));
          lastMousePos.current = { x: e.clientX, y: e.clientY };
        } else if (draggingNodeRef.current) {
          const dx = (e.clientX - lastMousePos.current.x) / transform.scale; const dy = (e.clientY - lastMousePos.current.y) / transform.scale;
          draggingNodeRef.current.x += dx; draggingNodeRef.current.y += dy;
          lastMousePos.current = { x: e.clientX, y: e.clientY };
        }
      };
      const handleCanvasPointerUp = () => { setIsDraggingCanvas(false); draggingNodeRef.current = null; };
      const handleWheel = (e) => {
        if (e.target.closest(".code-area") || e.target.closest(".floating-panel")) return;
        e.preventDefault();
        setTransform((prev) => ({ ...prev, scale: Math.min(Math.max(0.3, prev.scale * (e.deltaY > 0 ? 0.9 : 1.1)), 2.5) }));
      };

      const openNodeInEditor = (id) => { setOpenTabs((tabs) => (tabs.includes(id) ? tabs : [...tabs, id])); setActiveTabId(id); };

      return (
        <div style={{ width: '100vw', height: '100vh', padding: themeMode === 'brutal' ? '40px' : '0px', backgroundColor: outerBg, transition: 'all 0.4s ease', boxSizing: 'border-box' }}>
          <div className={wrapperClass}>
            
            <div className="app-header">
              <div className="hdr-brand">
                <Icons.Search /> FORBINDEN // {themeMode.toUpperCase()} IDE
              </div>
              <div style={{ display: 'flex', gap: '10px', alignItems: 'center' }}>
                {themeMode === 'brutal' && (
                  <button className="btn" onClick={() => setIsBrutalDark(!isBrutalDark)}>
                    {isBrutalDark ? 'LIGHT MODE' : 'DARK MODE'}
                  </button>
                )}
                <button className="btn" onClick={() => setThemeMode(themeMode === 'cyber' ? 'brutal' : 'cyber')}>
                  SWAP ENGINE
                </button>
              </div>
            </div>

            <div className="app-body">
              <div className="sidebar">
                <div className={`strip-icon ${sidebarMode === 'files' ? 'active' : ''}`} onClick={() => setSidebarMode(sidebarMode === 'files' ? null : 'files')}><Icons.Files /></div>
                <div className={`strip-icon ${sidebarMode === 'search' ? 'active' : ''}`} onClick={() => setSidebarMode(sidebarMode === 'search' ? null : 'search')}><Icons.Search /></div>
                <div className={`strip-icon ${sidebarMode === 'git' ? 'active' : ''}`} onClick={() => setSidebarMode(sidebarMode === 'git' ? null : 'git')}>
                  <Icons.Git />{modifiedNodes.length > 0 && <div className="badge">{modifiedNodes.length}</div>}
                </div>
                
                <div className={`strip-icon ${sidebarMode === 'chat' ? 'active' : ''}`} onClick={() => setSidebarMode(sidebarMode === 'chat' ? null : 'chat')}><Icons.Message /></div>
                <div className={`strip-icon ${sidebarMode === 'note' ? 'active' : ''}`} onClick={() => setSidebarMode(sidebarMode === 'note' ? null : 'note')}><Icons.Note /></div>
                <div className={`strip-icon ${sidebarMode === 'board' ? 'active' : ''}`} onClick={() => setSidebarMode(sidebarMode === 'board' ? null : 'board')}><Icons.Board /></div>

                <div style={{flex: 1}}></div>
                
                <div className={`strip-icon ${bottomPanelTab === 'timeline' ? 'active' : ''}`} onClick={() => setBottomPanelTab(bottomPanelTab === 'timeline' ? null : 'timeline')}><Icons.Timeline /></div>
                <div className={`strip-icon ${bottomPanelTab === 'terminal' ? 'active' : ''}`} onClick={() => setBottomPanelTab(bottomPanelTab === 'terminal' ? null : 'terminal')}><Icons.Terminal /></div>
              </div>

              <FloatingPanel title="EXPLORER" isOpen={sidebarMode === 'files'} onClose={() => setSidebarMode(null)} defaultX={80} defaultY={80} defaultW={280} defaultH={500}>
                <div style={{ flex: 1, overflowY: 'auto', paddingTop: '8px' }}>
                  <div style={{ padding: '0 20px', marginBottom: '8px', fontSize: '9px', opacity: 0.6, fontWeight: 'bold' }}>GRAPH WORKSPACE</div>
                  {nodesRef.current.map(n => (
                    <div key={'expl_'+n.id} className="list-item" onClick={() => openNodeInEditor(n.id)}>
                      <Icons.FileIcon /> <span style={{color: n.modified ? '#ffc410' : 'inherit'}}>{n.label}</span>
                    </div>
                  ))}
                </div>
              </FloatingPanel>

              <FloatingPanel title="COMMUNICATIONS" isOpen={sidebarMode === 'chat'} onClose={() => setSidebarMode(null)} defaultX={380} defaultY={80} defaultW={300} defaultH={400}>
                <div className="chat-wrap">
                  <div className="chat-messages">
                    <div className="chat-msg"><strong>Operator_1:</strong> Architecture booted. Testing WebSockets.</div>
                    <div className="chat-msg"><strong>System:</strong> Sync established.</div>
                  </div>
                  <div className="chat-input-wrap">
                    <input className="side-input" placeholder="Broadcast message..." style={{flex:1}} />
                    <button className="btn">SEND</button>
                  </div>
                </div>
              </FloatingPanel>

              <FloatingPanel title="OPERATOR NOTES" isOpen={sidebarMode === 'note'} onClose={() => setSidebarMode(null)} defaultX={100} defaultY={120} defaultW={300} defaultH={300}>
                <textarea 
                  className="code-area" 
                  style={{ width: '100%', height: '100%', resize: 'none' }}
                  placeholder="Personal scratchpad. Notes saved locally..."
                />
              </FloatingPanel>

              <FloatingPanel title="PLANNING BOARD" isOpen={sidebarMode === 'board'} onClose={() => setSidebarMode(null)} defaultX={200} defaultY={100} defaultW={650} defaultH={450}>
                <div className="kanban-board">
                  <div className="kanban-col">
                    <div className="kanban-col-title">TO DO</div>
                    <div className="kanban-card">Integrate Websocket Sync</div>
                    <div className="kanban-card">Setup Gemini Prompts</div>
                  </div>
                  <div className="kanban-col">
                    <div className="kanban-col-title">IN PROGRESS</div>
                    <div className="kanban-card">Draft Graph UI</div>
                  </div>
                  <div className="kanban-col" style={{borderRight: 'none'}}>
                    <div className="kanban-col-title">DONE</div>
                    <div className="kanban-card">Initialize Babel setup</div>
                  </div>
                </div>
              </FloatingPanel>

              <FloatingPanel 
                title={
                  <div style={{display:'flex', gap:'16px'}}>
                    <span style={{cursor:'pointer', opacity: bottomPanelTab === 'terminal' ? 1 : 0.5}} onClick={() => setBottomPanelTab('terminal')}>TERMINAL</span>
                    <span style={{cursor:'pointer', opacity: bottomPanelTab === 'timeline' ? 1 : 0.5}} onClick={() => setBottomPanelTab('timeline')}>GIT NLE TIMELINE</span>
                  </div>
                } 
                isOpen={!!bottomPanelTab} 
                onClose={() => setBottomPanelTab(null)} 
                defaultX={200} defaultY={window.innerHeight - 340} defaultW={800} defaultH={280}
              >
                {bottomPanelTab === 'terminal' && (
                  <div className="term-content">
                    <div style={{color: '#28f1c3'}}>[WS] Connected to backend.</div>
                    <div>Awaiting commands...</div>
                  </div>
                )}
                
                {/* NON-LINEAR EDITOR TIMELINE VIEW */}
                {bottomPanelTab === 'timeline' && (
                  <div className="nle-wrap">
                    <div className="nle-body">
                      
                      {/* Left: Track Headers */}
                      <div className="nle-track-headers">
                        <div className="nle-ruler" style={{borderBottom: 'none'}}></div>
                        <div className="nle-track-header">
                          <span>MAIN REPO</span>
                          <Icons.Git />
                        </div>
                        <div className="nle-track-header">
                          <span>OPERATOR 1</span>
                          <div style={{width: '8px', height: '8px', background: '#ff435a', borderRadius: '50%'}}></div>
                        </div>
                        <div className="nle-track-header">
                          <span>OPERATOR 2</span>
                          <div style={{width: '8px', height: '8px', background: '#4285f4', borderRadius: '50%'}}></div>
                        </div>
                      </div>
                      
                      {/* Right: Scrollable Tracks Area */}
                      <div style={{flex: 1, overflowX: 'auto', display: 'flex', flexDirection: 'column'}}>
                        
                        <div className="nle-ruler">
                            <div className="nle-ruler-tick major" style={{left: '50px'}}>v1.0</div>
                            <div className="nle-ruler-tick" style={{left: '100px'}}></div>
                            <div className="nle-ruler-tick major" style={{left: '150px'}}>v1.1</div>
                            <div className="nle-ruler-tick" style={{left: '200px'}}></div>
                            <div className="nle-ruler-tick major" style={{left: '250px'}}>v1.2</div>
                            <div className="nle-ruler-tick" style={{left: '300px'}}></div>
                            <div className="nle-ruler-tick major" style={{left: '350px'}}>v1.3</div>
                            <div className="nle-ruler-tick" style={{left: '400px'}}></div>
                            <div className="nle-ruler-tick major" style={{left: '450px'}}>v1.4</div>
                            <div className="nle-ruler-tick" style={{left: '500px'}}></div>
                            <div className="nle-ruler-tick major" style={{left: '550px'}}>v1.5</div>
                        </div>
                        
                        <div className="nle-tracks">
                            {/* The Scrubber / Playhead */}
                            <div className="nle-playhead" style={{left: '380px'}}></div>
                            
                            {/* Track 1: Main */}
                            <div className="nle-track-lane">
                              <div className="nle-clip" style={{left: '50px', width: '80px', background: 'transparent', color: 'var(--text)'}}>Init repo</div>
                              <div className="nle-clip" style={{left: '220px', width: '120px', background: 'transparent', color: 'var(--text)'}}>Merge PR #1</div>
                            </div>
                            
                            {/* Track 2: Operator 1 */}
                            <div className="nle-track-lane">
                              <div className="nle-clip" style={{left: '100px', width: '150px', background: 'rgba(255, 67, 90, 0.2)', borderColor: '#ff435a', color: 'var(--text)'}}>Write core_sys.py</div>
                              <div className="nle-clip" style={{left: '380px', width: '100px', background: 'rgba(255, 67, 90, 0.2)', borderColor: '#ff435a', color: 'var(--text)'}}>Fix pipeline</div>
                            </div>
                            
                            {/* Track 3: Operator 2 */}
                            <div className="nle-track-lane">
                              <div className="nle-clip" style={{left: '250px', width: '200px', background: 'rgba(66, 133, 244, 0.2)', borderColor: '#4285f4', color: 'var(--text)'}}>DataMatrix class setup</div>
                            </div>
                        </div>
                        
                      </div>
                    </div>
                  </div>
                )}
              </FloatingPanel>

              {/* MAIN CANVAS */}
              <div className="main-view">
                <div 
                  className="canvas-container"
                  onPointerDown={handleCanvasPointerDown} onPointerMove={handleCanvasPointerMove}
                  onPointerUp={handleCanvasPointerUp} onPointerLeave={handleCanvasPointerUp} onWheel={handleWheel}
                >
                  <div className="canvas-bg"></div>
                  <div className="graph-layer" style={{ transform: `translate(${transform.x}px, ${transform.y}px) scale(${transform.scale})` }}>
                    <svg className="svg-edges">
                      {edgesRef.current.map(edge => {
                        const src = nodesRef.current.find(n => n.id === edge.source);
                        const tgt = nodesRef.current.find(n => n.id === edge.target);
                        if (!src || !tgt) return null;
                        return <path key={edge.id} className="edge-path" d={`M ${src.x} ${src.y} L ${tgt.x} ${tgt.y}`} />
                      })}
                    </svg>

                    {nodesRef.current.map(node => (
                      <div 
                        key={node.id} 
                        className={`obs-node-wrapper clr-${ZONES[node.themeIdx % ZONES.length]}`}
                        style={{ left: node.x + 'px', top: node.y + 'px', opacity: hoveredNodeId && hoveredNodeId !== node.id && !activeTabId ? 0.3 : 1 }}
                        onPointerEnter={() => !activeTabId && !isDraggingCanvas && setHoveredNodeId(node.id)}
                        onPointerLeave={() => !activeTabId && setHoveredNodeId(null)}
                        onPointerDown={(e) => { e.stopPropagation(); draggingNodeRef.current = { id: node.id, x: node.x, y: node.y }; lastMousePos.current = { x: e.clientX, y: e.clientY }; }}
                        onPointerUp={(e) => { openNodeInEditor(node.id); draggingNodeRef.current = null; }}
                      >
                        <div className={`node-circle ${node.isMain ? 'main-node' : 'sub-node'}`}></div>
                        <div className="node-label">
                          {node.label}
                          {node.modified && <span className="modified-dot"></span>}
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            </div>

            <div className="status-bar">
              <div className="status-group">
                <span>CONNECTED</span>
                <span>{themeMode.toUpperCase()} ENGINE</span>
              </div>
            </div>

            {/* EDITOR MODAL */}
            <div className={`modal-overlay ${activeTabId ? 'open' : ''}`} onPointerDown={() => setActiveTabId(null)}>
              {activeTabNode && (
                <div className="modal-content" onPointerDown={e => e.stopPropagation()}>
                  <div className="tabs-hdr">
                    {openTabs.map(id => {
                      const n = nodesRef.current.find(x => x.id === id);
                      if (!n) return null;
                      return (
                        <div key={id} className={`editor-tab ${activeTabId === id ? 'active' : ''}`} onClick={() => setActiveTabId(id)}>
                          <div style={{display:'flex', alignItems:'center', gap:'8px'}}>
                            <Icons.FileIcon /> <span>{n.label}</span>
                          </div>
                          <div className="tab-close" onClick={(e) => {
                            e.stopPropagation();
                            const newTabs = openTabs.filter((t) => t !== id);
                            setOpenTabs(newTabs);
                            if (activeTabId === id) setActiveTabId(newTabs.length ? newTabs[newTabs.length - 1] : null);
                          }}>✕</div>
                        </div>
                      )
                    })}
                  </div>
                  <div className="modal-body">
                    <div className="editor-main-area">
                      <div className="modal-code-wrap">
                        <div className="editor-wrap">
                          <textarea 
                            className="code-area" 
                            value={activeTabNode.code}
                            onChange={e => {
                               const node = nodesRef.current.find(n => n.id === activeTabNode.id);
                               if(node) { node.code = e.target.value; node.modified = true; forceRender({}); }
                            }}
                            spellCheck="false"
                          />
                        </div>
                      </div>
                    </div>
                  </div>
                </div>
              )}
            </div>

          </div>
        </div>
      );
    }

    function Bootloader() {
      const [theme, setTheme] = useState(null);
      if (theme) return <IDE initialTheme={theme} />;
      return (
        <div className="boot-menu">
          <div className="boot-half cyber" onClick={() => setTheme('cyber')}>
            <div style={{ fontSize: '36px', fontWeight: '700', marginBottom: '8px' }}>OBSIDIAN CORE</div>
            <div style={{ fontSize: '12px', opacity: 0.6 }}>DARK MODE // EDGE-TO-EDGE // MODERN IDE</div>
          </div>
          <div className="boot-half brutal" onClick={() => setTheme('brutal')}>
            <div style={{ fontSize: '36px', fontWeight: '900', marginBottom: '8px' }}>FORSAKEN CORE</div>
            <div style={{ fontSize: '12px', opacity: 0.6, fontWeight: '700' }}>BRUTALIST // THICK MARGINS // COLOR FLOOD</div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<Bootloader />);
  </script>
</body>
</html>
